<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Admin Registration</title>

<style>

body{
margin:0;
font-family:Arial;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:350px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#1565c0;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#0d47a1;
}

#msg{
margin-top:15px;
text-align:center;
font-weight:bold;
}

</style>
</head>

<body>

<div class="box">

<h2>Admin Registration</h2>

<input type="text" id="name" placeholder="Admin Name">

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="registerAdmin()">
Register Admin
</button>

<p id="msg"></p>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
getDatabase,
ref,
set
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";


const firebaseConfig = {

apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getDatabase(app);


window.registerAdmin = async function(){

const name =
document.getElementById("name").value.trim();

const email =
document.getElementById("email").value.trim();

const password =
document.getElementById("password").value.trim();

const msg =
document.getElementById("msg");

if(!name || !email || !password){

msg.innerText = "Fill all fields";
return;

}

try{

msg.innerText = "Creating Admin...";

const userCred =
await createUserWithEmailAndPassword(
auth,
email,
password
);

const uid = userCred.user.uid;

/* SAVE ADMIN DATA */

await set(ref(db,"users/"+uid),{

uid:uid,
name:name,
email:email,
role:"admin"

});

msg.innerText = "Admin Created Successfully";

/* AUTO LOGIN SESSION */

localStorage.setItem("uid",uid);
localStorage.setItem("role","admin");

/* REDIRECT */

setTimeout(()=>{

window.location.href = "admin.html";

},1000);

}
catch(err){

msg.innerText = err.message;

}

};

</script>

</body>
</html>
