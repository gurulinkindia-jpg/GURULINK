<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Payment - GURULINK</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
margin:0;
text-align:center;
}

.container{
max-width:500px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

img{
width:250px;
margin:15px 0;
}

input,button{
width:90%;
padding:12px;
margin:10px 0;
}

button{
background:green;
color:white;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>GURULINK Payment</h2>

<p id="msg"></p>

<img id="qr" src="">

<p><b>UPI:</b> 9706380357@ucobank</p>

<input type="file" id="screenshot" accept="image/*">
<input type="text" id="utr" placeholder="Enter UTR / Transaction ID">

<button onclick="submitPayment()">Submit Payment</button>

<p style="color:green;font-weight:bold;margin-top:10px;">
After approval your profile will be visible publicly.
</p>

<p style="color:#555;font-size:13px;">
For help contact: 9706380357
</p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.firebasestorage.app",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* GET TYPE */
const params = new URLSearchParams(window.location.search);
const type = params.get("type");
const category = params.get("category");

/* SET AMOUNT */
let amount = (type === "institution") ? 200 : 100;

document.getElementById("msg").innerText =
`Registration Fee ₹${amount}`;

/* QR */
document.getElementById("qr").src =
`https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=upi://pay?pa=9706380357@ucobank&pn=G10Group&am=${amount}&cu=INR`;

/* IMGBB UPLOAD */
async function uploadImg(file){

const apiKey = "31f729ff855eb2e42c00ee508a8647ea";

let form = new FormData();
form.append("image", file);

let res = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
method:"POST",
body:form
});

let data = await res.json();
return data.data.url;
}

/* SUBMIT */
window.submitPayment = async function(){

let utr = document.getElementById("utr").value;
let file = document.getElementById("screenshot").files[0];

if(!utr){
alert("Enter UTR");
return;
}

let imgURL = "";

if(file){
imgURL = await uploadImg(file);
}

/* SAVE PAYMENT */
push(ref(db,"payments"),{
type:type,
category:category,
amount:amount,
utr:utr,
screenshot:imgURL,
status:"pending"
});

alert(
"Payment Successful Submitted!\n\nYour profile will be visible after admin approval.\nFor help: 9706380357"
);

window.location.href = "index.html";

};

</script>

</body>
</html>
