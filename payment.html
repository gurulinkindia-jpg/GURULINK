<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>GURULINK Payment</title>

<style>

body{
font-family:Arial;
background:#eef2f7;
margin:0;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
text-align:center;
}

h2{
color:#0d47a1;
}

img.qr{
width:250px;
margin:15px 0;
border-radius:10px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#1b5e20;
color:white;
font-size:16px;
cursor:pointer;
margin-top:15px;
}

button:disabled{
background:gray;
}

.preview{
margin-top:15px;
}

.preview img{
width:150px;
border-radius:10px;
border:1px solid #ddd;
}

.note{
margin-top:15px;
color:green;
font-weight:bold;
}

.help{
font-size:13px;
color:#555;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>GURULINK Payment</h2>

<h3 id="feeText"></h3>

<p>Scan QR and complete payment</p>

<img
class="qr"
id="qr"
src="">

<p>

<b>UPI:</b>

9706380357@ucobank

</p>


<input
type="file"
id="screenshot"
accept="image/*">

<div
class="preview"
id="preview"></div>


<input
type="text"
id="utr"
placeholder="Enter UTR / Transaction ID">


<button
id="payBtn"
onclick="submitPayment()">

Submit Payment

</button>


<div class="note">

Your profile will become public after admin approval.

</div>

<div class="help">

Customer Care: 9706380357

</div>

</div>


<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getDatabase,
ref,
push
}
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";


const firebaseConfig={

apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"

};


const app=
initializeApp(firebaseConfig);

const db=
getDatabase(app);



const API_KEY=
"31f729ff855eb2e42c00ee508a8647ea";



/* GET URL PARAMETERS */

const params=
new URLSearchParams(
window.location.search
);

const type=
params.get("type") || "teacher";

const category=
params.get("category") || "";



/* AMOUNT */

let amount=
type==="institution"
?
2
:
1;



feeText.innerHTML=
`Registration Fee ₹${amount}`;



/* QR */

qr.src=

`https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=upi://pay?pa=9706380357@ucobank&pn=G10Group&am=${amount}&cu=INR`;




/* IMAGE PREVIEW */

screenshot.addEventListener(
"change",
function(){

preview.innerHTML="";

if(this.files[0]){

let img=
document.createElement(
"img"
);

img.src=
URL.createObjectURL(
this.files[0]
);

preview.appendChild(
img
);

}

}
);




/* IMGBB */

async function uploadImage(file){

let fd=
new FormData();

fd.append(
"image",
file
);

let response=
await fetch(
`https://api.imgbb.com/1/upload?key=${API_KEY}`,
{
method:"POST",
body:fd
}
);

let data=
await response.json();

return data.data.url;

}




window.submitPayment=
async function(){

let utr=
document.getElementById(
"utr"
).value.trim();

if(!utr){

alert(
"Please enter transaction ID"
);

return;

}


payBtn.disabled=true;

payBtn.innerHTML=
"Uploading...";


let imageURL="";


if(
screenshot.files[0]
){

imageURL=
await uploadImage(
screenshot.files[0]
);

}



/* SAVE */

await push(
ref(db,"payments"),
{

type:type,

category:category,

amount:amount,

utr:utr,

screenshot:imageURL,

status:"pending",

date:
new Date().toLocaleString()

}

);



alert(

"Payment submitted successfully!\n\nYour profile will be visible after admin approval.\n\nFor help call: 9706380357"

);



window.location.href=
"index.html";

}

</script>

</body>
</html>
