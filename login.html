<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:350px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#1565c0;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="loginUser()">Login</button>

<p id="msg"></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { 
getAuth, 
signInWithEmailAndPassword 
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import { 
getDatabase, 
ref, 
get 
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

/* Firebase Config */
const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

window.loginUser = async function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;
const msg = document.getElementById("msg");

msg.innerText = "Logging in...";

try {

const userCred = await signInWithEmailAndPassword(auth, email, password);
const uid = userCred.user.uid;

/* GET USER DATA FROM DB */
const snap = await get(ref(db, "users/" + uid));

if(!snap.exists()){
msg.innerText = "User profile not found in database";
return;
}

const data = snap.val();

/* SAVE SESSION */
localStorage.setItem("uid", uid);
localStorage.setItem("role", data.role);
localStorage.setItem("profileId", data.profileId || uid);

/* REDIRECT BASED ON ROLE */
if(data.role === "teacher"){
window.location.href = "teacher-dashboard.html";
}
else if(data.role === "admin"){
window.location.href = "admin.html";
}
else if(data.role === "institute"){
window.location.href = "institution-register.html";
}
else{
msg.innerText = "Unknown role";
}

}
catch(err){
msg.innerText = "Error: " + err.message;
}

};

</script>

</body>
</html>
