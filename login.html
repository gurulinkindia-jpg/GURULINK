<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login - GuruLink</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#1565c0,#42a5f5);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
width:90%;
max-width:380px;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
color:#1565c0;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:8px;
outline:none;
font-size:14px;
}

input:focus{
border-color:#1565c0;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#1565c0;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0d47a1;
}

#msg{
margin-top:10px;
color:red;
font-size:14px;
}

.logo{
font-size:22px;
font-weight:bold;
color:#1565c0;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">GURULINK</div>
<h2>Teacher Login</h2>

<input id="input" placeholder="Email or Phone">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="msg"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const app = initializeApp({
apiKey:"YOUR_KEY",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db = getDatabase(app);

window.login = async () => {

const input = document.getElementById("input").value.trim();
const pass = document.getElementById("password").value.trim();
const msg = document.getElementById("msg");

msg.style.color = "red";
msg.innerText = "";

if(!input || !pass){
msg.innerText = "Please fill all fields";
return;
}

const snap = await get(ref(db,"users"));

let found = null;

snap.forEach(child => {
let u = child.val();

if(
(u.email === input || u.phone === input) &&
u.password === pass
){
found = {id: child.key, ...u};
}
});

if(found){

if(found.role !== "teacher"){
msg.innerText = "Only teachers can login here";
return;
}

localStorage.setItem("user", JSON.stringify(found));

msg.style.color = "green";
msg.innerText = "Login successful...";

setTimeout(()=>{
window.location = "teacher-dashboard.html";
},800);

}else{
msg.innerText = "Invalid email/phone or password";
}

};

</script>

</body>
</html>
