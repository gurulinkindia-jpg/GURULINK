<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - GURULINK</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:350px;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h2{
text-align:center;
margin-bottom:20px;
color:#1565c0;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#1565c0;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

#msg{
margin-top:10px;
text-align:center;
font-size:14px;
color:red;
}

.link{
text-align:center;
margin-top:15px;
}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="loginUser()">Login</button>

<p id="msg"></p>

<div class="link">
<a href="register.html">Create Account</a>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

window.loginUser = async function(){

const email = document.getElementById("email").value.trim().toLowerCase();
const password = document.getElementById("password").value;
const msg = document.getElementById("msg");

msg.style.color = "#1565c0";
msg.innerText = "Logging in...";

try{

// 1. Firebase Auth Login
const cred = await signInWithEmailAndPassword(auth, email, password);
const uid = cred.user.uid;

// 2. Detect role (ONLY ONE SOURCE)
let role = null;

// teacher
let snap = await get(ref(db,"teachers/"+uid));
if(snap.exists()) role = "teacher";

// institution
if(!role){
snap = await get(ref(db,"institutions/"+uid));
if(snap.exists()) role = "institution";
}

// admin (FIXED PATH)
if(!role){
snap = await get(ref(db,"users/"+uid));
if(snap.exists() && snap.val().role === "admin"){
role = "admin";
}
}

// student
if(!role){
snap = await get(ref(db,"students/"+uid));
if(snap.exists()) role = "student";
}

// 3. If no role
if(!role){
msg.style.color = "red";
msg.innerText = "No profile found!";
return;
}

// 4. SAVE SESSION (CLEAN)
localStorage.setItem("uid", uid);
localStorage.setItem("role", role);
localStorage.setItem("profileId", uid);

// 5. REDIRECT (FIXED SEPARATION)
if(role === "teacher"){
window.location.href = "teacher-dashboard.html";
}

else if(role === "institution"){
window.location.href = "institution-dashboard.html";
}

else if(role === "admin"){
window.location.href = "admin.html";
}

else if(role === "student"){
window.location.href = "student-dashboard.html";
}

}
catch(err){
console.log(err);
msg.style.color = "red";
msg.innerText = err.message;
}

};

</script>

</body>
</html>
