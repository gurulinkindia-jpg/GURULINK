<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Payment Success</title>

<style>

body{
font-family:Arial,sans-serif;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:30px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.15);
width:350px;
}

h2{
margin-top:0;
}

</style>
</head>

<body>

<div class="box">

<h2>Payment Processing...</h2>

<p id="msg">
Saving payment details...
</p>

</div>

<script type="module">

import {
initializeApp
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getDatabase,
ref,
push,
get,
set
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

import {
getAuth
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";


/* FIREBASE */

const firebaseConfig = {

apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",

authDomain:"gurulink-59cc7.firebaseapp.com",

databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"gurulink-59cc7",

storageBucket:"gurulink-59cc7.appspot.com",

messagingSenderId:"112148672399",

appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"

};


const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const auth = getAuth(app);



/* URL PARAMS */

const params =
new URLSearchParams(window.location.search);

const type =
params.get("type") || "teacher";

let id =
params.get("id");


/* LOCAL STORAGE FALLBACK */

if(!id){

id =

type === "institution"

?

localStorage.getItem("institutionId")

:

localStorage.getItem("teacherId");

}


/* CHECK */

if(!id){

document.getElementById("msg").innerHTML =

"Profile ID missing. Please login again.";

throw new Error("Missing Profile ID");

}


/* AMOUNT */

const amount =

type === "institution"

?

200

:

100;



/* MAIN */

async function savePayment(){

try{

let user = null;


/* PATH */

const path =

type === "teacher"

?

"teachers/" + id

:

"institutions/" + id;


/* GET PROFILE */

const snap = await get(ref(db,path));


if(snap.exists()){

user = snap.val();

}else{

document.getElementById("msg").innerHTML =

"Profile not found.";

throw new Error("Profile not found");

}



/* SAVE PAYMENT */

const paymentRef = push(ref(db,"payments"));

await set(paymentRef,{

paymentId:paymentRef.key,

type:type,

profileId:id,

uid:id,

name:user.name || "",

email:user.email || "",

phone:user.phone || "",

address:user.address || "",

website:user.website || "",

class:user.class || "",

subjects:user.subjects || [],

teachingModes:user.teachingModes || [],

homeFee:user.homeFee || "",

groupFee:user.groupFee || "",

onlineFee:user.onlineFee || "",

amount:amount,

status:"paid",

date:new Date().toLocaleString(),

createdAt:Date.now()

});


/* UPDATE PAYMENT STATUS */

await set(ref(db,path+"/paymentStatus"),"paid");


/* LOCAL STORAGE */

localStorage.setItem("paymentDone","yes");


document.getElementById("msg").innerHTML =

"Payment successful! Redirecting...";


/* REDIRECT */

setTimeout(()=>{

if(type==="teacher"){

window.location.href =

`profile-view.html?type=teacher&id=${id}`;

}
else if(type==="institution"){

window.location.href =

`profile-view.html?type=institution&id=${id}`;

}
else{

window.location.href = "index.html";

}

},2000);

}
catch(err){

console.log(err);

document.getElementById("msg").innerHTML =

"Payment save failed.<br><br>" + err.message;

}

}


savePayment();

</script>

</body>
</html>
