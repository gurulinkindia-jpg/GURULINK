<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Payment Success</title>

<style>
body{
font-family:Arial,sans-serif;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:30px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.15);
width:350px;
}
</style>
</head>

<body>

<div class="box">
<h2>Payment Processing...</h2>
<p id="msg">Saving payment details...</p>
</div>

<script type="module">

import {
initializeApp
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getDatabase,
ref,
push,
get,
child
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";


/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain: "gurulink-59cc7.firebaseapp.com",
databaseURL: "https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "gurulink-59cc7",
storageBucket: "gurulink-59cc7.appspot.com",
messagingSenderId: "112148672399",
appId: "1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);


/* URL PARAMS */
const params = new URLSearchParams(window.location.search);

const type = params.get("type") || "teacher";
const id = params.get("id");
console.log("TYPE:", type);
console.log("ID:", id);


/* AMOUNT */
const amount = type === "institution" ? 2 : 1;


/* MAIN */
try {

let user = null;

/* FETCH USER DATA */
if (id) {

const path = type === "teacher"
? `teachers/${id}`
: `institutions/${id}`;

const snap = await get(ref(db, path));

if (snap.exists()) {
user = snap.val();
} else {
console.log("NO USER FOUND IN DB:", path);
}

} else {
console.log("ID IS MISSING IN URL");
}



/* SAVE PAYMENT */
await push(ref(db, "payments"), {

  type,
  id,

  name: (user && user.name) ? user.name : "NOT FOUND",
  email: user?.email || "-",
  phone: user?.phone || "-",
  class: user?.class || "-",
  website: user?.website || "-",
  address: user?.address || "-",

  homeFee: user?.homeFee || "",
  groupFee: user?.groupFee || "",
  onlineFee: user?.onlineIndividualFee || "",

  amount,
  status: "paid",
  date: new Date().toLocaleString(),
  createdAt: Date.now()

});


document.getElementById("msg").innerHTML =
"Payment successful! Redirecting...";

setTimeout(() => {
window.location.href = "index.html";
}, 2000);

}
catch (err) {

console.log(err);

document.getElementById("msg").innerHTML =
"Payment saved with error. Please contact support.";

}

</script>

</body>
</html>
