<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>GURULINK INDIA</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f4f7fb;
}

/* NAVBAR */
header{
background:#0f172a;
color:white;
padding:15px 5%;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:26px;
font-weight:bold;
}

.logo span{
color:#38bdf8;
}

.right{
display:flex;
align-items:center;
gap:12px;
}

.login-btn{
background:#38bdf8;
color:white;
padding:10px 14px;
border-radius:8px;
text-decoration:none;
font-weight:600;
}

.profile{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
border:2px solid white;
display:none;
cursor:pointer;
}

/* HERO */
.hero{
min-height:90vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url('https://images.unsplash.com/photo-1523240795612-9a054b0db644') center/cover;
color:white;
}

.hero h1{
font-size:48px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
opacity:.9;
}

.nav-links{
margin-top:20px;
}

.nav-links a{
color:white;
margin:10px;
text-decoration:none;
padding:10px 15px;
background:#38bdf8;
border-radius:8px;
display:inline-block;
}
</style>
</head>

<body>

<header>

<div class="logo">GURU<span>LINK</span></div>

<div class="right">

<a href="login.html" class="login-btn" id="loginBtn">Login</a>

<img id="profilePic" class="profile">

</div>

</header>

<section class="hero">

<div>

<h1>India’s Smart Learning Platform</h1>

<p>Teachers • Institutes • Students • Skills</p>

<div class="nav-links">

<a href="academic-teacher.html">Academic</a>
<a href="skill-teacher.html">Skill</a>
<a href="sport-teacher.html">Sports</a>
<a href="creative-teacher.html">Creative</a>

</div>

</div>

</section>

<script type="module">

/* ================= FIREBASE ================= */

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

/* ================= SESSION ================= */

const studentUid = localStorage.getItem("studentUid");
const teacherUid = localStorage.getItem("uid");
const adminUid = localStorage.getItem("adminUid");

const loginBtn = document.getElementById("loginBtn");
const profilePic = document.getElementById("profilePic");

let uid = studentUid || teacherUid || adminUid;

/* ================= PROFILE LOAD ================= */

async function loadProfile(){

if(!uid) return;

/* HIDE LOGIN */
loginBtn.style.display = "none";
profilePic.style.display = "block";

/* FIND ROLE PATH */
let path = "";

if(studentUid) path = "students/" + studentUid;
if(teacherUid) path = "teachers/" + teacherUid;
if(adminUid) path = "admins/" + adminUid;

/* TRY FETCH PROFILE */
try{

const snap = await get(ref(db, path));

let data = snap.exists() ? snap.val() : null;

/* IMAGE PRIORITY */
let img =
data?.photo ||
data?.logo ||
localStorage.getItem("profilePhoto") ||
"https://i.ibb.co/2kR5X3R/user.png";

profilePic.src = img;

/* CLICK REDIRECT */
profilePic.onclick = () => {

if(studentUid) window.location.href = "profile-view.html?id=" + studentUid;
else if(teacherUid) window.location.href = "teacher-dashboard.html";
else window.location.href = "admin.html";

};

}
catch(err){
console.log(err);
}

}

loadProfile();

/* ================= REDIRECT FIX ================= */

const redirect = localStorage.getItem("redirectAfterLogin");

if(redirect && uid){
localStorage.removeItem("redirectAfterLogin");
window.location.href = redirect;
}

</script>

</body>
</html>
