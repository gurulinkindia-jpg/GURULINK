<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GURULINK INDIA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f7fb;
}

/* NAVBAR */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 5%;
background:#0f172a;
color:white;
position:sticky;
top:0;
z-index:1000;
flex-wrap:wrap;
gap:10px;
}

.logo{
font-size:22px;
font-weight:700;
}
.logo span{color:#38bdf8}

/* LEFT BUTTONS */
.left-actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.left-actions button{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:13px;
background:#38bdf8;
color:white;
}

/* MENU */
.menu{
display:flex;
gap:15px;
align-items:center;
flex-wrap:wrap;
}

.menu a{
color:white;
text-decoration:none;
font-size:14px;
}

/* PROFILE */
.profile{
width:42px;
height:42px;
border-radius:50%;
overflow:hidden;
cursor:pointer;
border:2px solid #38bdf8;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
}

/* DROPDOWN PANEL */
.panel{
display:none;
position:absolute;
top:70px;
left:5%;
right:5%;
background:white;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
padding:20px;
z-index:2000;
}

.panel h3{
margin-bottom:10px;
}

.sub-wrap{
display:flex;
align-items:center;
gap:10px;
margin:8px 0;
}

.sub-icon img{
width:35px;
height:35px;
border-radius:50%;
}

.sub-btn{
flex:1;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
}

.academic{background:#1976d2}
.creative{background:#9c27b0}
.skill{background:#ff9800}
.sports{background:#e91e63}

/* PROFILE MENU */
.profile-menu{
position:absolute;
right:5%;
top:70px;
background:white;
border-radius:12px;
width:260px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
display:none;
overflow:hidden;
z-index:3000;
}

.profile-header{
padding:15px;
background:#0f172a;
color:white;
text-align:center;
}

.profile-header img{
width:50px;
height:50px;
border-radius:50%;
}

.badge{
display:inline-block;
padding:3px 8px;
background:#38bdf8;
color:white;
font-size:11px;
border-radius:20px;
margin-top:5px;
}

/* HERO */
.hero{
height:75vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
padding:20px;
}

.btn{
margin-top:20px;
padding:12px 20px;
background:#38bdf8;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
text-decoration:none;
}

@media(max-width:768px){
nav{flex-direction:column}
}
</style>
</head>

<body>

<!-- NAV -->
<nav>

<div class="logo">GURU<span>LINK</span></div>

<div class="left-actions">
<button onclick="togglePanel('teacherPanel')">Teacher Reg</button>
<button onclick="togglePanel('instPanel')">Institute Reg</button>
</div>

<div class="menu">

<a href="#" onclick="togglePanel('findPanel')">Find Teachers</a>
<a href="teacher-dashboard.html">Dashboard</a>

<div class="profile" onclick="toggleProfileMenu()">
<img id="profileImg" src="https://i.ibb.co/placeholder/profile.png">
</div>
</div>

</nav>

<button class="sub-btn academic" onclick="location.href='academic-profile.html'">Academic Teachers</button>
</div>

<div class="sub-wrap">
<div class="sub-icon"><img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png"></div>
<button class="sub-btn creative" onclick="location.href='creative-profile.html'">Creative Teachers</button>
</div>

<div class="sub-wrap">
<div class="sub-icon"><img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png"></div>
<button class="sub-btn skill" onclick="location.href='skill-profile.html'">Skill Teachers</button>
</div>

<div class="sub-wrap">
<div class="sub-icon"><img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png"></div>
<button class="sub-btn sports" onclick="location.href='sport-profile.html'">Sports Teachers</button>
</div>
</div>

<!-- TEACHER REG PANEL -->
<div class="panel" id="teacherPanel">
<h3>Teacher Registration</h3>
<div class="sub-wrap"><button class="sub-btn academic" onclick="location.href='academic-teacher.html'">Academic Teacher</button></div>
<div class="sub-wrap"><button class="sub-btn creative" onclick="location.href='creative-teacher.html'">Creative Teacher</button></div>
<div class="sub-wrap"><button class="sub-btn skill" onclick="location.href='skill-teacher.html'">Skill Teacher</button></div>
<div class="sub-wrap"><button class="sub-btn sports" onclick="location.href='sport-teacher.html'">Sports Teacher</button></div>
</div>

<!-- INSTITUTE REG PANEL -->
<div class="panel" id="instPanel">
<h3>Institute Registration</h3>
<div class="sub-wrap"><button class="sub-btn academic" onclick="location.href='academic-institute.html'">Academic Institute</button></div>
<div class="sub-wrap"><button class="sub-btn creative" onclick="location.href='creative-institute.html'">Creative Institute</button></div>
<div class="sub-wrap"><button class="sub-btn skill" onclick="location.href='skill-institute.html'">Skill Institute</button></div>

</div>

<!-- PROFILE MENU -->
<div id="profileMenu" class="profile-menu">

<div class="profile-header">
<img id="menuImg">

</div>

</div>

<!-- HERO -->
<section class="hero">
<h1>GURULINK INDIA</h1>
<p>Smart Education Platform</p>
<a class="btn" href="academic-profile.html">Explore Teachers</a>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const uid = localStorage.getItem("uid");
const role = localStorage.getItem("role");
const profileId = localStorage.getItem("profileId");

/* LOAD PROFILE */
async function loadProfile(){
if(!profileId) return;

const path =
role==="teacher"?"teachers/"+profileId:
role==="institution"?"institutions/"+profileId:
"students/"+profileId;

const snap = await get(ref(db,path));
if(!snap.exists()) return;

const d = snap.val();

const img = d.photo || d.logo || "https://i.ibb.co/placeholder/profile.png";

document.getElementById("profileImg").src = img;
document.getElementById("menuImg").src = img;
document.getElementById("menuName").innerText = d.name || "User";
document.getElementById("menuRole").innerText = role || "Guest";
}
loadProfile();

/* PANEL TOGGLE */
window.togglePanel = function(id){
document.querySelectorAll(".panel").forEach(p=>p.style.display="none");
document.getElementById(id).style.display =
document.getElementById(id).style.display==="block"?"none":"block";
}

window.toggleProfileMenu = function(){
const m = document.getElementById("profileMenu");
m.style.display = m.style.display==="block"?"none":"block";
}

/* CLOSE OUTSIDE */
document.addEventListener("click",(e)=>{
if(!e.target.closest(".profile")){
document.getElementById("profileMenu").style.display="none";
}
});

/* LOGOUT */
window.logout = async function(){
await signOut(auth);
localStorage.clear();
window.location.href="login.html";
}

</script>

</body>
</html>
