<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GURULINK INDIA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f7fb;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 5%;
background:#0f172a;
color:white;
position:sticky;
top:0;
z-index:1000;
}

/* MOBILE FONT FIX */
@media(max-width:768px){
nav{
padding:10px 4%;
font-size:12px;
}
nav a{
font-size:12px;
}
.logo{
font-size:16px;
}
}

.logo{
font-size:22px;
font-weight:700;
}

.logo span{color:#38bdf8}

/* MENU */
.menu{
display:flex;
gap:15px;
align-items:center;
flex-wrap:wrap;
}

.menu a{
color:white;
text-decoration:none;
font-size:14px;
}

/* DROPDOWN */
.dropdown{
position:relative;
}

.dropdown-content{
display:none;
position:absolute;
top:35px;
left:0;
background:white;
min-width:220px;
border-radius:10px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
z-index:999;
}

.dropdown-content a{
display:block;
padding:10px;
color:black;
text-decoration:none;
font-size:13px;
}

.dropdown-content a:hover{
background:#f2f2f2;
}

/* HERO */
.hero{
height:85vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
padding:20px;
}

.btn{
margin-top:20px;
padding:12px 20px;
background:#38bdf8;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
text-decoration:none;
}

/* PROFILE */
.profile{
width:42px;
height:42px;
border-radius:50%;
overflow:hidden;
border:2px solid #38bdf8;
cursor:pointer;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>

<div class="logo">GURU<span>LINK</span></div>

<div class="menu">

<a href="index.html">Home</a>

<a href="teacher-dashboard.html">Dashboard</a>

<!-- FIND -->
<div class="dropdown">
<a href="#" onclick="toggleMenu('findMenu')">Find Teacher ▼</a>
<div id="findMenu" class="dropdown-content">
<a href="academic-profile.html">Academic</a>
<a href="creative-profile.html">Creative</a>
<a href="skill-profile.html">Skill</a>
<a href="sport-profile.html">Sports</a>
</div>
</div>

<!-- REGISTER -->
<div class="dropdown">
<a href="#" onclick="toggleMenu('regMenu')">Register ▼</a>
<div id="regMenu" class="dropdown-content">

<a href="academic-teacher.html">Teacher Register</a>
<a href="skill-teacher.html">Teacher Register</a>
<a href="creative-teacher.html">Teacher Register</a>
<a href="sport-teacher.html">Teacher Register</a>

<hr>

<a href="academic-institute.html">Institute Register</a>
<a href="skill-institute.html">Institute Register</a>
<a href="creative-institute.html">Institute Register</a>
<a href="sport-institution.html">Institute Register</a>

</div>
</div>

</div>

</nav>

<!-- HERO -->
<section class="hero">
<h1>GURULINK INDIA</h1>
<p>Smart Education Platform</p>
</section>

<script>

/* AUTO CLOSE DROPDOWN (ONLY ONE OPEN) */
function toggleMenu(id){

let menus = document.querySelectorAll(".dropdown-content");

menus.forEach(m => {
if(m.id !== id){
m.style.display = "none";
}
});

let el = document.getElementById(id);

el.style.display = (el.style.display === "block") ? "none" : "block";
}

/* CLOSE OUTSIDE */
document.addEventListener("click",(e)=>{
if(!e.target.closest(".dropdown")){
document.querySelectorAll(".dropdown-content").forEach(m=>{
m.style.display="none";
});
}
});

</script>

</body>
</html>
