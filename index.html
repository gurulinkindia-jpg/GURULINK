<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GURULINK INDIA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f7fb;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 5%;
background:#0f172a;
color:white;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:22px;
font-weight:700;
}

.logo span{color:#38bdf8}

/* MENU */
.menu{
display:flex;
gap:15px;
align-items:center;
}

.menu a{
color:white;
text-decoration:none;
font-size:14px;
}

/* PROFILE */
.profile{
width:42px;
height:42px;
border-radius:50%;
overflow:hidden;
cursor:pointer;
border:2px solid #38bdf8;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
}

/* PROFILE MENU */
.profile-menu{
position:absolute;
right:5%;
top:70px;
background:white;
border-radius:12px;
width:260px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
display:none;
overflow:hidden;
z-index:2000;
}

.profile-header{
padding:15px;
background:#0f172a;
color:white;
}

.profile-header img{
width:45px;
height:45px;
border-radius:50%;
object-fit:cover;
margin-bottom:8px;
}

.badge{
display:inline-block;
padding:3px 8px;
background:#38bdf8;
color:white;
font-size:11px;
border-radius:20px;
margin-top:5px;
}

.profile-menu a{
display:block;
padding:10px;
text-decoration:none;
color:#222;
font-size:13px;
}

.profile-menu a:hover{
background:#f2f2f2;
}

hr{
border:none;
border-top:1px solid #eee;
}

/* HERO */
.hero{
height:85vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
padding:20px;
}

.btn{
margin-top:20px;
padding:12px 20px;
background:#38bdf8;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
text-decoration:none;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>

<div class="logo">GURU<span>LINK</span></div>

<div class="menu">

<a href="index.html">Home</a>
<a href="academic-profile.html">Find Teachers</a>
<a href="teacher-dashboard.html">Dashboard</a>

<!-- PROFILE -->
<div class="profile" onclick="toggleProfileMenu()">
<img id="profileImg" src="https://i.ibb.co/placeholder/profile.png">
</div>

</div>

</nav>

<!-- PROFILE MENU -->
<div id="profileMenu" class="profile-menu">

<div class="profile-header">
<img id="menuImg" src="">
<div id="menuName">Guest</div>
<div class="badge" id="menuRole">Not Logged In</div>
</div>

<a href="teacher-dashboard.html">Teacher Dashboard</a>
<a href="student-dashboard.html">Student Dashboard</a>
<a href="institute-dashboard.html">Institute Dashboard</a>
<a href="admin.html">Admin Panel</a>

<hr>

<a href="settings.html">Settings</a>
<a href="mailto:gurulinkindia@gmail.com">Email Developer</a>
<a href="tel:+919999999999">Customer Care</a>

<hr>

<a href="#" onclick="logout()" style="color:red;">Logout</a>

</div>

<!-- HERO -->
<section class="hero">
<h1>GURULINK INDIA</h1>
<p>Smart Education Platform</p>
<a class="btn" href="academic-profile.html">Explore Teachers</a>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

/* SESSION */
const uid = localStorage.getItem("uid");
const role = localStorage.getItem("role") || "guest";
const profileId = localStorage.getItem("profileId");

/* AUTO REDIRECT IF NOT LOGGED */
if(!uid){
document.getElementById("menuRole").innerText = "Guest";
document.getElementById("menuName").innerText = "Not Logged In";
}

/* LOAD PROFILE */
async function loadProfile(){

if(!profileId) return;

const path =
role === "teacher"
? "teachers/"+profileId
: role === "institution"
? "institutions/"+profileId
: "students/"+profileId;

const snap = await get(ref(db, path));

if(!snap.exists()) return;

const data = snap.val();

const img = data.photo || data.logo || "https://i.ibb.co/placeholder/profile.png";

document.getElementById("profileImg").src = img;
document.getElementById("menuImg").src = img;

document.getElementById("menuName").innerText =
data.name || "User";

document.getElementById("menuRole").innerText =
role.toUpperCase();
}

loadProfile();

/* MENU */
window.toggleProfileMenu = function(){
const menu = document.getElementById("profileMenu");
menu.style.display = menu.style.display === "block" ? "none" : "block";
}

/* CLOSE OUTSIDE */
document.addEventListener("click",(e)=>{
if(!e.target.closest(".profile")){
document.getElementById("profileMenu").style.display = "none";
}
});

/* LOGOUT */
window.logout = async function(){

try{
await signOut(auth);
}catch(e){}

localStorage.clear();
window.location.href = "login.html";
}

</script>

</body>
</html>
