<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>GURULINK</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#e3f2fd,#f2f2f2);
}

/* HEADER */
header{
background:#0d47a1;
color:white;
padding:18px;
text-align:center;
}

/* MAIN AREA */
.hero{
text-align:center;
padding:40px 15px;
}

h2{
color:#0d47a1;
}

/* MAIN BUTTONS */
.main-btn{
display:block;
width:90%;
max-width:380px;
margin:15px auto;
padding:15px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
color:white;
transition:0.2s;
}

.teacher{background:#1b5e20;}
.institute{background:#283593;}
.find{background:#0d47a1;}

.main-btn:hover{
transform:scale(1.03);
}

/* BOX */
.box{
display:none;
width:90%;
max-width:380px;
margin:10px auto;
padding:15px;
background:white;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

/* BACK BUTTON */
.back{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
background:#444;
color:white;
cursor:pointer;
}

/* SUB BUTTON WRAPPER */
.item{
display:flex;
align-items:center;
gap:10px;
margin:10px 0;
}

/* ROUND OUTSIDE ICON (O STYLE) */
.circle{
width:38px;
height:38px;
border-radius:50%;
border:2px solid #0d47a1;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
background:white;
}

/* ICON IMAGE */
.circle img{
width:100%;
height:100%;
object-fit:cover;
}

/* SUB BUTTON */
.sub-btn{
flex:1;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
font-size:15px;
text-align:left;
}

.academic{background:#1b5e20;}
.creative{background:#6a1b9a;}
.skill{background:#e65100;}

</style>
</head>

<body>

<header>
<h1>GURULINK</h1>
<p>Powered by G10 Group</p>
</header>

<div class="hero">

<h2>Choose Action</h2>

<!-- MAIN BUTTONS -->
<button class="main-btn teacher" onclick="openOnly('teacherBox')">
Register as Teacher
</button>

<button class="main-btn institute" onclick="openOnly('instBox')">
Register as Institution
</button>

<button class="main-btn find" onclick="openOnly('findBox')">
Find Teacher
</button>

<!-- TEACHER BOX -->
<div class="box" id="teacherBox">

<div class="item">
<div class="circle">
<img src="https://via.placeholder.com/40">
</div>
<button class="sub-btn academic"
onclick="location.href='teacher-register.html?type=teacher&category=academic'">
Academic Teacher
</button>
</div>

<div class="item">
<div class="circle">
<img src="https://via.placeholder.com/40">
</div>
<button class="sub-btn creative"
onclick="location.href='teacher-register.html?type=teacher&category=creative'">
Creative Teacher
</button>
</div>

<div class="item">
<div class="circle">
<img src="https://via.placeholder.com/40">
</div>
<button class="sub-btn skill"
onclick="location.href='teacher-register.html?type=teacher&category=skill'">
Skill Teacher
</button>
</div>

<button class="back" onclick="goBack()">⬅ Back</button>
</div>

<!-- INSTITUTION BOX -->
<div class="box" id="instBox">

<div class="item">
<div class="circle">
<img src="https://via.placeholder.com/40">
</div>
<button class="sub-btn academic"
onclick="location.href='institution-register.html?type=institution&category=academic'">
Academic Institute
</button>
</div>

<div class="item">
<div class="circle">
<img src="https://via.placeholder.com/40">
</div>
<button class="sub-btn creative"
onclick="location.href='institution-register.html?type=institution&category=creative'">
Creative Institute
</button>
</div>

<div class="item">
<div class="circle">
<img src="https://via.placeholder.com/40">
</div>
<button class="sub-btn skill"
onclick="location.href='institution-register.html?type=institution&category=skill'">
Skill Institute
</button>
</div>

<button class="back" onclick="goBack()">⬅ Back</button>
</div>

<!-- FIND BOX -->
<div class="box" id="findBox">

<div class="item">
<div class="circle">
<img src="https://via.placeholder.com/40">
</div>
<button class="sub-btn academic"
onclick="location.href='profile.html?category=academic'">
Academic Teachers
</button>
</div>

<div class="item">
<div class="circle">
<img src="https://via.placeholder.com/40">
</div>
<button class="sub-btn creative"
onclick="location.href='profile.html?category=creative'">
Creative Teachers
</button>
</div>

<div class="item">
<div class="circle">
<img src="https://via.placeholder.com/40">
</div>
<button class="sub-btn skill"
onclick="location.href='profile.html?category=skill'">
Skill Teachers
</button>
</div>

<button class="back" onclick="goBack()">⬅ Back</button>
</div>

</div>

<script>

function openOnly(id){

// hide all boxes
document.querySelectorAll(".box").forEach(b=>{
b.style.display="none";
});

// show only selected
document.getElementById(id).style.display="block";

// hide main buttons
document.querySelectorAll(".main-btn").forEach(b=>{
b.style.display="none";
});

}

function goBack(){

// hide all boxes
document.querySelectorAll(".box").forEach(b=>{
b.style.display="none";
});

// show main buttons again
document.querySelectorAll(".main-btn").forEach(b=>{
b.style.display="block";
});

}

</script>

</body>
</html>
