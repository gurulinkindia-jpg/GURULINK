<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>GURULINK</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#e3f2fd,#f8f9fa);
min-height:100vh;
}

header{
background:#0d47a1;
color:white;
padding:18px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,.2);
}

header h1{
font-size:30px;
margin-bottom:5px;
}

header p{
font-size:14px;
opacity:.9;
}

.hero{
padding:30px 15px;
text-align:center;
}

.hero h2{
color:#0d47a1;
margin-bottom:25px;
}

#mainButtons{
transition:.4s;
}

.button-wrap{
position:relative;
width:90%;
max-width:420px;
margin:30px auto;
}

.icon{
position:absolute;
left:-25px;
top:50%;
transform:translateY(-50%);
width:65px;
height:65px;
border-radius:50%;
border:4px solid white;
background:white;
overflow:hidden;
z-index:100;
box-shadow:0 4px 10px rgba(0,0,0,.25);
}

.icon img{
width:100%;
height:100%;
object-fit:cover;
}

.main-btn{
width:100%;
padding:18px;
padding-left:45px;
border:none;
border-radius:40px;
font-size:17px;
font-weight:bold;
cursor:pointer;
color:white;
transition:.3s;
}

.main-btn:hover{
transform:scale(1.03);
}

.teacher{
background:linear-gradient(135deg,#1b5e20,#43a047);
}

.institute{
background:linear-gradient(135deg,#283593,#5c6bc0);
}

.find{
background:linear-gradient(135deg,#0d47a1,#42a5f5);
}

.box{
display:none;
width:90%;
max-width:450px;
margin:auto;
padding:20px;
background:white;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.sub-wrap{
position:relative;
margin:20px 0;
}

.sub-icon{
position:absolute;
left:-22px;
top:50%;
transform:translateY(-50%);
width:50px;
height:50px;
border-radius:50%;
overflow:hidden;
border:3px solid white;
background:white;
box-shadow:0 3px 10px rgba(0,0,0,.2);
z-index:100;
}

.sub-icon img{
width:100%;
height:100%;
object-fit:cover;
}

.sub-btn{
width:100%;
padding:15px;
padding-left:35px;
border:none;
border-radius:30px;
cursor:pointer;
color:white;
font-size:15px;
font-weight:bold;
}



.academic{
background:#1b5e20;
}

.creative{
background:#8e24aa;
}

.skill{
background:#ef6c00;
}
.sports{
background:#0288d1;
}



.back{
width:100%;
padding:12px;
margin-top:20px;
background:#e53935;
color:white;
border:none;
border-radius:25px;
cursor:pointer;
font-size:15px;
}

</style>

</head>

<body>

<header>

<h1>GURULINK</h1>
<p>Powered by G10 Group</p>

</header>


<div class="hero">

<h2>Choose Action</h2>

<div id="mainButtons">


<!-- Teacher -->

<div class="button-wrap">

<div class="icon">
<img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png">
</div>

<button class="main-btn teacher"
onclick="showBox('teacherBox')">

Register as Teacher

</button>

</div>



<!-- Institution -->

<div class="button-wrap">

<div class="icon">
<img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png">
</div>

<button class="main-btn institute"
onclick="showBox('instBox')">

Register as Institution

</button>

</div>



<!-- Find -->

<div class="button-wrap">

<div class="icon">
<img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png">
</div>

<button class="main-btn find"
onclick="showBox('findBox')">

Find Teacher

</button>

</div>

</div>



<!-- Teacher Category -->

<div class="box" id="teacherBox">

<h3>Teacher Categories</h3>

<div class="sub-wrap">
<div class="sub-icon">
<img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png">
</div>

<button class="sub-btn academic"
onclick="location.href='academic-teacher.html'">




Academic Teacher

</button>
</div>


<div class="sub-wrap">
<div class="sub-icon">
<img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png">
</div>




<button class="sub-btn creative"
onclick="location.href='creative-teacher.html'">

Creative Teacher

</button>
</div>


<div class="sub-wrap">
<div class="sub-icon">
<img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png">
</div>




<button class="sub-btn skill"
onclick="location.href='skill-teacher.html'">

Skill Teacher

</button>
</div>

<div class="sub-wrap">
<div class="sub-icon">
<img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png">
</div>

<button class="sub-btn sports"
onclick="location.href='sport-teacher.html'">

Sports Teacher

</button>
</div>



<button class="back" onclick="goBack()">

← Back

</button>

</div>



<!-- Institution Category -->

<div class="box" id="instBox">

<h3>Institution Categories</h3>

<div class="sub-wrap">
<div class="sub-icon">
<img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png">
</div>

<button class="sub-btn academic"
onclick="location.href='academic-institute.html'">

Academic Institution

</button>
</div>


<div class="sub-wrap">
<div class="sub-icon">
<img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png">
</div>

<button class="sub-btn creative"
onclick="location.href='creative-institute.html'">

Creative Institution

</button>
</div>


<div class="sub-wrap">
<div class="sub-icon">
<img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png">
</div>

<button class="sub-btn skill"
onclick="location.href='skill-institute.html'">

Skill Institution

</button>

<div class="sub-wrap">
<div class="sub-icon">
<img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png">
</div>

<button class="sub-btn sports"
onclick="location.href='sport-institution.html'">

Sports Institution

</button>
</div>

</div>

<button class="back" onclick="goBack()">

← Back

</button>

</div>



<!-- Find Category -->

<div class="box" id="findBox">







<h3>Find Teachers</h3>

<div class="sub-wrap">
<div class="sub-icon">
<img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png">
</div>

<button class="sub-btn academic"
onclick="location.href='profile.html?category=academic'">

Academic Teachers

</button>
</div>


<div class="sub-wrap">
<div class="sub-icon">
<img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png">
</div>

<button class="sub-btn creative"
onclick="location.href='profile.html?category=creative'">

Creative Teachers

</button>
</div>


<div class="sub-wrap">
<div class="sub-icon">
<img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png">
</div>

<button class="sub-btn skill"
onclick="location.href='profile.html?category=skill'">

Skill Teachers

</button>

<div class="sub-wrap">
<div class="sub-icon">
<img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png">
</div>

<button class="sub-btn sports"
onclick="location.href='profile.html?category=sports'">

Sports Teachers

</button>
</div>

</div>

<button class="back" onclick="goBack()">

← Back

</button>

</div>

</div>


<script>

function showBox(id){

document.getElementById(
"mainButtons"
).style.display="none";

document.querySelectorAll(
".box"
).forEach(box=>{

box.style.display="none";

});

document.getElementById(
id
).style.display="block";

}

function goBack(){

document.querySelectorAll(
".box"
).forEach(box=>{

box.style.display="none";

});

document.getElementById(
"mainButtons"
).style.display="block";

}

</script>

</body>
</html>
