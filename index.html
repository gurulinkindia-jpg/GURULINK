<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f7fb;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 5%;
background:#0f172a;
color:white;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:22px;
font-weight:700;
}

.logo span{color:#38bdf8}

.menu{
display:flex;
gap:15px;
align-items:center;
}

.menu a{
color:white;
text-decoration:none;
font-size:14px;
}

/* PROFILE */
.profile{
width:42px;
height:42px;
border-radius:50%;
overflow:hidden;
cursor:pointer;
border:2px solid #38bdf8;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
}

/* DROPDOWN */
.profile-menu{
position:absolute;
right:5%;
top:70px;
background:white;
border-radius:12px;
width:260px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
display:none;
z-index:2000;
}

.profile-header{
padding:15px;
background:#0f172a;
color:white;
text-align:center;
}

.profile-header img{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
margin-bottom:5px;
}

.badge{
display:inline-block;
padding:3px 8px;
background:#38bdf8;
color:white;
font-size:11px;
border-radius:20px;
margin-top:5px;
}

.profile-menu a{
display:block;
padding:10px;
text-decoration:none;
color:#222;
font-size:13px;
}

.profile-menu a:hover{
background:#f2f2f2;
}

hr{border:none;border-top:1px solid #eee}

/* HERO */
.hero{
height:70vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
padding:20px;
}

.hero h1{
font-size:40px;
}

.btn{
margin-top:15px;
padding:12px 18px;
background:#38bdf8;
color:white;
border-radius:8px;
text-decoration:none;
}

/* SECTION */
.section{
padding:40px 5%;
}

/* COLLAPSE */
.toggle-btn{
width:100%;
padding:12px;
background:#0f172a;
color:white;
border:none;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
text-align:left;
font-size:15px;
}

.box{
display:none;
margin-bottom:20px;
}

/* SUB BUTTONS */
.sub-wrap{
display:flex;
align-items:center;
gap:10px;
background:white;
padding:10px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.sub-icon img{
width:35px;
height:35px;
border-radius:50%;
}

.sub-btn{
flex:1;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
text-align:left;
font-weight:600;
}

.academic{background:#1976d2}
.creative{background:#e91e63}
.skill{background:#ff9800}
.sports{background:#4caf50}

</style>
</head>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const uid = localStorage.getItem("uid");
const role = localStorage.getItem("role") || "guest";
const profileId = localStorage.getItem("profileId");

async function loadProfile(){

if(!profileId) return;

const path =
role === "teacher"
? "teachers/"+profileId
: role === "institution"
? "institutions/"+profileId
: "students/"+profileId;

const snap = await get(ref(db,path));
if(!snap.exists()) return;

const d = snap.val();

const img = d.photo || d.logo || "https://i.ibb.co/placeholder/profile.png";

document.getElementById("profileImg").src = img;
document.getElementById("menuImg").src = img;
document.getElementById("menuName").innerText = d.name || "User";
document.getElementById("menuRole").innerText = role.toUpperCase();
}

loadProfile();

window.toggleProfile = function(){
let m = document.getElementById("profileMenu");
m.style.display = m.style.display === "block" ? "none" : "block";
}

window.toggleBox = function(id){
let el = document.getElementById(id);
el.style.display = el.style.display === "block" ? "none" : "block";
}

window.logout = async function(){
await signOut(auth);
localStorage.clear();
window.location.href = "login.html";
}

</script>
