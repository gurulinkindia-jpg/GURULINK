<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>GURULINK</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#e3f2fd,#f2f2f2);
}

/* HEADER */
header{
background:#0d47a1;
color:white;
padding:18px;
text-align:center;
}

/* HERO */
.hero{
text-align:center;
padding:40px 15px;
}

.hero h2{
color:#0d47a1;
}

/* MAIN BUTTON */
.main-btn{
display:block;
width:90%;
max-width:380px;
margin:15px auto;
padding:15px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
color:white;
background:#1b5e20;
transition:0.2s;
}

.main-btn:hover{
transform:scale(1.03);
}

/* COLORS */
.teacher{background:#1b5e20;}
.institute{background:#283593;}
.find{background:#0d47a1;}

/* HIDDEN BOX */
.box{
display:none;
background:white;
width:90%;
max-width:380px;
margin:10px auto;
padding:15px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

/* SUB BUTTONS */
.sub-btn{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
font-size:15px;
}

.academic{background:#1b5e20;}
.creative{background:#6a1b9a;}
.skill{background:#e65100;}

</style>
</head>

<body>

<header>
<h1>GURULINK</h1>
<p>Powered by G10 Group</p>
</header>

<div class="hero">

<h2>Choose Action</h2>

<!-- 1. TEACHER -->
<button class="main-btn teacher" onclick="toggleBox('teacherBox')">
Register as Teacher
</button>

<div class="box" id="teacherBox">

<button class="sub-btn academic"
onclick="location.href='teacher-register.html?type=teacher&category=academic'">
Academic Teacher
</button>

<button class="sub-btn creative"
onclick="location.href='teacher-register.html?type=teacher&category=creative'">
Creative Teacher
</button>

<button class="sub-btn skill"
onclick="location.href='teacher-register.html?type=teacher&category=skill'">
Skill Teacher
</button>

</div>

<!-- 2. INSTITUTION -->
<button class="main-btn institute" onclick="toggleBox('instBox')">
Register as Institution
</button>

<div class="box" id="instBox">

<button class="sub-btn academic"
onclick="location.href='institution-register.html?type=institution&category=academic'">
Academic Institute
</button>

<button class="sub-btn creative"
onclick="location.href='institution-register.html?type=institution&category=creative'">
Creative Institute
</button>

<button class="sub-btn skill"
onclick="location.href='institution-register.html?type=institution&category=skill'">
Skill Institute
</button>

</div>

<!-- 3. FIND TEACHER -->
<button class="main-btn find" onclick="toggleBox('findBox')">
Find Teacher
</button>

<div class="box" id="findBox">

<button class="sub-btn academic"
onclick="location.href='profile.html?category=academic'">
Academic Teachers
</button>

<button class="sub-btn creative"
onclick="location.href='profile.html?category=creative'">
Creative Teachers
</button>

<button class="sub-btn skill"
onclick="location.href='profile.html?category=skill'">
Skill Teachers
</button>

</div>

</div>

<script>

function toggleBox(id){

let box = document.getElementById(id);

if(box.style.display === "block"){
box.style.display = "none";
}else{
box.style.display = "block";
}

}

</script>

</body>
</html>
