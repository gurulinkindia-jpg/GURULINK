<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GURULINK INDIA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f7fb;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 5%;
background:#0f172a;
color:white;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:22px;
font-weight:700;
}

.logo span{color:#38bdf8}

/* LEFT BUTTONS */
.left-actions{
display:flex;
gap:10px;
align-items:center;
}

/* NAV MENU */
.menu{
display:flex;
gap:15px;
align-items:center;
}

.menu a{
color:white;
text-decoration:none;
font-size:14px;
}

/* PROFILE */
.profile{
width:42px;
height:42px;
border-radius:50%;
overflow:hidden;
border:2px solid #38bdf8;
cursor:pointer;
margin-left:10px;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
}

/* DROPDOWN PANELS */
.panel{
display:none;
position:absolute;
top:70px;
left:5%;
right:5%;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
z-index:999;
}

.sub-wrap{
display:flex;
align-items:center;
gap:12px;
margin:10px 0;
}

.sub-icon img{
width:40px;
height:40px;
border-radius:50%;
}

.sub-btn{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
background:#0f172a;
color:white;
width:100%;
text-align:left;
}

.sub-btn.academic{background:#1976d2;}
.sub-btn.creative{background:#e91e63;}
.sub-btn.skill{background:#ff9800;}
.sub-btn.sports{background:#4caf50;}

.back{
margin-top:10px;
padding:10px;
background:red;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

/* RESPONSIVE */
@media(max-width:768px){
nav{flex-wrap:wrap;font-size:12px}
}

</style>
</head>

<body>

<nav>

<div class="logo">GURU<span>LINK</span></div>

<!-- LEFT BUTTONS -->
<div class="left-actions">

<button onclick="togglePanel('teacherPanel')">Teacher Reg</button>
<button onclick="togglePanel('instPanel')">Institute Reg</button>

</div>

<!-- MENU -->
<div class="menu">

<a href="#" onclick="togglePanel('findPanel')">Find Teacher ▼</a>
<a href="teacher-dashboard.html">Dashboard</a>

<!-- PROFILE -->
<div class="profile" onclick="alert('Profile Open')">
<img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png">
</div>

</div>

</nav>

<!-- FIND PANEL -->
<div id="findPanel" class="panel">

<h3>Find Teachers</h3>

<div class="sub-wrap">
<div class="sub-icon"><img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png"></div>
<button class="sub-btn academic" onclick="location.href='academic-profile.html'">Academic Teachers</button>
</div>

<div class="sub-wrap">
<div class="sub-icon"><img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png"></div>
<button class="sub-btn creative" onclick="location.href='creative-profile.html'">Creative Teachers</button>
</div>

<div class="sub-wrap">
<div class="sub-icon"><img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png"></div>
<button class="sub-btn skill" onclick="location.href='skill-profile.html'">Skill Teachers</button>
</div>

<div class="sub-wrap">
<div class="sub-icon"><img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png"></div>
<button class="sub-btn sports" onclick="location.href='sport-profile.html'">Sports Teachers</button>
</div>

<button class="back" onclick="closePanels()">Close</button>

</div>

<!-- TEACHER PANEL -->
<div id="teacherPanel" class="panel">

<h3>Teacher Registration</h3>

<div class="sub-wrap">
<div class="sub-icon"><img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png"></div>
<button class="sub-btn academic" onclick="location.href='academic-teacher.html'">Academic Teacher</button>
</div>

<div class="sub-wrap">
<div class="sub-icon"><img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png"></div>
<button class="sub-btn creative" onclick="location.href='creative-teacher.html'">Creative Teacher</button>
</div>

<div class="sub-wrap">
<div class="sub-icon"><img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png"></div>
<button class="sub-btn skill" onclick="location.href='skill-teacher.html'">Skill Teacher</button>
</div>

<div class="sub-wrap">
<div class="sub-icon"><img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png"></div>
<button class="sub-btn sports" onclick="location.href='sport-teacher.html'">Sports Teacher</button>
</div>

<button class="back" onclick="closePanels()">Close</button>

</div>

<!-- INSTITUTE PANEL -->
<div id="instPanel" class="panel">

<h3>Institute Registration</h3>

<div class="sub-wrap">
<div class="sub-icon"><img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png"></div>
<button class="sub-btn academic" onclick="location.href='academic-institute.html'">Academic Institution</button>
</div>

<div class="sub-wrap">
<div class="sub-icon"><img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png"></div>
<button class="sub-btn creative" onclick="location.href='creative-institute.html'">Creative Institution</button>
</div>

<div class="sub-wrap">
<div class="sub-icon"><img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png"></div>
<button class="sub-btn skill" onclick="location.href='skill-institute.html'">Skill Institution</button>
</div>

<div class="sub-wrap">
<div class="sub-icon"><img src="https://i.ibb.co/WNZTWPwv/LOGO-PNG-2025-fab.png"></div>
<button class="sub-btn sports" onclick="location.href='sport-institution.html'">Sports Institution</button>
</div>

<button class="back" onclick="closePanels()">Close</button>

</div>

<script>

function togglePanel(id){

let panels = document.querySelectorAll('.panel');

panels.forEach(p=>{
if(p.id !== id){
p.style.display="none";
}
});

let el = document.getElementById(id);
el.style.display = (el.style.display==="block")?"none":"block";
}

function closePanels(){
document.querySelectorAll('.panel').forEach(p=>{
p.style.display="none";
});
}

document.addEventListener("click",(e)=>{
if(!e.target.closest(".panel") && !e.target.closest("button")){
closePanels();
}
});

</script>

</body>
</html>
