<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GURULINK INDIA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f7fb;
}

/* HEADER */
header{
background:#0f172a;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 5%;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:24px;
font-weight:700;
}

.logo span{ color:#38bdf8; }

/* NAV */
nav{
display:flex;
gap:18px;
align-items:center;
}

nav a{
color:white;
text-decoration:none;
font-size:14px;
}

.dropdown{
position:relative;
}

.dropdown-content{
display:none;
position:absolute;
top:30px;
left:0;
background:white;
color:black;
min-width:180px;
border-radius:10px;
overflow:hidden;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.dropdown-content a{
display:block;
padding:10px;
color:black;
text-decoration:none;
}

.dropdown-content a:hover{
background:#f2f2f2;
}

/* RIGHT SIDE */
.right{
display:flex;
align-items:center;
gap:10px;
}

.login{
background:#38bdf8;
padding:8px 12px;
border-radius:8px;
color:white;
text-decoration:none;
font-size:14px;
}

.profile{
width:40px;
height:40px;
border-radius:50%;
display:none;
border:2px solid white;
object-fit:cover;
cursor:pointer;
}

/* HERO */
.hero{
height:90vh;
background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url('https://images.unsplash.com/photo-1523240795612-9a054b0db644') center/cover;
color:white;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:50px;
}

.hero p{
margin-top:10px;
opacity:0.9;
}

.btns{
margin-top:20px;
}

.btns a{
display:inline-block;
margin:10px;
padding:12px 22px;
border-radius:8px;
text-decoration:none;
font-weight:600;
}

.btn1{ background:#38bdf8;color:white; }
.btn2{ background:white;color:#0f172a; }

</style>
</head>

<body>

<!-- HEADER -->
<header>

<div class="logo">GURU<span>LINK</span></div>

<nav>

<div class="dropdown">
<a href="#" onclick="toggle('t1')">Find Teachers ▼</a>
<div id="t1" class="dropdown-content">
<a href="academic-profile.html">Academic</a>
<a href="skill-profile.html">Skill</a>
<a href="creative-profile.html">Creative</a>
<a href="sport-profile.html">Sports</a>
</div>
</div>

<div class="dropdown">
<a href="#" onclick="toggle('t2')">Find Institutes ▼</a>
<div id="t2" class="dropdown-content">
<a href="academic-institute.html">Academic</a>
<a href="skill-institute.html">Skill</a>
<a href="creative-institute.html">Creative</a>
<a href="sport-institution.html">Sports</a>
</div>
</div>

<a href="teacher-dashboard.html">Teacher</a>
<a href="student-dashboard.html">Student</a>
<a href="institute-dashboard.html">Institute</a>

</nav>

<div class="right">

<a href="login.html" id="loginBtn" class="login">Login</a>

<img id="profilePic" class="profile">

</div>

</header>

<!-- HERO -->
<section class="hero">

<div>
<h1>India’s Smart Learning Platform</h1>
<p>Find Teachers, Institutes & Skills Across India</p>

<div class="btns">
<a href="academic-profile.html" class="btn1">Find Teachers</a>
<a href="teacher-register.html" class="btn2">Register Now</a>
</div>

</div>

</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* DROPDOWN */
window.toggle = function(id){
const el = document.getElementById(id);
el.style.display = el.style.display === "block" ? "none" : "block";
}

/* LOGIN CHECK */
const uid = localStorage.getItem("uid");

if(uid){
document.getElementById("loginBtn").style.display = "none";
document.getElementById("profilePic").style.display = "block";

get(ref(db,"users/"+uid)).then(snap=>{
if(snap.exists()){
const d = snap.val();
if(d.photo){
document.getElementById("profilePic").src = d.photo;
}
}
});
}

</script>

</body>
</html>
