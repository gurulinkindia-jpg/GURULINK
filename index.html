<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>GURULINK</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#e3f2fd,#f2f2f2);
}

header{
background:#0d47a1;
color:white;
padding:18px;
text-align:center;
}

.hero{
text-align:center;
padding:60px 20px;
}

.btn{
display:inline-block;
padding:14px 18px;
margin:10px;
border:none;
border-radius:10px;
cursor:pointer;
color:white;
font-size:15px;
}

.academic{background:#1b5e20;}
.creative{background:#6a1b9a;}
.skill{background:#e65100;}

.institute{background:#283593;}

.cardBox{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:15px;
margin-top:30px;
}

.card{
background:white;
padding:15px;
width:250px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,.1);
text-align:center;
}
</style>
</head>

<body>

<header>
<h1>GURULINK</h1>
<p>Powered by G10 Group</p>
</header>

<div class="hero">

<h2>Choose Category</h2>

<h3>Teachers</h3>

<button class="btn academic" onclick="location.href='teacher-register.html?category=academic&type=teacher'">
Academic Teacher
</button>

<button class="btn creative" onclick="location.href='teacher-register.html?category=creative&type=teacher'">
Creative Teacher
</button>

<button class="btn skill" onclick="location.href='teacher-register.html?category=skill&type=teacher'">
Skill Teacher
</button>

<h3>Institutions</h3>

<button class="btn academic" onclick="location.href='institution-register.html?category=academic&type=institution'">
Academic Institute
</button>

<button class="btn creative" onclick="location.href='institution-register.html?category=creative&type=institution'">
Creative Institute
</button>

<button class="btn skill" onclick="location.href='institution-register.html?category=skill&type=institution'">
Skill Institute
</button>

</div>

<div class="cardBox">
<div class="card">Academic Learning</div>
<div class="card">Creative Arts</div>
<div class="card">Skill Development</div>
</div>

</body>
</html>
