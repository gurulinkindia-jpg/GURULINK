<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Profile View - GURULINK</title>

<style>

body{
font-family:Arial;
background:#f5f7ff;
padding:20px;
margin:0;
}

.box{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.header{
display:flex;
gap:15px;
align-items:center;
flex-wrap:wrap;
}

.mainPhoto{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:4px solid #1976d2;
}

.badge{
display:inline-block;
padding:5px 10px;
background:#1976d2;
color:white;
border-radius:20px;
font-size:12px;
margin:5px 3px;
}

.actions{
margin-top:15px;
display:flex;
gap:8px;
flex-wrap:nowrap;
}

.actions a,
.actions button{
flex:1;
padding:10px 5px;
border-radius:10px;
text-decoration:none;
color:white;
font-weight:bold;
font-size:13px;
text-align:center;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}
@media(max-width:480px){

.actions a,
.actions button{
font-size:12px;
padding:10px 3px;
}

}

.call{background:#4caf50}
.whatsapp{background:#009688}
.website{background:#1565c0}



.saveContact{
background:#ff5722;
}





.section{
margin-top:20px;
padding:15px;
background:#f9f9ff;
