<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getDatabase,
ref,
get,
child,
onValue,
push,
set
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);
const WEBSITE_BASE = "https://www.gurulink.co.in/";

const profile = document.getElementById("profile");
const queryProfileId = new URLSearchParams(location.search).get("id");
let currentProfileId =
queryProfileId ||
localStorage.getItem("profileId") ||
sessionStorage.getItem("profileId") ||
localStorage.getItem("teacherId") ||
sessionStorage.getItem("teacherId") ||
localStorage.getItem("institutionId") ||
sessionStorage.getItem("institutionId") ||
"";

let data = null;
let type = "";
let reviewAccessState = {
allowed:false,
checked:false,
message:"Only logged-in Student / Parent and Teacher / Institute users verified through Mobile OTP can submit reviews.",
viewerRole:"",
uid:"",
phone:""
};

let authBootstrapPromise = null;
let linkedReviewRoleCache = "";

function getAuthUser(forceRefresh = false){
if(!forceRefresh && auth.currentUser){
return Promise.resolve(auth.currentUser);
}

if(!forceRefresh && authBootstrapPromise){
return authBootstrapPromise;
}

authBootstrapPromise = new Promise((resolve)=>{
let settled = false;
let unsubscribe = null;
const timer = setTimeout(()=>{
finish(auth.currentUser || null);
},5000);

const finish = (user)=>{
if(settled) return;
settled = true;
clearTimeout(timer);
if(typeof unsubscribe === "function"){
try{ unsubscribe(); }catch(err){}
}
resolve(user || null);
};

unsubscribe = onAuthStateChanged(auth,(user)=>{
finish(user || auth.currentUser || null);
});
});

return authBootstrapPromise;
}

function getStoredReviewRole(){
const allowedRoles = ["student","parent","teacher","institution","teacher_institute"];
const candidates = [
sessionStorage.getItem("otpRole"),
localStorage.getItem("otpRole"),
sessionStorage.getItem("role"),
localStorage.getItem("role")
]
.map(value => String(value || "").trim().toLowerCase())
.filter(Boolean);

return candidates.find(role => allowedRoles.includes(role)) || "";
}

async function getLinkedReviewRole(authUid, forceRefresh = false){
if(!authUid) return "";
if(linkedReviewRoleCache && !forceRefresh){
return linkedReviewRoleCache;
}

try{
const userSnap = await get(child(ref(db),"users/" + authUid));
if(!userSnap.exists()){
return "";
}

const userData = userSnap.val() || {};
const resolvedRole = String(
userData.linkedRole ||
userData.role ||
""
)
.trim()
.toLowerCase();

linkedReviewRoleCache = resolvedRole;
return resolvedRole;
}
catch(err){
console.log("Unable to read linked review role", err);
return "";
}
}

function normalizeReviewPhone(phone){
const digits = String(phone || "").replace(/\D/g, "");
if(digits.length === 12 && digits.startsWith("91")){
return digits.slice(2);
}
return digits;
}

async function resolveReviewAccess(forceRefresh = false){
if(reviewAccessState.checked && !forceRefresh){
return reviewAccessState;
}

const authUser = await getAuthUser(forceRefresh);
const storedRole = getStoredReviewRole();
const linkedRole =
authUser && authUser.uid
? await getLinkedReviewRole(authUser.uid, forceRefresh)
: "";
const viewerRole = linkedRole || storedRole;
const allowedRoles = ["student","parent","teacher","institution","teacher_institute"];
const authPhone = normalizeReviewPhone(authUser ? authUser.phoneNumber : "");
const storedPhone = normalizeReviewPhone(
localStorage.getItem("phone") ||
sessionStorage.getItem("phone") ||
""
);

let allowed = false;
let message = "";

if(!allowedRoles.includes(viewerRole)){
message = "Only logged-in Student / Parent and Teacher / Institute users can submit reviews.";
}
else if(!authUser || !authUser.uid){
message = "Please log in through GURULINK Mobile OTP to submit a review.";
}
else if(!authPhone){
message = "Please log in through GURULINK Mobile OTP to submit a review.";
}
else if(!linkedRole && storedPhone && authPhone !== storedPhone){
message = "Please re-login through GURULINK Mobile OTP before submitting a review.";
}
else{
allowed = true;
}

reviewAccessState = {
allowed,
checked:true,
message,
viewerRole,
uid:authUser ? authUser.uid : "",
phone:authPhone
};

return reviewAccessState;
}

function setReviewFormState(access){
const form = document.querySelector(".reviewForm");
if(!form) return;

const notice = document.getElementById("reviewNotice");
const controls = [
"rname",
"rrating",
"rtext"
]
.map(id => document.getElementById(id))
.filter(Boolean);

const submitBtn = form.querySelector("button");

form.classList.toggle("disabledReview", !access.allowed);

controls.forEach(control => {
control.disabled = !access.allowed;
});

if(submitBtn){
submitBtn.disabled = !access.allowed;
submitBtn.textContent = access.allowed ? "Submit Review" : "Login Required";
}

if(notice){
notice.style.display = access.allowed ? "none" : "block";
notice.textContent = access.allowed
? ""
: (access.message || "Please log in through GURULINK Mobile OTP to submit a review.");
}
}

async function applyReviewAccessUI(forceRefresh = false){
const form = document.querySelector(".reviewForm");
if(!form) return;
const access = await resolveReviewAccess(forceRefresh);
setReviewFormState(access);
}

onAuthStateChanged(auth,()=>{
reviewAccessState.checked = false;
applyReviewAccessUI(true);
});

/* MARK VIEW */
async function markView() {
  const authUser = await getAuthUser();

  const viewerId =
    localStorage.getItem("uid") ||
    localStorage.getItem("profileId") ||
    (authUser ? authUser.uid : "");

  const viewedProfileId = currentProfileId;
  const viewerRole = (localStorage.getItem("role") || "").toLowerCase();

  if (!viewedProfileId) return;

  try {
    const isRegisteredTeacherOrInstitution =
      viewerRole === "teacher" ||
      viewerRole === "institution";

    const isGuestViewer =
      !viewerId ||
      viewerRole === "guest";

    const viewId =
      viewerId ||
      "guest_" + Date.now() + "_" + Math.floor(Math.random() * 9999);

    let viewerData = {
      name:"",
      email:"",
      phone:""
    };

    if (viewerId) {
      const paths = [];

      if (viewerRole === "student" || viewerRole === "parent") {
        paths.push("students/" + viewerId);
      }

      if (viewerRole === "teacher") {
        paths.push("teachers/" + viewerId);
      }

      if (viewerRole === "institution") {
        paths.push("institutions/" + viewerId);
      }

      paths.push("users/" + viewerId);
      paths.push("students/" + viewerId);

      for (const path of paths) {
        const snap = await get(ref(db, path));

        if (snap.exists()) {
          viewerData = {
            ...viewerData,
            ...snap.val()
          };
        }
      }
    }

    const displayName = isRegisteredTeacherOrInstitution
      ? (viewerRole === "teacher" ? "Teacher" : "Institution")
      : (
        isGuestViewer
          ? "Guest"
          : (viewerData.name || (viewerRole === "parent" ? "Parent" : "Student"))
      );

    const displayPhone = isRegisteredTeacherOrInstitution
      ? ""
      : (
        viewerData.phone ||
        viewerData.alternatePhone ||
        (authUser ? authUser.phoneNumber : "") ||
        localStorage.getItem("phone") ||
        ""
      );

    await set(
      ref(db, `profileViews/${viewedProfileId}/${viewId}`),
      {
        viewerId:viewId,
        studentId:viewId,
        viewerRole:viewerRole || "guest",
        name:displayName,
        email:viewerData.email || (authUser ? authUser.email : "") || localStorage.getItem("email") || "",
        phone:displayPhone,
        time: Date.now()
      }
    );

  } catch (err) {
    console.log("View not saved", err);
  }
}

/* LOAD PROFILE */
async function load(){

if(!currentProfileId){
profile.innerHTML = "<h2>No ID Found</h2>";
return;
}

/* SAVE VIEW */
markView();

/* TEACHER */
let snap = await get(child(ref(db),"teachers/"+currentProfileId));

if(snap.exists()){
data = snap.val();
type = "Teacher";
currentProfileId = data.uid || currentProfileId;
}

/* INSTITUTION */
if(!data){
let snap2 = await get(child(ref(db),"institutions/"+currentProfileId));

if(snap2.exists()){
data = snap2.val();
type = "Institution";
currentProfileId = data.uid || currentProfileId;
}
}

/* NOT FOUND */
if(!data){
profile.innerHTML = "<h2>Profile Not Found</h2>";
return;
}

renderProfile();
loadReviews();
await applyReviewAccessUI();
}

/* RENDER PROFILE */
function renderProfile(){

const visibility = data.publicVisibility || {};

function canShow(key){
return visibility[key] !== false;
}

function showValue(key){
return canShow(key) && data[key];
}

function esc(value){
return String(value ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
}

function externalUrl(value){
const text = String(value ?? "").trim();
if(!text) return "";
return /^https?:\/\//i.test(text) ? text : `https://${text}`;
}

function formatExperience(value){
const text = String(value ?? "").trim();
if(!text) return "";
return /year/i.test(text) ? esc(text) : `${esc(text)} years`;
}

function getCategoryLabel(){
const raw = String(data.categoryName || data.category || "").trim();
if(!raw) return "";
const normalized = raw.toLowerCase();
if(normalized === "skill") return "Professional Skill";
if(normalized === "sport") return "Sports & Fitness";
if(normalized === "creative") return "Arts & Creativity";
if(normalized === "academic") return "Academic";
return esc(raw);
}

function listFromValue(value){
if(Array.isArray(value)) return value.filter(Boolean);
if(value && typeof value === "object") return Object.values(value).filter(Boolean);
return String(value || "").trim() ? [String(value).trim()] : [];
}

const subjects = listFromValue(data.subjects);
const teachingModes = listFromValue(data.teachingModes);
const feeStructure =
  data.feeStructure && typeof data.feeStructure === "object"
    ? data.feeStructure
    : {};
const feeItems = Array.isArray(feeStructure.items)
  ? feeStructure.items
      .map((item, index)=>({
        title:String(item && item.title || "").trim(),
        amount:String(item && item.amount || "").trim(),
        unit:String(item && item.unit || "").trim(),
        appliesTo:String(item && item.appliesTo || "").trim(),
        note:String(item && item.note || "").trim(),
        active:item && item.active !== false,
        sortOrder:Number(item && item.sortOrder || (index + 1))
      }))
      .filter(item => item.active && item.title)
      .sort((a,b)=>a.sortOrder - b.sortOrder)
  : [];
const addressLines = [];

/* REVIEWS */
function loadReviews(){

onValue(ref(db,`reviews/${type.toLowerCase()}s/${currentProfileId}`),(snap)=>{

let total=0,count=0,html="";

snap.forEach(item=>{
const d=item.val();
total+=d.rating;
count++;

html+=`
<div class="reviewItem">
<b>${d.name}</b>
<div>${"&#9733;".repeat(d.rating)}</div>
<p>${d.text}</p>
</div>`;
});

const avgValue =
count ? (total/count).toFixed(1) : "0.0";

const roundedStars =
Math.round(Number(avgValue));

const starLine =
"&#9733;".repeat(roundedStars) +
"&#9734;".repeat(5-roundedStars);

const topRatingText =
document.getElementById("topRatingText");

const topStars =
document.getElementById("topStars");

if(topRatingText){
topRatingText.innerText = `Rating: ${avgValue} stars`;
}

if(topStars){
topStars.innerHTML = starLine;
}

document.getElementById("reviews").innerHTML =
html || "No Reviews Yet";

});
}

/* SUBMIT REVIEW */
window.submitReview = async function(){

const access = await resolveReviewAccess(true);
setReviewFormState(access);

if(!access.allowed){
alert(access.message || "Please log in through GURULINK Mobile OTP to submit a review.");
return;
}

const name=document.getElementById("rname").value.trim();
const rating=Number(document.getElementById("rrating").value);
const text=document.getElementById("rtext").value.trim();
const submitBtn =
document.querySelector(".reviewForm button");

if(!name||!text){
alert("Fill all fields");
return;
}

if(name.length > 80){
alert("Name is too long. Please keep it within 80 characters.");
return;
}

if(text.length > 500){
alert("Review is too long. Please keep it within 500 characters.");
return;
}

if(!rating || rating < 1 || rating > 5){
alert("Please select a valid star rating.");
return;
}

if(submitBtn){
submitBtn.disabled = true;
submitBtn.textContent = "Submitting...";
}

try{

await push(ref(db,`reviews/${type.toLowerCase()}s/${currentProfileId}`),{
name,
rating,
text,
time:Date.now(),
reviewerUid:access.uid,
reviewerPhone:access.phone,
reviewerRole:access.viewerRole,
authVerified:true
});

alert("Review submitted");
document.getElementById("rname").value="";
document.getElementById("rtext").value="";
document.getElementById("rrating").value="5";

}
catch(err){
console.log(err);

const rawMessage =
String(err && (err.message || err.code) || "").toLowerCase();

if(
rawMessage.includes("permission_denied") ||
rawMessage.includes("permission denied")
){
alert(
"Review submission is currently blocked by your Firebase rules.\n\n" +
"Please update the reviews rule in Firebase Console so authenticated GURULINK OTP users can submit reviews."
);
}else{
alert(err.message || "Unable to submit review. Please try again.");
}
}
finally{
if(submitBtn){
submitBtn.disabled = false;
submitBtn.textContent = "Submit Review";
}
}
};

window.saveContact = function(){

const name =
(data.name || "GURULINK Contact");

const phone =
(data.phone || "");

const email =
(data.email || "");

const vcf = `
BEGIN:VCARD
VERSION:3.0
FN:${name}
TEL:${phone}
EMAIL:${email}
END:VCARD
`;

const blob = new Blob(
[vcf],
{type:"text/vcard"}
);

const url =
URL.createObjectURL(blob);

const a =
document.createElement("a");

a.href = url;
a.download =
name.replace(/\s+/g,"_") + ".vcf";

document.body.appendChild(a);
a.click();
document.body.removeChild(a);

URL.revokeObjectURL(url);

};

function getDashboardPath(){
const viewerRole = String(
localStorage.getItem("role") ||
sessionStorage.getItem("role") ||
""
).toLowerCase();

if(
viewerRole === "student" ||
viewerRole === "parent"
){
return "student-dashboard.html";
}

if(
viewerRole === "teacher" ||
viewerRole === "institution" ||
viewerRole === "teacher_institute"
){
return "teacher-dashboard.html";
}

if(viewerRole === "admin"){
return "admin.html";
}

return "otp-login.html";
}

function getPrimaryProfileImage(data){
const images =
Array.isArray(data?.profileImages)
?
data.profileImages
:
[];

const normalized =
images
.map(item=>typeof item === "string" ? {url:item} : item)
.filter(item=>item && item.url);

const selected =
normalized[Number(data?.primaryProfileImage || 0)] ||
normalized[0];

return selected?.url || data?.photo || data?.profilePic || data?.logo || "https://via.placeholder.com/120";
}

window.goBackSmart = function(){
if(window.history.length > 1){
window.history.back();
return;
}

const fallback =
getDashboardPath() === "otp-login.html"
? "index.html"
: getDashboardPath();

window.location.href = fallback;
};

function getShareProfileUrl(){
if(!currentProfileId){
return "";
}

return WEBSITE_BASE + "profile-view.html?id=" + encodeURIComponent(currentProfileId);
}

window.shareProfile = async function(){
const shareUrl = getShareProfileUrl();

if(!shareUrl){
alert("Profile link is not ready yet. Please try again.");
return;
}

const profileName =
data && data.name
? data.name
: data && data.ownerName
  ? data.ownerName
  : "this profile";

const shareText =
"Check out " + profileName + " on GURULINK.";

try{
if(navigator.share){
await navigator.share({
title:"GURULINK Profile",
text:shareText,
url:shareUrl
});
return;
}

if(navigator.clipboard && navigator.clipboard.writeText){
await navigator.clipboard.writeText(shareUrl);
alert("Profile link copied. You can now share it on social media.");
return;
}

const tempInput =
document.createElement("input");

tempInput.value = shareUrl;
document.body.appendChild(tempInput);
tempInput.select();
document.execCommand("copy");
document.body.removeChild(tempInput);

alert("Profile link copied. You can now share it on social media.");
}
catch(err){
console.log(err);

if(err && err.name === "AbortError"){
return;
}

alert("Unable to share right now. Please try again.");
}
};
