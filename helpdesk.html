<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GURULINK Helpdesk Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

.window{
width:95%;
max-width:700px;
margin:20px auto;
background:white;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.2);
overflow:hidden;
}

.header{
background:#1565c0;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.closeBtn{
background:red;
border:none;
color:white;
font-size:18px;
width:35px;
height:35px;
border-radius:8px;
cursor:pointer;
}

.chat{
height:420px;
overflow-y:auto;
padding:15px;
background:#f9f9f9;
}

.msg{
padding:10px;
margin:8px 0;
border-radius:10px;
max-width:80%;
}

.user{background:#d1e7ff;margin-left:auto;}
.bot{background:#fff;border:1px solid #ddd;}

.inputBox{
display:flex;
padding:10px;
border-top:1px solid #ddd;
position:relative;
}

input, select{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:8px;
margin-bottom:8px;
}

button{
margin-left:8px;
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
}

.send{background:#1565c0;color:white;}
.ticketBtn{background:#ff9800;color:white;}

.suggestions{
position:absolute;
bottom:55px;
left:10px;
right:10px;
background:white;
border:1px solid #ccc;
border-radius:8px;
display:none;
flex-direction:column;
z-index:10;
}

.suggestions div{
padding:10px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.suggestions div:hover{
background:#f0f0f0;
}

.statusBox{
background:#fff3cd;
padding:10px;
margin:10px;
border-radius:8px;
border:1px solid #ffeeba;
}
</style>
</head>

<body>

<div class="window">

<div class="header">
<h3>GURULINK HELP DESK</h3>
<button class="closeBtn" onclick="window.location.href='dashboard.html'">✖</button>
</div>

<div class="chat" id="chatBox">

<div class="msg bot">
👋 Welcome! Enter Ticket Number or Phone to check status OR start new request.
</div>

<!-- STATUS CHECK -->
<div class="statusBox">
<input id="checkInput" placeholder="Enter Ticket No OR Phone">
<button onclick="checkStatus()" class="send">Check Status</button>
</div>

<!-- CATEGORY -->
<div id="catBox">
<button onclick="selectCategory('login')">Login</button>
<button onclick="selectCategory('registration')">Registration</button>
<button onclick="selectCategory('profile')">Profile</button>
<button onclick="selectCategory('dashboard')">Dashboard</button>
<button onclick="selectCategory('find teacher')">Find Teacher</button>
<button onclick="selectCategory('renew profile')">Renew Profile</button>
</div>

</div>

<div class="inputBox">

<input id="input"
placeholder="Type your question..."
oninput="showSuggestions()"
disabled>

<button class="send" onclick="sendMsg()">Send</button>

<div class="suggestions" id="suggestBox"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, push, get } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let currentUser=null;
let currentCategory="";
let canCreateTicket=false;

/* AUTH */
onAuthStateChanged(auth, async (user)=>{
if(user){
currentUser=user;

if(!user.phoneNumber){
addMsg("⚠ Login with registered phone number","bot");
return;
}

await checkOpenTicket(user.phoneNumber);
}
});

/* CHECK OPEN TICKET */
async function checkOpenTicket(phone){

const snap=await get(ref(db,"tickets"));

let open=false;

snap.forEach(c=>{
let d=c.val();
if(d.phone===phone && d.status==="open"){
open=true;
}
});

canCreateTicket=!open;

if(open){
addMsg("🚫 You already have an OPEN ticket.","bot");
}
}

/* STATUS CHECK */
window.checkStatus = async function(){

const val=document.getElementById("checkInput").value.trim();
if(!val) return;

const snap=await get(ref(db,"tickets"));

let found=null;

snap.forEach(c=>{
let d=c.val();

if(d.ticketNo===val || d.phone===val){
found=d;
}
});

if(found){
addMsg(
`🎫 Ticket: ${found.ticketNo}<br>
📌 Status: ${found.status}<br>
📞 Phone: ${found.phone}`,
"bot"
);
}else{
addMsg("❌ No ticket found","bot");
}
};

/* CATEGORY */
window.selectCategory=function(cat){
currentCategory=cat;
document.getElementById("catBox").style.display="none";
document.getElementById("input").disabled=false;
addMsg("Category: "+cat,"bot");
};

/* CHAT */
function addMsg(text,type){
const div=document.createElement("div");
div.className="msg "+type;
div.innerHTML=text;
document.getElementById("chatBox").appendChild(div);
div.scrollIntoView();
}

/* BOT */
function botReply(msg){
msg=msg.toLowerCase();

if(msg.includes("login")) return "Reset password via email.";
if(msg.includes("profile")) return "Go to edit profile.";

return "Not solved. Create ticket or check status.";
}

/* SEND */
window.sendMsg=function(){

const input=document.getElementById("input");
const text=input.value.trim();
if(!text) return;

addMsg(text,"user");

setTimeout(()=>{
addMsg(botReply(text),"bot");
askResolved();
},500);

input.value="";
};

/* RESOLVED */
function askResolved(){
const div=document.createElement("div");
div.className="msg bot";
div.innerHTML=`
<b>Resolved?</b><br>
<button onclick="resolved(true)">Yes</button>
<button onclick="resolved(false)">No</button>
`;
document.getElementById("chatBox").appendChild(div);
div.scrollIntoView();
}

window.resolved=function(status){
if(status){
addMsg("Yes ✔","user");
addMsg("Great 👍","bot");
}else{
addMsg("No ❌","user");
showTicketBox();
}
};

/* TICKET */
function generateTicket(){
return "GURU-"+Date.now()+"-"+Math.floor(Math.random()*999);
}

function showTicketBox(){

const div=document.createElement("div");
div.className="msg bot";
div.innerHTML=`
<b>Create Ticket</b><br><br>

<input id="tname" placeholder="Name"><br>
<select id="role">
<option>Student</option>
<option>Teacher</option>
<option>Institute</option>
<option>Parent</option>
</select><br>

<input id="tphone" placeholder="Phone"><br>
<input id="temail" placeholder="Email"><br>
<input id="tmsg" placeholder="Issue"><br>

<button class="ticketBtn" onclick="submitTicket()">Submit</button>
`;

document.getElementById("chatBox").appendChild(div);
div.scrollIntoView();
}

window.submitTicket = async function(){

if(!canCreateTicket){
alert("You already have an open ticket. Wait until resolved.");
return;
}

const name=document.getElementById("tname").value;
const role=document.getElementById("role").value;
const phone=document.getElementById("tphone").value;
const email=document.getElementById("temail").value;
const msg=document.getElementById("tmsg").value;

if(!name||!phone||!email||!msg){
alert("Fill all fields");
return;
}

if(currentUser && phone!==currentUser.phoneNumber){
alert("Enter registered phone number");
return;
}

const ticketNo=generateTicket();

await push(ref(db,"tickets"),{
ticketNo,
name,
role,
phone,
email,
message:msg,
category:currentCategory,
status:"open",
time:Date.now()
});

canCreateTicket=false;

addMsg(
`🎫 Ticket Created Successfully<br>
<b>Ticket ID:</b> ${ticketNo}<br>
⏳ Your ticket is under review.`,
"bot"
);
};

</script>

</body>
</html>
