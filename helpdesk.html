<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GURULINK Helpdesk</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#eef2f7;
padding:12px;
min-height:100vh;
min-height:100dvh;
display:flex;
align-items:center;
justify-content:center;
}

.window{
width:100%;
max-width:900px;
background:#fff;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.15);
overflow:hidden;
height:calc(100vh - 24px);
height:calc(100dvh - 24px);
display:flex;
flex-direction:column;
}

.header{
background:#00897b;
color:#fff;
padding:16px;
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
flex-shrink:0;
}

.header h3{
font-size:20px;
margin:0;
}

.closeBtn{
background:#fff;
border:none;
color:#00897b;
min-width:42px;
height:38px;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.chat{
flex:1;
overflow-y:auto;
padding:14px;
background:#f9f9f9;
scroll-behavior:smooth;
}

.msg{
padding:12px;
margin:8px 0;
border-radius:12px;
max-width:95%;
word-wrap:break-word;
overflow-wrap:anywhere;
line-height:1.55;
}

.user{
background:#d1e7ff;
margin-left:auto;
}

.bot{
background:#fff;
border:1px solid #ddd;
}

.statusBox,.faqPanel{
background:#fff3cd;
padding:12px;
border-radius:10px;
border:1px solid #ffeeba;
margin:12px 0;
}

.quickGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:8px;
margin-top:10px;
}

input,select,textarea{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
margin-bottom:10px;
outline:none;
}

input:focus,select:focus,textarea:focus{
border-color:#00897b;
}

button{
padding:11px 14px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:14px;
min-height:42px;
}

.send,.quickGrid button{
background:#00897b;
color:#fff;
}

.ticketBtn{
background:#ff9800;
color:#fff;
width:100%;
margin-top:10px;
}

.ghostBtn{
background:#263238;
color:#fff;
}

.ticketChatBox{
background:#fff;
border:1px solid #d9e2ec;
border-radius:10px;
padding:10px;
margin-top:10px;
}

.ticketChatMessages{
max-height:240px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:8px;
margin:10px 0;
}

.ticketChatMsg{
padding:9px 11px;
border-radius:10px;
font-size:13px;
line-height:1.45;
max-width:90%;
word-break:break-word;
}

.ticketChatMsg.user{
background:#d1e7ff;
align-self:flex-end;
}

.ticketChatMsg.admin{
background:#e8f5e9;
align-self:flex-start;
}

.ticketChatMeta{
display:block;
font-size:11px;
color:#666;
margin-top:4px;
}

.ticketReplyRow{
display:flex;
gap:8px;
}

.ticketReplyRow input{
margin:0;
}

.faqItem{
background:#fff;
border:1px solid #ddd;
border-radius:10px;
margin:8px 0;
overflow:hidden;
}

.faqItem summary{
cursor:pointer;
font-weight:bold;
padding:12px;
color:#1f2933;
}

.faqItem div{
padding:0 12px 12px;
color:#333;
line-height:1.55;
}

.inputBox{
position:relative;
padding:10px;
border-top:1px solid #ddd;
background:white;
display:flex;
gap:8px;
align-items:center;
flex-shrink:0;
}

.inputBox input{
margin:0;
}

.suggestions{
position:absolute;
left:10px;
right:10px;
bottom:60px;
background:white;
border:1px solid #ccc;
border-radius:8px;
display:none;
flex-direction:column;
max-height:220px;
overflow-y:auto;
z-index:100;
box-shadow:0 4px 10px rgba(0,0,0,.15);
}

.suggestions div{
padding:12px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.suggestions div:hover{
background:#f5f5f5;
}

@media(max-width:600px){
body{
padding:0;
align-items:stretch;
}

.window{
border-radius:0;
height:100vh;
height:100dvh;
max-width:none;
box-shadow:none;
}

.header{
padding:calc(env(safe-area-inset-top) + 12px) 12px 12px;
}

.header h3{
font-size:17px;
line-height:1.2;
}

.closeBtn{
min-width:38px;
height:36px;
font-size:14px;
}

.chat{
padding:10px;
}

.msg{
max-width:100%;
padding:11px;
font-size:14px;
border-radius:10px;
}

.statusBox,.faqPanel{
padding:10px;
margin:10px 0;
border-radius:10px;
}

.quickGrid{
grid-template-columns:repeat(2,1fr);
gap:7px;
}

.quickGrid button{
padding:9px 6px;
font-size:12px;
line-height:1.2;
min-height:42px;
}

.faqItem{
border-radius:9px;
margin:7px 0;
}

.faqItem summary{
padding:11px;
font-size:14px;
line-height:1.35;
}

.faqItem div{
padding:0 11px 11px;
font-size:14px;
}

.inputBox{
flex-direction:column;
padding:8px;
padding-bottom:calc(env(safe-area-inset-bottom) + 8px);
}

.inputBox input,.inputBox .send{
width:100%;
height:42px;
margin:0;
font-size:14px;
}

.suggestions{
left:8px;
right:8px;
bottom:96px;
max-height:45vh;
}

input,select,textarea{
font-size:14px;
padding:11px;
margin-bottom:8px;
}

.ticketReplyRow{
flex-direction:column;
}

.ticketReplyRow button{
width:100%;
}
}

@media(max-width:360px){
.quickGrid{
grid-template-columns:1fr;
}

.header h3{
font-size:16px;
}

.quickGrid button{
font-size:13px;
}
}
</style>

<link rel="shortcut icon" href="https://i.ibb.co/0RT0BQKq/GURULINK-Logo-1.png">
<link rel="apple-touch-icon" href="https://i.ibb.co/0RT0BQKq/GURULINK-Logo-1.png">

<body>
<div class="window">
<div class="header">
<h3>GURULINK Helpdesk</h3>
<button class="closeBtn" onclick="closeHelpdesk()">X</button>
</div>

<div class="chat" id="chatBox">
<div class="msg bot">
Welcome. Choose a Quick Help Topic or type your question below.
</div>

<div class="statusBox" id="ticketStatusBox" style="display:none;">
<input id="checkInput" placeholder="Enter Ticket Number or Phone">
<button onclick="checkStatus()" class="send">Check Ticket Status</button>
</div>

<div class="faqPanel">
<b>Quick Help Topics</b>
<div class="quickGrid">
<button onclick="showFaq('registration')">Registration</button>
<button onclick="showFaq('category')">Category Selection</button>
<button onclick="showFaq('images')">Images & ID Proof</button>
<button onclick="showFaq('payment')">Payment</button>
<button onclick="showFaq('login')">Login</button>
<button onclick="showFaq('teacher')">Teacher Forms</button>
<button onclick="showFaq('institution')">Institution Forms</button>
<button onclick="showFaq('dashboard')">Dashboard</button>
<button onclick="showFaq('editprofile')">Edit Profile</button>
<button onclick="showTicketStatusBox()">Check Existing Ticket</button>
<button onclick="showFaq('all')">Show All FAQ</button>
</div>
</div>

<div id="faqBox"></div>
</div>

<div class="inputBox">
<input id="input" placeholder="Type your question..." oninput="showSuggestions()">
<button class="send" onclick="sendMsg()">Send</button>
<div class="suggestions" id="suggestBox"></div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, push, get, onValue, update } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let currentUser = null;
let canCreateTicket = true;
let currentCategory = "general";
let activeTicketId = "";
let activeTicketListener = null;

const faqs = [
{cat:"registration",q:"Which registration form should I choose?",a:"Choose Institution if you are registering a school, coaching center, academy, institute, gym, sports club, studio, training center, or organization. Choose Teacher if you are registering as an individual teacher, trainer, coach, mentor, tutor, artist, or instructor."},
{cat:"registration",q:"What are the current registration categories?",a:"Available categories include Professional Skills, Arts & Creativity, Sports & Fitness, and Academics, Education & Career Development. Each category has separate Institution and Teacher forms."},
{cat:"registration",q:"Can I edit my details later?",a:"Yes, the forms are structured so profile data can be edited later from the dashboard or edit profile page. Use the same login email and password created during registration."},
{cat:"registration",q:"Why is email and password required?",a:"Email and password create your secure login account. The same login will be used later to manage your profile, payment status, dashboard, and future edits."},
{cat:"registration",q:"What if my email already exists?",a:"Use the login page instead of registering again. If you forgot the password, use password reset. Do not create duplicate profiles with another email unless it is a different teacher or institution."},
{cat:"registration",q:"What if password is not accepted?",a:"Use at least 6 characters. A stronger password should include letters, numbers, and a symbol."},
{cat:"registration",q:"What should I enter in phone and alternate phone?",a:"Enter your main active contact number in Phone. Alternate Phone is optional but useful if the first number is unavailable."},
{cat:"registration",q:"What should I enter in Area / City or Town?",a:"Enter your locality, city, town, or service area. Example: Guwahati, Dispur, Jorhat Town, Silchar, or your local area name."},
{cat:"registration",q:"Why is PIN code required?",a:"PIN code helps students, parents, and users find nearby teachers or institutions and improves location accuracy."},

{cat:"category",q:"How do I select a long list of subjects or skills?",a:"Click the More button in the form. A full grouped chart will open. Select all subjects, skills, activities, or exams that apply to your profile."},
{cat:"category",q:"Can I select multiple subjects or skills?",a:"Yes. You can select multiple checkboxes across different groups. All selected values are saved in your profile."},
{cat:"category",q:"What if my subject or skill is not listed?",a:"Use the Other option inside the matching category. Type your custom subject, skill, sport, training mode, or exam name in the input that appears."},
{cat:"category",q:"What is Professional Skills?",a:"Professional Skills includes technology, business, digital skills, communication, career development, software training, languages, culinary arts, fashion, trade skills, and beauty or styling skills."},
{cat:"category",q:"What is Arts & Creativity?",a:"Arts & Creativity includes music, dance, visual arts, performing arts, photography, media, creative content, crafts, design, literary arts, and fine arts."},
{cat:"category",q:"What is Sports & Fitness?",a:"Sports & Fitness includes team sports, racquet sports, individual sports, martial arts, fitness, wellness, adventure sports, water sports, mind sports, esports, and sports coaching."},
{cat:"category",q:"What is Academics, Education & Career Development?",a:"This includes early childhood education, primary, secondary, higher secondary, law, languages, competitive exams, career guidance, and government job preparation."},
{cat:"category",q:"What should I enter in Class / Preparation For?",a:"Enter the class, level, age group, or exam type you teach or support. Examples: LKG, Class 1-5, Class 10, Class 11-12, JEE, NEET, UPSC, Banking, SSC, Career Guidance."},
{cat:"category",q:"What should I enter in Board / Type of Exam?",a:"Enter board or exam type. Examples: CBSE, SEBA, ICSE, ISC, IB, Cambridge, JEE, NEET, UPSC, APSC, Banking, SSC, Railway, Defence."},
{cat:"category",q:"What are Training Modes or Teaching Modes?",a:"These describe how you provide service, such as group coaching, individual coaching, home tuition, online training, workshop, personal coaching, or other custom mode."},
{cat:"category",q:"Can I add fees for every mode?",a:"Yes. When you select a mode, the fee input appears. Enter the amount for that mode. Leave blank only if you do not want to show a fee yet."},

{cat:"images",q:"Why do I need to upload ID proof?",a:"ID proof is used only for verification. GURULINK promises never to use or make your ID proof public under any circumstances."},
{cat:"images",q:"Which ID proof can I upload?",a:"Institutions can upload documents such as Owner PAN, Owner Aadhaar, Trading License, GST Certificate, UDYAM Aadhaar, Electricity Bill, NGO Certificate, or Other. Teachers can upload PAN, Aadhaar, or Other accepted proof."},
{cat:"images",q:"Will my ID proof be shown publicly?",a:"No. ID proof is only for verification and should not be displayed publicly on your profile."},
{cat:"images",q:"What is logo or profile picture?",a:"Institution forms use Logo for the institution brand image. Teacher forms use Profile Picture for the teacher or trainer image."},
{cat:"images",q:"What image format should I upload?",a:"Use clear JPG, PNG, or WebP images. Avoid blurry images, screenshots with extra borders, or very dark photos."},
{cat:"images",q:"Why is my image not uploading?",a:"Check your internet connection, try a smaller image, use JPG or PNG, and wait until upload completes before clicking payment. If it still fails, create a support ticket."},
{cat:"images",q:"What is Gallery?",a:"Gallery is optional. You can upload extra photos of your institute, classroom, training area, studio, gym, sports ground, previous work, or certificates where suitable."},
{cat:"images",q:"Can I skip Gallery?",a:"Yes. Gallery is optional unless your admin specifically asks for it."},
{cat:"images",q:"What is Google Maps Share Link?",a:"Paste the normal Google Maps share URL for your location so users can open directions."},
{cat:"images",q:"What is Google Maps Embed Code?",a:"This is optional iframe code from Google Maps. It helps display a map on your profile if the website supports embedded maps."},

{cat:"payment",q:"Why does the form go to payment after registration?",a:"After registration, your profile is saved as pending. Payment completes the subscription process and allows your profile to move toward approval."},
{cat:"payment",q:"What should I do after clicking Continue To Payment?",a:"Do not refresh or go back. Complete the payment page. The payment success page updates your payment status in Firebase."},
{cat:"payment",q:"What if payment succeeds but profile still shows pending?",a:"Wait a few minutes and refresh your dashboard. If it still shows pending, create a ticket with your registered phone, email, and payment reference."},
{cat:"payment",q:"What if payment fails?",a:"Try again from the payment page or dashboard if available. Do not create another registration unless support asks you to."},
{cat:"payment",q:"What if I closed the payment page by mistake?",a:"Login with the registered email and check whether your dashboard or payment page allows retry. If not, create a ticket with your registered email and phone."},
{cat:"payment",q:"Can I use promo code PRO-98?",a:"If the promo is active on the payment page, use the displayed promo code exactly as shown. Promo availability can depend on current offers."},

{cat:"login",q:"How do I login after registration?",a:"Use the same email and password you entered during registration."},
{cat:"login",q:"I forgot my password. What should I do?",a:"Use the forgot password option on the login page. A reset email should be sent to your registered email address."},
{cat:"login",q:"My login says user not found.",a:"Make sure you are using the exact email used during registration. If registration failed before account creation, register again."},
{cat:"login",q:"My account exists but payment was not completed.",a:"Login and check the dashboard or payment retry option. If unavailable, create a ticket with your registered email and phone number."},

{cat:"teacher",q:"What is different in Teacher forms?",a:"Teacher forms ask for Teacher Name, Experience, Qualification, Profile Picture, subjects or skills, training modes, and fees. They save under the teacher role."},
{cat:"teacher",q:"What should teachers enter in Experience?",a:"Enter total teaching, coaching, training, or professional experience in years. Example: 2, 5, or 10."},
{cat:"teacher",q:"What should teachers enter in Qualification?",a:"Enter education, certification, professional course, coaching certificate, degree, diploma, or practical expertise."},
{cat:"teacher",q:"Can a teacher register in multiple categories?",a:"Yes, but use the correct category form each time. Avoid duplicate profiles in the same category unless support advises it."},
{cat:"teacher",q:"Why does teacher form still save logo?",a:"Some older profile display code may read the image from logo. Teacher forms also save profilePic for clearer future use."},

{cat:"institution",q:"What is different in Institution forms?",a:"Institution forms ask for Institution Name, Owner or Director Name, Established Date, Logo, ID proof, subjects or services, training modes, and fees."},
{cat:"institution",q:"What should I enter in Established Date?",a:"Enter the start date or establishment date of the institute, academy, center, gym, studio, or organization."},
{cat:"institution",q:"What if my institution does not have a website?",a:"Leave Website URL blank. It is optional."},
{cat:"institution",q:"Can an institution offer online and offline classes?",a:"Yes. Select all applicable teaching or training modes and enter fees for each mode if you want to show them."},
{cat:"institution",q:"What if I manage both institution and teacher profile?",a:"Register institution using the Institution form. Register yourself as a teacher only if you also want an individual teacher profile."},

{cat:"dashboard",q:"Who can use the teacher dashboard?",a:"The dashboard is used by both teachers and institutions. It opens the profile connected to the current login and role saved during registration or OTP login."},
{cat:"dashboard",q:"Why is the same dashboard used for teacher and institution?",a:"Teacher and institution profiles share many common tools, such as profile status, profile views, bank details, edit profile, sharing link, and support. The dashboard detects the role and loads the correct teacher or institution data."},
{cat:"dashboard",q:"What does Total Views mean in the dashboard?",a:"Total Views shows how many profile view records are saved for your profile. It helps you understand how many people opened or viewed your public profile."},
{cat:"dashboard",q:"Why do some viewers show phone number but some do not?",a:"Phone numbers are hidden for registered Teacher or Institution viewers. Student, Parent, and guest viewers may show a phone number when it is available from OTP login or saved profile data."},
{cat:"dashboard",q:"Why does a viewer show as Teacher or Institution instead of a personal name?",a:"For privacy, registered Teacher or Institution viewers are shown as Teacher or Institution. Their personal phone number is not shown in your dashboard leads."},
{cat:"dashboard",q:"Why does a viewer show as Guest?",a:"Guest appears when someone opens a shared public profile link directly without OTP login, or when the system cannot identify a registered student, parent, teacher, or institution account."},
{cat:"dashboard",q:"Why is a viewer phone number missing?",a:"The viewer may be a registered teacher or institution, a guest without OTP, or the phone number was not available in Firebase Auth or profile data at the time of view."},
{cat:"dashboard",q:"Can I call or WhatsApp a viewer from the dashboard?",a:"Yes, when a valid phone number is available, the dashboard can show call and WhatsApp options. If the phone number is hidden or missing, those contact buttons may not appear."},
{cat:"dashboard",q:"Why are Call or WhatsApp buttons not visible?",a:"The contact buttons are shown only when the viewer phone number is available. If the viewer is a registered teacher or institution, the number is intentionally hidden."},
{cat:"dashboard",q:"What does payment status mean in dashboard?",a:"Payment status shows whether payment has been recorded for the profile. If payment is successful but the dashboard does not update, wait a few minutes and then create a ticket with your payment reference."},
{cat:"dashboard",q:"What does profile status pending mean?",a:"Pending means the profile is saved but may still need payment confirmation, admin verification, or approval before full public use."},
{cat:"dashboard",q:"What does profile status approved mean?",a:"Approved means the profile has passed verification and can be shown or used according to GURULINK platform rules."},
{cat:"dashboard",q:"How do I edit my profile from dashboard?",a:"Click Edit Profile from the dashboard. It opens the edit profile page for the current teacher or institution account."},
{cat:"dashboard",q:"How do I share my profile?",a:"Use the share profile option in the dashboard. It creates a public profile link like profile-view.html?id=YOUR_PROFILE_ID. A person opening that shared link can view the profile directly."},
{cat:"dashboard",q:"Will a shared social media profile link require OTP?",a:"No. A direct shared profile-view link opens publicly. OTP is required only when a guest clicks a profile from inside GURULINK listing pages."},
{cat:"dashboard",q:"Why does a guest need OTP when clicking from the website listing?",a:"Guests have limited access inside the app or website. For complete access and better lead tracking, they are asked to log in as Student / Parent or Teacher / Institution before opening profiles from listing pages."},
{cat:"dashboard",q:"Can I hide my bank details from public profile?",a:"Yes. Open Edit Profile and uncheck the public option for bank details. Bank details can stay saved for your own dashboard/admin use while remaining hidden publicly."},
{cat:"dashboard",q:"Why are my bank details visible in dashboard?",a:"Dashboard shows your own saved information so you can check and manage it. Public visibility is controlled separately from Edit Profile."},
{cat:"dashboard",q:"What should I do if dashboard opens the wrong profile?",a:"Logout and login again with the correct account. If the issue continues, create a ticket with your registered phone, email, role, and profile ID."},
{cat:"dashboard",q:"Why does dashboard ask me to login again?",a:"Your browser may have lost local login data, or you may be opening the dashboard from a different device or browser. Login again using the correct role and phone/email."},

{cat:"editprofile",q:"What can I change in Edit Profile?",a:"You can update profile details such as name, phone, alternate phone, email, website, address, area or city, PIN code, subjects, skills, class or preparation, board or exam type, teaching modes, fees, images, map link, description, and bank details where available."},
{cat:"editprofile",q:"What do the checkboxes beside profile fields mean?",a:"The checkboxes control public visibility. If checked, that field can be shown on the public profile. If unchecked, the field remains saved but should be hidden from profile-view."},
{cat:"editprofile",q:"If I uncheck a field, is the data deleted?",a:"No. Unchecking only hides the field from the public profile. The saved value remains in your profile so you can show it again later by checking the box."},
{cat:"editprofile",q:"Why are bank details handled carefully?",a:"Bank details are sensitive. You can save them for your own/dashboard or admin use, but you can uncheck public visibility so they do not appear on the public profile."},
{cat:"editprofile",q:"How do I hide my phone number from public profile?",a:"Open Edit Profile and uncheck the public visibility checkbox beside the phone field. Save the profile after changing it."},
{cat:"editprofile",q:"How do I hide my email or alternate phone?",a:"Open Edit Profile, uncheck the visibility checkbox beside Email or Alternate Phone, and save. The information remains saved but should not be shown publicly."},
{cat:"editprofile",q:"How do I hide my address, area, or PIN code?",a:"Open Edit Profile and uncheck the visibility checkbox beside Address, Area / City or Town, or PIN Code. Save the profile after changing it."},
{cat:"editprofile",q:"How do I hide fees?",a:"Open Edit Profile and uncheck the visibility checkbox beside the fee fields you do not want public, such as group fee, individual fee, home fee, online fee, or super group fee."},
{cat:"editprofile",q:"Can I hide subjects, skills, sports, or exams?",a:"Yes. Open Edit Profile and uncheck public visibility for the subjects or skills field if you do not want the selected chart items to appear publicly."},
{cat:"editprofile",q:"Can I hide teaching modes or training modes?",a:"Yes. Uncheck the visibility checkbox beside teaching modes or training modes and save the profile."},
{cat:"editprofile",q:"Can I change my logo or profile picture?",a:"Yes. Use the logo/profile picture upload section in Edit Profile, upload a new image, and save. Use a clear JPG, PNG, or WebP image."},
{cat:"editprofile",q:"Can I remove or update gallery images?",a:"Yes. Edit Profile can show existing gallery images and options to manage them where available. If an image does not remove correctly, create a ticket with your profile ID."},
{cat:"editprofile",q:"Can I update my Google Maps link?",a:"Yes. Update the Google Maps Share Link or Embed Code in Edit Profile and save. If you do not want a map shown publicly, uncheck the related visibility option."},
{cat:"editprofile",q:"Why do I see technical field names in Edit Profile?",a:"Some data comes directly from Firebase keys. The edit page supports all known registration fields so old and new forms can be edited from one place."},
{cat:"editprofile",q:"What should I do after editing profile details?",a:"Click Save or Update Profile and wait for confirmation. Then open your public profile to check that the visible information is correct."},
{cat:"editprofile",q:"Why did my public profile not change immediately?",a:"Refresh the public profile page. If it still does not update, make sure you clicked Save in Edit Profile and that the visibility checkbox for that field is checked."},
{cat:"editprofile",q:"Why is a field still visible after I unchecked it?",a:"Make sure you saved the profile after unchecking. If it is still visible, create a ticket and mention the field name, profile ID, and whether you are teacher or institution."},
{cat:"editprofile",q:"Can I make a hidden field public again?",a:"Yes. Open Edit Profile, check the visibility checkbox again, save, and refresh the public profile."},
{cat:"editprofile",q:"Can I edit category from Edit Profile?",a:"Category changes can affect listing pages and profile search. If you selected the wrong main category, create a support ticket instead of changing it manually."},
{cat:"editprofile",q:"Can I edit role from Edit Profile?",a:"No. Role should remain teacher or institution. If the role is wrong, create a support ticket with your registered email, phone, and correct role."},
{cat:"editprofile",q:"Can I edit payment status or approval status?",a:"No. Payment status and approval status are verification fields. Contact support if payment or approval status looks wrong."},
{cat:"editprofile",q:"What happens if I leave a field blank?",a:"Blank fields may not appear on the public profile. If the field is important, enter the correct value and keep its visibility checkbox checked."},
{cat:"editprofile",q:"Why should I keep my profile complete?",a:"A complete profile helps students and parents understand your subjects, modes, fees, location, experience, and contact options before contacting you."},

{cat:"profile",q:"When will my profile be approved?",a:"After successful payment and verification, admin can approve the profile. Timing depends on verification queue and completeness of your submitted details."},
{cat:"profile",q:"Why is my status pending?",a:"Pending means registration is saved but payment or admin approval may still be incomplete."},
{cat:"profile",q:"What does paymentStatus pending mean?",a:"It means payment has not been confirmed in the database yet. Complete payment or contact support if you already paid."},
{cat:"profile",q:"What does approved mean?",a:"Approved means the profile has passed verification and is allowed to appear or function according to the platform rules."},
{cat:"profile",q:"Can I change phone, fee, subjects, or image later?",a:"Yes, from edit profile when available. If edit is not visible, create a support ticket with the exact change needed."},
{cat:"profile",q:"I selected wrong category. What should I do?",a:"Create a ticket before making payment if possible. If already paid, contact support with your registered email, phone, profile type, and correct category."},
{cat:"profile",q:"I entered wrong spelling or wrong fee.",a:"Use edit profile if available. Otherwise create a ticket and mention the exact field and correct value."}
];

const suggestions = faqs.map(item => item.q);

onAuthStateChanged(auth, (user)=>{
currentUser = user || null;
if(user && user.phoneNumber){
checkOpenTicket(user.phoneNumber);
}
});

function addMsg(text,type){
const div=document.createElement("div");
div.className="msg "+type;
div.innerHTML=text;
document.getElementById("chatBox").appendChild(div);
div.scrollIntoView();
}

function escapeHtml(value){
return String(value ?? "").replace(/[&<>"]/g, c => ({
"&":"&amp;",
"<":"&lt;",
">":"&gt;",
"\"":"&quot;"
}[c]));
}

function formatTime(time){
return time ? new Date(time).toLocaleString() : "";
}

function ticketChatHtml(messages){
const list =
Object.values(messages || {})
.sort((a,b)=>(a.time || 0) - (b.time || 0));

if(!list.length){
return `<div class="ticketChatMsg admin">No chat messages yet. Send a message to support.</div>`;
}

return list.map(msg => `
<div class="ticketChatMsg ${msg.sender === "admin" ? "admin" : "user"}">
${escapeHtml(msg.text)}
<span class="ticketChatMeta">${msg.sender === "admin" ? "Admin" : "You"} â€¢ ${formatTime(msg.time)}</span>
</div>
`).join("");
}

function openTicketChat(ticketId,ticketNo){
activeTicketId = ticketId;

if(activeTicketListener){
activeTicketListener();
activeTicketListener = null;
}

let existing = document.getElementById("ticketChatBox");
if(!existing){
const div = document.createElement("div");
div.className = "msg bot";
div.innerHTML = `
<div class="ticketChatBox" id="ticketChatBox">
<b>Ticket Chat</b>
<div style="font-size:12px;color:#666;margin-top:4px;">Ticket: <span id="activeTicketNo">${escapeHtml(ticketNo || "")}</span></div>
<div class="ticketChatMessages" id="ticketChatMessages"></div>
<div class="ticketReplyRow">
<input id="ticketReplyInput" placeholder="Type message to admin...">
<button class="send" onclick="sendTicketMessage()">Send Message</button>
</div>
</div>
`;
document.getElementById("chatBox").appendChild(div);
existing = div;
}
else{
document.getElementById("activeTicketNo").textContent = ticketNo || "";
}

activeTicketListener = onValue(ref(db,"tickets/"+ticketId+"/chatMessages"), snap=>{
document.getElementById("ticketChatMessages").innerHTML =
ticketChatHtml(snap.val());
document.getElementById("ticketChatBox").scrollIntoView();
});
}

window.sendTicketMessage = async function(){
const input = document.getElementById("ticketReplyInput");
if(!activeTicketId || !input) return;

const text = input.value.trim();
if(!text){
alert("Please type a message.");
return;
}

await push(ref(db,"tickets/"+activeTicketId+"/chatMessages"),{
sender:"user",
text,
time:Date.now()
});

await update(ref(db,"tickets/"+activeTicketId),{
lastUserMessage:text,
lastUserMessageAt:Date.now()
});

input.value = "";
};

function faqHtml(list){
return list.map(item => `
<details class="faqItem">
<summary>${item.q}</summary>
<div>${item.a}</div>
</details>
`).join("");
}

window.showFaq=function(cat){
currentCategory=cat;
let list = cat==="all" ? faqs : faqs.filter(item => item.cat===cat);
document.getElementById("faqBox").innerHTML = faqHtml(list);
addMsg("Showing FAQ: "+cat,"bot");
};

window.showTicketStatusBox=function(){
const box = document.getElementById("ticketStatusBox");
box.style.display = "block";
box.scrollIntoView();
document.getElementById("checkInput").focus();
};

function findAnswer(text){
const q = text.toLowerCase();
let exact = faqs.find(item => item.q.toLowerCase()===q);
if(exact) return exact;

let scored = faqs.map(item => {
const combined = (item.q+" "+item.a+" "+item.cat).toLowerCase();
let score = 0;
q.split(/\s+/).forEach(word => {
if(word.length > 2 && combined.includes(word)) score++;
});
return {item,score};
}).sort((a,b)=>b.score-a.score);

return scored[0].score > 0 ? scored[0].item : null;
}

window.showSuggestions=function(){
const input=document.getElementById("input");
const val=input.value.toLowerCase();
const box=document.getElementById("suggestBox");
box.innerHTML="";

if(!val){
box.style.display="none";
return;
}

let found=suggestions.filter(s=>s.toLowerCase().includes(val)).slice(0,8);

if(found.length===0){
box.style.display="none";
return;
}

found.forEach(s=>{
let div=document.createElement("div");
div.innerText=s;
div.onclick=()=>{
input.value=s;
box.style.display="none";
};
box.appendChild(div);
});

box.style.display="flex";
};

window.sendMsg=function(){
const input=document.getElementById("input");
const text=input.value.trim();
if(!text) return;

addMsg(text,"user");
input.value="";
document.getElementById("suggestBox").style.display="none";

const answer=findAnswer(text);
if(answer){
addMsg("<b>"+answer.q+"</b><br>"+answer.a,"bot");
}else{
addMsg("I could not find an exact FAQ answer. You can create a support ticket below with your registered phone and email.","bot");
}

askResolved();
};

function askResolved(){
const div=document.createElement("div");
div.className="msg bot";
div.innerHTML=`
<b>Was this helpful?</b><br>
<button class="send" onclick="resolved(true)">Yes</button>
<button class="ghostBtn" onclick="resolved(false)">No, create ticket</button>
`;
document.getElementById("chatBox").appendChild(div);
div.scrollIntoView();
}

window.resolved=function(status){
if(status){
addMsg("Yes","user");
addMsg("Great. You can continue registration.","bot");
}else{
addMsg("No, create ticket","user");
showTicketBox();
}
};

function generateTicket(){
return "GURU-"+Date.now()+"-"+Math.floor(Math.random()*999);
}

function checkOpenTicket(phone){
onValue(ref(db,"tickets"),(snap)=>{
let open=false;
snap.forEach(c=>{
let d=c.val();
if(d.phone===phone && d.status==="open"){
open=true;
}
});
canCreateTicket=!open;
});
}

window.checkStatus=async function(){
const val=document.getElementById("checkInput").value.trim();
if(!val) return;

const snap=await get(ref(db,"tickets"));
let found=null;
let foundId="";

snap.forEach(c=>{
let d=c.val();
if(d.ticketNo===val || d.phone===val){
found=d;
foundId=c.key;
}
});

if(found){
addMsg(`<b>Ticket:</b> ${found.ticketNo}<br><b>Status:</b> ${found.status}<br><b>Phone:</b> ${found.phone}<br><b>Category:</b> ${found.category || "general"}`,"bot");
openTicketChat(foundId,found.ticketNo);
}else{
addMsg("No ticket found for this ticket number or phone.","bot");
}
};

function showTicketBox(){
const div=document.createElement("div");
div.className="msg bot";
div.innerHTML=`
<b>Create Support Ticket</b><br><br>
<input id="tname" placeholder="Name">
<select id="role">
<option>Institution</option>
<option>Teacher</option>
<option>Student</option>
<option>Parent</option>
</select>
<select id="issueCategory">
<option>Registration</option>
<option>Payment</option>
<option>ID Proof / Image Upload</option>
<option>Login</option>
<option>Profile Edit</option>
<option>Teacher / Institution Dashboard</option>
<option>Public Visibility / Hidden Fields</option>
<option>Profile Views / Leads</option>
<option>Category / Subject Selection</option>
<option>Other</option>
</select>
<input id="tphone" placeholder="Registered Phone">
<input id="temail" placeholder="Registered Email">
<textarea id="tmsg" placeholder="Describe your issue. Include form name, registered email, phone, and payment reference if payment related." rows="4"></textarea>
<button class="ticketBtn" onclick="submitTicket()">Submit Ticket</button>
`;
document.getElementById("chatBox").appendChild(div);
div.scrollIntoView();
}

window.submitTicket=async function(){
if(!canCreateTicket){
alert("You already have an open ticket. Please wait until it is resolved.");
return;
}

const name=document.getElementById("tname").value.trim();
const role=document.getElementById("role").value;
const issueCategory=document.getElementById("issueCategory").value;
const phone=document.getElementById("tphone").value.trim();
const email=document.getElementById("temail").value.trim();
const message=document.getElementById("tmsg").value.trim();

if(!name || !phone || !email || !message){
alert("Please fill all ticket fields.");
return;
}

const ticketNo=generateTicket();

const ticketRef = await push(ref(db,"tickets"),{
ticketNo,
name,
role,
phone,
email,
message,
category:issueCategory,
status:"open",
time:Date.now(),
chatMessages:{
initial:{
sender:"user",
text:message,
time:Date.now()
}
}
});

canCreateTicket=false;

addMsg(`<b>Ticket Created Successfully</b><br><b>Ticket ID:</b> ${ticketNo}<br>Please save this ticket number for status checking. You can also chat with admin below.`,"bot");
document.getElementById("ticketStatusBox").style.display = "block";
document.getElementById("checkInput").value = ticketNo;
openTicketChat(ticketRef.key,ticketNo);
};

window.closeHelpdesk=function(){
const returnPage=sessionStorage.getItem("helpdeskReturn");

if(returnPage){
sessionStorage.removeItem("helpdeskReturn");
window.location.href=returnPage;
}else if(document.referrer){
history.back();
}else{
window.location.href="index.html";
}
};

</script>
