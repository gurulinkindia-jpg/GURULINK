<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GURULINK Helpdesk Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

/* WINDOW */
.window{
width:95%;
max-width:700px;
margin:20px auto;
background:white;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.2);
overflow:hidden;
}

/* HEADER */
.header{
background:#1565c0;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.closeBtn{
background:red;
border:none;
color:white;
font-size:18px;
width:35px;
height:35px;
border-radius:8px;
cursor:pointer;
}

/* CHAT */
.chat{
height:420px;
overflow-y:auto;
padding:15px;
background:#f9f9f9;
}

.msg{
padding:10px;
margin:8px 0;
border-radius:10px;
max-width:80%;
}

.user{background:#d1e7ff;margin-left:auto;}
.bot{background:#fff;border:1px solid #ddd;}

/* INPUT */
.inputBox{
display:flex;
padding:10px;
border-top:1px solid #ddd;
position:relative;
}

input, select{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:8px;
margin-bottom:8px;
}

button{
margin-left:8px;
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
}

.send{background:#1565c0;color:white;}
.ticketBtn{background:#ff9800;color:white;}

/* CATEGORY SCREEN */
.categoryBox{
padding:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.cat{
padding:15px;
background:#e3f2fd;
border:1px solid #90caf9;
border-radius:10px;
cursor:pointer;
text-align:center;
}

.cat:hover{
background:#bbdefb;
}

/* SUGGESTIONS */
.suggestions{
position:absolute;
bottom:55px;
left:10px;
right:10px;
background:white;
border:1px solid #ccc;
border-radius:8px;
display:none;
flex-direction:column;
z-index:10;
}

.suggestions div{
padding:10px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.suggestions div:hover{
background:#f0f0f0;
}
</style>
</head>

<body>

<div class="window">

<div class="header">
<h3>GURULINK HELP DESK</h3>
<button class="closeBtn" onclick="window.location.href='dashboard.html'">✖</button>
</div>

<div class="chat" id="chatBox">

<div class="msg bot">
👋 Welcome! Please select a category to continue.
</div>

<div class="categoryBox" id="catBox">
<div class="cat" onclick="selectCategory('login')">Login</div>
<div class="cat" onclick="selectCategory('registration')">Registration</div>
<div class="cat" onclick="selectCategory('profile')">Profile</div>
<div class="cat" onclick="selectCategory('dashboard')">Dashboard</div>
<div class="cat" onclick="selectCategory('find teacher')">Find Teacher</div>
<div class="cat" onclick="selectCategory('renew profile')">Renew Profile</div>
</div>

</div>

<div class="inputBox">

<input id="input"
placeholder="Type your question..."
oninput="showSuggestions()"
disabled>

<button class="send" onclick="sendMsg()">Send</button>

<div class="suggestions" id="suggestBox"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentCategory = "";
let selectedQuestion = "";

/* CATEGORY SELECT */
window.selectCategory = function(cat){

currentCategory = cat;

document.getElementById("catBox").style.display="none";

addMsg("Category selected: " + cat,"bot");

document.getElementById("input").disabled = false;
};

/* CHAT */
function addMsg(text,type){
const div=document.createElement("div");
div.className="msg "+type;
div.innerHTML=text;
document.getElementById("chatBox").appendChild(div);
div.scrollIntoView();
}

/* FAQ AI BASED ON CATEGORY */
function botReply(msg){

msg = msg.toLowerCase();

if(currentCategory === "login"){
if(msg.includes("password")) return "Reset password using email link.";
if(msg.includes("otp")) return "Check your registered mobile for OTP.";
}

if(currentCategory === "profile"){
if(msg.includes("edit")) return "Go to profile → edit → save.";
}

if(currentCategory === "dashboard"){
return "Refresh dashboard or logout/login again.";
}

return "Not solved. You can book a ticket.";
}

/* SUGGESTIONS BASED ON CATEGORY */
const suggestionData = {
login:["Login issue","Forgot password","OTP not received"],
registration:["Sign up issue","Email not verified","Mobile issue"],
profile:["Edit profile","Photo update","Change details"],
dashboard:["Dashboard not loading","Data missing"],
"find teacher":["Search teacher","Filter issue"],
"renew profile":["Renew failed","Payment issue"]
};

window.showSuggestions = function(){

const input=document.getElementById("input");
const val=input.value.toLowerCase();
const box=document.getElementById("suggestBox");

box.innerHTML="";

if(!val || !currentCategory){
box.style.display="none";
return;
}

let list = suggestionData[currentCategory] || [];

list.filter(s=>s.toLowerCase().includes(val))
.forEach(s=>{
let div=document.createElement("div");
div.innerText=s;
div.onclick=()=>{
input.value=s;
input.disabled=true;
box.style.display="none";
selectedQuestion=s;
};
box.appendChild(div);
});

let other=document.createElement("div");
other.innerHTML="✍ Other (type manually)";
other.style.color="red";
other.onclick=()=>{
input.disabled=false;
input.value="";
box.style.display="none";
};

box.appendChild(other);
box.style.display="flex";
};

/* SEND */
window.sendMsg=function(){

const input=document.getElementById("input");
const text=input.value.trim();
if(!text) return;

addMsg(text,"user");

setTimeout(()=>{
addMsg(botReply(text),"bot");
askResolved();
},500);

input.value="";
};

/* RESOLVED */
function askResolved(){
const div=document.createElement("div");
div.className="msg bot";
div.innerHTML=`
<b>Is your problem resolved?</b>
<button onclick="resolved(true)">Yes 👍</button>
<button onclick="resolved(false)">No ❌</button>
`;
document.getElementById("chatBox").appendChild(div);
div.scrollIntoView();
}

window.resolved=function(status){
if(status){
addMsg("Yes ✔","user");
addMsg("Great 👍","bot");
}else{
addMsg("No ❌","user");
showTicketBox();
}
};

/* TICKET */
function generateTicket(){
return "GURU-" + Date.now() + "-" + Math.floor(Math.random()*999);
}

function showTicketBox(){

const div=document.createElement("div");
div.className="msg bot";
div.innerHTML=`
<b>Book Ticket</b><br><br>

<input id="tname" placeholder="Name"><br>
<select id="role">
<option>Student</option>
<option>Teacher</option>
<option>Institute</option>
<option>Parent</option>
</select><br>

<input id="tphone" placeholder="Phone"><br>
<input id="temail" placeholder="Email"><br>
<input id="tmsg" placeholder="Issue"><br>

<button class="ticketBtn" onclick="submitTicket()">Submit Ticket</button>
`;

document.getElementById("chatBox").appendChild(div);
div.scrollIntoView();
}

window.submitTicket = async function(){

const name=document.getElementById("tname").value;
const role=document.getElementById("role").value;
const phone=document.getElementById("tphone").value;
const email=document.getElementById("temail").value;
const msg=document.getElementById("tmsg").value;

if(!name || !phone || !email || !msg){
alert("Fill all fields");
return;
}

const ticketNo = generateTicket();

await push(ref(db,"tickets"),{
ticketNo,
name,
role,
phone,
email,
message:msg,
category:currentCategory,
status:"open",
time:Date.now()
});

addMsg("🎫 Ticket Created: <b>"+ticketNo+"</b>","bot");
};

</script>

</body>
</html>
