<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GURULINK Helpdesk Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

.window{
width:95%;
max-width:700px;
margin:20px auto;
background:white;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.2);
overflow:hidden;
}

.header{
background:#1565c0;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.closeBtn{
background:red;
border:none;
color:white;
font-size:18px;
width:35px;
height:35px;
border-radius:8px;
cursor:pointer;
}

.chat{
height:420px;
overflow-y:auto;
padding:15px;
background:#f9f9f9;
}

.msg{
padding:10px;
margin:8px 0;
border-radius:10px;
max-width:80%;
}

.user{background:#d1e7ff;margin-left:auto;}
.bot{background:#fff;border:1px solid #ddd;}

.inputBox{
display:flex;
padding:10px;
border-top:1px solid #ddd;
}

input{
flex:1;
padding:10px;
border:1px solid #ccc;
border-radius:8px;
}

button{
margin-left:8px;
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
}

.send{background:#1565c0;color:white;}

.ticketBox{
padding:15px;
background:white;
border-bottom:1px solid #ddd;
}
</style>
</head>

<body>

<div class="window">

<div class="header">
<h3>GURULINK HELP DESK</h3>
<button class="closeBtn" onclick="window.location.href='dashboard.html'">✖</button>
</div>

<div class="ticketBox" id="ticketBox">
<h4>🔎 Enter Ticket Number</h4>
<input id="ticketInput" placeholder="GURU-xxxxx">
<button class="send" onclick="checkTicket()">Check Status</button>
</div>

<div class="chat" id="chatBox" style="display:none;">
<div class="msg bot">Welcome to Helpdesk 👋</div>
</div>

<div class="inputBox" style="display:none;" id="chatInput">
<input id="input" placeholder="Type message...">
<button class="send" onclick="sendMsg()">Send</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentTicket = null;

/* UI */
function addMsg(text,type){
const div=document.createElement("div");
div.className="msg "+type;
div.innerHTML=text;
document.getElementById("chatBox").appendChild(div);
div.scrollIntoView();
}

/* CHECK TICKET */
window.checkTicket = async function(){

const id = document.getElementById("ticketInput").value.trim();
if(!id){
alert("Enter ticket number");
return;
}

const snap = await get(ref(db,"tickets"));

let found = null;

snap.forEach(child=>{
if(child.val().ticketNo === id){
found = child.val();
}
});

if(!found){
alert("Ticket not found");
return;
}

currentTicket = found;

/* show UI */
document.getElementById("ticketBox").style.display="none";
document.getElementById("chatBox").style.display="block";
document.getElementById("chatInput").style.display="flex";

addMsg(`🎫 Ticket Found<br>
<b>Status:</b> ${found.status}<br>
<b>Name:</b> ${found.name}<br>
<b>Message:</b> ${found.message}`, "bot");

if(found.status === "open"){
addMsg("⏳ Your ticket is under review", "bot");
}
if(found.status === "resolved"){
addMsg("✅ Your issue has been resolved", "bot");
}
if(found.status === "not_resolved"){
addMsg("❌ Ticket was not resolved", "bot");
}
};

/* CHAT (optional) */
window.sendMsg = function(){
const input=document.getElementById("input");
const text=input.value.trim();
if(!text) return;

addMsg(text,"user");
addMsg("📌 Support team will reply on your ticket update","bot");

input.value="";
};

</script>

</body>
</html>
