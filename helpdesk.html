<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GURULINK Helpdesk Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{
margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif;
}

body{ background:#eef2f7; padding:10px;
}

.window{width:100%; max-width:700px; margin:auto; background:#fff; border-radius:15px; box-shadow:0 5px 20px rgba(0,0,0,.15); overflow:hidden;
}

.header{ background:#1565c0; color:#fff; padding:12px; display:flex; justify-content:space-between; align-items:center; gap:10px;
}

.header h3{ font-size:18px; margin:0; flex:1;
}

.closeBtn{ background:red; border:none; color:#fff; width:40px; height:40px; border-radius:8px; font-size:18px; cursor:pointer; flex-shrink:0;
}

.chat height:65vh; overflow-y:auto; padding:12px; background:#f9f9f9;
}

.msg{ padding:12px; margin:8px 0; border-radius:12px; max-width:90%; word-wrap:break-word; line-height:1.5;
}

.user{ background:#d1e7ff; margin-left:auto;
}

.bot{ background:#fff; border:1px solid #ddd;
}

.statusBox{ background:#fff3cd; padding:12px; border-radius:10px; border:1px solid #ffeeba; margin-bottom:15px;
}

.statusBox button{ width:100%; margin-top:8px; margin-left:0;
}

input, select, textarea{ width:100%; padding:12px; border:1px solid #ccc; border-radius:8px; font-size:16px; margin-bottom:10px; outline:none;
}

input:focus, select:focus, textarea:focus{ border-color:#1565c0;
}

button{ padding:12px 15px; border:none; border-radius:8px; cursor:pointer; font-size:15px;
}

.send{ background:#1565c0; color:#fff;
}

.ticketBtn{ background:#ff9800; color:#fff; width:100%; margin-top:10px;
}

/* Category Buttons */

#catBox{ display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-top:10px;
}

#catBox button{ width:100%; background:#1565c0; color:white; padding:12px; margin:0;
}

/* Chat Input */

.inputBox{ position:relative; padding:10px; border-top:1px solid #ddd; background:white; display:flex; gap:8px; align-items:center;
}

.inputBox input{ margin:0;
}

.inputBox .send{ white-space:nowrap;
}

/* Suggestions */

.suggestions{ position:absolute; left:10px; right:10px; bottom:60px; background:white; border:1px solid #ccc; border-radius:8px; display:none; flex-direction:column; max-height:200px; overflow-y:auto; z-index:100; box-shadow:0 4px 10px rgba(0,0,0,.15);
}

.suggestions div{ padding:12px; cursor:pointer; border-bottom:1px solid #eee;
}

.suggestions div:last-child{ border-bottom:none;
}

.suggestions div:hover{ background:#f5f5f5;
}

/* Ticket Form Buttons */

.msg button{ margin-top:8px; margin-right:6px;
}

/* Mobile */

@media(max-width:600px){

body{ padding:5px;
}

.window{ border-radius:0; height:100vh; max-width:none;
}

.chat{ height:calc(100vh - 180px);
}

.header h3{ font-size:16px;
}

.inputBox{ flex-direction:column;
}

.inputBox input{ width:100%;
}

.inputBox .send{ width:100%; margin:0;
}

#catBox{ grid-template-columns:1fr;
}

.msg{ max-width:100%;
}

.closeBtn{ width:36px; height:36px;
}
} 

</style>
</head>

<body>

<div class="window">

<div class="header">
<h3>GURULINK HELP DESK</h3>
<button class="closeBtn" onclick="closeHelpdesk()">✖</button>
</div>

<div class="chat" id="chatBox">

<div class="msg bot">
👋 Welcome! Enter Ticket Number or Phone to check status OR start new request.
</div>

<div class="statusBox">
<input id="checkInput" placeholder="Enter Ticket No OR Phone">
<button onclick="checkStatus()" class="send">Check Status</button>
</div>

<div id="catBox">
<button onclick="selectCategory('login')">Login</button>
<button onclick="selectCategory('registration')">Registration</button>
<button onclick="selectCategory('profile')">Profile</button>
<button onclick="selectCategory('dashboard')">Dashboard</button>
<button onclick="selectCategory('find teacher')">Find Teacher</button>
<button onclick="selectCategory('renew profile')">Renew Profile</button>
</div>

</div>

<div class="inputBox">

<input id="input"
placeholder="Type your question..."
oninput="showSuggestions()"
disabled>

<button class="send" onclick="sendMsg()">Send</button>

<div class="suggestions" id="suggestBox"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, push, get, onValue } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let currentUser=null;
let currentCategory="";
let canCreateTicket=false;

/* AUTH */
onAuthStateChanged(auth, async (user)=>{
if(user){
currentUser=user;

if(!user.phoneNumber){
addMsg("⚠ Login with registered phone number","bot");
return;
}

checkOpenTicket(user.phoneNumber);
}
});

/* FIXED REALTIME TICKET CHECK */
function checkOpenTicket(phone){

onValue(ref(db,"tickets"),(snap)=>{

let open=false;

snap.forEach(c=>{
let d=c.val();
if(d.phone===phone && d.status==="open"){
open=true;
}
});

canCreateTicket = !open;

if(open){
addMsg("🚫 You already have an OPEN ticket.","bot");
}else{
addMsg("✅ You can create a new ticket now.","bot");
}

});
}

/* STATUS CHECK */
window.checkStatus = async function(){

const val=document.getElementById("checkInput").value.trim();
if(!val) return;

const snap=await get(ref(db,"tickets"));

let found=null;

snap.forEach(c=>{
let d=c.val();
if(d.ticketNo===val || d.phone===val){
found=d;
}
});

if(found){
addMsg(
`🎫 Ticket: ${found.ticketNo}<br>
📌 Status: ${found.status}<br>
📞 Phone: ${found.phone}`,
"bot"
);
}else{
addMsg("❌ No ticket found","bot");
}
};

/* CATEGORY */
window.selectCategory=function(cat){
currentCategory=cat;
document.getElementById("catBox").style.display="none";
document.getElementById("input").disabled=false;
addMsg("Category: "+cat,"bot");
};

/* CHAT */
function addMsg(text,type){
const div=document.createElement("div");
div.className="msg "+type;
div.innerHTML=text;
document.getElementById("chatBox").appendChild(div);
div.scrollIntoView();
}

/* BOT */
function botReply(msg){
msg=msg.toLowerCase();

if(msg.includes("login")) return "Reset password via email.";
if(msg.includes("profile")) return "Go to edit profile.";

return "Not solved. Create ticket or check status.";
}

/* FIXED SUGGESTIONS */
const suggestions = {
login:["Login issue","Forgot password","OTP issue"],
registration:["Sign up issue","Email not verified"],
profile:["Edit profile","Photo issue"],
dashboard:["Dashboard not loading"],
"find teacher":["Search teacher"],
"renew profile":["Renew failed"]
};

window.showSuggestions = function(){

const input=document.getElementById("input");
const val=input.value.toLowerCase();
const box=document.getElementById("suggestBox");

box.innerHTML="";

if(!val || !currentCategory){
box.style.display="none";
return;
}

let list = suggestions[currentCategory] || [];

let found = list.filter(s=>s.toLowerCase().includes(val));

if(found.length===0){
box.style.display="none";
return;
}

found.forEach(s=>{
let div=document.createElement("div");
div.innerText=s;
div.onclick=()=>{
input.value=s;
input.disabled=true;
box.style.display="none";
};
box.appendChild(div);
});

box.style.display="flex";
};

/* SEND */
window.sendMsg=function(){

const input=document.getElementById("input");
const text=input.value.trim();
if(!text) return;

addMsg(text,"user");

setTimeout(()=>{
addMsg(botReply(text),"bot");
askResolved();
},500);

input.value="";
};

/* RESOLVED */
function askResolved(){
const div=document.createElement("div");
div.className="msg bot";
div.innerHTML=`
<b>Resolved?</b><br>
<button onclick="resolved(true)">Yes</button>
<button onclick="resolved(false)">No</button>
`;
document.getElementById("chatBox").appendChild(div);
div.scrollIntoView();
}

window.resolved=function(status){
if(status){
addMsg("Yes ✔","user");
addMsg("Great 👍","bot");
}else{
addMsg("No ❌","user");
showTicketBox();
}
};

/* TICKET */
function generateTicket(){
return "GURU-"+Date.now()+"-"+Math.floor(Math.random()*999);
}

function showTicketBox(){

const div=document.createElement("div");
div.className="msg bot";
div.innerHTML=`
<b>Create Ticket</b><br><br>

<input id="tname" placeholder="Name"><br>
<select id="role">
<option>Student</option>
<option>Teacher</option>
<option>Institute</option>
<option>Parent</option>
</select><br>

<input id="tphone" placeholder="Phone"><br>
<input id="temail" placeholder="Email"><br>
<textarea
id="tmsg"
placeholder="Describe your issue"
rows="4"></textarea><br>

<button class="ticketBtn" onclick="submitTicket()">Submit</button>
`;

document.getElementById("chatBox").appendChild(div);
div.scrollIntoView();
}

window.submitTicket = async function(){

if(!canCreateTicket){
alert("You already have an open ticket. Wait until resolved.");
return;
}

const name=document.getElementById("tname").value;
const role=document.getElementById("role").value;
const phone=document.getElementById("tphone").value;
const email=document.getElementById("temail").value;
const msg=document.getElementById("tmsg").value;

if(!name||!phone||!email||!msg){
alert("Fill all fields");
return;
}

if(currentUser && phone!==currentUser.phoneNumber){
alert("Enter registered phone number");
return;
}

const ticketNo=generateTicket();

await push(ref(db,"tickets"),{
ticketNo,
name,
role,
phone,
email,
message:msg,
category:currentCategory,
status:"open",
time:Date.now()
});

canCreateTicket=false;

addMsg(
`🎫 Ticket Created Successfully<br>
<b>Ticket ID:</b> ${ticketNo}<br>
⏳ Your ticket is under review.`,
"bot"
);
};
window.closeHelpdesk = function () {
  const returnPage = sessionStorage.getItem("helpdeskReturn");

  if (returnPage) {
    sessionStorage.removeItem("helpdeskReturn");
    window.location.href = returnPage;
  } else if (document.referrer) {
    history.back();
  } else {
    window.location.href = "index.html";
  }
};
</script>

</body>
</html>
