<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GURULINK Helpdesk Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

.window{
width:95%;
max-width:700px;
margin:20px auto;
background:white;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.2);
overflow:hidden;
}

.header{
background:#1565c0;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.closeBtn{
background:red;
border:none;
color:white;
font-size:18px;
width:35px;
height:35px;
border-radius:8px;
cursor:pointer;
}

.chat{
height:420px;
overflow-y:auto;
padding:15px;
background:#f9f9f9;
}

.msg{
padding:10px;
margin:8px 0;
border-radius:10px;
max-width:80%;
}

.user{background:#d1e7ff;margin-left:auto;}
.bot{background:#fff;border:1px solid #ddd;}

.inputBox{
display:flex;
padding:10px;
border-top:1px solid #ddd;
}

input{
flex:1;
padding:10px;
border:1px solid #ccc;
border-radius:8px;
}

button{
margin-left:8px;
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
}

.send{background:#1565c0;color:white;}
.ticketBtn{background:#ff9800;color:white;}

.resolvedBox{
display:flex;
gap:10px;
margin-top:10px;
}

.resolvedBox button{
flex:1;
padding:8px;
}
</style>
</head>

<body>

<div class="window">

<div class="header">
<h3>GURULINK HELP DESK</h3>
<button class="closeBtn" onclick="window.location.href='dashboard.html'">✖</button>
</div>

<div class="chat" id="chatBox">
<div class="msg bot">
👋 Hello! Ask your problem, I will try to help instantly.
</div>
</div>

<div class="inputBox">
<input id="input" placeholder="Type your question...">
<button class="send" onclick="sendMsg()">Send</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

/* ✅ YOUR FIREBASE CONFIG */
const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ---------------- CHAT UI ---------------- */
function addMsg(text,type){
const div=document.createElement("div");
div.className="msg "+type;
div.innerHTML=text;
document.getElementById("chatBox").appendChild(div);
div.scrollIntoView();
}

/* ---------------- SIMPLE AI ---------------- */
function botReply(msg){

msg = msg.toLowerCase();

if(msg.includes("login")){
return "Try resetting password or check email verification link.";
}

if(msg.includes("payment")){
return "Payment usually updates in 5–10 minutes. Please check transaction status.";
}

if(msg.includes("profile")){
return "Go to Dashboard → Edit Profile → Save changes.";
}

if(msg.includes("dashboard")){
return "Try logout and login again or refresh page.";
}

return "I couldn't fully solve it. You may book a support ticket.";
}

/* ---------------- RESOLVED ASK ---------------- */
function askResolved(){
const div=document.createElement("div");
div.className="msg bot";
div.innerHTML=`
<b>Is your problem resolved?</b>
<div class="resolvedBox">
<button onclick="resolved(true)">Yes 👍</button>
<button onclick="resolved(false)">No ❌</button>
</div>
`;
document.getElementById("chatBox").appendChild(div);
div.scrollIntoView();
}

window.resolved = function(status){

if(status){
addMsg("Yes, issue resolved ✔","user");
addMsg("Great 👍 Happy to help!","bot");
}
else{
addMsg("No, issue not resolved ❌","user");
showTicketBox();
}
}

/* ---------------- TICKET BOX ---------------- */
function showTicketBox(){

const div=document.createElement("div");
div.className="msg bot";
div.innerHTML=`
<b>Book Support Ticket</b><br><br>
<input id="tmsg" placeholder="Describe issue" style="width:100%;padding:8px"><br><br>
<input id="temail" placeholder="Email" style="width:100%;padding:8px"><br><br>
<button class="ticketBtn" onclick="submitTicket()">Submit Ticket</button>
`;

document.getElementById("chatBox").appendChild(div);
div.scrollIntoView();
}

/* ---------------- FIREBASE TICKET SAVE ---------------- */
window.submitTicket = async function(){

const msg=document.getElementById("tmsg").value;
const email=document.getElementById("temail").value;

if(!msg || !email){
alert("Fill all fields");
return;
}

try{

await push(ref(db,"tickets"),{
message:msg,
email:email,
status:"open",
time:Date.now()
});

addMsg("🎫 Ticket submitted successfully. Our team will contact you soon.","bot");

}catch(err){
console.log(err);
alert("Firebase Error: " + err.message);
}

}

/* ---------------- SEND CHAT ---------------- */
window.sendMsg=function(){

const input=document.getElementById("input");
const text=input.value.trim();
if(!text) return;

addMsg(text,"user");

setTimeout(()=>{
addMsg(botReply(text),"bot");
askResolved();
},500);

input.value="";
}
</script>

</body>
</html>
