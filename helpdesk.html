<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GURULINK Helpdesk Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

.window{
width:95%;
max-width:700px;
margin:20px auto;
background:white;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.2);
overflow:hidden;
}

.header{
background:#1565c0;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.closeBtn{
background:red;
border:none;
color:white;
font-size:18px;
width:35px;
height:35px;
border-radius:8px;
cursor:pointer;
}

.chat{
height:420px;
overflow-y:auto;
padding:15px;
background:#f9f9f9;
}

.msg{
padding:10px;
margin:8px 0;
border-radius:10px;
max-width:80%;
}

.user{background:#d1e7ff;margin-left:auto;}
.bot{background:#fff;border:1px solid #ddd;}

.inputBox{
display:flex;
padding:10px;
border-top:1px solid #ddd;
position:relative;
}

input, select{
flex:1;
padding:10px;
border:1px solid #ccc;
border-radius:8px;
margin-bottom:5px;
}

button{
margin-left:8px;
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
}

.send{background:#1565c0;color:white;}
.ticketBtn{background:#ff9800;color:white;}

.resolvedBox{
display:flex;
gap:10px;
margin-top:10px;
}

.suggestions{
position:absolute;
bottom:55px;
left:10px;
right:10px;
background:white;
border:1px solid #ccc;
border-radius:8px;
display:none;
flex-direction:column;
z-index:10;
}

.suggestions div{
padding:10px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.suggestions div:hover{
background:#f0f0f0;
}
</style>
</head>

<body>

<div class="window">

<div class="header">
<h3>GURULINK HELP DESK</h3>
<button class="closeBtn" onclick="window.location.href='dashboard.html'">✖</button>
</div>

<div class="chat" id="chatBox">
<div class="msg bot">👋 Hello! Ask your problem, I will try to help instantly.</div>
</div>

<div class="inputBox">

<input id="input" placeholder="Type your question..."
oninput="showSuggestions()" onfocus="showSuggestions()">

<button class="send" onclick="sendMsg()">Send</button>

<div class="suggestions" id="suggestBox"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* AI */
function botReply(msg){
msg = msg.toLowerCase();

if(msg.includes("login")) return "Try reset password or check email verification.";
if(msg.includes("payment")) return "Payment updates in 5–10 mins.";
if(msg.includes("profile")) return "Go to Dashboard → Edit Profile.";
if(msg.includes("dashboard")) return "Refresh or login again.";

return "Not fully solved. You can book a ticket.";
}

/* CHAT */
function addMsg(text,type){
const div=document.createElement("div");
div.className="msg "+type;
div.innerHTML=text;
document.getElementById("chatBox").appendChild(div);
div.scrollIntoView();
}

/* SUGGESTIONS */
const suggestionData = [
"Login issue",
"Payment problem",
"Profile not updating",
"Dashboard issue",
"Other issue"
];

window.showSuggestions = function(){

const input = document.getElementById("input");
const val = input.value.toLowerCase();
const box = document.getElementById("suggestBox");

box.innerHTML = "";

if(!val){
box.style.display="none";
return;
}

let filtered = suggestionData.filter(s =>
s.toLowerCase().includes(val)
);

filtered.forEach(s=>{
let div = document.createElement("div");
div.innerText = s;
div.onclick = () => {
input.value = s;
input.disabled = true;
box.style.display="none";
};
box.appendChild(div);
});

let other = document.createElement("div");
other.innerHTML = "✍ Other (type manually)";
other.style.color = "red";
other.onclick = () => {
input.disabled = false;
input.value = "";
box.style.display="none";
};

box.appendChild(other);
box.style.display="flex";
};

/* CHAT SEND */
window.sendMsg = function(){

const input = document.getElementById("input");
const text = input.value.trim();
if(!text) return;

addMsg(text,"user");

setTimeout(()=>{
addMsg(botReply(text),"bot");
askResolved();
},500);

input.value="";
};

/* RESOLVED */
function askResolved(){
const div=document.createElement("div");
div.className="msg bot";
div.innerHTML=`
<b>Is your problem resolved?</b>
<div class="resolvedBox">
<button onclick="resolved(true)">Yes 👍</button>
<button onclick="resolved(false)">No ❌</button>
</div>
`;
document.getElementById("chatBox").appendChild(div);
div.scrollIntoView();
}

window.resolved = function(status){
if(status){
addMsg("Yes ✔","user");
addMsg("Great 👍","bot");
}else{
addMsg("No ❌","user");
showTicketBox();
}
};

/* TICKET */
function showTicketBox(){

const div=document.createElement("div");
div.className="msg bot";
div.innerHTML=`
<b>Book Support Ticket</b><br><br>

<select id="role">
<option>Student</option>
<option>Teacher</option>
<option>Institute</option>
<option>Parent</option>
</select><br><br>

<input id="tmsg" placeholder="Issue" style="width:100%;padding:8px"><br><br>
<input id="tphone" placeholder="Phone" style="width:100%;padding:8px"><br><br>
<input id="temail" placeholder="Email" style="width:100%;padding:8px"><br><br>

<button class="ticketBtn" onclick="submitTicket()">Submit Ticket</button>
`;

document.getElementById("chatBox").appendChild(div);
div.scrollIntoView();
}

/* TICKET ID */
function generateTicketNumber(){
return "GURU-" + Date.now() + "-" + Math.floor(Math.random()*999);
}

/* SAVE FIREBASE */
window.submitTicket = async function(){

const msg=document.getElementById("tmsg").value;
const phone=document.getElementById("tphone").value;
const email=document.getElementById("temail").value;
const role=document.getElementById("role").value;

if(!msg || !phone || !email){
alert("Fill all fields");
return;
}

const ticketNo = generateTicketNumber();

await push(ref(db,"tickets"),{
ticketNo,
role,
message:msg,
phone,
email,
status:"open",
time:Date.now()
});

addMsg("🎫 Ticket Created: <b>"+ticketNo+"</b>","bot");
};

</script>

</body>
</html>
