<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GURULINK Smart Helpdesk</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

/* WINDOW */
.window{
width:95%;
max-width:720px;
margin:20px auto;
background:white;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.2);
overflow:hidden;
}

/* HEADER */
.header{
background:#1565c0;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.closeBtn{
background:red;
border:none;
color:white;
font-size:18px;
width:35px;
height:35px;
border-radius:8px;
cursor:pointer;
}

/* CHAT */
.chat{
height:400px;
overflow-y:auto;
padding:15px;
background:#f9f9f9;
}

.msg{
padding:10px;
margin:8px 0;
border-radius:10px;
max-width:80%;
}

.user{
background:#d1e7ff;
margin-left:auto;
text-align:right;
}

.bot{
background:#fff;
border:1px solid #ddd;
}

/* INPUT */
.inputBox{
display:flex;
padding:10px;
background:white;
border-top:1px solid #ddd;
position:relative;
}

input{
flex:1;
padding:10px;
border:1px solid #ccc;
border-radius:8px;
}

button{
margin-left:8px;
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
}

.send{background:#1565c0;color:white;}
.ticket{background:#ff9800;color:white;width:100%;margin-top:10px;}

/* SUGGESTIONS */
.suggestions{
position:absolute;
bottom:55px;
left:10px;
right:10px;
background:white;
border:1px solid #ddd;
border-radius:8px;
display:none;
max-height:150px;
overflow-y:auto;
}

.suggestions div{
padding:8px;
cursor:pointer;
}

.suggestions div:hover{
background:#eee;
}
</style>
</head>

<body>

<div class="window">

<div class="header">
<h3>GURULINK SMART HELP DESK</h3>
<button class="closeBtn" onclick="window.location.href='dashboard.html'">✖</button>
</div>

<div class="chat" id="chatBox">
<div class="msg bot">
👋 Hello! I am your AI Help Assistant.<br>
Ask your issue or select a suggestion below.
</div>
</div>

<div class="inputBox">

<div style="width:100%">
<input id="input" placeholder="Type your problem..." oninput="showSuggestions()">
<div class="suggestions" id="suggestBox"></div>
</div>

<button class="send" onclick="sendMsg()">Send</button>
</div>

<div style="padding:10px">

<button class="ticket" id="ticketBtn" onclick="createTicket()" disabled>
🚨 Book Ticket (Only if not resolved)
</button>

</div>

</div>

<script>

let knownIssues = [
"login issue",
"password reset",
"payment problem",
"payment failed",
"dashboard not loading",
"profile not updating",
"image upload error",
"email not verified",
"registration issue",
"account not opening"
];

let issueResolved = false;

/* CHAT */
function addMsg(text, type){
let div = document.createElement("div");
div.className = "msg " + type;
div.innerHTML = text;
document.getElementById("chatBox").appendChild(div);
div.scrollIntoView();
}

/* AI ENGINE */
function botReply(msg){

msg = msg.toLowerCase();

if(msg.includes("login")){
return "✔ Try password reset or check email verification.";
}

if(msg.includes("payment")){
return "✔ Wait 5–10 minutes or check Razorpay status.";
}

if(msg.includes("profile")){
return "✔ Go to Dashboard → Edit Profile → Save changes.";
}

if(msg.includes("dashboard")){
return "✔ Refresh page or logout and login again.";
}

if(msg.includes("image")){
return "✔ Check image size or internet connection.";
}

return "❌ I could not fully solve this. You may book a ticket.";
}

/* SEND MESSAGE */
function sendMsg(){

let input = document.getElementById("input");
let text = input.value.trim();
if(!text) return;

addMsg(text,"user");

let reply = botReply(text);

setTimeout(()=>{

addMsg(reply,"bot");

/* if solved */
if(!reply.includes("could not fully solve")){
issueResolved = true;
document.getElementById("ticketBtn").disabled = true;
} else {
issueResolved = false;
document.getElementById("ticketBtn").disabled = false;
}

},500);

input.value="";
document.getElementById("suggestBox").style.display="none";
}

/* SUGGESTIONS */
function showSuggestions(){

let val = document.getElementById("input").value.toLowerCase();
let box = document.getElementById("suggestBox");

box.innerHTML="";

if(!val){
box.style.display="none";
return;
}

let filtered = knownIssues.filter(i=>i.includes(val));

if(filtered.length===0){
box.style.display="none";
return;
}

filtered.forEach(item=>{
let div = document.createElement("div");
div.innerText = item;
div.onclick = ()=>selectSuggestion(item);
box.appendChild(div);
});

box.style.display="block";
}

function selectSuggestion(text){
document.getElementById("input").value = text;
document.getElementById("suggestBox").style.display="none";
}

/* TICKET SYSTEM */
function createTicket(){

if(issueResolved){
alert("Issue already resolved. Ticket not required.");
return;
}

let msg = prompt("Describe your issue:");
if(!msg) return;

let email = prompt("Enter email:");
if(!email) return;

alert("Ticket created successfully!");

window.open(
"mailto:gurulinkindia@gmail.com?subject=GURULINK Ticket&body="
+ encodeURIComponent(msg + "\nEmail: " + email)
);

}

</script>

</body>
</html>
