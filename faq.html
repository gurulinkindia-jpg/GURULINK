<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GURULINK AI Helpdesk</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

/* WINDOW */
.window{
width:95%;
max-width:720px;
margin:20px auto;
background:white;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.2);
overflow:hidden;
}

/* HEADER */
.header{
background:#1565c0;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.closeBtn{
background:red;
border:none;
color:white;
font-size:18px;
width:35px;
height:35px;
border-radius:8px;
cursor:pointer;
}

/* CHAT */
.chat{
height:420px;
overflow-y:auto;
padding:15px;
background:#f9f9f9;
}

.msg{
padding:10px;
margin:8px 0;
border-radius:10px;
max-width:80%;
}

.user{
background:#d1e7ff;
margin-left:auto;
text-align:right;
}

.bot{
background:#fff;
border:1px solid #ddd;
}

/* INPUT */
.inputBox{
display:flex;
padding:10px;
background:white;
border-top:1px solid #ddd;
}

input{
flex:1;
padding:10px;
border:1px solid #ccc;
border-radius:8px;
}

button{
margin-left:8px;
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
}

.send{background:#1565c0;color:white;}

.ticketBox{
display:none;
padding:10px;
border-top:1px solid #ddd;
text-align:center;
}

.ticketBtn{
background:#ff9800;
color:white;
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="window">

<div class="header">
<h3>GURULINK AI HELP DESK</h3>
<button class="closeBtn" onclick="window.location.href='dashboard.html'">✖</button>
</div>

<div class="chat" id="chatBox">

<div class="msg bot">
👋 Hello! I am your AI Support Assistant.<br>
Please describe your issue.
</div>

</div>

<div class="inputBox">
<input id="input" placeholder="Type your issue...">
<button class="send" onclick="sendMsg()">Send</button>
</div>

<div class="ticketBox" id="ticketBox">
<p>❓ Is your problem resolved?</p>
<button onclick="resolved(true)" style="background:#4caf50;color:white;padding:8px 12px;border:none;border-radius:6px;">YES</button>
<button onclick="resolved(false)" style="background:#e53935;color:white;padding:8px 12px;border:none;border-radius:6px;">NO</button>
<br><br>

<button class="ticketBtn" id="bookTicketBtn" onclick="createTicket()" style="display:none;">
🚨 Book Ticket
</button>
</div>

</div>

<script>

let lastResolvedQuestion = false;

/* CHAT */
function addMsg(text, type){
let div = document.createElement("div");
div.className = "msg " + type;
div.innerHTML = text;
document.getElementById("chatBox").appendChild(div);
div.scrollIntoView();
}

/* AI ENGINE */
function botReply(msg){

msg = msg.toLowerCase();

if(msg.includes("login")){
return "✔ Try resetting your password or check email verification.";
}

if(msg.includes("payment")){
return "✔ Wait 5–10 minutes or check transaction status in Razorpay.";
}

if(msg.includes("profile")){
return "✔ Go to Dashboard → Edit Profile → Save changes.";
}

if(msg.includes("dashboard")){
return "✔ Refresh page or logout and login again.";
}

return "⚠ I tried my best, please check again carefully.";
}

/* SEND MESSAGE */
function sendMsg(){

let input = document.getElementById("input");
let text = input.value.trim();
if(!text) return;

addMsg(text,"user");

setTimeout(()=>{

let reply = botReply(text);
addMsg(reply,"bot");

/* AFTER ANSWER → ASK RESOLUTION */
setTimeout(()=>{

addMsg("❓ Is your problem resolved?","bot");

document.getElementById("ticketBox").style.display="block";

lastResolvedQuestion = false;

},600);

},500);

input.value="";
}

/* RESOLUTION HANDLER */
function resolved(status){

if(status){
addMsg("✅ Glad your issue is resolved!","bot");
document.getElementById("ticketBox").style.display="none";
document.getElementById("bookTicketBtn").style.display="none";
lastResolvedQuestion = true;
}
else{
addMsg("⚠ Sorry for inconvenience. You can book a ticket now.","bot");
document.getElementById("bookTicketBtn").style.display="inline-block";
}
}

/* TICKET */
function createTicket(){

let msg = prompt("Describe your issue:");
if(!msg) return;

let email = prompt("Enter your email:");
if(!email) return;

alert("Ticket created successfully!");

window.open(
"mailto:gurulinkindia@gmail.com?subject=GURULINK Support Ticket&body="
+ encodeURIComponent(msg + "\nEmail: " + email)
);

}

</script>

</body>
</html>
