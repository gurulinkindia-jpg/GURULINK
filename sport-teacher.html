<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Sport Teacher Registration</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
}

header{
background:#1565c0;
color:white;
padding:18px;
text-align:center;
}

.container{
width:90%;
max-width:800px;
margin:20px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

textarea{
height:100px;
resize:none;
}

button{
width:100%;
padding:14px;
background:#1565c0;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:disabled{
opacity:.7;
cursor:not-allowed;
}

.preview{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

.preview img{
width:90px;
height:90px;
border-radius:10px;
object-fit:cover;
border:1px solid #ddd;
}

.modeBox{
padding:15px;
border:1px solid #ddd;
border-radius:10px;
}

.row{
display:flex;
align-items:center;
gap:10px;
margin:10px 0;
}

.row input[type=checkbox]{
width:auto;
transform:scale(1.2);
}

.modeFee{
display:none;
padding:10px;
background:#f4f4f4;
border-radius:10px;
margin-bottom:10px;
}

</style>
</head>

<body>

<header>
<h1>Sport Teacher Registration</h1>
<p>Registration Fee ₹100</p>
</header>

<div class="container">

<form id="teacherForm">

<input id="name" placeholder="Full Name" required>
<input id="phone" placeholder="Phone Number" required>
<input id="alternatePhone" placeholder="Alternate Phone Number">
<input type="email" id="email" placeholder="Email">

<input id="password" type="password" placeholder="Create Password" required>
<input id="confirmPassword" type="password" placeholder="Confirm Password" required>
<p id="passError" style="color:red;display:none;">
Passwords do not match
</p>

<input id="website" placeholder="Website / Social Link">
<input id="qualification" placeholder="Qualification / Certification">
<input id="experience" placeholder="Experience: 5 Years, 6 Months">
<input id="location" placeholder="Preferred Training Area" required>
<input id="mapLink" placeholder="Google Map Location Link">

<h3>Sports / Activities <span style="color:red">*</span></h3>

<div class="modeBox">

<!-- SPORTS SAME (UNCHANGED) -->
<div class="row"><input type="checkbox" value="Cricket" class="sportCheck"> Cricket</div>
<div class="row"><input type="checkbox" value="Football" class="sportCheck"> Football</div>
<div class="row"><input type="checkbox" value="Badminton" class="sportCheck"> Badminton</div>
<div class="row"><input type="checkbox" value="Basketball" class="sportCheck"> Basketball</div>
<div class="row"><input type="checkbox" value="Volleyball" class="sportCheck"> Volleyball</div>
<div class="row"><input type="checkbox" value="Swimming" class="sportCheck"> Swimming</div>
<div class="row"><input type="checkbox" value="Athletics" class="sportCheck"> Athletics</div>
<div class="row"><input type="checkbox" value="Gym Training" class="sportCheck"> Gym Training</div>
<div class="row"><input type="checkbox" value="Fitness Training" class="sportCheck"> Fitness Training</div>
<div class="row"><input type="checkbox" value="Yoga" class="sportCheck"> Yoga</div>

<div class="row">
<input type="checkbox" value="other" id="otherCheck">
<label>Other</label>
</div>

<input id="otherSport" placeholder="Write Other Sport / Activity"
style="display:none;margin-top:10px">

<p id="sportError" style="color:red;display:none;">
Please select at least one sport
</p>

</div>

<h3>Training Modes</h3>

<div class="modeBox">

<div class="row">
<input type="checkbox" id="individualCheck" value="Individual Coaching" onchange="toggleFee('individual')">
<label>Individual Coaching</label>
</div>
<div id="individual" class="modeFee"><input id="individualFee"></div>

<div class="row">
<input type="checkbox" id="homeCheck" value="Home Training" onchange="toggleFee('home')">
<label>Home Training</label>
</div>
<div id="home" class="modeFee"><input id="homeFee"></div>

<div class="row">
<input type="checkbox" id="groupCheck" value="Group Training" onchange="toggleFee('group')">
<label>Group Training</label>
</div>
<div id="group" class="modeFee"><input id="groupFee"></div>

<div class="row">
<input type="checkbox" id="dualCheck" value="Dual Coaching" onchange="toggleFee('dual')">
<label>Dual Coaching</label>
</div>
<div id="dual" class="modeFee"><input id="dualFee"></div>

<div class="row">
<input type="checkbox" id="academyCheck" value="Academy Training" onchange="toggleFee('academy')">
<label>Academy Training</label>
</div>
<div id="academy" class="modeFee"><input id="academyFee"></div>

<div class="row">
<input type="checkbox" id="onlineIndividualCheck" value="Online Individual" onchange="toggleFee('onlineIndividual')">
<label>Online Individual</label>
</div>
<div id="onlineIndividual" class="modeFee"><input id="onlineIndividualFee"></div>

<div class="row">
<input type="checkbox" id="onlineGroupCheck" value="Online Group" onchange="toggleFee('onlineGroup')">
<label>Online Group</label>
</div>
<div id="onlineGroup" class="modeFee"><input id="onlineGroupFee"></div>

<div class="row">
<input type="checkbox" id="demoCheck" value="Demo Class Reg. Fee" onchange="toggleFee('demo')">
<label>Demo Class</label>
</div>
<div id="demo" class="modeFee"><input id="demoFee"></div>

<div class="row">
<input type="checkbox" id="otherModeCheck" value="Other" onchange="toggleFee('otherMode')">
<label>Other</label>
</div>
<div id="otherMode" class="modeFee"><input id="otherModeFee"></div>

</div>

<h3>Profile Photo</h3>
<input type="file" id="photo" accept="image/*" required>
<div id="photoPreview" class="preview"></div>

<h3>Identity Proof</h3>
<select id="idType" required>
<option value="">Select ID Type</option>
<option>Aadhaar Card</option>
<option>Driving License</option>
<option>Voter ID</option>
<option>PAN Card</option>
<option>Passport</option>
</select>

<input type="file" id="idUpload" accept="image/*" required>
<div id="idPreview" class="preview"></div>

<h3>Gallery Photos</h3>
<input type="file" id="gallery" multiple style="display:none">

<button type="button" onclick="document.getElementById('gallery').click()">
📸 Add Gallery Images
</button>

<div id="galleryPreview" class="preview"></div>

<div style="margin-top:20px;padding:15px;background:#f5f5f5;border-radius:10px;">
<input type="checkbox" id="declaration" required>
<label>I agree to terms</label>
</div>

<textarea id="description"></textarea>

<button type="submit">Continue To Payment</button>

</form>

</div>

<script type="module">
function toggleFee(id){
const box = document.getElementById(id);
const check = document.getElementById(id + "Check");

if(!check) return;

// ONLY FIX: proper toggle logic
if(check.checked){
box.style.display = "block";
}else{
box.style.display = "none";
const input = box.querySelector("input");
if(input) input.value = "";
}
}
window.toggleFee = toggleFee;
</script>

</body>
</html>
