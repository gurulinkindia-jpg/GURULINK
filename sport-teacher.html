<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Sport Teacher Registration</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
}

header{
background:#1565c0;
color:white;
padding:18px;
text-align:center;
}

.container{
width:90%;
max-width:800px;
margin:20px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

textarea{
height:100px;
resize:none;
}

button{
width:100%;
padding:14px;
background:#1565c0;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:disabled{
opacity:.7;
cursor:not-allowed;
}

.preview{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

.preview img{
width:90px;
height:90px;
border-radius:10px;
object-fit:cover;
border:1px solid #ddd;
}

.modeBox{
padding:15px;
border:1px solid #ddd;
border-radius:10px;
}

.row{
display:flex;
align-items:center;
gap:10px;
margin:10px 0;
}

.row input[type=checkbox]{
width:auto;
transform:scale(1.2);
}

.modeFee{
display:none;
padding:10px;
background:#f4f4f4;
border-radius:10px;
margin-bottom:10px;
}

</style>
</head>

<body>

<header>
<h1>Sport Teacher Registration</h1>
<p>Registration Fee ₹100</p>
</header>

<div class="container">

<form id="teacherForm">

<input id="name" placeholder="Full Name" required>
<input id="phone" placeholder="Phone Number" required>
<input id="alternatePhone" placeholder="Alternate Phone Number">
<input type="email" id="email" placeholder="Email">

<input id="password" type="password" placeholder="Create Password" required>
<input id="confirmPassword" type="password" placeholder="Confirm Password" required>
<p id="passError" style="color:red;display:none;">Passwords do not match</p>

<input id="website" placeholder="Website / Social Link">
<input id="qualification" placeholder="Qualification / Certification">
<input id="experience" placeholder="Experience: 5 Years, 6 Months">
<input id="location" placeholder="Preferred Training Area" required>
<input id="mapLink" placeholder="Google Map Location Link">

<h3>Sports / Activities <span style="color:red">*</span></h3>

<div class="modeBox">

<div class="row"><input type="checkbox" value="Cricket" class="sportCheck"> Cricket</div>
<div class="row"><input type="checkbox" value="Football" class="sportCheck"> Football</div>

<div class="row">
<input type="checkbox" id="otherCheck">
<label>Other</label>
</div>

<input id="otherSport" placeholder="Write Other Sport / Activity"
style="display:none;margin-top:10px">

<p id="sportError" style="color:red;display:none;">
Please select at least one sport
</p>

</div>

<h3>Training Modes</h3>

<div class="modeBox">

<div class="row">
<input type="checkbox" id="individualCheck" value="Individual Coaching" onchange="toggleFee('individual')">
<label>Individual Coaching</label>
</div>
<div id="individual" class="modeFee"><input id="individualFee"></div>

<div class="row">
<input type="checkbox" id="homeCheck" value="Home Training" onchange="toggleFee('home')">
<label>Home Training</label>
</div>
<div id="home" class="modeFee"><input id="homeFee"></div>

</div>

<h3>Profile Photo</h3>
<input type="file" id="photo" accept="image/*" required>
<div id="photoPreview" class="preview"></div>

<h3>Identity Proof</h3>
<select id="idType" required>
<option value="">Select ID Type</option>
<option>Aadhaar</option>
<option>PAN</option>
</select>

<input type="file" id="idUpload" accept="image/*" required>
<div id="idPreview" class="preview"></div>

<button type="submit">Continue To Payment</button>

</form>

</div>

<script type="module">

/* ---------------- FIREBASE ---------------- */
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSyBK0Q",
authDomain:"gurulink.firebaseapp.com",
databaseURL:"https://gurulink.firebaseio.com"
});

const db = getDatabase(app);

/* ---------------- ELEMENTS ---------------- */
const form = document.getElementById("teacherForm");
const photo = document.getElementById("photo");
const photoPreview = document.getElementById("photoPreview");
const idUpload = document.getElementById("idUpload");
const idPreview = document.getElementById("idPreview");

const otherCheck = document.getElementById("otherCheck");
const otherSport = document.getElementById("otherSport");

/* ---------------- FIX 1: OTHER SPORT ---------------- */
otherCheck.addEventListener("change", () => {
if(otherCheck.checked){
otherSport.style.display = "block";
otherSport.required = true;
}else{
otherSport.style.display = "none";
otherSport.value = "";
otherSport.required = false;
}
});

/* ---------------- FIX 2: PHOTO PREVIEW ---------------- */
photo.addEventListener("change", () => {
photoPreview.innerHTML = "";
if(photo.files && photo.files[0]){
const img = document.createElement("img");
img.src = URL.createObjectURL(photo.files[0]);
photoPreview.appendChild(img);
}
});

/* ---------------- FIX 3: ID PREVIEW ---------------- */
idUpload.addEventListener("change", () => {
idPreview.innerHTML = "";
if(idUpload.files && idUpload.files[0]){
const img = document.createElement("img");
img.src = URL.createObjectURL(idUpload.files[0]);
idPreview.appendChild(img);
}
});

/* ---------------- FIX 4: TOGGLE ---------------- */
function toggleFee(id){
const box = document.getElementById(id);
const check = document.getElementById(id + "Check");

if(check && check.checked){
box.style.display = "block";
}else{
box.style.display = "none";
const input = box.querySelector("input");
if(input) input.value = "";
}
}
window.toggleFee = toggleFee;

/* ---------------- SUBMIT FIX ---------------- */
form.addEventListener("submit", async (e) => {
e.preventDefault();

/* password check */
const p1 = document.getElementById("password").value;
const p2 = document.getElementById("confirmPassword").value;

if(p1 !== p2){
alert("Passwords do not match");
return;
}

/* sport check */
const sportsChecked = document.querySelectorAll(".sportCheck:checked").length;
if(sportsChecked === 0 && !otherCheck.checked){
document.getElementById("sportError").style.display = "block";
return;
}

alert("Form ready ✔ (Firebase connect here)");

});

</script>

</body>
</html>
