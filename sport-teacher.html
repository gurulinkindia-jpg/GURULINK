<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Teacher Form</title>

<style>
body{font-family:Arial;background:#eef2f7;margin:0}
.container{max-width:850px;margin:20px auto;background:#fff;padding:20px;border-radius:12px}

.modeBox{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
padding:15px;
border:1px solid #ddd;
border-radius:10px;
}

.row{display:flex;gap:8px;align-items:center;background:#f8f8f8;padding:8px;border-radius:8px}

.modeFee{display:none;background:#eee;padding:10px;border-radius:8px;margin:5px 0}

.preview{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.preview img{width:80px;height:80px;border-radius:10px;object-fit:cover}
</style>
</head>

<body>

<div class="container">

<h2>SPORTS</h2>
<div class="modeBox">

<div class="row"><input type="checkbox" class="sportCheck" value="Cricket">Cricket</div>
<div class="row"><input type="checkbox" class="sportCheck" value="Football">Football</div>
<div class="row"><input type="checkbox" id="sportOther">Other</div>

</div>

<input id="otherSport" placeholder="Other sport" style="display:none;margin-top:10px">

<h2>TRAINING MODES</h2>
<div class="modeBox">

<div class="row">
<input type="checkbox" class="modeCheck" data-target="ind">Individual
</div>
<div id="ind" class="modeFee"><input placeholder="Fee"></div>

<div class="row">
<input type="checkbox" class="modeCheck" data-target="home">Home
</div>
<div id="home" class="modeFee"><input placeholder="Fee"></div>

<div class="row">
<input type="checkbox" class="modeCheck" data-target="group">Group
</div>
<div id="group" class="modeFee"><input placeholder="Fee"></div>

</div>

<h2>PROFILE PHOTO</h2>
<input type="file" id="photo">
<div id="photoPreview" class="preview"></div>

<h2>ID PROOF</h2>
<input type="file" id="id">
<div id="idPreview" class="preview"></div>

<h2>GALLERY</h2>
<input type="file" id="gallery" multiple style="display:none">
<button onclick="document.getElementById('gallery').click()">Add Images</button>
<div id="galleryPreview" class="preview"></div>

<button onclick="submitForm()">SUBMIT</button>

</div>

<script>

/* =====================
SPORT OTHER
===================== */
const sportOther=document.getElementById("sportOther");
const otherSport=document.getElementById("otherSport");

sportOther.addEventListener("change",()=>{
otherSport.style.display=sportOther.checked?"block":"none";
if(!sportOther.checked) otherSport.value="";
});

/* =====================
TRAINING TOGGLE (FIXED)
===================== */
document.querySelectorAll(".modeCheck").forEach(cb=>{
cb.addEventListener("change",function(){
const box=document.getElementById(this.dataset.target);
if(this.checked){
box.style.display="block";
}else{
box.style.display="none";
box.querySelector("input").value="";
}
});
});

/* =====================
PHOTO PREVIEW
===================== */
document.getElementById("photo").addEventListener("change",function(){
let box=document.getElementById("photoPreview");
box.innerHTML="";
if(this.files[0]){
let img=new Image();
img.src=URL.createObjectURL(this.files[0]);
box.appendChild(img);
}
});

/* =====================
ID PREVIEW
===================== */
document.getElementById("id").addEventListener("change",function(){
let box=document.getElementById("idPreview");
box.innerHTML="";
if(this.files[0]){
let img=new Image();
img.src=URL.createObjectURL(this.files[0]);
box.appendChild(img);
}
});

/* =====================
GALLERY PREVIEW
===================== */
let files=[];
document.getElementById("gallery").addEventListener("change",function(){
files.push(...this.files);
render();
});

function render(){
let box=document.getElementById("galleryPreview");
box.innerHTML="";
files.forEach(f=>{
let img=new Image();
img.src=URL.createObjectURL(f);
box.appendChild(img);
});
}

/* =====================
SUBMIT DEMO
===================== */
function submitForm(){

let sports=[];
document.querySelectorAll(".sportCheck:checked").forEach(i=>sports.push(i.value));
if(sportOther.checked && otherSport.value.trim()) sports.push(otherSport.value);

let modes=[];
document.querySelectorAll(".modeCheck:checked").forEach(i=>{
modes.push(i.dataset.target);
});

console.log({
sports,
modes,
photo:document.getElementById("photo").files[0],
id:document.getElementById("id").files[0],
gallery:files
});

alert("All working ✔ Check console");
}

</script>

</body>
</html>
