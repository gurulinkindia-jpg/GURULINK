<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Sport Teacher Registration</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
}

header{
background:#1565c0;
color:white;
padding:18px;
text-align:center;
}

.container{
width:90%;
max-width:800px;
margin:20px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

textarea{
height:100px;
resize:none;
}

button{
width:100%;
padding:14px;
background:#1565c0;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:disabled{opacity:.7;cursor:not-allowed;}

.preview{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

.preview img{
width:90px;
height:90px;
border-radius:10px;
object-fit:cover;
border:1px solid #ddd;
}

.modeBox{
padding:15px;
border:1px solid #ddd;
border-radius:10px;
display:grid;
grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
gap:10px;
}

.row{
display:flex;
align-items:center;
gap:8px;
padding:8px;
border:1px solid #eee;
border-radius:8px;
background:#fafafa;
}

.row input[type=checkbox]{
width:auto;
transform:scale(1.2);
}

.modeFee{
display:none;
padding:10px;
background:#f4f4f4;
border-radius:10px;
margin-bottom:10px;
}
</style>
</head>

<body>

<header>
<h1>Sport Teacher Registration</h1>
<p>Registration Fee ₹100</p>
</header>

<div class="container">

<form id="teacherForm">

<!-- BASIC INFO -->
<input id="name" placeholder="Full Name" required>
<input id="phone" placeholder="Phone Number" required>
<input id="alternatePhone" placeholder="Alternate Phone Number">
<input type="email" id="email" placeholder="Email">

<!-- NEW REQUIRED FIELDS -->
<input id="website" placeholder="Website / Social Link">
<input id="qualification" placeholder="Qualification / Certification">
<input id="experience" placeholder="Experience (e.g. 5 Years)">
<input id="location" placeholder="Preferred Training Area" required>
<input id="mapLink" placeholder="Google Map Link">

<!-- PASSWORD -->
<input id="password" type="password" placeholder="Create Password" required>
<input id="confirmPassword" type="password" placeholder="Confirm Password" required>
<p id="passError" style="color:red;display:none;">Passwords do not match</p>

<!-- SPORTS -->
<h3>Sports / Activities</h3>
<div class="modeBox">

<div class="row"><input type="checkbox" value="Cricket" class="sportCheck">Cricket</div>
<div class="row"><input type="checkbox" value="Football" class="sportCheck">Football</div>

<div class="row">
<input type="checkbox" id="sportOtherCheck">
Other
</div>

<input id="otherSport" placeholder="Other Sport" style="display:none">

</div>

<!-- TRAINING MODES -->
<h3>Training Modes</h3>
<div class="modeBox">

<div class="row">
<input type="checkbox" class="modeCheck" value="Individual Coaching" data-target="individual">
Individual Coaching
</div>
<div id="individual" class="modeFee"><input placeholder="Fee"></div>

<div class="row">
<input type="checkbox" class="modeCheck" value="Home Training" data-target="home">
Home Training
</div>
<div id="home" class="modeFee"><input placeholder="Fee"></div>

<div class="row">
<input type="checkbox" class="modeCheck" value="Group Training" data-target="group">
Group Training
</div>
<div id="group" class="modeFee"><input placeholder="Fee"></div>

<div class="row">
<input type="checkbox" class="modeCheck" value="Other" data-target="otherMode">
Other
</div>
<div id="otherMode" class="modeFee"><input placeholder="Fee / Details"></div>

</div>

<!-- PHOTO -->
<h3>Profile Photo</h3>
<input type="file" id="photo" accept="image/*">
<div id="photoPreview" class="preview"></div>

<!-- ID -->
<h3>Identity Proof</h3>
<select id="idType" required>
<option value="">Select ID Type</option>
<option>Aadhaar</option>
<option>Driving License</option>
<option>Voter ID</option>
<option>PAN</option>
<option>Passport</option>
<option>Other</option>
</select>

<input type="file" id="idUpload" accept="image/*">
<div id="idPreview" class="preview"></div>

<!-- GALLERY -->
<h3>Gallery</h3>
<input type="file" id="gallery" multiple style="display:none">
<button type="button" onclick="document.getElementById('gallery').click()">Add Gallery</button>
<div id="galleryPreview" class="preview"></div>

<!-- DECLARATION -->
<div style="margin-top:20px;padding:15px;background:#f5f5f5;border-radius:10px;">
<input type="checkbox" id="declaration" required>
<label>I hereby declare that all information is correct and I agree to terms.</label>
</div>

<textarea id="description" placeholder="About Coach"></textarea>

<button type="submit">Continue To Payment</button>

</form>

</div>

<script>

/* ===== TRAINING TOGGLE ===== */
document.querySelectorAll(".modeCheck").forEach(cb=>{
cb.addEventListener("change",function(){
const box=document.getElementById(this.dataset.target);
if(this.checked){
box.style.display="block";
}else{
box.style.display="none";
box.querySelector("input").value="";
}
});
});

/* ===== SPORT OTHER ===== */
const sportOther=document.getElementById("sportOtherCheck");
const sportInput=document.getElementById("otherSport");

sportOther.addEventListener("change",()=>{
sportInput.style.display=sportOther.checked?"block":"none";
if(!sportOther.checked) sportInput.value="";
});

/* ===== PHOTO PREVIEW ===== */
document.getElementById("photo").addEventListener("change",function(){
const box=document.getElementById("photoPreview");
box.innerHTML="";
if(this.files[0]){
let img=document.createElement("img");
img.src=URL.createObjectURL(this.files[0]);
box.appendChild(img);
}
});

/* ===== ID PREVIEW ===== */
document.getElementById("idUpload").addEventListener("change",function(){
const box=document.getElementById("idPreview");
box.innerHTML="";
if(this.files[0]){
let img=document.createElement("img");
img.src=URL.createObjectURL(this.files[0]);
box.appendChild(img);
}
});

/* ===== GALLERY ===== */
let files=[];
document.getElementById("gallery").addEventListener("change",function(){
files.push(...this.files);
render();
});

function render(){
const box=document.getElementById("galleryPreview");
box.innerHTML="";
files.forEach(f=>{
let img=document.createElement("img");
img.src=URL.createObjectURL(f);
box.appendChild(img);
});
}

/* ===== SUBMIT (ONLY VALIDATION DEMO) ===== */
document.getElementById("teacherForm").addEventListener("submit",function(e){
e.preventDefault();

const pass=document.getElementById("password").value;
const cpass=document.getElementById("confirmPassword").value;

if(pass!==cpass){
document.getElementById("passError").style.display="block";
return;
}

if(!document.getElementById("declaration").checked){
alert("Please accept declaration");
return;
}

alert("Form ready ✔ (Firebase connect here)");
});

</script>

</body>
</html>
