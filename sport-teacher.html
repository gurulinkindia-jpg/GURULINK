<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Sport Teacher Registration</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
}

header{
background:#1565c0;
color:white;
padding:18px;
text-align:center;
}

.container{
width:90%;
max-width:800px;
margin:20px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

textarea{
height:100px;
resize:none;
}

button{
width:100%;
padding:14px;
background:#1565c0;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.preview{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

.preview img{
width:90px;
height:90px;
border-radius:10px;
object-fit:cover;
border:1px solid #ddd;
}

.modeBox{
padding:15px;
border:1px solid #ddd;
border-radius:10px;
}

.row{
display:flex;
align-items:center;
gap:10px;
margin:8px 0;
}

.row input[type=checkbox]{
width:auto;
transform:scale(1.2);
}

.modeFee{
display:none;
padding:10px;
background:#f4f4f4;
border-radius:10px;
margin-bottom:10px;
}

</style>
</head>

<body>

<header>
<h1>Sport Teacher Registration</h1>
<p>Registration Fee ₹100</p>
</header>

<div class="container">

<form id="form">

<input id="name" placeholder="Full Name" required>
<input id="phone" placeholder="Phone Number" required>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Create Password" required>

<input id="location" placeholder="Location" required>
<input id="experience" placeholder="Experience (Years)">

<h3>Sports You Teach</h3>

<div class="modeBox">

<div class="row"><input type="checkbox" class="sportCheck" value="Cricket"> Cricket</div>
<div class="row"><input type="checkbox" class="sportCheck" value="Football"> Football</div>
<div class="row"><input type="checkbox" class="sportCheck" value="Basketball"> Basketball</div>
<div class="row"><input type="checkbox" class="sportCheck" value="Badminton"> Badminton</div>
<div class="row"><input type="checkbox" class="sportCheck" value="Swimming"> Swimming</div>
<div class="row"><input type="checkbox" class="sportCheck" value="Athletics"> Athletics</div>
<div class="row"><input type="checkbox" class="sportCheck" value="Gym Training"> Gym Training</div>
<div class="row"><input type="checkbox" class="sportCheck" value="Yoga"> Yoga</div>
<div class="row"><input type="checkbox" class="sportCheck" value="Martial Arts"> Martial Arts</div>

</div>

<h3>Training Modes</h3>

<div class="modeBox">

<div class="row">
<input type="checkbox" value="Individual Coaching" onchange="toggleFee('individual')"> Individual Coaching
</div>
<div id="individual" class="modeFee">
<input id="individualFee" placeholder="Fee">
</div>

<div class="row">
<input type="checkbox" value="Home Training" onchange="toggleFee('home')"> Home Training
</div>
<div id="home" class="modeFee">
<input id="homeFee" placeholder="Fee">
</div>

<div class="row">
<input type="checkbox" value="Group Training" onchange="toggleFee('group')"> Group Training
</div>
<div id="group" class="modeFee">
<input id="groupFee" placeholder="Fee">
</div>

<div class="row">
<input type="checkbox" value="Online Training" onchange="toggleFee('online')"> Online Training
</div>
<div id="online" class="modeFee">
<input id="onlineFee" placeholder="Fee">
</div>

</div>

<h3>Profile Photo</h3>
<input type="file" id="photo" accept="image/*">
<div id="photoPreview" class="preview"></div>

<h3>ID Proof</h3>
<input type="file" id="idUpload" accept="image/*">
<div id="idPreview" class="preview"></div>

<h3>Gallery</h3>
<input type="file" id="gallery" accept="image/*" multiple>
<div id="galleryPreview" class="preview"></div>

<textarea id="description" placeholder="About You"></textarea>

<button type="submit">Continue To Payment</button>

</form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* TOGGLE FEE */
window.toggleFee = function(id){
document.getElementById(id).style.display =
document.getElementById(id).style.display === "block" ? "none" : "block";
};

/* IMAGE PREVIEW */
function preview(input, box){
input.addEventListener("change", ()=>{
box.innerHTML="";
if(input.files[0]){
const img = document.createElement("img");
img.src = URL.createObjectURL(input.files[0]);
box.appendChild(img);
}
});
}

preview(document.getElementById("photo"), document.getElementById("photoPreview"));
preview(document.getElementById("idUpload"), document.getElementById("idPreview"));

/* GALLERY */
let galleryFiles = [];

document.getElementById("gallery").addEventListener("change", function(){
Array.from(this.files).forEach(f=>{
if(galleryFiles.length < 5) galleryFiles.push(f);
});

const box = document.getElementById("galleryPreview");
box.innerHTML = "";

galleryFiles.forEach(f=>{
const img = document.createElement("img");
img.src = URL.createObjectURL(f);
box.appendChild(img);
});
});

/* SUBMIT */
document.getElementById("form").addEventListener("submit", async (e)=>{
e.preventDefault();

let sports = [];
document.querySelectorAll(".sportCheck:checked").forEach(i=>{
sports.push(i.value);
});

const data = {
name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
email:document.getElementById("email").value,
password:document.getElementById("password").value,
location:document.getElementById("location").value,
experience:document.getElementById("experience").value,
sports,
individualFee:document.getElementById("individualFee").value,
homeFee:document.getElementById("homeFee").value,
groupFee:document.getElementById("groupFee").value,
onlineFee:document.getElementById("onlineFee").value,
description:document.getElementById("description").value,
role:"teacher",
category:"sport",
status:"pending",
createdAt:Date.now()
};

const newRef = await push(ref(db,"teachers"), data);

localStorage.setItem("teacherId", newRef.key);

window.location.href = "payment.html?type=sport-teacher";

});

</script>

</body>
</html>
