<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Sports Teacher Registration</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
}

header{
background:#1976d2;
color:white;
padding:18px;
text-align:center;
}

.container{
width:90%;
max-width:850px;
margin:20px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,
select,
textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

textarea{
height:100px;
resize:none;
}

button{
width:100%;
padding:14px;
background:#1976d2;
border:none;
color:white;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.preview{
display:flex;
flex-wrap:wrap;
gap:10px;
margin:10px 0;
}

.preview img{
width:90px;
height:90px;
border-radius:10px;
object-fit:cover;
border:1px solid #ddd;
}

.modeBox{
padding:10px;
border:1px solid #ddd;
border-radius:10px;
margin-top:10px;
}

.modeFee{
display:none;
padding:10px;
background:#f7f7f7;
margin-top:10px;
border-radius:10px;
}

.row{
display:flex;
align-items:center;
gap:10px;
margin:10px 0;
}

.row input[type=checkbox]{
width:auto;
}

</style>

</head>

<body>

<header>

<h1>Sports Teacher Registration</h1>
<p>Registration Fee ₹100</p>

</header>


<div class="container">

<form id="form">

<input
id="name"
placeholder="Teacher Name"
required>

<input
id="phone"
placeholder="Phone Number"
required>

<input
id="email"
type="email"
placeholder="Email">

<input
id="qualification"
placeholder="Qualification">

<input
id="experience"
placeholder="Experience">

<input
id="location"
placeholder="Location">


<select id="sport">

<option value="">
Select Sport
</option>

<option>Cricket</option>
<option>Football</option>
<option>Badminton</option>
<option>Basketball</option>
<option>Swimming</option>
<option>Karate</option>
<option>Yoga</option>
<option>Gym Training</option>
<option>Tennis</option>

<option value="other">
Other
</option>

</select>

<input
id="otherSport"
style="display:none"
placeholder="Enter Sport">


<h3>Teaching Modes</h3>

<div class="modeBox">

<div class="row">

<input
type="checkbox"
onchange="toggleFee('home')">

Home Training

</div>

<div
class="modeFee"
id="home">

<input
id="homeFee"
placeholder="Enter Fee">

</div>


<div class="row">

<input
type="checkbox"
onchange="toggleFee('group')">

Group Training

</div>

<div
class="modeFee"
id="group">

<input
id="groupFee"
placeholder="Enter Fee">

</div>


<div class="row">

<input
type="checkbox"
onchange="toggleFee('online')">

Online Individual

</div>

<div
class="modeFee"
id="online">

<input
id="onlineFee"
placeholder="Enter Fee">

</div>


<div class="row">

<input
type="checkbox"
onchange="toggleFee('onlineGroup')">

Online Group

</div>

<div
class="modeFee"
id="onlineGroup">

<input
id="onlineGroupFee"
placeholder="Enter Fee">

</div>

</div>


<label>
<b>Profile Photo</b>
</label>

<input
type="file"
id="photo"
accept="image/*">

<div
id="photoPreview"
class="preview"></div>


<label>
<b>Gallery Photos (Max 5)</b>
</label>

<input
type="file"
id="gallery"
multiple
accept="image/*">

<div
id="galleryPreview"
class="preview"></div>


<textarea
id="description"
placeholder="About Yourself"></textarea>


<button type="submit">

Continue To Payment

</button>

</form>

</div>



<script type="module">

import {
initializeApp
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getDatabase,
ref,
push
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";


const firebaseConfig={

apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"

};


const app=
initializeApp(firebaseConfig);

const db=
getDatabase(app);

const API_KEY=
"31f729ff855eb2e42c00ee508a8647ea";


const form=document.getElementById("form");
const sport=document.getElementById("sport");
const otherSport=document.getElementById("otherSport");

const photo=document.getElementById("photo");
const gallery=document.getElementById("gallery");


sport.addEventListener(
"change",
()=>{

otherSport.style.display=
sport.value==="other"
?
"block"
:
"none";

}
);


/* PHOTO PREVIEW */

photo.addEventListener(
"change",
()=>{

photoPreview.innerHTML="";

if(photo.files[0]){

photoPreview.innerHTML=
`<img src="${URL.createObjectURL(photo.files[0])}">`;

}

}
);


/* GALLERY PREVIEW */

gallery.addEventListener(
"change",
()=>{

galleryPreview.innerHTML="";

Array.from(
gallery.files
)
.slice(0,5)
.forEach(file=>{

galleryPreview.innerHTML+=
`<img src="${URL.createObjectURL(file)}">`;

});

}
);


async function upload(file){

let fd=new FormData();

fd.append("image",file);

let res=
await fetch(
`https://api.imgbb.com/1/upload?key=${API_KEY}`,
{
method:"POST",
body:fd
}
);

let data=
await res.json();

return data.data.url;

}



form.addEventListener(
"submit",
async(e)=>{

e.preventDefault();

try{

let photoUrl="";

if(photo.files[0]){

photoUrl=
await upload(
photo.files[0]
);

}


let galleryUrls=[];

for(let file of gallery.files){

galleryUrls.push(
await upload(file)
);

}


let teachingModes=[];

document
.querySelectorAll(
'input[type="checkbox"]:checked'
)
.forEach(c=>{

teachingModes.push(
c.parentElement.innerText.trim()
);

});


let newRef=
await push(
ref(db,"teachers"),
{

name:name.value,

phone:phone.value,

email:email.value,

qualification:
qualification.value,

experience:
experience.value,

location:
location.value,

sport:
sport.value==="other"
?
otherSport.value
:
sport.value,

teachingModes:

teachingModes,

homeFee:
homeFee.value,

groupFee:
groupFee.value,

onlineIndividualFee:
onlineFee.value,

onlineGroupFee:
onlineGroupFee.value,

photo:
photoUrl,

gallery:
galleryUrls,

description:
description.value,

category:"sports",

status:"pending"

}

);


window.location.href=
"payment.html?type=teacher&id="+newRef.key;

}
catch(err){

alert(err.message);

}

});

</script>


<script>

function toggleFee(id){

let box=
document.getElementById(id);

box.style.display=
box.style.display==="block"
?
"none"
:
"block";

}

</script>

</body>
</html>
