<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Sport Teacher Registration</title>

<style>

body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#1565c0;
color:white;
padding:18px;
text-align:center;
}

.container{
width:90%;
max-width:800px;
margin:20px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

textarea{
height:100px;
resize:none;
}

button{
width:100%;
padding:14px;
background:#1565c0;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.preview{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}

.preview img{
width:90px;
height:90px;
border-radius:10px;
object-fit:cover;
border:1px solid #ddd;
}

.modeBox{
border:1px solid #ddd;
padding:15px;
border-radius:10px;
}

.modeFee{
display:none;
padding:10px;
background:#f4f4f4;
border-radius:10px;
margin-bottom:10px;
}

.row{
display:flex;
align-items:center;
gap:10px;
margin:10px 0;
}

.row input{
width:auto;
transform:scale(1.2);
}

</style>
</head>

<body>

<header>
<h1>Sport Teacher Registration</h1>
<p>Registration Fee ₹100</p>
</header>

<div class="container">

<form id="teacherForm">

<input id="name" placeholder="Full Name" required>

<input id="phone" placeholder="Phone Number" required>

<input type="email" id="email" placeholder="Email">

<input id="website" placeholder="Website / Social Link">

<input id="qualification" placeholder="Qualification">

<input id="experience" placeholder="Experience">

<!-- SPORT SUBJECT -->
<select id="sport">

<option value="">Select Sport</option>

<option>Cricket</option>
<option>Football</option>
<option>Badminton</option>
<option>Basketball</option>
<option>Volleyball</option>
<option>Athletics</option>
<option>Swimming</option>
<option>Gym Training</option>
<option value="other">Other</option>

</select>

<input id="customSport" placeholder="Write Sport" style="display:none">

<input id="location" placeholder="Preferred Teaching Area">


<h3>Teaching Modes</h3>

<div class="modeBox">

<div class="row">
<input type="checkbox" value="Home Training" onchange="toggleFee('home')">
<label>Home Training</label>
</div>
<div id="home" class="modeFee">
<input id="homeFee" placeholder="Enter Home Fee">
</div>


<div class="row">
<input type="checkbox" value="Group Training" onchange="toggleFee('group')">
<label>Group Training</label>
</div>
<div id="group" class="modeFee">
<input id="groupFee" placeholder="Enter Group Fee">
</div>


<div class="row">
<input type="checkbox" value="Online Individual" onchange="toggleFee('onlineInd')">
<label>Online Individual</label>
</div>
<div id="onlineInd" class="modeFee">
<input id="onlineIndividualFee" placeholder="Enter Fee">
</div>


<div class="row">
<input type="checkbox" value="Online Group" onchange="toggleFee('onlineGrp')">
<label>Online Group</label>
</div>
<div id="onlineGrp" class="modeFee">
<input id="onlineGroupFee" placeholder="Enter Fee">
</div>

</div>


<h3>Profile Photo</h3>
<input type="file" id="photo" accept="image/*">
<div id="photoPreview" class="preview"></div>


<h3>Gallery (Max 5)</h3>
<input type="file" id="gallery" multiple accept="image/*">
<div id="galleryPreview" class="preview"></div>


<textarea id="description" placeholder="About Teacher"></textarea>

<button type="submit">Continue To Payment</button>

</form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const API_KEY = "31f729ff855eb2e42c00ee508a8647ea";

const form = document.getElementById("teacherForm");
const sport = document.getElementById("sport");
const customSport = document.getElementById("customSport");
const photo = document.getElementById("photo");
const gallery = document.getElementById("gallery");
const photoPreview = document.getElementById("photoPreview");
const galleryPreview = document.getElementById("galleryPreview");

/* SPORT CHANGE */
sport.addEventListener("change", () => {
customSport.style.display = sport.value === "other" ? "block" : "none";
});

/* IMAGE UPLOAD */
async function upload(file){
let fd = new FormData();
fd.append("image", file);

let res = await fetch(
`https://api.imgbb.com/1/upload?key=${API_KEY}`,
{ method:"POST", body:fd }
);

let data = await res.json();
return data.data.url;
}

/* PHOTO PREVIEW */
photo.addEventListener("change", () => {
photoPreview.innerHTML="";
if(photo.files[0]){
let img=document.createElement("img");
img.src=URL.createObjectURL(photo.files[0]);
photoPreview.appendChild(img);
}
});

/* GALLERY PREVIEW */
gallery.addEventListener("change", () => {
galleryPreview.innerHTML="";

if(gallery.files.length>5){
alert("Max 5 images allowed");
gallery.value="";
return;
}

Array.from(gallery.files).forEach(file=>{
let img=document.createElement("img");
img.src=URL.createObjectURL(file);
galleryPreview.appendChild(img);
});
});

/* SUBMIT */
form.addEventListener("submit", async(e)=>{
e.preventDefault();

try{

let photoUrl="";
if(photo.files[0]){
photoUrl=await upload(photo.files[0]);
}

let galleryUrls=[];
for(let f of gallery.files){
galleryUrls.push(await upload(f));
}

let modes=[];
document.querySelectorAll('input[type="checkbox"]:checked')
.forEach(c=>{
modes.push(c.value || "");
});

/* FIX: NO undefined values allowed */
let newRef = await push(ref(db,"teachers"),{

name: document.getElementById("name").value || "",
phone: document.getElementById("phone").value || "",
email: document.getElementById("email").value || "",
website: document.getElementById("website").value || "",
qualification: document.getElementById("qualification").value || "",
experience: document.getElementById("experience").value || "",

sport: sport.value === "other"
? customSport.value || ""
: sport.value || "",

location: document.getElementById("location").value || "",

teachingModes: modes,

homeFee: document.getElementById("homeFee").value || "",
groupFee: document.getElementById("groupFee").value || "",
onlineIndividualFee: document.getElementById("onlineIndividualFee").value || "",
onlineGroupFee: document.getElementById("onlineGroupFee").value || "",

photo: photoUrl || "",
gallery: galleryUrls || [],
description: document.getElementById("description").value || "",

category:"sport",
status:"pending"

});

const teacherId = newRef.key;
localStorage.setItem("teacherId", teacherId);

window.location.href =
"payment.html?type=teacher&id="+teacherId;

}
catch(err){
console.log(err);
alert("Error: " + err.message);
}

});

</script>

<script>

function toggleFee(id){
let box=document.getElementById(id);
box.style.display = box.style.display==="block" ? "none" : "block";
}

</script>

</body>
</html>
