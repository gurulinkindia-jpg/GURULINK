<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Sport Teacher Registration</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
}

header{
background:#1565c0;
color:white;
padding:18px;
text-align:center;
}

.container{
width:90%;
max-width:800px;
margin:20px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

textarea{
height:100px;
resize:none;
}

button{
width:100%;
padding:14px;
background:#1565c0;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:disabled{
opacity:.7;
cursor:not-allowed;
}

.preview{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

.preview img{
width:90px;
height:90px;
border-radius:10px;
object-fit:cover;
border:1px solid #ddd;
}

.modeBox{
padding:15px;
border:1px solid #ddd;
border-radius:10px;
}

.row{
display:flex;
align-items:center;
gap:10px;
margin:10px 0;
}

.row input[type=checkbox]{
width:auto;
transform:scale(1.2);
}

.modeFee{
display:none;
padding:10px;
background:#f4f4f4;
border-radius:10px;
margin-bottom:10px;
}

</style>
</head>

<body>

<header>
<h1>Sport Teacher Registration</h1>
<p>Registration Fee ₹100</p>
</header>

<div class="container">

<form id="teacherForm">

<input id="name" placeholder="Full Name" required>
<input id="phone" placeholder="Phone Number" required>
<input id="alternatePhone" placeholder="Alternate Phone Number">
<input type="email" id="email" placeholder="Email">

<input id="password" type="password" placeholder="Create Password" required>
<input id="confirmPassword" type="password" placeholder="Confirm Password" required>

<input id="website" placeholder="Website / Social Link">
<input id="qualification" placeholder="Qualification / Certification">
<input id="experience" placeholder="Experience: 5 Years, 6 Months">
<input id="location" placeholder="Preferred Training Area" required>
<input id="mapLink" placeholder="Google Map Location Link">

<h3>Training Modes</h3>

<div class="modeBox">

<div class="row">
<input type="checkbox" value="Individual Coaching" data-mode="individual" onchange="toggleFee(this)">
<label>Individual Coaching</label>
</div>
<div id="individual" class="modeFee"><input id="individualFee" placeholder="Fee"></div>

<div class="row">
<input type="checkbox" value="Home Training" data-mode="home" onchange="toggleFee(this)">
<label>Home Training</label>
</div>
<div id="home" class="modeFee"><input id="homeFee" placeholder="Fee"></div>

<div class="row">
<input type="checkbox" value="Group Training" data-mode="group" onchange="toggleFee(this)">
<label>Group Training</label>
</div>
<div id="group" class="modeFee"><input id="groupFee" placeholder="Fee"></div>

<div class="row">
<input type="checkbox" value="Dual Coaching" data-mode="dual" onchange="toggleFee(this)">
<label>Dual Coaching</label>
</div>
<div id="dual" class="modeFee"><input id="dualFee" placeholder="Fee"></div>

<div class="row">
<input type="checkbox" value="Academy Training" data-mode="academy" onchange="toggleFee(this)">
<label>Academy Training</label>
</div>
<div id="academy" class="modeFee"><input id="academyFee" placeholder="Fee"></div>

</div>

<h3>Profile Photo</h3>
<input type="file" id="photo" accept="image/*" required>
<div id="photoPreview" class="preview"></div>

<h3>Identity Proof</h3>
<input type="file" id="idUpload" accept="image/*" required>
<div id="idPreview" class="preview"></div>

<h3>Gallery Photos</h3>
<input type="file" id="gallery" accept="image/*" multiple style="display:none">

<button type="button" onclick="document.getElementById('gallery').click()">
📸 Add Gallery Images
</button>

<div id="galleryPreview" class="preview"></div>

<button type="submit">Continue To Payment</button>

</form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db = getDatabase(app);
const API_KEY = "31f729ff855eb2e42c00ee508a8647ea";

/* =========================
   IMAGE UPLOAD (FIXED)
========================= */
async function upload(file){
let fd = new FormData();
fd.append("image", file);

let res = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`,{
method:"POST",
body:fd
});

let data = await res.json();
return data?.data?.url || "";
}

/* =========================
   IMAGE PREVIEW (FIXED)
========================= */

const photo = document.getElementById("photo");
const idUpload = document.getElementById("idUpload");
const gallery = document.getElementById("gallery");

const photoPreview = document.getElementById("photoPreview");
const idPreview = document.getElementById("idPreview");
const galleryPreview = document.getElementById("galleryPreview");

/* PHOTO */
photo.addEventListener("change",()=>{
photoPreview.innerHTML="";
if(photo.files[0]){
let img=document.createElement("img");
img.src=URL.createObjectURL(photo.files[0]);
photoPreview.appendChild(img);
}
});

/* ID */
idUpload.addEventListener("change",()=>{
idPreview.innerHTML="";
if(idUpload.files[0]){
let img=document.createElement("img");
img.src=URL.createObjectURL(idUpload.files[0]);
idPreview.appendChild(img);
}
});

/* GALLERY */
let selectedFiles=[];

gallery.addEventListener("change",function(){
Array.from(this.files).forEach(f=>{
if(selectedFiles.length < 5) selectedFiles.push(f);
});
renderGallery();
});

function renderGallery(){
galleryPreview.innerHTML="";
selectedFiles.forEach(f=>{
let img=document.createElement("img");
img.src=URL.createObjectURL(f);
galleryPreview.appendChild(img);
});
}

/* =========================
   TRAINING MODE FIXED
========================= */

window.toggleFee = function(el){
const mode = el.dataset.mode;
const box = document.getElementById(mode);

if(el.checked){
box.style.display = "block";
} else {
box.style.display = "none";
document.getElementById(mode+"Fee").value = "";
}
};

/* =========================
   SUBMIT
========================= */

document.getElementById("teacherForm").addEventListener("submit", async (e)=>{
e.preventDefault();

const password = document.getElementById("password").value;
const confirm = document.getElementById("confirmPassword").value;

if(password !== confirm){
alert("Passwords do not match");
return;
}

/* TRAINING MODES */
let teachingModes=[];
document.querySelectorAll("input[data-mode]:checked").forEach(i=>{
teachingModes.push({
mode:i.value,
fee:document.getElementById(i.dataset.mode+"Fee").value || ""
});
});

/* UPLOAD IMAGES */
let photoUrl = photo.files[0] ? await upload(photo.files[0]) : "";
let idUrl = idUpload.files[0] ? await upload(idUpload.files[0]) : "";

let galleryUrls=[];
for(let f of selectedFiles){
let url=await upload(f);
if(url) galleryUrls.push(url);
}

/* SAVE */
let newRef = await push(ref(db,"teachers"),{
name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
email:document.getElementById("email").value,
sports:[],
teachingModes,
photo:photoUrl,
idProof:idUrl,
gallery:galleryUrls,
createdAt:Date.now()
});

await set(ref(db,"users/"+newRef.key),{
email:document.getElementById("email").value,
phone:document.getElementById("phone").value,
role:"teacher",
profileId:newRef.key
});

window.location.href="payment.html?id="+newRef.key;

});

</script>

</body>
</html>
