<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Student Dashboard - GURULINK</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#eef2f7;
}

header{
background:#1565c0;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:900px;
margin:20px auto;
padding:15px;
}

.card{
background:white;
border-radius:15px;
padding:20px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

h2{
margin-bottom:15px;
color:#1565c0;
}

.row{
margin:10px 0;
font-size:15px;
}

.label{
font-weight:bold;
}

.btn{
display:inline-block;
padding:12px 18px;
border:none;
border-radius:10px;
cursor:pointer;
text-decoration:none;
font-size:15px;
margin:5px;
}

.blue{
background:#1565c0;
color:white;
}

.green{
background:#2e7d32;
color:white;
}

.red{
background:#d32f2f;
color:white;
}

.center{
text-align:center;
}

</style>
</head>

<body>

<header>

<h1>Student Dashboard</h1>

<p>Welcome to GURULINK</p>

</header>

<div class="container">

<div class="card">

<h2>My Profile</h2>

<div class="row">
<span class="label">Name:</span>
<span id="name">Loading...</span>
</div>

<div class="row">
<span class="label">Email:</span>
<span id="email">Loading...</span>
</div>

<div class="row">
<span class="label">Phone:</span>
<span id="phone">Loading...</span>
</div>

</div>

<div class="card center">

<h2>Quick Actions</h2>

<a
href="find-teacher.html"
class="btn blue">
Browse Teachers
</a>

<a
href="index.html"
class="btn green">
Home Page
</a>

<button
class="btn red"
onclick="logout()">
Logout
</button>

</div>

</div>

<script type="module">

import {
initializeApp
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getAuth,
signOut
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
getDatabase,
ref,
get
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

/* FIREBASE */

const firebaseConfig = {

apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",

authDomain:"gurulink-59cc7.firebaseapp.com",

databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"gurulink-59cc7",

storageBucket:"gurulink-59cc7.appspot.com",

messagingSenderId:"112148672399",

appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getDatabase(app);

/* CHECK LOGIN */

const uid = localStorage.getItem("uid");

const role = localStorage.getItem("role");

if(!uid || role !== "student"){

window.location.href =
"login.html";

}

/* LOAD STUDENT */

async function loadStudent(){

try{

const snap = await get(
ref(db,"students/" + uid)
);

if(!snap.exists()){

alert("Student profile not found");

return;

}

const data = snap.val();

document.getElementById("name").innerHTML =
data.name || "-";

document.getElementById("email").innerHTML =
data.email || "-";

document.getElementById("phone").innerHTML =
data.phone || "-";

}
catch(err){

console.log(err);

}

}

loadStudent();

/* LOGOUT */

window.logout = async function(){

await signOut(auth);

localStorage.removeItem("uid");
localStorage.removeItem("role");
localStorage.removeItem("profileId");

window.location.href =
"student-login.html";

};

</script>

</body>
</html>
