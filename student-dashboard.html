<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1, viewport-fit=cover">

<title>Student Dashboard - GURULINK</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#eef2f7;
}

header{
background:#1565c0;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:900px;
margin:20px auto;
padding:15px;
}

.card{
background:white;
border-radius:15px;
padding:20px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

h2{
margin-bottom:15px;
color:#1565c0;
}

.row{
margin:10px 0;
font-size:15px;
}

.label{
font-weight:bold;
}

.btn{
display:inline-block;
padding:12px 18px;
border:none;
border-radius:10px;
cursor:pointer;
text-decoration:none;
font-size:15px;
margin:5px;
}

.blue{
background:#1565c0;
color:white;
}

.green{
background:#2e7d32;
color:white;
}

.red{
background:#d32f2f;
color:white;
}

.center{
text-align:center;
}

.providerCard{
border:1px solid #d9e2ec;
border-radius:12px;
padding:15px;
margin:12px 0;
background:#fff;
box-shadow:0 3px 10px rgba(0,0,0,.06);
}

.providerTop{
display:flex;
gap:12px;
align-items:center;
margin-bottom:10px;
}

.providerLogo{
width:54px;
height:54px;
border-radius:10px;
object-fit:cover;
background:#eef2f7;
}

.providerName{
font-size:18px;
font-weight:bold;
color:#1565c0;
}

.status{
display:inline-block;
padding:4px 9px;
border-radius:999px;
font-size:12px;
font-weight:bold;
background:#fff3e0;
color:#ef6c00;
}

.accepted{
background:#e8f5e9;
color:#2e7d32;
}

.chatBox{
margin-top:12px;
border-top:1px solid #e0e0e0;
padding-top:10px;
}

.chatMsg{
padding:8px 10px;
border-radius:8px;
background:#eef2f7;
margin:6px 0;
font-size:13px;
line-height:1.4;
}

.chatMeta{
display:block;
font-size:11px;
color:#666;
margin-bottom:3px;
}

.replyRow{
display:grid;
grid-template-columns:1fr auto;
gap:8px;
margin-top:8px;
}

.replyRow input{
padding:10px;
border:1px solid #ccc;
border-radius:8px;
}

</style>

<link rel="stylesheet" href="gurulink-theme.css?v=2">
<script src="gurulink-theme.js?v=2"></script>
</head>

<body>

<header>

<h1>Student Dashboard</h1>

<p>Welcome to GURULINK</p>

</header>

<div class="container">

<div class="card">

<h2>My Profile</h2>

<div class="row">
<span class="label">Name:</span>
<span id="name">Loading...</span>
</div>

<div class="row">
<span class="label">Email:</span>
<span id="email">Loading...</span>
</div>

<div class="row">
<span class="label">Phone:</span>
<span id="phone">Loading...</span>
</div>

</div>

<div class="card">
<h2>My Teachers / Institutes</h2>
<div id="enrollmentList">Loading...</div>
</div>

<div class="card center">

<h2>Quick Actions</h2>

<a
href="find-teacher.html"
class="btn blue">
Browse Teachers
</a>

<a
href="index.html"
class="btn green">
Home Page
</a>

<button
class="btn red"
onclick="logout()">
Logout
</button>

</div>

</div>

<script type="module">

import {
initializeApp
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getAuth,
signOut
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
getDatabase,
ref,
get,
onValue,
update,
push
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

/* FIREBASE */

const firebaseConfig = {

apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",

authDomain:"gurulink-59cc7.firebaseapp.com",

databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"gurulink-59cc7",

storageBucket:"gurulink-59cc7.appspot.com",

messagingSenderId:"112148672399",

appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getDatabase(app);

/* CHECK LOGIN */

const uid = localStorage.getItem("uid");

const role = localStorage.getItem("role");

if(!uid || role !== "student"){

window.location.href =
"login.html";

}

/* LOAD STUDENT */

async function loadStudent(){

try{

const snap = await get(
ref(db,"students/" + uid)
);

if(!snap.exists()){

alert("Student profile not found");

return;

}

const data = snap.val();

document.getElementById("name").innerHTML =
data.name || "-";

document.getElementById("email").innerHTML =
data.email || "-";

document.getElementById("phone").innerHTML =
data.phone || "-";

}
catch(err){

console.log(err);

}

}

loadStudent();

function cleanPhone(phone){
return String(phone || "").replace(/\D/g,"");
}

function callProvider(phone){
if(!phone){
alert("Phone number not available.");
return;
}
location.href = "tel:" + phone;
}

function whatsappProvider(phone){
const clean = cleanPhone(phone);
if(!clean){
alert("WhatsApp number not available.");
return;
}
window.open("https://wa.me/" + clean,"_blank");
}

function providerWebsite(url){
if(!url){
alert("Website not available.");
return;
}
const finalUrl =
url.startsWith("http") ? url : "https://" + url;
window.open(finalUrl,"_blank");
}

function renderMessages(profileId){
const box =
document.getElementById("chat_" + profileId);

if(!box){
return;
}

onValue(
ref(db,`enrollmentChats/${uid}/${profileId}/messages`),
snap=>{
let messages = [];

snap.forEach(child=>{
messages.push(child.val());
});

messages = messages
.sort((a,b)=>(a.time || 0) - (b.time || 0))
.slice(-5);

if(!messages.length){
box.innerHTML = `<div class="chatMsg">No messages yet.</div>`;
return;
}

box.innerHTML = messages.map(msg=>`
<div class="chatMsg">
<span class="chatMeta">${msg.senderRole === "student" ? "You" : (msg.senderName || "Teacher / Institution")} - ${msg.time ? new Date(msg.time).toLocaleString() : ""}</span>
${msg.text || ""}
</div>
`).join("");
}
);
}

async function loadEnrollments(){
const list =
document.getElementById("enrollmentList");

onValue(
ref(db,"studentEnrollments/" + uid),
snap=>{
if(!snap.exists()){
list.innerHTML = "No enrolled teacher or institution yet.";
return;
}

let html = "";
let ids = [];

snap.forEach(child=>{
const item = child.val();
const profileId = child.key;
ids.push(profileId);

const accepted =
item.status === "accepted";

const phone =
item.phone || item.alternatePhone || "";

html += `
<div class="providerCard">
<div class="providerTop">
<img class="providerLogo" src="${item.logo || "https://i.ibb.co/4pDNDk1/user.png"}">
<div>
<div class="providerName">${item.name || "Teacher / Institution"}</div>
<span class="status ${accepted ? "accepted" : ""}">${accepted ? "Accepted" : "Waiting for your acceptance"}</span>
</div>
</div>

<div class="row"><span class="label">Category:</span> ${item.category || "-"}</div>
<div class="row"><span class="label">Phone:</span> ${phone || "-"}</div>
${item.email ? `<div class="row"><span class="label">Email:</span> ${item.email}</div>` : ""}
${item.website ? `<div class="row"><span class="label">Website:</span> ${item.website}</div>` : ""}

${accepted ? `
<button class="btn green" onclick="callProvider('${phone}')">Call</button>
<button class="btn green" onclick="whatsappProvider('${phone}')">WhatsApp</button>
${item.website ? `<button class="btn blue" onclick="providerWebsite('${item.website}')">Website</button>` : ""}
<div class="chatBox">
<h3>Messages</h3>
<div id="chat_${profileId}">Loading messages...</div>
<div class="replyRow">
<input id="reply_${profileId}" placeholder="Reply message">
<button class="btn blue" onclick="sendStudentMessage('${profileId}')">Send</button>
</div>
</div>
` : `
<button class="btn green" onclick="acceptEnrollment('${profileId}')">Accept</button>
<button class="btn red" onclick="rejectEnrollment('${profileId}')">Reject</button>
`}
</div>
`;
});

list.innerHTML = html;

ids.forEach(profileId=>{
const itemSnap = snap.child(profileId);
if(itemSnap.exists() && itemSnap.val().status === "accepted"){
renderMessages(profileId);
}
});
}
);
}

window.acceptEnrollment = async function(profileId){
await update(ref(db,`studentEnrollments/${uid}/${profileId}`),{
status:"accepted",
acceptedAt:Date.now(),
updatedAt:Date.now(),
unreadForStudent:false
});

await update(ref(db,`profileViews/${profileId}/${uid}`),{
status:"accepted",
studentAccepted:true,
acceptedAt:Date.now()
});
};

window.rejectEnrollment = async function(profileId){
await update(ref(db,`studentEnrollments/${uid}/${profileId}`),{
status:"rejected",
rejectedAt:Date.now(),
updatedAt:Date.now()
});

await update(ref(db,`profileViews/${profileId}/${uid}`),{
status:"rejected",
studentAccepted:false,
rejectedAt:Date.now()
});
};

window.sendStudentMessage = async function(profileId){
const input =
document.getElementById("reply_" + profileId);

const text =
(input?.value || "").trim();

if(!text){
alert("Type a message first.");
return;
}

await push(ref(db,`enrollmentChats/${uid}/${profileId}/messages`),{
senderId:uid,
senderRole:"student",
senderName:document.getElementById("name").textContent || "Student",
text:text,
time:Date.now()
});

await update(ref(db,`studentEnrollments/${uid}/${profileId}`),{
lastMessage:text,
lastMessageAt:Date.now(),
unreadForStudent:false
});

input.value = "";
};

window.callProvider = callProvider;
window.whatsappProvider = whatsappProvider;
window.providerWebsite = providerWebsite;

loadEnrollments();

/* LOGOUT */

window.logout = async function(){

await signOut(auth);

localStorage.removeItem("uid");
localStorage.removeItem("role");
localStorage.removeItem("profileId");

window.location.href =
"student-login.html";

};

</script>

</body>
</html>
