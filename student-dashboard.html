<script type="module">

import {
initializeApp
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
getDatabase,
ref,
get,
onValue,
update,
push,
remove
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

/* FIREBASE */

const firebaseConfig = {

apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",

authDomain:"gurulink-59cc7.firebaseapp.com",

databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"gurulink-59cc7",

storageBucket:"gurulink-59cc7.appspot.com",

messagingSenderId:"112148672399",

appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getDatabase(app);

/* CHECK LOGIN */

const authUid = localStorage.getItem("uid");
const uid =
localStorage.getItem("studentId") ||
localStorage.getItem("profileId") ||
authUid;

const role = localStorage.getItem("role");

if(!uid || role !== "student"){

window.location.href =
"otp-login.html";

}

localStorage.setItem("uid",uid);
localStorage.setItem("profileId",uid);
localStorage.setItem("studentId",uid);
localStorage.setItem("role","student");

const WEEK_DAYS = [
"Monday",
"Tuesday",
"Wednesday",
"Thursday",
"Friday",
"Saturday",
"Sunday"
];

const DAY_INDEX_TO_NAME = {
1:"Monday",
2:"Tuesday",
3:"Wednesday",
4:"Thursday",
5:"Friday",
6:"Saturday",
0:"Sunday"
};

const DEFAULT_AVATAR =
"default-avatar.svg";

const TIME_TABLE_TYPE_ORDER = [
"School",
"Tuition",
"Training / Coaching",
"Self Study / Practice",
"Online Class",
"Exam",
"Break",
"Other"
];

let dashboardSelectedDay =
getTodayName();

let activeEnrollmentProfileId = "";

/* LOAD STUDENT */

async function loadStudent(){

try{

const snap = await get(
ref(db,"students/" + uid)
);

if(!snap.exists()){

alert("Student profile not found");

return;

}

const data = snap.val();

const studentImage =
data.photo ||
data.logo ||
data.profilePic ||
"";

const studentProfileImage =
document.getElementById("studentProfileImage");

studentProfileImage.onerror = function(){
this.onerror = null;
this.src = DEFAULT_AVATAR;
};

studentProfileImage.src =
studentImage || DEFAULT_AVATAR;

localStorage.setItem("profilePhoto",studentImage || DEFAULT_AVATAR);

document.getElementById("name").innerHTML =
data.name || "-";

document.getElementById("email").innerHTML =
data.email || "-";

document.getElementById("phone").innerHTML =
data.phone || "-";

document.getElementById("studentClass").innerHTML =
data.class || "-";

renderTimeTableSummary(data.timeTable || {});

}
catch(err){

console.log(err);

}

}

function escapeHTML(value){
return String(value ?? "")
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#039;");
}

function getTodayName(){
return DAY_INDEX_TO_NAME[new Date().getDay()] || "Monday";
}

function normalizeTimeTableType(type){
const raw = String(type || "Other").trim();

if(!raw){
return "Other";
}

if(raw === "Training" || raw === "Coaching" || raw === "Training / Coaching"){
return "Training / Coaching";
}

if(raw === "Self Study" || raw === "Practice" || raw === "Self Study / Practice"){
return "Self Study / Practice";
}

return raw;
}

function getTimeTableDisplayMeta(item){
const type = normalizeTimeTableType(item.type);

if(type === "Break"){
return {
title:item.subject || "Break",
showSubject:false
};
}

if(type === "Self Study / Practice"){
return {
title:item.subject || "Self Study / Practice",
showSubject:false
};
}

if(type === "Exam"){
return {
title:`Exam: ${item.title || "Untitled Exam"}`,
showSubject:!!item.subject
};
}

return {
title:item.title || "Untitled",
showSubject:!!item.subject
};
}

function getTimeTableBoardMeta(item,index){
const type = normalizeTimeTableType(item.type);

if(type === "Break"){
return {
boxLabel:"Break",
boxName:item.subject || "Break",
showSubject:false,
subjectText:""
};
}

if(type === "Self Study / Practice"){
return {
boxLabel:"Subject",
boxName:item.subject || "Self Study / Practice",
showSubject:false,
subjectText:""
};
}

if(type === "Exam"){
return {
boxLabel:"Exam",
boxName:item.title || "Untitled Exam",
showSubject:!!item.subject,
subjectText:item.subject || ""
};
}

return {
boxLabel:"Period",
boxName:item.title || `Period ${index + 1}`,
showSubject:!!item.subject,
subjectText:item.subject || ""
};
}

function normalizeTimeTable(raw){
const week = {};

WEEK_DAYS.forEach(day=>{
week[day] = Array.isArray(raw?.[day])
? raw[day]
.map(item=>({
title:String(item.title || "").trim(),
subject:String(item.subject || "").trim(),
type:normalizeTimeTableType(item.type || "Other"),
startTime:String(item.startTime || "").trim(),
endTime:String(item.endTime || "").trim(),
location:String(item.location || "").trim(),
note:String(item.note || "").trim()
}))
.filter(item=>item.title || item.subject || item.startTime || item.endTime || item.location || item.note)
.sort((a,b)=>(a.startTime || "").localeCompare(b.startTime || ""))
: [];
});

return week;
}

function renderDashboardDaySchedule(week,selectedDay){
const selectedItems = week[selectedDay] || [];

if(!selectedItems.length){
return `
<div class="timeTableEmpty">
No class or session saved for ${escapeHTML(selectedDay)}. You can still update your weekly plan anytime.
</div>
`;
}

const grouped = {};

selectedItems.forEach(item=>{
const typeKey =
normalizeTimeTableType(item.type || "Other");

if(!grouped[typeKey]){
grouped[typeKey] = [];
}

grouped[typeKey].push(item);
});

const orderedTypes =
Object.keys(grouped)
.sort((a,b)=>{
const aIndex = TIME_TABLE_TYPE_ORDER.indexOf(a);
const bIndex = TIME_TABLE_TYPE_ORDER.indexOf(b);
const safeA = aIndex === -1 ? 999 : aIndex;
const safeB = bIndex === -1 ? 999 : bIndex;

if(safeA !== safeB){
return safeA - safeB;
}

return a.localeCompare(b);
});

return orderedTypes.map(typeName=>`
<div class="timeTypeGroup">
<div class="timeTypeHeader">
<div>
<h3>${escapeHTML(typeName)}</h3>
<div class="boardSubtitle">${escapeHTML(selectedDay)}</div>
</div>
<div class="typeCountBadge">${grouped[typeName].length} item${grouped[typeName].length === 1 ? "" : "s"}</div>
</div>
<div class="periodBoardWrap">
<div class="periodBoard">
${grouped[typeName].map((item,index)=>{
const meta = getTimeTableBoardMeta(item,index);
return `
<div class="periodBox">
<div class="periodBoxHead">
<div class="periodBoxLabel">${escapeHTML(meta.boxLabel)}</div>
<div class="periodBoxName">${escapeHTML(meta.boxName)}</div>
</div>
<div class="periodBoxBody">
<div class="periodBoxTime">${escapeHTML(item.startTime || "--:--")}${item.endTime ? ` - ${escapeHTML(item.endTime)}` : ""}</div>
${meta.showSubject ? `<div class="periodBoxSubject">${escapeHTML(meta.subjectText)}</div>` : ""}
${item.location ? `
<div class="periodBoxLine">
<b>Place</b>
<span>${escapeHTML(item.location)}</span>
</div>
` : ""}
${item.note ? `
<div class="periodBoxLine">
<b>Note</b>
<span>${escapeHTML(item.note)}</span>
</div>
` : ""}
</div>
</div>
`;
}).join("")}
</div>
</div>
</div>
`).join("");
}

function renderTimeTableSummary(rawTimeTable){
const box =
document.getElementById("timeTableSummary");

if(!box){
return;
}

const week =
normalizeTimeTable(rawTimeTable);

const todayName =
getTodayName();

const todayItems =
week[todayName] || [];

if(!WEEK_DAYS.includes(dashboardSelectedDay)){
dashboardSelectedDay = todayName;
}

const weeklyCount =
WEEK_DAYS.reduce((sum,day)=>sum + (week[day]?.length || 0),0);

if(!weeklyCount){
box.innerHTML = `
<div class="timeTableEmpty">
No weekly time table added yet.<br>
Create your school, tuition, and training schedule so you can check it quickly every day.
<div class="timeTableActionRow" style="margin-top:12px;">
<a href="student-timetable.html?mode=view" class="btn blue">Show Time Table</a>
<a href="student-timetable.html?mode=edit" class="btn orange">Edit Time Table</a>
</div>
</div>
`;
return;
}

function cleanPhone(phone){
return String(phone || "").replace(/\D/g,"");
}

window.openStudentEditProfile = function(){
localStorage.setItem("uid",uid);
localStorage.setItem("profileId",uid);
localStorage.setItem("studentId",uid);
localStorage.setItem("role","student");
window.location.href = "edit-profile.html";
};

function callProvider(phone){
if(!phone){
alert("Phone number not available.");
return;
}
location.href = "tel:" + phone;
}

function whatsappProvider(phone){
const clean = cleanPhone(phone);
if(!clean){
alert("WhatsApp number not available.");
return;
}
window.open("https://wa.me/" + clean,"_blank");
}

function providerWebsite(url){
if(!url){
alert("Website not available.");
return;
}
const finalUrl =
url.startsWith("http") ? url : "https://" + url;
window.open(finalUrl,"_blank");
}

function getSafeImageUrl(url){
return String(url || "").trim() || DEFAULT_AVATAR;
}

async function getProviderProfile(profileId,item){
let profile = null;

if((item.profileRole || "").toLowerCase() === "institution"){
const instSnap = await get(ref(db,"institutions/" + profileId));
if(instSnap.exists()){
profile = instSnap.val();
}
}

if(!profile){
const teacherSnap = await get(ref(db,"teachers/" + profileId));
if(teacherSnap.exists()){
profile = teacherSnap.val();
}
}

if(!profile){
const instSnap = await get(ref(db,"institutions/" + profileId));
if(instSnap.exists()){
profile = instSnap.val();
}
}

if(!profile){
const itemEmail =
String(item.email || "").trim().toLowerCase();
const itemPhone =
cleanPhone(item.phone || item.alternatePhone || "");

const collections =
["teachers","institutions"];

for(const collectionName of collections){
const snap = await get(ref(db,collectionName));

if(!snap.exists()){
continue;
}

snap.forEach(child=>{
if(profile){
return;
}

const candidate = child.val() || {};
const candidateEmail =
String(candidate.email || "").trim().toLowerCase();
const candidatePhone =
cleanPhone(candidate.phone || candidate.alternatePhone || "");

if(
(itemEmail && candidateEmail && itemEmail === candidateEmail) ||
(itemPhone && candidatePhone && itemPhone === candidatePhone)
){
profile = {
...candidate,
uid:child.key
};
}
});

if(profile){
break;
}
}
}

if(!profile){
return item;
}

return {
...item,
name:profile.name || item.name,
phone:profile.phone || item.phone,
alternatePhone:profile.alternatePhone || item.alternatePhone,
email:profile.email || item.email,
website:profile.website || item.website,
logo:profile.logo || profile.profilePic || item.logo,
category:profile.category || item.category,
showBankDetails:profile.showBankDetails !== false,
accountHolderName:profile.showBankDetails === false ? "" : (profile.accountHolderName || item.accountHolderName || ""),
bankName:profile.showBankDetails === false ? "" : (profile.bankName || item.bankName || ""),
accountNumber:profile.showBankDetails === false ? "" : (profile.accountNumber || item.accountNumber || ""),
ifsc:profile.showBankDetails === false ? "" : (profile.ifsc || item.ifsc || ""),
upiId:profile.showBankDetails === false ? "" : (profile.upiId || item.upiId || ""),
qrImage:profile.showBankDetails === false ? "" : (profile.qrImage || item.qrImage || "")
};
}

function renderMessages(profileId){
const box =
document.getElementById("chat_" + profileId);

if(!box){
return;
}

onValue(
ref(db,`enrollmentChats/${uid}/${profileId}`),
snap=>{
let messages = [];
const clearedAt =
Number(snap.child(`clearedFor/${uid}`).val() || 0);

const expiryTime =
Date.now() - (7 * 24 * 60 * 60 * 1000);

snap.child("messages").forEach(child=>{
const msg = child.val();
const msgTime = Number(msg.time || 0);

if(msgTime && msgTime < expiryTime){
remove(ref(db,`enrollmentChats/${uid}/${profileId}/messages/${child.key}`));
return;
}

if(msgTime > clearedAt){
messages.push(msg);
}
});

messages = messages
.sort((a,b)=>(a.time || 0) - (b.time || 0))
.slice(-5);

if(!messages.length){
box.innerHTML = `<div class="chatMsg systemMsg">No messages yet.</div>`;
return;
}

box.innerHTML = messages.map(msg=>`
<div class="chatMsg ${msg.senderRole === "student" ? "studentMsg" : "providerMsg"}">
<span class="chatMeta">${msg.senderRole === "student" ? "You" : (msg.senderName || "Teacher / Institution")} - ${msg.time ? new Date(msg.time).toLocaleString() : ""}</span>
${escapeHTML(msg.text || "")}
</div>
`).join("");
}
);
}

function syncEnrollmentAccordion(){
const list =
document.getElementById("enrollmentList");

if(!list){
return;
}

list.querySelectorAll(".providerCard").forEach(card=>{
const profileId =
card.dataset.profileId || "";
const isOpen =
profileId && profileId === activeEnrollmentProfileId;

card.classList.toggle("open",isOpen);

const icon =
card.querySelector(".providerToggleIcon");

if(icon){
icon.textContent = isOpen ? "-" : "+";
}
});
}

window.toggleEnrollmentCard = function(profileId){
activeEnrollmentProfileId =
activeEnrollmentProfileId === profileId
? ""
: profileId;

syncEnrollmentAccordion();
};

async function loadEnrollments(){
const list =
document.getElementById("enrollmentList");

onValue(
ref(db,"studentEnrollments/" + uid),
async snap=>{
if(!snap.exists()){
list.innerHTML = "No enrolled teacher or institution yet.";
return;
}

let html = "";
let ids = [];
let enrollmentItems = [];

snap.forEach(child=>{
enrollmentItems.push({
profileId:child.key,
item:child.val()
});
});

for(const entry of enrollmentItems){

const profileId = entry.profileId;
const item = await getProviderProfile(profileId,entry.item);
ids.push(profileId);

if(
item.website !== entry.item.website ||
item.upiId !== entry.item.upiId ||
item.qrImage !== entry.item.qrImage ||
item.bankName !== entry.item.bankName ||
item.accountNumber !== entry.item.accountNumber
){
update(ref(db,`studentEnrollments/${uid}/${profileId}`),{
website:item.website || "",
showBankDetails:item.showBankDetails !== false,
accountHolderName:item.accountHolderName || "",
bankName:item.bankName || "",
accountNumber:item.accountNumber || "",
ifsc:item.ifsc || "",
upiId:item.upiId || "",
qrImage:item.qrImage || "",
updatedAt:Date.now()
});
}

const accepted =
item.status === "accepted";

const phone =
item.phone || item.alternatePhone || "";

const hasPayment =
item.showBankDetails !== false &&
(item.qrImage || item.upiId || (item.accountHolderName && item.bankName && item.accountNumber));

const paymentDetailsHTML = hasPayment ? `
<div class="paymentBox" id="payment_${profileId}">
<h3>Payment Details</h3>
<p><b>Important:</b> Please verify payment details before sending money. GURULINK is only a linking platform and does not process or verify payments.</p>
${item.accountHolderName ? `<p><b>Account Holder:</b> ${escapeHTML(item.accountHolderName)}</p>` : ""}
${item.bankName ? `<p><b>Bank Name:</b> ${escapeHTML(item.bankName)}</p>` : ""}
${item.accountNumber ? `<p><b>Account Number:</b> ${escapeHTML(item.accountNumber)}</p>` : ""}
${item.ifsc ? `<p><b>IFSC Code:</b> ${escapeHTML(item.ifsc)}</p>` : ""}
${item.upiId ? `<p><b>UPI ID:</b> ${escapeHTML(item.upiId)}</p>` : ""}
${item.qrImage ? `<img src="${escapeHTML(item.qrImage)}" alt="Payment QR">` : ""}
</div>
` : "";

html += `
<div class="providerCard ${activeEnrollmentProfileId === profileId ? "open" : ""}" data-profile-id="${profileId}">
<button type="button" class="providerHeaderBtn" onclick="toggleEnrollmentCard('${profileId}')">
<span class="providerHeaderMain">
<img class="providerLogo" src="${getSafeImageUrl(item.logo)}" onerror="this.onerror=null;this.src='default-avatar.svg';">
<span class="providerHeaderMeta">
<span class="providerName">${item.name || "Teacher / Institution"}</span>
<span class="status ${accepted ? "accepted" : ""}">${accepted ? "Accepted" : "Waiting for your acceptance"}</span>
</span>
</span>
<span class="providerToggleIcon">${activeEnrollmentProfileId === profileId ? "-" : "+"}</span>
</button>
<div class="providerBody">
<div class="row"><span class="label">Category:</span> ${item.category || "-"}</div>
<div class="row"><span class="label">Phone:</span> ${phone || "-"}</div>
${item.email ? `<div class="row"><span class="label">Email:</span> ${item.email}</div>` : ""}
${item.website ? `<div class="row"><span class="label">Website:</span> ${item.website}</div>` : ""}

${accepted ? `
<button class="btn green" onclick="callProvider('${phone}')">Call</button>
<button class="btn green" onclick="whatsappProvider('${phone}')">WhatsApp</button>
${item.website ? `<button class="btn blue" onclick="providerWebsite('${item.website}')">Website</button>` : ""}
${hasPayment ? `<button class="btn payFeeBtn" onclick="toggleProviderPayment('${profileId}')">Pay Fee</button>` : ""}
${paymentDetailsHTML}
<div class="chatBox">
<div class="chatHeader">
<h3>Messages</h3>
<button class="clearChatBtn" onclick="clearStudentChat('${profileId}')">Clear Chat</button>
</div>
<div id="chat_${profileId}">Loading messages...</div>
<div class="replyRow">
<input id="reply_${profileId}" placeholder="Reply message">
<button class="btn blue" onclick="sendStudentMessage('${profileId}')">Send</button>
</div>
</div>
` : `
<button class="btn green" onclick="acceptEnrollment('${profileId}')">Accept</button>
<button class="btn red" onclick="rejectEnrollment('${profileId}')">Reject</button>
`}
</div>
</div>
`;
}

list.innerHTML = html;

if(activeEnrollmentProfileId && !ids.includes(activeEnrollmentProfileId)){
activeEnrollmentProfileId = "";
}

syncEnrollmentAccordion();

ids.forEach(profileId=>{
const itemSnap = snap.child(profileId);
if(itemSnap.exists() && itemSnap.val().status === "accepted"){
renderMessages(profileId);
}
});
}
);
}

window.acceptEnrollment = async function(profileId){
await update(ref(db,`studentEnrollments/${uid}/${profileId}`),{
status:"accepted",
acceptedAt:Date.now(),
updatedAt:Date.now(),
unreadForStudent:false
});

await update(ref(db,`profileViews/${profileId}/${uid}`),{
status:"accepted",
studentAccepted:true,
acceptedAt:Date.now()
});
};

window.rejectEnrollment = async function(profileId){
await update(ref(db,`studentEnrollments/${uid}/${profileId}`),{
status:"rejected",
rejectedAt:Date.now(),
updatedAt:Date.now()
});

await update(ref(db,`profileViews/${profileId}/${uid}`),{
status:"rejected",
studentAccepted:false,
rejectedAt:Date.now()
});
};

window.sendStudentMessage = async function(profileId){
const input =
document.getElementById("reply_" + profileId);

const text =
(input?.value || "").trim();

if(!text){
alert("Type a message first.");
return;
}

await push(ref(db,`enrollmentChats/${uid}/${profileId}/messages`),{
senderId:uid,
senderRole:"student",
senderName:document.getElementById("name").textContent || "Student",
text:text,
time:Date.now()
});

await update(ref(db,`studentEnrollments/${uid}/${profileId}`),{
lastMessage:text,
lastMessageAt:Date.now(),
unreadForStudent:false
});

input.value = "";
};

window.clearStudentChat = async function(profileId){
if(!confirm("Clear this chat from your side only?")){
return;
}

await update(ref(db,`enrollmentChats/${uid}/${profileId}/clearedFor`),{
[uid]:Date.now()
});

await update(ref(db,`studentEnrollments/${uid}/${profileId}`),{
lastMessageAt:Date.now(),
unreadForStudent:false
});
};

window.toggleProviderPayment = function(profileId){
const box =
document.getElementById("payment_" + profileId);

if(!box){
alert("Payment details are not available.");
return;
}

if(box.style.display === "block"){
box.style.display = "none";
return;
}

const ok = confirm(
"Payments are made directly between you and the teacher/institution.\n\n" +
"GURULINK does not process or verify payments and is not responsible for failed transactions, refunds, disputes, or wrong transfers.\n\n" +
"Please verify all details before paying."
);

if(ok){
box.style.display = "block";
}
};

window.callProvider = callProvider;
window.whatsappProvider = whatsappProvider;
window.providerWebsite = providerWebsite;

onAuthStateChanged(auth,(user)=>{

if(!user){
window.location.href = "otp-login.html";
return;
}

loadStudent();
loadEnrollments();

});

/* LOGOUT */

window.logout = async function(){

await signOut(auth);

localStorage.removeItem("uid");
localStorage.removeItem("role");
localStorage.removeItem("profileId");

window.location.href =
"student-login.html";

};
