<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Creative Institution Registration</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
}

header{
background:#6a1b9a;
color:white;
padding:18px;
text-align:center;
}

.container{
width:90%;
max-width:800px;
margin:20px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

textarea{
height:100px;
resize:none;
}

button{
width:100%;
padding:14px;
background:#6a1b9a;
border:none;
color:white;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.preview{
display:flex;
flex-wrap:wrap;
gap:10px;
margin:10px 0;
}

.preview img{
width:90px;
height:90px;
border-radius:10px;
object-fit:cover;
border:1px solid #ddd;
}

.modeBox{
padding:10px;
border:1px solid #ddd;
border-radius:10px;
margin-top:10px;
}

.modeFee{
display:none;
padding:10px;
background:#f7f7f7;
margin-top:10px;
border-radius:10px;
}

.row{
display:flex;
align-items:center;
gap:10px;
margin:10px 0;
}

.row input[type=checkbox]{
width:auto;
}

</style>
</head>

<body>

<header>

<h1>Creative Institution Registration</h1>
<p>Registration Fee ₹200</p>

</header>

<div class="container">

<form id="form">

<input id="name"
placeholder="Institution Name"
required>

<input id="phone"
placeholder="Contact Number"
required>

<input id="email"
type="email"
placeholder="Email">

<input id="website"
placeholder="Website">

<input id="address"
placeholder="Address">

<input id="area"
placeholder="Preferred Service Area Example: Beltola">

<select id="creative">

<option value="">Select Creative Category</option>

<option>Music Academy</option>
<option>Dance Academy</option>
<option>Drawing School</option>
<option>Art School</option>
<option>Guitar Classes</option>
<option>Piano Classes</option>
<option>Photography</option>
<option>Singing Classes</option>

<option value="other">
Other
</option>

</select>

<input
id="otherCreative"
style="display:none"
placeholder="Enter Category">


<h3>Modes</h3>

<div class="modeBox">

<div class="row">
<input type="checkbox"
onchange="toggleFee('offline')">

Offline Classroom
</div>

<div class="modeFee"
id="offline">

<input
id="offlineFee"
placeholder="Enter Fee">

</div>


<div class="row">

<input
type="checkbox"
onchange="toggleFee('online')">

Online
</div>

<div class="modeFee"
id="online">

<input
id="onlineFee"
placeholder="Enter Fee">

</div>


<div class="row">

<input
type="checkbox"
onchange="toggleFee('hybrid')">

Hybrid
</div>

<div class="modeFee"
id="hybrid">

<input
id="hybridFee"
placeholder="Enter Fee">

</div>

</div>


<label>
<b>Institution Logo</b>
</label>

<input
type="file"
id="logo"
accept="image/*">

<div
id="logoPreview"
class="preview"></div>


<label>
<b>Gallery Photos (Max 5)</b>
</label>

<input
type="file"
id="gallery"
multiple
accept="image/*">

<div
id="galleryPreview"
class="preview"></div>


<textarea
id="description"
placeholder="About Institution"></textarea>

<button type="submit">

Continue To Payment

</button>

</form>

</div>







<script type="module">

import { 
initializeApp 
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import { 
getDatabase,
ref,
push
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";


const firebaseConfig={

apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"

};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const API_KEY="31f729ff855eb2e42c00ee508a8647ea";


/* ELEMENTS */

const form=document.getElementById("form");
const creative=document.getElementById("creative");
const otherCreative=document.getElementById("otherCreative");

const logo=document.getElementById("logo");
const gallery=document.getElementById("gallery");


/* IMAGE UPLOAD */

async function upload(file){

let fd=new FormData();

fd.append("image",file);

let res=await fetch(
`https://api.imgbb.com/1/upload?key=${API_KEY}`,
{
method:"POST",
body:fd
}
);

let data=await res.json();

return data.data.url;

}


/* OTHER CATEGORY */

creative.addEventListener(
"change",
()=>{

otherCreative.style.display=
creative.value==="other"
?
"block"
:
"none";

}
);


/* SUBMIT */

form.addEventListener(
"submit",
async(e)=>{

e.preventDefault();

try{

/* LOGO */

let logoUrl="";

if(logo.files[0]){

logoUrl=
await upload(
logo.files[0]
);

}


/* GALLERY */

let galleryUrls=[];

for(let file of gallery.files){

galleryUrls.push(
await upload(file)
);

}


/* MODES */

let modes=[];

document
.querySelectorAll(
'input[type="checkbox"]:checked'
)
.forEach(c=>{

let txt=
c.parentElement.innerText.trim();

modes.push(txt);

});


/* SAVE FIREBASE */

let newRef=
await push(
ref(db,"institutions"),
{

name:
document.getElementById("name").value,

phone:
document.getElementById("phone").value,

email:
document.getElementById("email").value,

website:
document.getElementById("website").value,

address:
document.getElementById("address").value,

area:
document.getElementById("area").value,

creative:
creative.value==="other"
?
otherCreative.value
:
creative.value,

modes:modes,

offlineFee:
document.getElementById("offlineFee").value || "",

onlineFee:
document.getElementById("onlineFee").value || "",

hybridFee:
document.getElementById("hybridFee").value || "",

logo:logoUrl,

gallery:galleryUrls,

description:
document.getElementById("description").value,

category:"creative",

status:"pending"

}

);


/* SAVE ID */

const institutionId=
newRef.key;

localStorage.setItem(
"institutionId",
institutionId
);


/* GO PAYMENT PAGE */

window.location.href=
"payment.html?type=institution&id="+institutionId;

}
catch(error){

console.log(error);

alert(
"Error:\n"+
error.message
);

}

}

);

</script>


<script>

function toggleFee(id){

let box=
document.getElementById(id);

box.style.display=
box.style.display==="block"
?
"none"
:
"block";

}

</script>

</body>
</html>
