<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Sports & Fitness Profile - GURULINK</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#dcefff,#eef7ff,#ffffff);
padding-bottom:24px;
}

header{
background:#1565c0;
color:#fff;
padding-top:calc(env(safe-area-inset-top) + 12px);
padding-right:16px;
padding-bottom:12px;
padding-left:16px;
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
position:sticky;
top:0;
z-index:1000;
box-shadow:0 6px 18px rgba(13,71,161,.22);
}

.brand{
display:flex;
flex-direction:row;
align-items:center;
gap:8px;
min-width:0;
}

.logoImg{
width:44px;
height:44px;
object-fit:contain;
flex-shrink:0;
}

.logoText{
display:flex;
flex-direction:row;
align-items:center;
font-size:22px;
font-weight:bold;
line-height:1;
white-space:nowrap;
text-shadow:0 1px 2px rgba(255,255,255,.2);
}

.guru{
color:#2196f3;
}

.link{
color:#4caf50;
}

.header-nav{
display:flex;
align-items:center;
gap:8px;
flex-shrink:0;
}

.header-link{
height:38px;
padding:0 14px;
border:none;
border-radius:10px;
background:#fff;
color:#1565c0;
text-decoration:none;
font-size:13px;
font-weight:700;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
box-shadow:0 4px 12px rgba(0,0,0,.14);
}

.container{
width:95%;
max-width:1400px;
margin:auto;
padding:25px;
}

.filters{
display:grid;
grid-template-columns:repeat(3,minmax(0,1fr));
gap:10px;
padding:16px;
background:rgba(255,255,255,.4);
backdrop-filter:blur(25px);
border-radius:25px;
margin-bottom:22px;
box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.filters input,
.filters select{
min-width:0;
padding:12px;
font-size:13px;
border:none;
outline:none;
border-radius:14px;
background:rgba(255,255,255,.8);
}

#search{
grid-column:1/span 2;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
gap:25px;
}

.card{
background:rgba(255,255,255,.35);
backdrop-filter:blur(25px);
border-radius:25px;
padding:20px;
border:1px solid rgba(255,255,255,.5);
box-shadow:0 10px 30px rgba(0,0,0,.06);
transition:.4s;
}

.card:hover{
transform:translateY(-8px);
}

.card.teacher{
border-left:6px solid #1976d2;
}

.card.institution{
border-left:6px solid #e91e63;
}

.top{
display:flex;
gap:15px;
align-items:center;
}

.photo{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:4px solid white;
}

.badges{
margin-top:8px;
}

.badge{
display:inline-block;
padding:6px 12px;
margin:3px;
font-size:12px;
border-radius:20px;
background:white;
color:#1976d2;
}

.verify{
background:#2196f3;
color:white;
}

.rating-badge{
background:#fff3cd;
color:#c77700;
font-weight:bold;
}

.details{
margin-top:15px;
line-height:1.8;
color:#444;
font-size:14px;
}

.btn{
margin-top:16px;
width:100%;
padding:12px 14px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#1565c0,#1e88e5);
color:#fff;
font-size:14px;
font-weight:700;
cursor:pointer;
box-shadow:0 10px 20px rgba(21,101,192,.18);
transition:transform .2s ease, box-shadow .2s ease, opacity .2s ease;
}

.btn:hover{
transform:translateY(-1px);
box-shadow:0 14px 24px rgba(21,101,192,.22);
}

.btn:active{
transform:translateY(0);
opacity:.94;
}

.empty{
padding:30px;
text-align:center;
border-radius:20px;
background:white;
}

@media(max-width:768px){
header{
padding-right:12px;
padding-bottom:10px;
padding-left:12px;
gap:10px;
}

.brand{
gap:7px;
}

.logoImg{
width:38px;
height:38px;
}

.logoText{
font-size:16px;
line-height:1;
}

.header-nav{
gap:6px;
}

.header-link{
height:34px;
padding:0 12px;
font-size:12px;
border-radius:9px;
}

.container{
padding:16px;
}

.filters{
grid-template-columns:repeat(2,minmax(0,1fr));
gap:8px;
padding:12px;
}

#search{
grid-column:1/-1;
}

.filters input,
.filters select{
padding:11px;
font-size:12px;
}

.grid{
grid-template-columns:1fr;
gap:16px;
}

.card{
padding:16px;
border-radius:20px;
}

.photo{
width:76px;
height:76px;
}

.btn{
font-size:13px;
padding:11px 12px;
border-radius:12px;
}
}
</style>
<link rel="icon" type="image/png" href="https://i.ibb.co/0RT0BQKq/GURULINK-Logo-1.png">
<link rel="shortcut icon" href="https://i.ibb.co/0RT0BQKq/GURULINK-Logo-1.png">
<link rel="apple-touch-icon" href="https://i.ibb.co/0RT0BQKq/GURULINK-Logo-1.png">
<link rel="stylesheet" href="gurulink-theme.css?v=2">
<script src="gurulink-theme.js?v=2"></script>
</head>
<body>

<header>
<div class="brand">
<img 
src="https://i.ibb.co/0RT0BQKq/GURULINK-Logo-1.png"
alt="GL"
class="logoImg">
<div class="logoText">
<span class="guru">GURU</span><span class="link">LINK</span>
</div>
</div>

<div class="header-nav">
<button class="header-link" type="button" onclick="history.back()">Back</button>
<a href="index.html" class="header-link">Home</a>
</div>
</header>

<div class="container">

<div class="filters">
<input type="text" id="search" placeholder="Search Name / Location">

<select id="modeFilter">
<option value="">All Modes</option>
<option value="Indoor Training">Indoor Training</option>
<option value="Outdoor Training">Outdoor Training</option>
<option value="Personal Coaching">Personal Coaching</option>
<option value="Group Coaching">Group Coaching</option>
<option value="Fitness Session">Fitness Session</option>
<option value="Academy Training">Academy Training</option>
<option value="Practice Session">Practice Session</option>
</select>

<select id="stateFilter">
<option value="">State</option>
</select>

<input type="text" id="areaFilter" placeholder="Area">
<input type="text" id="subjectSearch" placeholder="Sport / Activity">
</div>

<div id="grid" class="grid"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain: "gurulink-59cc7.firebaseapp.com",
databaseURL: "https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "gurulink-59cc7",
storageBucket: "gurulink-59cc7.appspot.com",
messagingSenderId: "112148672399",
appId: "1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let teachers = [];
let institutes = [];
let ratingMap = {};

function isPublicProfile(profile){
return profile.publicVisible !== false &&
profile.publicVisible !== "false";
}

function publicRankValue(profile){
const rank = Number(profile.publicRank);
return Number.isFinite(rank) && rank > 0 ? rank : null;
}

function ratingInfo(profile){
const collection = profile.type === "Institution" ? "institutions" : "teachers";
return ratingMap[collection + "/" + profile.id] || {avg:0,count:0};
}

function sortPublicProfiles(list){
return [...list].sort((a,b)=>{
const aRank = publicRankValue(a);
const bRank = publicRankValue(b);

if(aRank !== null || bRank !== null){
if(aRank === null) return 1;
if(bRank === null) return -1;
if(aRank !== bRank) return aRank - bRank;
}

const ar = ratingInfo(a);
const br = ratingInfo(b);

if(br.avg !== ar.avg) return br.avg - ar.avg;
if(br.count !== ar.count) return br.count - ar.count;

return (a.name || "").localeCompare(b.name || "");
});
}

function getAllProfiles() {
return [...teachers, ...institutes];
}

function getStateText(profile) {
return profile.address || profile.state || profile.location || "";
}

function getAreaText(profile) {
return profile.area || profile.city || profile.town || "";
}

function getSubjectText(profile) {
if (profile.subjects) {
if (Array.isArray(profile.subjects)) return profile.subjects.join(", ");
if (typeof profile.subjects === "object") return Object.values(profile.subjects).join(", ");
return String(profile.subjects);
}

return profile.subject || profile.sport || profile.activity || "Not Mentioned";
}

function getModesText(profile) {
if (profile.teachingModes) {
if (Array.isArray(profile.teachingModes)) return profile.teachingModes.join(", ");
if (typeof profile.teachingModes === "object") return Object.values(profile.teachingModes).join(", ");
return String(profile.teachingModes);
}

if (Array.isArray(profile.modes)) return profile.modes.join(", ");
if (typeof profile.modes === "object" && profile.modes) return Object.values(profile.modes).join(", ");
return profile.modes || "Not Mentioned";
}

function modeMatch(profile, selectedMode) {
if (!selectedMode) return true;
return getModesText(profile).toLowerCase().includes(selectedMode.toLowerCase());
}

function populateStateFilter() {
const select = document.getElementById("stateFilter");
if (!select) return;

const current = select.value || "";
const states = [...new Set(
getAllProfiles()
.map(profile => getStateText(profile))
.filter(Boolean)
)].sort((a, b) => a.localeCompare(b));

select.innerHTML = `<option value="">State</option>`;

states.forEach((state) => {
const option = document.createElement("option");
option.value = state;
option.textContent = state;
select.appendChild(option);
});

if (current && states.includes(current)) {
select.value = current;
}
}

function loadData() {
onValue(ref(db, "teachers"), (snap) => {
teachers = [];

snap.forEach((c) => {
const d = c.val();

if (
(d.status || "").toLowerCase() === "approved" &&
isPublicProfile(d) &&
(d.category || "").toLowerCase() === "sport"
) {
teachers.push({ ...d, id: c.key, type: "Teacher" });
}
});

populateStateFilter();
render();
});

onValue(ref(db, "institutions"), (snap) => {
institutes = [];

snap.forEach((c) => {
const d = c.val();

if (
(d.status || "").toLowerCase() === "approved" &&
isPublicProfile(d) &&
(d.category || "").toLowerCase() === "sport"
) {
institutes.push({ ...d, id: c.key, type: "Institution" });
}
});

populateStateFilter();
render();
});
}

loadData();

onValue(ref(db, "reviews"), (snap) => {
ratingMap = {};

snap.forEach((typeSnap) => {
const collection = typeSnap.key;

typeSnap.forEach((profileSnap) => {
let total = 0;
let count = 0;

profileSnap.forEach((reviewSnap) => {
const rating = Number(reviewSnap.val()?.rating || 0);
if(rating > 0){
total += rating;
count++;
}
});

if(count){
ratingMap[collection + "/" + profileSnap.key] = {
avg: total / count,
count
};
}
});
});

render();
});

function showGuestAccessPopup(onLogin){
const popup = document.createElement("div");
popup.id = "guestAccessPopup";
popup.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:18px;z-index:9999;";
popup.innerHTML = `
<div style="width:100%;max-width:430px;background:white;border-radius:16px;box-shadow:0 18px 45px rgba(0,0,0,.28);overflow:hidden;">
<div style="background:#00897b;color:white;padding:18px 20px;">
<h3 style="margin:0;font-size:20px;">Limited Access</h3>
</div>
<div style="padding:20px;">
<p style="margin:0 0 12px;line-height:1.6;color:#333;font-size:14px;">You are using limited access. For complete access, please log in as a Teacher / Institution or Student / Parent.</p>
<p style="margin:0 0 12px;line-height:1.6;color:#333;font-size:14px;">GURULINK is only a linking platform between students, parents, teachers, and institutions. GURULINK never shares or misuses your personal data.</p>
<p style="margin:0;line-height:1.6;color:#333;font-size:14px;">After login, you and the teacher or institution can contact each other directly by phone call, WhatsApp, or chat.</p>
<div style="display:flex;gap:10px;margin-top:18px;">
<button type="button" id="guestCancelBtn" style="flex:1;width:auto;padding:12px;background:#eceff1;color:#263238;border:none;border-radius:10px;font-size:14px;">Cancel</button>
<button type="button" id="guestLoginBtn" style="flex:1;width:auto;padding:12px;background:#00897b;color:white;border:none;border-radius:10px;font-size:14px;">Login Now</button>
</div>
</div>
</div>
`;

document.body.appendChild(popup);
document.getElementById("guestCancelBtn").onclick = () => popup.remove();
document.getElementById("guestLoginBtn").onclick = () => {
popup.remove();
onLogin();
};
}

function openProfileWithLogin(id){
const viewerId =
localStorage.getItem("uid") ||
localStorage.getItem("profileId");

const viewerRole =
(localStorage.getItem("role") || "").toLowerCase();

const profileUrl = "profile-view.html?id=" + id;

if(!viewerId || viewerRole === "guest"){
showGuestAccessPopup(() => {
localStorage.removeItem("selectedRole");
sessionStorage.setItem("postLoginRedirect", profileUrl);
window.location.href =
"otp-login.html?return=" + encodeURIComponent(profileUrl);
});
return;
}

window.location.href = profileUrl;
}

document.addEventListener("click", (event) => {
const button = event.target.closest(".view");
if (!button) return;
openProfileWithLogin(button.dataset.id);
});

document.getElementById("search").addEventListener("input", render);
document.getElementById("modeFilter").addEventListener("change", render);
document.getElementById("stateFilter").addEventListener("change", render);
document.getElementById("areaFilter").addEventListener("input", render);
document.getElementById("subjectSearch").addEventListener("input", render);

function render() {
const all = getAllProfiles();
const search = document.getElementById("search").value.trim().toLowerCase();
const selectedMode = document.getElementById("modeFilter").value;
const selectedState = document.getElementById("stateFilter").value.trim().toLowerCase();
const areaFilter = document.getElementById("areaFilter").value.trim().toLowerCase();
const subjectSearch = document.getElementById("subjectSearch").value.trim().toLowerCase();

const filtered = all.filter((item) => {
const stateText = getStateText(item);
const areaText = getAreaText(item);
const subjectText = getSubjectText(item);
const modeText = getModesText(item);
const searchableText = `
${item.name || ""}
${stateText}
${areaText}
${item.address || ""}
${subjectText}
${modeText}
`.toLowerCase();

if (search && !searchableText.includes(search)) return false;
if (selectedState && !stateText.toLowerCase().includes(selectedState)) return false;
if (areaFilter && !areaText.toLowerCase().includes(areaFilter)) return false;
if (subjectSearch && !subjectText.toLowerCase().includes(subjectSearch)) return false;
if (!modeMatch(item, selectedMode)) return false;

return true;
});

const grid = document.getElementById("grid");
const sorted = sortPublicProfiles(filtered);

if (!sorted.length) {
grid.innerHTML = `<div class="empty">No Sports & Fitness Profiles Found</div>`;
return;
}

grid.innerHTML = sorted.map((item) => {
const rating = ratingInfo(item);
const subject = getSubjectText(item);
const stateText = getStateText(item) || "-";
const areaText = getAreaText(item) || "-";
const modeText = getModesText(item);

return `
<div class="card ${item.type.toLowerCase()}">
<div class="top">
<img class="photo" src="${item.photo || item.logo || 'https://via.placeholder.com/100'}">
<div>
<h2>${item.name || "-"}</h2>
<div class="badges">
<span class="badge">${item.type}</span>
<span class="badge">Sports & Fitness</span>
<span class="badge rating-badge">${rating.avg ? rating.avg.toFixed(1) + " / 5" : "No Rating"}${rating.count ? " (" + rating.count + ")" : ""}</span>
<span class="badge verify">Verified</span>
</div>
</div>
</div>

<div class="details">
<b style="color:red;">Sport / Activity:</b> ${subject}<br><br>
<b>State:</b> ${stateText}<br>
<b>Area:</b> ${areaText}<br>
<b>Mode:</b> ${modeText}<br>
<b>${item.type === "Teacher" ? "Experience" : "Established"}:</b> ${item.type === "Teacher" ? (item.experience ? item.experience + " Years" : "-") : (item.establishedDate || "-")}
</div>

<button class="btn view" data-id="${item.id}">View Details</button>
</div>
`;
}).join("");
}
</script>

</body>
</html>
