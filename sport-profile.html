<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Sport Profile - GURULINK</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#d9efff,#f4f9ff,#fff);
padding-bottom:40px;
}

header{
padding:30px;
text-align:center;
background:rgba(255,255,255,.4);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,.6);
}

.container{
width:95%;
max-width:1300px;
margin:auto;
padding:20px;
}

.filters{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
background:rgba(255,255,255,.45);
border-radius:20px;
margin-bottom:20px;
}

.filters input,
.filters select{
padding:12px;
border:none;
border-radius:10px;
outline:none;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,.45);
border-radius:20px;
padding:15px;
border:1px solid #ddd;
position:relative;
}

.card.institution{
border-left:6px solid #e91e63;
}

.card.teacher{
border-left:6px solid #1976d2;
}

.top{
display:flex;
gap:15px;
}

.photo{
width:70px;
height:70px;
border-radius:50%;
object-fit:cover;
}

.badge{
background:#fff;
padding:5px 10px;
border-radius:20px;
font-size:12px;
margin:3px;
display:inline-block;
}

.verify{
background:#2196f3;
color:#fff;
}

.btn{
margin-top:10px;
padding:10px 14px;
border:none;
background:#1976d2;
color:#fff;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.details{
margin-top:10px;
font-size:14px;
line-height:1.7;
}

.empty{
text-align:center;
padding:20px;
background:#fff;
border-radius:15px;
}

</style>
</head>

<body>

<header>
<h1>Sport Profile</h1>
<p>Find Coaches, Academies & Training Centers</p>
</header>

<div class="container">

<div class="filters">

<input id="search" placeholder="Search name">

<select id="sportFilter">

<option value="">All Sports</option>
<option>Cricket</option>
<option>Football</option>
<option>Basketball</option>
<option>Badminton</option>
<option>Swimming</option>
<option>Gymnastics</option>
<option>Karate</option>
<option>Yoga</option>
<option>Table Tennis</option>
<option>Volleyball</option>

</select>

<select id="modeFilter">

<option value="">All Modes</option>
<option>Indoor Training</option>
<option>Outdoor Training</option>
<option>Personal Coaching</option>
<option>Group Coaching</option>

</select>

</div>

<div id="grid" class="grid"></div>

</div>






<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
  authDomain: "gurulink-59cc7.firebaseapp.com",
  databaseURL: "https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "gurulink-59cc7",
  storageBucket: "gurulink-59cc7.appspot.com",
  messagingSenderId: "112148672399",
  appId: "1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let teachers = [];
let institutes = [];

/* =========================
   LOAD TEACHERS
========================= */

onValue(ref(db, "teachers"), (snap) => {

  teachers = [];

  snap.forEach((c) => {

    const d = c.val();

    if (
      d.status === "approved" &&
      (d.category || "").toLowerCase() === "sport"
    ) {
      teachers.push({
        ...d,
        id: c.key,
        type: "Teacher"
      });
    }

  });

  render();
});

/* =========================
   LOAD INSTITUTIONS
========================= */

onValue(ref(db, "institutions"), (snap) => {

  institutes = [];

  snap.forEach((c) => {

    const d = c.val();

    if (
      d.status === "approved" &&
      (d.category || "").toLowerCase() === "sport"
    ) {
      institutes.push({
        ...d,
        id: c.key,
        type: "Institution"
      });
    }

  });

  render();
});

/* COMBINE */
function getAll() {
  return [...teachers, ...institutes];
}

/* SEARCH HELPER */
function similar(a, b) {
  return (a || "").toLowerCase().includes((b || "").toLowerCase());
}

/* MODE MATCH */
function modeMatch(modes, selectedMode) {
  if (!selectedMode) return true;
  return (modes || []).includes(selectedMode);
}

/* SPORT MATCH */
function sportMatch(subject, selectedSport) {
  if (!selectedSport) return true;

  if (!subject) return false;

  return (subject || "")
    .toLowerCase()
    .includes(selectedSport.toLowerCase());
}

/* =========================
   VIEW BUTTON HANDLER (UNIFIED)
========================= */

document.addEventListener("click", (e) => {

  const btn = e.target.closest(".view");
  if (!btn) return;

  const id = btn.dataset.id;

  const uid =
    localStorage.getItem("uid") ||
    localStorage.getItem("studentUid") ||
    localStorage.getItem("teacherUid") ||
    localStorage.getItem("adminUid") ||
    localStorage.getItem("institutionId");

  if (!uid) {

    sessionStorage.setItem(
      "redirectAfterLogin",
      "profile-view.html?id=" + id
    );

    alert("Please login first");

    window.location.href = "student-login.html";
    return;
  }

  window.location.href = "profile-view.html?id=" + id;
});

/* FILTER EVENTS */
document.getElementById("search").addEventListener("input", render);
document.getElementById("sportFilter").addEventListener("change", render);
document.getElementById("modeFilter").addEventListener("change", render);

/* =========================
   RENDER
========================= */

function render() {

  const all = getAll();

  const search = document.getElementById("search").value.trim().toLowerCase();
  const sport = document.getElementById("sportFilter").value;
  const mode = document.getElementById("modeFilter").value;

  const filtered = all.filter((x) => {

    const name = (x.name || "").toLowerCase();
    const location = (x.location || x.address || "").toLowerCase();

    /* SEARCH */
    if (search && !(similar(name, search) || similar(location, search))) {
      return false;
    }

    /* SPORT */
  const sportValue =
  Array.isArray(x.subjects)
    ? x.subjects.join(", ")
    : (x.subject || x.sport || "");

if (!sportMatch(sportValue, sport)) {
  return false;
}

    /* MODE */
    if (!modeMatch(x.teachingModes || x.modes, mode)) {
      return false;
    }

    return true;
  });

  const grid = document.getElementById("grid");

  /* EMPTY */
  if (!filtered.length) {
    grid.innerHTML = `
      <div class="empty">
        No Sport Profiles Found
      </div>
    `;
    return;
  }

  /* CARDS */
  grid.innerHTML = filtered.map((x) => `

    <div class="card ${x.type.toLowerCase()}">

      <div class="top">

        <img
          class="photo"
          src="${x.photo || x.logo || 'https://via.placeholder.com/100'}"
        >

        <div>

          <h3>${x.name || "-"}</h3>

          <div class="badge">${x.type}</div>

          <div class="badge">${x.category || "sport"}</div>

        



		<div class="badge verify">
  ${
    x.verified === true ||
    x.status === "approved"
      ? "✅ Verified"
      : "❌ Not Verified"
  }
</div>
		  
		  
		  

        </div>

      </div>

      <div class="details">

        <b>Sport:</b>
${
  Array.isArray(x.subjects)
    ? x.subjects.join(", ")
    : (x.subject || x.sport || "-")
}
        <br>

        <b>Mode:</b>
        ${(x.teachingModes || x.modes || []).join(", ") || "-"}
        <br>

        <b>Location:</b>
        ${x.location || x.address || "-"}

      </div>

      <button
        class="btn view"
        data-id="${x.id}"
      >
        View Details
      </button>

    </div>

  `).join("");
}

</script>

</body>
</html>
