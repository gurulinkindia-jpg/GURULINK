<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1, viewport-fit=cover">

<title>Sport Profile - GURULINK</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#d9efff,#f4f9ff,#fff);
padding-bottom:40px;
}

header{
padding:30px;
text-align:center;
background:rgba(255,255,255,.4);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,.6);
}

.container{
width:95%;
max-width:1300px;
margin:auto;
padding:20px;
}

.filters{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
background:rgba(255,255,255,.45);
border-radius:20px;
margin-bottom:20px;
}

.filters input,
.filters select{
padding:12px;
border:none;
border-radius:10px;
outline:none;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,.45);
border-radius:20px;
padding:15px;
border:1px solid #ddd;
position:relative;
}

.card.institution{
border-left:6px solid #e91e63;
}

.card.teacher{
border-left:6px solid #1976d2;
}

.top{
display:flex;
gap:15px;
}

.photo{
width:70px;
height:70px;
border-radius:50%;
object-fit:cover;
}

.badge{
background:#fff;
padding:5px 10px;
border-radius:20px;
font-size:12px;
margin:3px;
display:inline-block;
}

.verify{
background:#2196f3;
color:#fff;
}

.btn{
margin-top:10px;
padding:10px 14px;
border:none;
background:#1976d2;
color:#fff;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.details{
margin-top:10px;
font-size:14px;
line-height:1.7;
}

.empty{
text-align:center;
padding:20px;
background:#fff;
border-radius:15px;
}

</style>
<link rel="icon" type="image/png" href="https://i.ibb.co/0RT0BQKq/GURULINK-Logo-1.png">
<link rel="shortcut icon" href="https://i.ibb.co/0RT0BQKq/GURULINK-Logo-1.png">
<link rel="apple-touch-icon" href="https://i.ibb.co/0RT0BQKq/GURULINK-Logo-1.png">

<link rel="stylesheet" href="gurulink-theme.css?v=2">
<script src="gurulink-theme.js?v=2"></script>
</head>

<body>

<header>
<h1>Sport Profile</h1>
<p>Find Coaches, Academies & Training Centers</p>
</header>

<div class="container">

<div class="filters">

<input id="search" placeholder="Search name">

<select id="sportFilter">

<option value="">All Sports</option>
<option>Cricket</option>
<option>Football</option>
<option>Basketball</option>
<option>Badminton</option>
<option>Swimming</option>
<option>Gymnastics</option>
<option>Karate</option>
<option>Yoga</option>
<option>Table Tennis</option>
<option>Volleyball</option>

</select>

<select id="modeFilter">

<option value="">All Modes</option>
<option>Indoor Training</option>
<option>Outdoor Training</option>
<option>Personal Coaching</option>
<option>Group Coaching</option>

</select>

</div>

<div id="grid" class="grid"></div>

</div>






<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
  authDomain: "gurulink-59cc7.firebaseapp.com",
  databaseURL: "https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "gurulink-59cc7",
  storageBucket: "gurulink-59cc7.appspot.com",
  messagingSenderId: "112148672399",
  appId: "1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let teachers = [];
let institutes = [];
let ratingMap = {};

/* =========================
   LOAD TEACHERS
========================= */

onValue(ref(db, "teachers"), (snap) => {

  teachers = [];

  snap.forEach((c) => {

    const d = c.val();

    if (
      (d.status || "").toLowerCase() === "approved" &&
      isPublicProfile(d) &&
      (d.category || "").toLowerCase() === "sport"
    ) {
      teachers.push({
        ...d,
        id: c.key,
        type: "Teacher"
      });
    }

  });

  render();
});

/* =========================
   LOAD INSTITUTIONS
========================= */

onValue(ref(db, "institutions"), (snap) => {

  institutes = [];

  snap.forEach((c) => {

    const d = c.val();

    if (
      (d.status || "").toLowerCase() === "approved" &&
      isPublicProfile(d) &&
      (d.category || "").toLowerCase() === "sport"
    ) {
      institutes.push({
        ...d,
        id: c.key,
        type: "Institution"
      });
    }

  });

  render();
});

onValue(ref(db, "reviews"), (snap) => {
  ratingMap = {};

  snap.forEach((typeSnap) => {
    const collection = typeSnap.key;

    typeSnap.forEach((profileSnap) => {
      let total = 0;
      let count = 0;

      profileSnap.forEach((reviewSnap) => {
        const rating = Number(reviewSnap.val()?.rating || 0);
        if (rating > 0) {
          total += rating;
          count++;
        }
      });

      if (count) {
        ratingMap[collection + "/" + profileSnap.key] = {
          avg: total / count,
          count
        };
      }
    });
  });

  render();
});

/* COMBINE */
function getAll() {
  return [...teachers, ...institutes];
}

/* SEARCH HELPER */
function similar(a, b) {
  return (a || "").toLowerCase().includes((b || "").toLowerCase());
}

function isPublicProfile(profile) {
  return profile.publicVisible !== false &&
    profile.publicVisible !== "false";
}

function publicRankValue(profile) {
  const rank = Number(profile.publicRank);
  return Number.isFinite(rank) && rank > 0 ? rank : null;
}

function ratingInfo(profile) {
  const collection = profile.type === "Institution" ? "institutions" : "teachers";
  return ratingMap[collection + "/" + profile.id] || { avg: 0, count: 0 };
}

function sortPublicProfiles(list) {
  return [...list].sort((a, b) => {
    const aRank = publicRankValue(a);
    const bRank = publicRankValue(b);

    if (aRank !== null || bRank !== null) {
      if (aRank === null) return 1;
      if (bRank === null) return -1;
      if (aRank !== bRank) return aRank - bRank;
    }

    const ar = ratingInfo(a);
    const br = ratingInfo(b);

    if (br.avg !== ar.avg) return br.avg - ar.avg;
    if (br.count !== ar.count) return br.count - ar.count;

    return (a.name || "").localeCompare(b.name || "");
  });
}

/* MODE MATCH */
function modeMatch(modes, selectedMode) {
  if (!selectedMode) return true;
  return (modes || []).includes(selectedMode);
}

/* SPORT MATCH */
function sportMatch(subject, selectedSport) {
  if (!selectedSport) return true;

  if (!subject) return false;

  return (subject || "")
    .toLowerCase()
    .includes(selectedSport.toLowerCase());
}

/* =========================
   VIEW BUTTON HANDLER (UNIFIED)
========================= */

function showGuestAccessPopup(onLogin){
  const oldPopup = document.getElementById("guestAccessPopup");
  if(oldPopup) oldPopup.remove();

  const popup = document.createElement("div");
  popup.id = "guestAccessPopup";
  popup.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:18px;z-index:9999;";
  popup.innerHTML = `
    <div style="width:100%;max-width:430px;background:white;border-radius:16px;box-shadow:0 18px 45px rgba(0,0,0,.28);overflow:hidden;">
      <div style="background:#00897b;color:white;padding:18px 20px;">
        <h3 style="margin:0;font-size:20px;">Limited Access</h3>
      </div>
      <div style="padding:20px;">
        <p style="margin:0 0 12px;line-height:1.6;color:#333;font-size:14px;">
          You are using limited access. For complete access, please log in as a Teacher / Institution or Student / Parent.
        </p>
        <p style="margin:0 0 12px;line-height:1.6;color:#333;font-size:14px;">
          GURULINK is only a linking platform between students, parents, teachers, and institutions. GURULINK never shares or misuses your personal data.
        </p>
        <p style="margin:0;line-height:1.6;color:#333;font-size:14px;">
          After login, you and the teacher or institution can contact each other directly by phone call, WhatsApp, or chat.
        </p>
        <div style="display:flex;gap:10px;margin-top:18px;">
          <button type="button" id="guestCancelBtn" style="flex:1;width:auto;padding:12px;background:#eceff1;color:#263238;border:none;border-radius:10px;font-size:14px;">Cancel</button>
          <button type="button" id="guestLoginBtn" style="flex:1;width:auto;padding:12px;background:#00897b;color:white;border:none;border-radius:10px;font-size:14px;">Login Now</button>
        </div>
      </div>
    </div>
  `;

  document.body.appendChild(popup);
  document.getElementById("guestCancelBtn").onclick = () => popup.remove();
  document.getElementById("guestLoginBtn").onclick = () => {
    popup.remove();
    onLogin();
  };
}

function openProfileWithLogin(id){
  const viewerId =
    localStorage.getItem("uid") ||
    localStorage.getItem("profileId");

  const viewerRole =
    (localStorage.getItem("role") || "").toLowerCase();

  const profileUrl = "profile-view.html?id=" + id;

  if(!viewerId || viewerRole === "guest"){
    showGuestAccessPopup(() => {
      localStorage.removeItem("selectedRole");
      sessionStorage.setItem("postLoginRedirect", profileUrl);
      window.location.href =
        "otp-login.html?return=" + encodeURIComponent(profileUrl);
    });
    return;
  }

  window.location.href = profileUrl;
}

document.addEventListener("click", (e) => {

  const btn = e.target.closest(".view");
  if (!btn) return;

  const id = btn.dataset.id;

  openProfileWithLogin(id);
});

/* FILTER EVENTS */
document.getElementById("search").addEventListener("input", render);
document.getElementById("sportFilter").addEventListener("change", render);
document.getElementById("modeFilter").addEventListener("change", render);

/* =========================
   RENDER
========================= */

function render() {

  const all = getAll();

  const search = document.getElementById("search").value.trim().toLowerCase();
  const sport = document.getElementById("sportFilter").value;
  const mode = document.getElementById("modeFilter").value;

  const filtered = all.filter((x) => {

    const name = (x.name || "").toLowerCase();
    const location = (x.location || x.address || "").toLowerCase();

    /* SEARCH */
    if (search && !(similar(name, search) || similar(location, search))) {
      return false;
    }

    /* SPORT */
  const sportValue =
  Array.isArray(x.subjects)
    ? x.subjects.join(", ")
    : (x.subject || x.sport || "");

if (!sportMatch(sportValue, sport)) {
  return false;
}

    /* MODE */
    if (!modeMatch(x.teachingModes || x.modes, mode)) {
      return false;
    }

    return true;
  });

  const sorted = sortPublicProfiles(filtered);

  const grid = document.getElementById("grid");

  /* EMPTY */
  if (!sorted.length) {
    grid.innerHTML = `
      <div class="empty">
        No Sport Profiles Found
      </div>
    `;
    return;
  }

  /* CARDS */
  grid.innerHTML = sorted.map((x) => `

    <div class="card ${x.type.toLowerCase()}">

      <div class="top">

        <img
          class="photo"
          src="${x.photo || x.logo || 'https://via.placeholder.com/100'}"
        >

        <div>

          <h3>${x.name || "-"}</h3>

          <div class="badge">${x.type}</div>

          <div class="badge">${x.category || "sport"}</div>

        



		<div class="badge verify">
  ${
    x.verified === true ||
    x.status === "approved"
      ? "Verified"
      : "Not Verified"
  }
</div>
		  
		  
		  

        </div>

      </div>

      <div class="details">

        <b>Sport:</b>
${
  Array.isArray(x.subjects)
    ? x.subjects.join(", ")
    : (x.subject || x.sport || "-")
}
        <br>

        <b>Mode:</b>
        ${(x.teachingModes || x.modes || []).join(", ") || "-"}
        <br>

${x.type === "Teacher" ? `
<b>Experience:</b>
${x.experience || "-"} Years
<br>
` : `
<b>Established:</b>
${x.establishedDate || "-"}
<br>
`}


        <b>Location:</b>
        ${x.location || x.address || "-"}

      </div>

      <button
        class="btn view"
        data-id="${x.id}"
      >
        View Details
      </button>

    </div>

  `).join("");
}

</script>

</body>
</html>
