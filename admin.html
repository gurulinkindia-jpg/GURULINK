<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GURULINK Admin Panel</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#0d47a1;
color:white;
padding:15px;
text-align:center;
position:relative;
}

header h2{
margin:0;
}

.headerBtns{
position:absolute;
right:15px;
top:12px;
display:flex;
gap:8px;
}

.headerBtns button{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:12px;
color:white;
}

.homeBtn{background:#4caf50;}
.logoutBtn{background:#e53935;}

.container{
width:95%;
max-width:1400px;
margin:20px auto;
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:15px;
}

.card{
background:white;
padding:12px;
margin-bottom:12px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

img{
width:70px;
height:70px;
border-radius:8px;
object-fit:cover;
margin:5px 0;
}

button{
padding:6px 8px;
margin:3px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
font-size:12px;
}

.approve{background:green;}
.reject{background:red;}
.delete{background:#444;}
.view{background:#1565c0;}
.edit{background:#ff9800;}
.renew{background:#6a1b9a;}

.badge{
display:inline-block;
padding:4px 8px;
background:#eee;
border-radius:6px;
font-size:11px;
margin:3px;
}

.expired{background:red;color:white;}
.active{background:green;color:white;}
</style>
</head>

<body>

<header>
<h2>GURULINK ADMIN PANEL</h2>

<!-- ✅ NEW BUTTONS -->
<div class="headerBtns">
<button class="homeBtn" onclick="goHome()">Home</button>
<button class="logoutBtn" onclick="logout()">Logout</button>
</div>

</header>

<div class="container">

<div>
<h3>Teachers</h3>
<div id="teachers"></div>
</div>

<div>
<h3>Institutions</h3>
<div id="institutions"></div>
</div>

<div>
<h3>Payments</h3>
<div id="payments"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ADMIN CHECK */
if(localStorage.getItem("role") !== "admin"){
alert("Access Denied!");
window.location.href = "login.html";
}

/* ================= LOGOUT + HOME ================= */
window.logout = ()=>{
localStorage.removeItem("uid");
localStorage.removeItem("role");
window.location.href = "login.html";
};

window.goHome = ()=>{
window.location.href = "index.html";
};

/* ================= EVERYTHING ELSE SAME ================= */

function getExpiryInfo(approvedAt){
if(!approvedAt) return {days:"N/A", expired:false};
const diff = approvedAt + (366*24*60*60*1000) - Date.now();
return {
days: Math.max(0, Math.ceil(diff/(24*60*60*1000))),
expired: diff <= 0
};
}

/* Teachers */
function loadTeachers(){
onValue(ref(db,"teachers"),snap=>{
let html="";
snap.forEach(c=>{
let d=c.val(); let id=c.key;
const exp = getExpiryInfo(d.approvedAt);

html+=`
<div class="card">
<h3>${d.name || "No Name"}</h3>
<span class="badge">${d.status || "pending"}</span>

${d.approvedAt ? `
<span class="badge ${exp.expired ? "expired" : "active"}">
${exp.expired ? "EXPIRED" : "Days Left: " + exp.days}
</span>` : ""}

<p>${d.email||"-"}</p>
<p>${d.phone||"-"}</p>

<img src="${d.logo||d.photo||'https://via.placeholder.com/100'}">

<div>
<button class="approve" onclick="approveTeacher('${id}')">Approve</button>
<button class="reject" onclick="rejectTeacher('${id}')">Reject</button>
<button class="delete" onclick="deleteTeacher('${id}')">Delete</button>
<button class="edit" onclick="editTeacher('${id}')">Edit</button>
<button class="renew" onclick="renewTeacher('${id}')">Renew</button>
<button class="view" onclick="viewProfile('${id}','teacher')">View</button>
</div>
</div>`;
});
document.getElementById("teachers").innerHTML=html;
});
}

/* Institutions */
function loadInstitutions(){
onValue(ref(db,"institutions"),snap=>{
let html="";
snap.forEach(c=>{
let d=c.val(); let id=c.key;
const exp = getExpiryInfo(d.approvedAt);

html+=`
<div class="card">
<h3>${d.name||"No Name"}</h3>
<span class="badge">${d.status||"pending"}</span>

${d.approvedAt ? `
<span class="badge ${exp.expired ? "expired" : "active"}">
${exp.expired ? "EXPIRED" : "Days Left: " + exp.days}
</span>` : ""}

<p>${d.email||"-"}</p>
<p>${d.phone||"-"}</p>

<img src="${d.logo||d.photo||'https://via.placeholder.com/100'}">

<div>
<button class="approve" onclick="approveInst('${id}')">Approve</button>
<button class="reject" onclick="rejectInst('${id}')">Reject</button>
<button class="delete" onclick="deleteInst('${id}')">Delete</button>
<button class="edit" onclick="editInst('${id}')">Edit</button>
<button class="renew" onclick="renewInst('${id}')">Renew</button>
<button class="view" onclick="viewProfile('${id}','institution')">View</button>
</div>
</div>`;
});
document.getElementById("institutions").innerHTML=html;
});
}

/* Payments */
function loadPayments(){
onValue(ref(db,"payments"),snap=>{
let html="";
snap.forEach(c=>{
let d=c.val(); let id=c.key;

html+=`
<div class="card">
<h3>Payment</h3>
<p>${d.name||"-"}</p>
<p>${d.phone||"-"}</p>
<p>₹${d.amount||0}</p>
<p>${d.status||"pending"}</p>
<button class="delete" onclick="deletePayment('${id}')">Delete</button>
</div>`;
});
document.getElementById("payments").innerHTML=html;
});
}

/* ACTIONS (UNCHANGED) */
window.approveTeacher=async(id)=>{
await update(ref(db,"teachers/"+id),{status:"approved",approvedAt:Date.now()});
};
window.rejectTeacher=async(id)=>{
await update(ref(db,"teachers/"+id),{status:"rejected"});
};
window.deleteTeacher=async(id)=>{
await remove(ref(db,"teachers/"+id));
};
window.approveInst=async(id)=>{
await update(ref(db,"institutions/"+id),{status:"approved",approvedAt:Date.now()});
};
window.rejectInst=async(id)=>{
await update(ref(db,"institutions/"+id),{status:"rejected"});
};
window.deleteInst=async(id)=>{
await remove(ref(db,"institutions/"+id));
};
window.deletePayment=async(id)=>{
await remove(ref(db,"payments/"+id));
};

window.renewTeacher=async(id)=>{
await update(ref(db,"teachers/"+id),{approvedAt:Date.now(),status:"approved"});
};
window.renewInst=async(id)=>{
await update(ref(db,"institutions/"+id),{approvedAt:Date.now(),status:"approved"});
};

window.viewProfile=(id,type)=>{
window.open("profile-view.html?id="+id+"&type="+type);
};

loadTeachers();
loadInstitutions();
loadPayments();

</script>

</body>
</html>
