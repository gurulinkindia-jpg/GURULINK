<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GURULINK Admin Panel</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#0d47a1;
color:white;
padding:12px;
text-align:center;
}

.header-actions{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 15px;
background:#1565c0;
color:white;
}

.header-actions button{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
margin-left:5px;
}

.container{
width:95%;
max-width:1400px;
margin:20px auto;
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:15px;
}

.card{
background:white;
padding:12px;
margin-bottom:12px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

img{
width:70px;
height:70px;
border-radius:8px;
object-fit:cover;
margin:5px 0;
}

button{
padding:6px 8px;
margin:3px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
font-size:12px;
}

.approve{background:green;}
.reject{background:red;}
.delete{background:#444;}
.view{background:#1565c0;}
.edit{background:#ff9800;}
.renew{background:#9c27b0;}

.badge{
display:inline-block;
padding:4px 8px;
background:#eee;
border-radius:6px;
font-size:11px;
margin:3px;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
padding:10px;
max-width:1400px;
margin:auto;
}

.stat{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<header>
<h2>GURULINK ADMIN PANEL</h2>
</header>

<div class="header-actions">
<div>
<button onclick="location.href='index.html'">Home</button>
<button onclick="logout()">Logout</button>
</div>

<input id="search" placeholder="Search name / email / phone" oninput="renderAll()">

</div>

<!-- STATS -->
<div class="stats">
<div class="stat">Teachers: <span id="tCount">0</span></div>
<div class="stat">Institutes: <span id="iCount">0</span></div>
<div class="stat">Academic: <span id="aCount">0</span></div>
<div class="stat">Skill: <span id="sCount">0</span></div>
<div class="stat">Sport: <span id="spCount">0</span></div>
<div class="stat">Creative: <span id="cCount">0</span></div>
<div class="stat">Payments ₹: <span id="pTotal">0</span></div>
</div>

<div class="container">

<div>
<h3>Teachers</h3>
<div id="teachers"></div>
</div>

<div>
<h3>Institutions</h3>
<div id="institutions"></div>
</div>

<div>
<h3>Payments</h3>
<div id="payments"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ADMIN CHECK */
if(localStorage.getItem("role") !== "admin"){
alert("Access Denied!");
window.location.href = "login.html";
}

/* DATA */
let teachers=[], inst=[], payments=[];

/* DAYS */
function isExpired(t){
if(!t) return false;
return Date.now() > t + (365*24*60*60*1000);
}

function remainingDays(t){
if(!t) return "-";
let diff = (t + 365*24*60*60*1000) - Date.now();
return Math.max(0, Math.ceil(diff / (1000*60*60*24)));
}

/* LOAD */
function loadTeachers(){
onValue(ref(db,"teachers"),snap=>{
teachers=[];
let html="";

snap.forEach(c=>{
let d=c.val();
d.id=c.key;
teachers.push(d);

html+=card(d,"teacher");
});

document.getElementById("teachers").innerHTML=html;
renderStats();
});
}

function loadInstitutions(){
onValue(ref(db,"institutions"),snap=>{
inst=[];
let html="";

snap.forEach(c=>{
let d=c.val();
d.id=c.key;
inst.push(d);

html+=card(d,"institution");
});

document.getElementById("institutions").innerHTML=html;
renderStats();
});
}

function loadPayments(){
onValue(ref(db,"payments"),snap=>{
payments=[];
let html="";
let total=0;

snap.forEach(c=>{
let d=c.val();
payments.push(d);

total += Number(d.amount||0);

html+=`
<div class="card">
<h4>${d.name||"-"}</h4>
<p>${d.phone||"-"}</p>
<p>₹${d.amount||0}</p>
<p>${d.status||"pending"}</p>
<button class="delete" onclick="deletePayment('${c.key}')">Delete</button>
</div>
`;
});

document.getElementById("payments").innerHTML=html;
document.getElementById("pTotal").innerText=total;

renderStats();
});
}

/* CARD */
function card(d,type){

let expired = isExpired(d.approvedAt);
let rem = remainingDays(d.approvedAt);

let cat = (d.category||"").toLowerCase();

return `
<div class="card">

<h3>${d.name||"-"}</h3>

<span class="badge">${d.status||"pending"}</span>
<span class="badge">${cat}</span>

<p>Email: ${d.email||"-"}</p>
<p>Phone: ${d.phone||"-"}</p>

<p>Days left: ${rem}</p>
${expired?`<span class="badge" style="background:red;color:white">EXPIRED</span>`:""}

<img src="${d.photo||d.logo||d.idProof||'https://via.placeholder.com/100'}">

<button class="approve" onclick="approve('${type}','${d.id}')">Approve</button>
<button class="reject" onclick="reject('${type}','${d.id}')">Reject</button>
<button class="delete" onclick="del('${type}','${d.id}')">Delete</button>
<button class="renew" onclick="renew('${type}','${d.id}')">Renew</button>
<button class="edit" onclick="edit('${type}','${d.id}')">Edit</button>

</div>
`;
}

/* ACTIONS */
window.approve=(type,id)=>{
update(ref(db,`${type}s/${id}`),{
status:"approved",
approvedAt:Date.now()
});
};

window.reject=(type,id)=>{
update(ref(db,`${type}s/${id}`),{status:"rejected"});
};

window.del=(type,id)=>{
remove(ref(db,`${type}s/${id}`));
};

window.renew=(type,id)=>{
update(ref(db,`${type}s/${id}`),{
approvedAt:Date.now(),
status:"approved"
});
};

/* SEARCH + STATS */
window.renderAll=function(){

let q=(document.getElementById("search").value||"").toLowerCase();

function match(d){
return (
(d.name||"").toLowerCase().includes(q) ||
(d.email||"").toLowerCase().includes(q) ||
(d.phone||"").toLowerCase().includes(q)
);
}

document.getElementById("teachers").innerHTML =
teachers.filter(match).map(d=>card(d,"teacher")).join("");

document.getElementById("institutions").innerHTML =
inst.filter(match).map(d=>card(d,"institution")).join("");

};

/* STATS */
function renderStats(){

let count = (arr,cat)=>
arr.filter(x=>(x.category||"").toLowerCase()===cat).length;

document.getElementById("tCount").innerText=teachers.length;
document.getElementById("iCount").innerText=inst.length;

document.getElementById("aCount").innerText =
count([...teachers,...inst],"academic");

document.getElementById("sCount").innerText =
count([...teachers,...inst],"skill");

document.getElementById("spCount").innerText =
count([...teachers,...inst],"sport");

document.getElementById("cCount").innerText =
count([...teachers,...inst],"creative");

}

/* LOGOUT */
window.logout=()=>{
localStorage.clear();
window.location.href="login.html";
};

/* INIT */
loadTeachers();
loadInstitutions();
loadPayments();

</script>

</body>
</html>
