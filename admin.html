<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GURULINK Admin Panel</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#0d47a1;
color:#fff;
padding:18px;
text-align:center;
}

.container{
width:95%;
max-width:1500px;
margin:auto;
padding:20px;
}

.search{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin:15px 0;
}

.card{
background:#fff;
padding:15px;
margin-top:15px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.top{
display:flex;
gap:15px;
align-items:center;
}

.photo{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
border:2px solid #0d47a1;
}

.gallery{
display:flex;
gap:8px;
overflow:auto;
margin-top:10px;
}

.gallery img{
width:70px;
height:70px;
object-fit:cover;
border-radius:10px;
}

.badge{
padding:4px 10px;
border-radius:20px;
font-size:12px;
color:#fff;
}

.verify{background:green;}
.pending{background:orange;}

button{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
margin:4px;
color:#fff;
}

.approve{background:green;}
.delete{background:red;}
.edit{background:#0d47a1;}

.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.6);
}

.modal-box{
background:#fff;
width:90%;
max-width:700px;
margin:40px auto;
padding:20px;
border-radius:12px;
max-height:90vh;
overflow:auto;
}

input,textarea,select{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;
}

.small-img{
width:60px;height:60px;
object-fit:cover;
margin:3px;
border-radius:8px;
}
</style>
</head>

<body>

<header>
<h2>GURULINK ADMIN PANEL (FULL EDIT MODE)</h2>
</header>

<div class="container">

<input id="search" class="search" placeholder="Search teachers / institutions">

<h3>Teachers</h3>
<div id="teachers"></div>

<h3>Institutions</h3>
<div id="institutions"></div>

</div>

<!-- ================= EDIT MODAL ================= -->
<div class="modal" id="editModal">
<div class="modal-box">

<h3>Edit Data</h3>

<div id="editForm"></div>

<button onclick="saveEdit()" style="background:green">Save</button>
<button onclick="closeModal()" style="background:red">Close</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getDatabase, ref, onValue,
update, remove, get, child
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* CURRENT EDIT */
let editId = null;
let editType = null;

/* ================= LOAD TEACHERS ================= */
onValue(ref(db,"teachers"),snap=>{
let html="";

snap.forEach(c=>{
let t=c.val();

html+=`
<div class="card">

<div class="top">
<img class="photo" src="${t.photo||''}">
<div>
<h3>${t.name||""}</h3>
<span class="badge ${t.status==='approved'?'verify':'pending'}">${t.status||'pending'}</span>
</div>
</div>

<p><b>Phone:</b> ${t.phone||""}</p>
<p><b>Email:</b> ${t.email||""}</p>
<p><b>Skills:</b> ${(t.skills||[]).join(", ")}</p>
<p><b>Location:</b> ${t.location||""}</p>

<p><b>Fees:</b>
Ind: ₹${t.individualFee||0},
Home: ₹${t.homeFee||0},
Group: ₹${t.groupFee||0}
</p>

<p><b>ID Type:</b> ${t.idType||""}</p>

<div class="gallery">
${(t.gallery||[]).map(i=>`<img src="${i}">`).join("")}
</div>

<div class="gallery">
<img class="small-img" src="${t.idProof||''}">
</div>

<button class="approve" onclick="approve('teachers','${c.key}')">Approve</button>
<button class="edit" onclick="edit('teachers','${c.key}')">Edit</button>
<button class="delete" onclick="del('teachers','${c.key}')">Delete</button>

</div>
`;
});

document.getElementById("teachers").innerHTML = html;
});


/* ================= LOAD INSTITUTIONS ================= */
onValue(ref(db,"institutions"),snap=>{
let html="";

snap.forEach(c=>{
let t=c.val();

html+=`
<div class="card">

<h3>${t.name||""}</h3>
<p><b>Sport:</b> ${t.sport||""}</p>
<p><b>Phone:</b> ${t.phone||""}</p>
<p><b>Address:</b> ${t.address||""}</p>

<div class="gallery">
<img class="small-img" src="${t.logo||''}">
</div>

<div class="gallery">
${(t.gallery||[]).map(i=>`<img src="${i}">`).join("")}
</div>

<button class="approve" onclick="approve('institutions','${c.key}')">Approve</button>
<button class="edit" onclick="edit('institutions','${c.key}')">Edit</button>
<button class="delete" onclick="del('institutions','${c.key}')">Delete</button>

</div>
`;
});

document.getElementById("institutions").innerHTML = html;
});


/* ================= ACTIONS ================= */

window.approve=(type,id)=>{
update(ref(db,`${type}/${id}`),{status:"approved"});
};

window.del=(type,id)=>{
if(confirm("Delete?")){
remove(ref(db,`${type}/${id}`));
}
};


/* ================= EDIT ================= */

window.edit=async(type,id)=>{
editId=id;
editType=type;

const snap = await get(child(ref(db),`${type}/${id}`));
const data = snap.val();

let form="";

for(let key in data){
if(typeof data[key]==="string"||typeof data[key]==="number"){
form+=`
<label>${key}</label>
<input id="f_${key}" value="${data[key]||""}">
`;
}
}

document.getElementById("editForm").innerHTML=form;
document.getElementById("editModal").style.display="block";
};

window.closeModal=()=>{
document.getElementById("editModal").style.display="none";
};

window.saveEdit=async()=>{

let updates={};

document.querySelectorAll("#editForm input").forEach(inp=>{
let key=inp.id.replace("f_","");
updates[key]=inp.value;
});

await update(ref(db,`${editType}/${editId}`),updates);

closeModal();
alert("Updated!");
};

</script>

</body>
</html>
