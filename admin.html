<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GURULINK Admin Panel</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#0d47a1;
color:white;
padding:15px;
text-align:center;
}

.searchBox{
width:95%;
max-width:1400px;
margin:10px auto;
display:flex;
gap:10px;
}

.searchBox input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
outline:none;
}

.container{
width:95%;
max-width:1400px;
margin:20px auto;
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:15px;
}

.card{
background:white;
padding:12px;
margin-bottom:12px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

img{
width:70px;
height:70px;
border-radius:8px;
object-fit:cover;
margin:5px 0;
}

button{
padding:6px 8px;
margin:3px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
font-size:12px;
}

.approve{background:green;}
.reject{background:red;}
.delete{background:#444;}
.view{background:#1565c0;}
.edit{background:#ff9800;}

.badge{
display:inline-block;
padding:4px 8px;
background:#eee;
border-radius:6px;
font-size:11px;
margin:3px;
}
.expired{
background:red;
color:white;
}
.active{
background:green;
color:white;
}
</style>
</head>

<body>

<header>
<h2>GURULINK ADMIN PANEL</h2>
</header>

<!-- 🔍 SEARCH FILTER -->
<div class="searchBox">
<input id="search" placeholder="Search by name / email / phone">
</div>

<div class="container">

<div>
<h3>Teachers</h3>
<div id="teachers"></div>
</div>

<div>
<h3>Institutions</h3>
<div id="institutions"></div>
</div>

<div>
<h3>Payments</h3>
<div id="payments"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ADMIN CHECK */
if(localStorage.getItem("role") !== "admin"){
alert("Access Denied!");
window.location.href = "login.html";
}

/* EXPIRY */
function isExpired(time){
if(!time) return false;
return Date.now() > time + (366*24*60*60*1000);
}

/* SEARCH */
document.getElementById("search").addEventListener("input",render);

let teachersData = [];
let instData = [];

/* ================= TEACHERS ================= */
function loadTeachers(){
onValue(ref(db,"teachers"),snap=>{

teachersData = [];

snap.forEach(c=>{
let d=c.val();
let id=c.key;
teachersData.push({id,...d});
});

render();
});
}

/* ================= INSTITUTIONS ================= */
function loadInstitutions(){
onValue(ref(db,"institutions"),snap=>{

instData = [];

snap.forEach(c=>{
let d=c.val();
let id=c.key;
instData.push({id,...d});
});

render();
});
}

/* ================= FILTER + RENDER ================= */
function render(){

let search = document.getElementById("search").value.toLowerCase();

function match(x){
return (
(x.name||"").toLowerCase().includes(search) ||
(x.email||"").toLowerCase().includes(search) ||
(x.phone||"").toLowerCase().includes(search)
);
}

/* ===== TEACHERS ===== */
document.getElementById("teachers").innerHTML =
teachersData.filter(match).map(d=>{

let expired = isExpired(d.approvedAt);

return `
<div class="card">

<h3>${d.name||"No Name"}</h3>

<span class="badge">${d.status||"pending"}</span>
<span class="badge ${expired ? "expired":"active"}">
${expired ? "EXPIRED" : "ACTIVE"}
</span>

<p>${d.email||"-"}</p>
<p>${d.phone||"-"}</p>

<img src="${d.photo||d.logo||d.idProof||'https://via.placeholder.com/100'}">

<div>
<button class="approve" onclick="approveTeacher('${d.id}')">Approve</button>
<button class="reject" onclick="rejectTeacher('${d.id}')">Reject</button>
<button class="delete" onclick="deleteTeacher('${d.id}')">Delete</button>
<button class="edit" onclick="editTeacher('${d.id}')">Edit</button>
<button class="view" onclick="viewProfile('${d.id}','teacher')">View</button>
</div>

</div>`;
}).join("");

/* ===== INSTITUTIONS ===== */
document.getElementById("institutions").innerHTML =
instData.filter(match).map(d=>{

let expired = isExpired(d.approvedAt);

return `
<div class="card">

<h3>${d.name||"No Name"}</h3>

<span class="badge">${d.status||"pending"}</span>
<span class="badge ${expired ? "expired":"active"}">
${expired ? "EXPIRED" : "ACTIVE"}
</span>

<p>${d.email||"-"}</p>
<p>${d.phone||"-"}</p>

<img src="${d.logo||d.photo||'https://via.placeholder.com/100'}">

<div>
<button class="approve" onclick="approveInst('${d.id}')">Approve</button>
<button class="reject" onclick="rejectInst('${d.id}')">Reject</button>
<button class="delete" onclick="deleteInst('${d.id}')">Delete</button>
<button class="edit" onclick="editInst('${d.id}')">Edit</button>
<button class="view" onclick="viewProfile('${d.id}','institution')">View</button>
</div>

</div>`;
}).join("");

}

/* ================= PAYMENTS ================= */
function loadPayments(){
onValue(ref(db,"payments"),snap=>{

let html="";

snap.forEach(c=>{
let d=c.val();

html+=`
<div class="card">

<h3>Payment</h3>

<p><b>Name:</b> ${d.name||"-"}</p>
<p><b>Phone:</b> ${d.phone||"-"}</p>
<p><b>Amount:</b> ₹${d.amount||0}</p>
<p><b>Status:</b> ${d.status||"pending"}</p>

<button class="delete" onclick="deletePayment('${c.key}')">Delete</button>

</div>`;
});

document.getElementById("payments").innerHTML=html;
});
}

/* ACTIONS */
window.approveTeacher=(id)=>{
update(ref(db,"teachers/"+id),{status:"approved",approvedAt:Date.now()});
};

window.rejectTeacher=(id)=>{
update(ref(db,"teachers/"+id),{status:"rejected"});
};

window.deleteTeacher=(id)=>{
remove(ref(db,"teachers/"+id));
};

window.approveInst=(id)=>{
update(ref(db,"institutions/"+id),{status:"approved",approvedAt:Date.now()});
};

window.rejectInst=(id)=>{
update(ref(db,"institutions/"+id),{status:"rejected"});
};

window.deleteInst=(id)=>{
remove(ref(db,"institutions/"+id));
};

window.deletePayment=(id)=>{
remove(ref(db,"payments/"+id));
};

window.editTeacher=(id)=>{
let n=prompt("Name");
let p=prompt("Phone");
let s=prompt("Subject");
let l=prompt("Location");
update(ref(db,"teachers/"+id),{name:n,phone:p,subjects:s,location:l});
};

window.editInst=(id)=>{
let n=prompt("Name");
let p=prompt("Phone");
let l=prompt("Location");
update(ref(db,"institutions/"+id),{name:n,phone:p,location:l});
};

window.viewProfile=(id,type)=>{
window.open("profile-view.html?id="+id+"&type="+type);
};

/* INIT */
loadTeachers();
loadInstitutions();
loadPayments();

</script>

</body>
</html>
