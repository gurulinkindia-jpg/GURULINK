let teachers=[];
let inst=[];
let students=[];
let payments=[];
let renewPayments=[];
function expired(t){

return t &&
Date.now() >
t + (365*24*60*60*1000);

}

function remain(t){

if(!t) return "-";

return Math.max(
0,
Math.ceil(
(
t + (365*24*60*60*1000)
-
Date.now()
)
/86400000
)
);

}

function isProfilePublic(d){

return d.publicVisible !== false &&
d.publicVisible !== "false";

}

function publicRankValue(d){

const rank =
Number(d.publicRank);

return Number.isFinite(rank) &&
rank > 0
?
rank
:
null;

}

function sortAdminProfiles(list){

return [...list].sort((a,b)=>{

const aHidden =
isProfilePublic(a) ? 0 : 1;

const bHidden =
isProfilePublic(b) ? 0 : 1;

if(aHidden !== bHidden){
return aHidden - bHidden;
}

const aRank =
publicRankValue(a);

const bRank =
publicRankValue(b);

if(
aRank !== null ||
bRank !== null
){
if(aRank === null) return 1;
if(bRank === null) return -1;
if(aRank !== bRank) return aRank - bRank;
}

const aApproved =
Number(a.approvedAt || 0);

const bApproved =
Number(b.approvedAt || 0);

if(bApproved !== aApproved){
return bApproved - aApproved;
}

return (a.name || "")
.localeCompare(b.name || "");

});

}

window.savePublicSettings =
async function(type,id){

const visibleEl =
document.getElementById(
`publicVisible_${type}_${id}`
);

const rankEl =
document.getElementById(
`publicRank_${type}_${id}`
);

if(!visibleEl || !rankEl){
alert("Public controls not found.");
return;
}

const visible =
visibleEl.checked;

const rawRank =
rankEl.value.trim();

let rankValue = null;

if(rawRank !== ""){

const parsed =
parseInt(rawRank,10);

if(
!Number.isFinite(parsed) ||
parsed < 1
){
alert("Public rank must be 1 or higher.");
return;
}

rankValue = parsed;
}

try{

await update(
ref(db,`${type}s/${id}`),
{
publicVisible:visible,
publicRank:
rankValue === null
?
null
:
rankValue
}
);

alert(
"Public profile settings saved."
);

}
catch(err){

console.log(err);
alert(
"Unable to save public profile settings."
);

}

};

/* =========================
   RENEW MEMBERSHIP
========================= */

window.renew = async function(type,id){

  if(!confirm("Approve renewal for this membership?")){
    return;
  }

  const ONE_DAY = 24 * 60 * 60 * 1000;
  const SUB_DAYS = 366;
  const SUB_TIME = SUB_DAYS * ONE_DAY;
  const now = Date.now();

  const path = `${type}s/${id}`;

  const snap = await get(ref(db, path));

  if(!snap.exists()){
    alert("Profile not found");
    return;
  }

  const d = snap.val();

  const oldApprovedAt = Number(d.approvedAt || 0);
  const oldExpiry = oldApprovedAt + SUB_TIME;

  let newApprovedAt;

  if(oldApprovedAt && oldExpiry > now){
    newApprovedAt = oldExpiry; // remaining days + 366
  }else{
    newApprovedAt = now; // expired = fresh 366 days
  }

  await update(ref(db, path), {
    approvedAt: newApprovedAt,
    renewalStatus:"active",
    lastRenewalDate:now,
    status:"approved"
  });

  alert("Renewal approved successfully");
};

/* =========================
   INVOICE FEATURE ACCESS
========================= */

window.setInvoiceFeature = async function(type,id,active){

  const message = active
    ? "Activate Create Invoice for this profile after Rs.1500 payment?"
    : "Disable Create Invoice for this profile?";

  if(!confirm(message)){
    return;
  }

  const now = Date.now();

  await update(
    ref(db,`${type}s/${id}`),
    {
      invoiceFeatureActive: active,
      invoiceFeatureAmount: active ? 1500 : null,
      invoiceFeatureActivatedAt: active ? now : null,
      invoiceFeatureDisabledAt: active ? null : now
    }
  );

  alert(active ? "Invoice feature activated." : "Invoice feature disabled.");

};

/* =========================

========================= */

window.approveRenewalFromPayment =
async function(paymentId, profileId, type){

  if(!confirm("Approve this renewal payment?")){
    return;
  }

  try{

    const profilePath =
      type === "institution"
      ? `institutions/${profileId}`
      : `teachers/${profileId}`;

    const snap =
      await get(ref(db, profilePath));

    if(!snap.exists()){
      alert("Profile not found");
      return;
    }

    const profile = snap.val();

    const ONE_DAY =
      24 * 60 * 60 * 1000;

    const MEMBERSHIP_DAYS = 366;

    const MEMBERSHIP_TIME =
      MEMBERSHIP_DAYS * ONE_DAY;

    const now = Date.now();

    const oldApprovedAt =
      Number(profile.approvedAt || 0);

    const oldExpiry =
      oldApprovedAt + MEMBERSHIP_TIME;

    let newApprovedAt;

    if(
      oldApprovedAt &&
      oldExpiry > now
    ){
      // add renewal after current expiry
      newApprovedAt = oldExpiry;
    }else{
      // expired membership
      newApprovedAt = now;
    }

    await update(
      ref(db, profilePath),
      {
        approvedAt:newApprovedAt,
        status:"approved",
        renewalStatus:"active",
        lastRenewalDate:now
      }
    );

    await update(
      ref(db, "payment2/" + paymentId),
      {
        status:"approved",
        approvedAt:now
      }
    );

    alert("Renewal approved successfully");

  }catch(err){

    console.error(err);

    alert(
      "Renewal approval failed"
    );

  }

};

.getElementById(

.toLowerCase()

===

cat

).length;

}

function studentCard(d){

return `

student
</span>

${d.class ? `<span class="badge">${d.class}</span>` : ""}

<br><br>

<p>
<b>Email:</b>
${d.email || "-"}
</p>

<p>
<b>Phone:</b>
${d.phone || "-"}
</p>

<p>
<b>Parent:</b>
${d.parentName || "-"}
</p>

<p>
<b>Address:</b>
${d.address || d.area || d.pinCode ? `${d.address || ""}${d.area ? " / " + d.area : ""}${d.pinCode ? " - " + d.pinCode : ""}`.trim() : "-"}
</p>

<br>

<button
class="delete"
onclick="delStudent('${d.id}')">

class="edit"

}

snap=>{

snap.forEach(c=>{

});

document
.getElementById(
"students"
).innerHTML = html;

});

}

},800);

}

const adminSnap =
await get(ref(db,"admins/" + user.uid));

localStorage.clear();
showAdminMessage("Access denied. This account is not an admin.");
return;
}

localStorage.setItem("uid",user.uid);
localStorage.setItem("profileId",user.uid);
localStorage.setItem("role","admin");

startAdminPanel();

});
