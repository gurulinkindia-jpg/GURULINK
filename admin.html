<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Edit Full Form</title>

<style>
body{
font-family:Arial;
background:#eef2f7;
margin:0;
}

.container{
width:90%;
max-width:800px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
}

input,select,textarea{
width:100%;
padding:10px;
margin:8px 0;
}

button{
padding:12px;
background:#0d47a1;
color:white;
border:none;
width:100%;
}
</style>
</head>

<body>

<div class="container">

<h2>Edit Full Profile</h2>

<form id="editForm">

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<input id="qualification" placeholder="Qualification">
<input id="experience" placeholder="Experience">

<textarea id="description" placeholder="Description"></textarea>

<button type="submit">SAVE CHANGES</button>

</form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getDatabase,
ref,
get,
update
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSyBK0Q...",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7"
});

const db = getDatabase(app);

// GET URL DATA
const params = new URLSearchParams(window.location.search);
const type = params.get("type");
const id = params.get("id");

// LOAD DATA
async function loadData(){
const snap = await get(ref(db, `${type}s/${id}`));

if(snap.exists()){
const data = snap.val();

document.getElementById("name").value = data.name || "";
document.getElementById("phone").value = data.phone || "";
document.getElementById("email").value = data.email || "";
document.getElementById("qualification").value = data.qualification || "";
document.getElementById("experience").value = data.experience || "";
document.getElementById("description").value = data.description || "";
}
}

loadData();

// SAVE DATA
document.getElementById("editForm").addEventListener("submit", async (e)=>{
e.preventDefault();

await update(ref(db, `${type}s/${id}`), {
name: name.value,
phone: phone.value,
email: email.value,
qualification: qualification.value,
experience: experience.value,
description: description.value
});

alert("Updated Successfully");
window.location.href = "admin.html";
});

</script>

</body>
</html>
