<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GURULINK Admin Panel</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#0d47a1;
color:white;
padding:12px;
text-align:center;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 15px;
background:#1565c0;
color:white;
}

.topbar button{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
margin-left:5px;
}

.topbar input{
width:250px;
padding:6px;
border-radius:6px;
border:none;
outline:none;
}

.stats{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
padding:10px;
}

.stat{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
font-size:13px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.container{
width:95%;
max-width:1400px;
margin:10px auto;
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:15px;
}

.card{
background:white;
padding:12px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
margin-bottom:10px;
}

img{
width:70px;
height:70px;
border-radius:8px;
object-fit:cover;
margin:5px 0;
}

button{
padding:5px 7px;
margin:3px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
font-size:11px;
}

.approve{background:green;}
.reject{background:red;}
.delete{background:#444;}
.view{background:#1565c0;}
.edit{background:#ff9800;}
.renew{background:#8e24aa;}

.badge{
display:inline-block;
padding:3px 6px;
background:#eee;
border-radius:6px;
font-size:10px;
margin:2px;
}
</style>
</head>

<body>

<header>
<h2>GURULINK ADMIN PANEL</h2>
</header>

<div class="topbar">

<div>
<button onclick="location.href='index.html'">Home</button>
<button onclick="logout()">Logout</button>
</div>

<input id="search" placeholder="Search name / email / phone" oninput="renderAll()">

</div>

<!-- STATS -->
<div class="stats">
<div class="stat">Teachers <div id="tCount">0</div></div>
<div class="stat">Institutes <div id="iCount">0</div></div>
<div class="stat">Academic <div id="aCount">0</div></div>
<div class="stat">Skill <div id="sCount">0</div></div>
<div class="stat">Sport <div id="spCount">0</div></div>
<div class="stat">Creative <div id="cCount">0</div></div>
<div class="stat">Payments ₹ <div id="pTotal">0</div></div>
</div>

<div class="container">

<div>
<h3>Teachers</h3>
<div id="teachers"></div>
</div>

<div>
<h3>Institutions</h3>
<div id="institutions"></div>
</div>

<div>
<h3>Payments</h3>
<div id="payments"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ADMIN CHECK */
if(localStorage.getItem("role") !== "admin"){
alert("Access Denied!");
location.href="login.html";
}

/* DATA */
let teachers=[], inst=[], payments=[];

/* VALIDITY */
function expired(t){
return t && Date.now() > t + (365*24*60*60*1000);
}

function remain(t){
if(!t) return "-";
return Math.max(0,Math.ceil((t+(365*24*60*60*1000)-Date.now())/86400000));
}

/* LOAD TEACHERS */
function loadTeachers(){
onValue(ref(db,"teachers"),snap=>{
teachers=[];
let html="";

snap.forEach(c=>{
let d=c.val();
d.id=c.key;
teachers.push(d);

html+=card(d,"teacher");
});

document.getElementById("teachers").innerHTML=html;
updateStats();
});
}

/* LOAD INSTITUTIONS */
function loadInstitutions(){
onValue(ref(db,"institutions"),snap=>{
inst=[];
let html="";

snap.forEach(c=>{
let d=c.val();
d.id=c.key;
inst.push(d);

html+=card(d,"institution");
});

document.getElementById("institutions").innerHTML=html;
updateStats();
});
}

/* LOAD PAYMENTS */
function loadPayments(){
onValue(ref(db,"payments"),snap=>{
payments=[];
let html="";
let total=0;

snap.forEach(c=>{
let d=c.val();
payments.push(d);

total+=Number(d.amount||0);

html+=`
<div class="card">
<h4>${d.name||"-"}</h4>
<p>${d.phone||"-"}</p>
<p>₹${d.amount||0}</p>
<p>${d.status||"pending"}</p>
<button class="delete" onclick="delPay('${c.key}')">Delete</button>
</div>
`;
});

document.getElementById("payments").innerHTML=html;
document.getElementById("pTotal").innerText=total;

updateStats();
});
}

/* CARD */
function card(d,type){

let exp = expired(d.approvedAt);
let rem = remain(d.approvedAt);

return `
<div class="card">

<h3>${d.name||"-"}</h3>

<span class="badge">${d.status||"pending"}</span>
<span class="badge">${d.category||"-"}</span>

<p>Email: ${d.email||"-"}</p>
<p>Phone: ${d.phone||"-"}</p>
<p>Days: ${rem}</p>

${exp?`<span class="badge" style="background:red;color:white">EXPIRED</span>`:""}

<img src="${d.photo||d.logo||d.idProof||'https://via.placeholder.com/100'}">

<button class="approve" onclick="approve('${type}','${d.id}')">Approve</button>
<button class="reject" onclick="reject('${type}','${d.id}')">Reject</button>
<button class="delete" onclick="del('${type}','${d.id}')">Delete</button>
<button class="renew" onclick="renew('${type}','${d.id}')">Renew</button>
<button class="edit" onclick="edit('${type}','${d.id}')">Edit</button>

</div>
`;
}

/* ACTIONS */
window.approve=(t,id)=>update(ref(db,`${t}s/${id}`),{status:"approved",approvedAt:Date.now()});
window.reject=(t,id)=>update(ref(db,`${t}s/${id}`),{status:"rejected"});
window.del=(t,id)=>remove(ref(db,`${t}s/${id}`));
window.renew=(t,id)=>update(ref(db,`${t}s/${id}`),{approvedAt:Date.now(),status:"approved"});

/* SEARCH (FIXED) */
window.renderAll=function(){
let q=document.getElementById("search").value.toLowerCase();

function match(x){
return (
(x.name||"").toLowerCase().includes(q) ||
(x.email||"").toLowerCase().includes(q) ||
(x.phone||"").toLowerCase().includes(q)
);
}

document.getElementById("teachers").innerHTML =
teachers.filter(match).map(d=>card(d,"teacher")).join("");

document.getElementById("institutions").innerHTML =
inst.filter(match).map(d=>card(d,"institution")).join("");
};

/* PAY DELETE */
window.delPay=(id)=>remove(ref(db,"payments/"+id));

/* STATS */
function updateStats(){

document.getElementById("tCount").innerText=teachers.length;
document.getElementById("iCount").innerText=inst.length;

let all=[...teachers,...inst];

function c(cat){
return all.filter(x=>(x.category||"").toLowerCase()===cat).length;
}

document.getElementById("aCount").innerText=c("academic");
document.getElementById("sCount").innerText=c("skill");
document.getElementById("spCount").innerText=c("sport");
document.getElementById("cCount").innerText=c("creative");
}

/* LOGOUT */
window.logout=()=>{
localStorage.clear();
location.href="login.html";
};

/* INIT */
loadTeachers();
loadInstitutions();
loadPayments();

</script>

</body>
</html>
