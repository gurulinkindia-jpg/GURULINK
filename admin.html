<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>GURULINK Admin</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#0d47a1;
color:white;
padding:15px;
text-align:center;
}

.container{
padding:20px;
}

.section{
margin-bottom:30px;
}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

button{
padding:8px 10px;
margin:5px;
border:none;
border-radius:5px;
color:white;
cursor:pointer;
}

.approve{background:green;}
.delete{background:red;}

img{
width:80px;
border-radius:8px;
}
</style>
</head>

<body>

<header>
<h1>GURULINK ADMIN PANEL</h1>
</header>

<div class="container">

<div class="section">
<h2>Teachers</h2>
<div id="teachers"></div>
</div>

<div class="section">
<h2>Institutions</h2>
<div id="institutions"></div>
</div>

<div class="section">
<h2>Payments</h2>
<div id="payments"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getDatabase,
ref,
onValue,
update,
remove
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.firebasestorage.app",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* SAFE GET */
const safe = (v) => v ? v : "N/A";

/* TEACHERS */
onValue(ref(db,"teachers"), snap => {

let html = "";

snap.forEach(c => {
let t = c.val();

html += `
<div class="card">
<h3>${safe(t.name)}</h3>
<p>${safe(t.category)} | ${safe(t.subject || t.skillType)}</p>
<p>${safe(t.location)}</p>
<p>Status: ${safe(t.status)}</p>

<button class="approve" onclick="approveTeacher('${c.key}')">Approve</button>
<button class="delete" onclick="deleteTeacher('${c.key}')">Delete</button>
</div>
`;
});

document.getElementById("teachers").innerHTML = html;
});

/* INSTITUTIONS */
onValue(ref(db,"institutions"), snap => {

let html = "";

snap.forEach(c => {
let i = c.val();

html += `
<div class="card">
<h3>${safe(i.name)}</h3>
<p>${safe(i.category)}</p>
<p>${safe(i.address)}</p>
<p>Status: ${safe(i.status)}</p>

<button class="approve" onclick="approveInst('${c.key}')">Approve</button>
<button class="delete" onclick="deleteInst('${c.key}')">Delete</button>
</div>
`;
});

document.getElementById("institutions").innerHTML = html;
});

/* PAYMENTS */
onValue(ref(db,"payments"), snap => {

let html = "";

snap.forEach(c => {
let p = c.val();

html += `
<div class="card">
<p>Type: ${safe(p.type)}</p>
<p>Amount: ₹${safe(p.amount)}</p>
<p>UTR: ${safe(p.utr)}</p>
<p>Status: ${safe(p.status)}</p>

${p.screenshot ? `<img src="${p.screenshot}">` : ""}
</div>
`;
});

document.getElementById("payments").innerHTML = html;
});

/* ACTIONS */
window.approveTeacher = (id) => {
update(ref(db,"teachers/"+id), {status:"approved"});
};

window.deleteTeacher = (id) => {
remove(ref(db,"teachers/"+id));
};

window.approveInst = (id) => {
update(ref(db,"institutions/"+id), {status:"approved"});
};

window.deleteInst = (id) => {
remove(ref(db,"institutions/"+id));
};

</script>

</body>
</html>
