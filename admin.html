<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MASTER GURULINK ADMIN</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f7}
header{background:#0d47a1;color:white;padding:15px;text-align:center}

.container{width:95%;max-width:1400px;margin:auto;padding:15px}

/* dashboard */
.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;margin:10px 0
}
.box{
background:white;padding:12px;border-radius:10px;text-align:center
}

/* filters */
.topbar{display:flex;gap:10px;flex-wrap:wrap}
input,select{padding:10px;flex:1;border-radius:8px;border:1px solid #ccc}

/* cards */
.card{
background:white;padding:12px;border-radius:10px;margin-top:10px
}

button{
padding:7px 10px;border:none;border-radius:6px;color:white;margin:3px;cursor:pointer
}
.approve{background:green}
.del{background:red}
.edit{background:#0d47a1}
.review{background:#6a1b9a}
.pay{background:#ff9800}

/* edit modal */
.modal{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,.6);align-items:center;justify-content:center
}
.box2{
background:white;width:90%;max-width:900px;padding:15px;max-height:90vh;overflow:auto
}
.box2 input, .box2 textarea{
width:100%;padding:10px;margin:5px 0
}
</style>
</head>

<body>

<header>
<h2>MASTER ADMIN PANEL</h2>
</header>

<div class="container">

<!-- DASHBOARD -->
<div class="dashboard">
<div class="box">Teachers <h3 id="tCount">0</h3></div>
<div class="box">Institutions <h3 id="iCount">0</h3></div>
<div class="box">Payments <h3 id="pCount">0</h3></div>
<div class="box">Earnings <h3 id="earn">₹0</h3></div>
</div>

<!-- FILTERS -->
<div class="topbar">
<input id="search" placeholder="Search name/email">
<input id="phone" placeholder="Search phone exact">
<select id="type">
<option value="">All</option>
<option value="teacher">Teachers</option>
<option value="institution">Institutions</option>
</select>
</div>

<h3>PROFILES</h3>
<div id="list"></div>

<h3>PAYMENTS</h3>
<div id="payments"></div>

</div>

<!-- EDIT MODAL -->
<div class="modal" id="modal">
<div class="box2">
<h3>Edit Full Profile</h3>
<div id="form"></div>
<button onclick="save()">SAVE</button>
<button onclick="closeModal()">CLOSE</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getDatabase, ref, onValue, update, remove
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSyBK0...",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db = getDatabase(app);

let teachers=[], inst=[], payments=[];
let current=null;

/* LOAD TEACHERS */
onValue(ref(db,"teachers"),s=>{
teachers=[];
s.forEach(c=>teachers.push({id:c.key,...c.val(),type:"teacher"}));
render();
});

/* LOAD INSTITUTIONS */
onValue(ref(db,"institutions"),s=>{
inst=[];
s.forEach(c=>inst.push({id:c.key,...c.val(),type:"institution"}));
render();
});

/* LOAD PAYMENTS */
onValue(ref(db,"payments"),s=>{
payments=[];
let total=0;

s.forEach(c=>{
let p=c.val();
payments.push(p);
total+=Number(p.amount||0);
});

document.getElementById("pCount").innerText=s.size;
document.getElementById("earn").innerText="₹"+total;

renderPayments();
});

/* DASHBOARD */
function dashboard(list){
document.getElementById("tCount").innerText=list.filter(x=>x.type==="teacher").length;
document.getElementById("iCount").innerText=list.filter(x=>x.type==="institution").length;
}

/* RENDER */
function render(){

let all=[...teachers,...inst];
dashboard(all);

let search=document.getElementById("search").value.toLowerCase();
let phone=document.getElementById("phone").value;
let type=document.getElementById("type").value;

let html="";

all.forEach(x=>{

if(type && x.type!==type) return;
if(search && !(x.name||"").toLowerCase().includes(search)
&& !(x.email||"").toLowerCase().includes(search)) return;
if(phone && x.phone!==phone) return;

html+=`
<div class="card">

<h3>${x.name}</h3>
<p>📞 ${x.phone}</p>

<p>Status: ${x.status||"pending"}</p>

<p><b>Public Review:</b> ${x.publicReview||"-"}</p>
<p><b>Admin Review:</b> ${x.adminReview||"-"}</p>

<button class="approve" onclick="approve('${x.type}','${x.id}')">Approve</button>
<button class="edit" onclick='openEdit(${JSON.stringify(x)})'>Edit</button>
<button class="review" onclick="adminReview('${x.type}','${x.id}')">Admin Review</button>
<button class="del" onclick="del('${x.type}','${x.id}')">Delete</button>

</div>
`;
});

document.getElementById("list").innerHTML=html;
}

/* PAYMENTS */
function renderPayments(){
let html="";
payments.forEach(p=>{
html+=`
<div class="card">
<p>${p.name}</p>
<p>₹${p.amount}</p>
<p>${p.status}</p>
</div>`;
});
document.getElementById("payments").innerHTML=html;
}

/* APPROVE */
window.approve=(type,id)=>{
update(ref(db,`${type}s/${id}`),{status:"approved"});
}

/* DELETE FIXED */
window.del=(type,id)=>{
if(confirm("Delete?")){
remove(ref(db,`${type}s/${id}`));
}
}

/* ADMIN REVIEW */
window.adminReview=(type,id)=>{
let msg=prompt("Admin Review:");
if(msg){
update(ref(db,`${type}s/${id}`),{adminReview:msg});
}
}

/* EDIT FULL */
window.openEdit=(data)=>{
current=data;
let html="";
for(let k in data){
if(typeof data[k]==="object") continue;
html+=`<input id="f_${k}" value="${data[k]||""}">`;
}
document.getElementById("form").innerHTML=html;
document.getElementById("modal").style.display="flex";
}

/* SAVE */
window.save=()=>{
let up={};
for(let k in current){
let el=document.getElementById("f_"+k);
if(el) up[k]=el.value;
}
update(ref(db,`${current.type}s/${current.id}`),up);
closeModal();
}

/* CLOSE */
window.closeModal=()=>{
document.getElementById("modal").style.display="none";
}

/* FILTER EVENTS */
document.getElementById("search").oninput=render;
document.getElementById("phone").oninput=render;
document.getElementById("type").onchange=render;

</script>

</body>
</html>
