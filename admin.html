<style>

*{

.statInstitution{border-top-color:#00897b;background:#f7fffc;}
.statAcademic{border-top-color:#3949ab;background:#f8f8ff;}
.statSkill{border-top-color:#2e7d32;background:#f4fff6;}

margin:4px 0;

}

<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getDatabase,
ref,
onValue,
update,
remove,
get
}
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",

authDomain:
"gurulink-59cc7.firebaseapp.com",

databaseURL:
"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"gurulink-59cc7",

storageBucket:
"gurulink-59cc7.appspot.com",

messagingSenderId:
"112148672399",

appId:
"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"

};

const app =
initializeApp(firebaseConfig);

const db =
getDatabase(app);

if(
localStorage.getItem("role")
!== "admin"
){
alert("Access Denied");
location.href="login.html";
}

let teachers=[];
let inst=[];
let payments=[];
let renewPayments=[];
function expired(t){

return t &&
Date.now() >
t + (365*24*60*60*1000);

}

function remain(t){

if(!t) return "-";

return Math.max(
0,
Math.ceil(
(
t + (365*24*60*60*1000)
-
Date.now()
)
/86400000
)
);

}

/* =========================
   TEACHERS
========================= */

function loadTeachers(){

onValue(
ref(db,"teachers"),
snap=>{

teachers=[];

let html="";

snap.forEach(c=>{

let d=c.val();

d.id=c.key;

teachers.push(d);

html += card(
d,
"teacher"
);

});

document
.getElementById(
"teachers"
).innerHTML = html;

updateStats();

});

}

/* =========================
   INSTITUTIONS
========================= */

function loadInstitutions(){

onValue(
ref(db,"institutions"),
snap=>{

inst=[];

let html="";

snap.forEach(c=>{

let d=c.val();

d.id=c.key;

inst.push(d);

html += card(
d,
"institution"
);

document

"institutions"

}

${d.phone || "-"}

${d.status || "paid"}

class="delete"
onclick="delPay('${c.key}')">

Delete

});

========================= */

ref(db,"payment2"),
snap=>{

let html="";

snap.forEach(c=>{

const d=c.val();

</p>

${d.status || "paid"}

'${d.profileId}',

/* =========================
   PROFILE CARD
========================= */

function card(d,type){

const exp =
expired(
d.approvedAt
);

const rem =
remain(
d.approvedAt
);

return `

<div class="card ${type === "teacher" ? "teacherCard" : "institutionCard"}">

<h3>
${d.name || "-"}
</h3>

<span class="badge">
${d.status || "pending"}
</span>

<span class="badge">
${d.category || "-"}
</span>

<br><br>

<p>
<b>Email:</b>
${d.email || "-"}
</p>

<p>
<b>Phone:</b>
${d.phone || "-"}
</p>

<p>
<b>Role:</b>
${d.role || "-"}
</p>

<p>
<b>Payment:</b>
${d.paymentStatus || "unpaid"}
</p>

<p>
<b>Days Left:</b>
${rem}
</p>

${exp
?
`
<span
class="badge"
style="
background:red;
color:white;
">

EXPIRED

</span>
`
:
""
}

<br><br>

<img
src="${
d.logo ||
d.idProof ||
'https://via.placeholder.com/100'
}"
onerror="
this.src='https://via.placeholder.com/100'
">

<br>

<button
class="approve"
onclick="approve('${type}','${d.id}')">

Approve

</button>

class="view"

Profile

</button>

<button
class="edit"
onclick="editProfile('${type}','${d.id}')">

Edit

</button>

</div>

`;

}

/* =========================
   DELETE PROFILE
========================= */

function(type,id){

!confirm(
"Delete this profile?"
)
){
return;
}

remove(
ref(
db,
`${type}s/${id}`
)
);

};

/* =========================
   RENEW MEMBERSHIP
========================= */

window.renew = async function(type,id){

  if(!confirm("Approve renewal for this membership?")){
    return;
  }

  const ONE_DAY = 24 * 60 * 60 * 1000;
  const SUB_DAYS = 366;
  const SUB_TIME = SUB_DAYS * ONE_DAY;
  const now = Date.now();

  const path = `${type}s/${id}`;

  const snap = await get(ref(db, path));

  if(!snap.exists()){
    alert("Profile not found");
    return;
  }

  const d = snap.val();

  const oldApprovedAt = Number(d.approvedAt || 0);
  const oldExpiry = oldApprovedAt + SUB_TIME;

  let newApprovedAt;

  if(oldApprovedAt && oldExpiry > now){
    newApprovedAt = oldExpiry; // remaining days + 366
  }else{
    newApprovedAt = now; // expired = fresh 366 days
  }

  await update(ref(db, path), {
    approvedAt: newApprovedAt,
    renewalStatus:"active",
    lastRenewalDate:now,
    status:"approved"
  });

  alert("Renewal approved successfully");
};

/* =========================
   PROFILE VIEW
========================= */

/* =========================

/* =========================
   DELETE REGISTRATION PAYMENT
========================= */

window.delPay =

)
){

db,

/* =========================
   DELETE RENEWAL PAYMENT
========================= */

window.delRenewPay =

)

/* =========================
   APPROVE RENEWAL PAYMENT
========================= */

window.approveRenewalFromPayment =
async function(paymentId, profileId, type){

  if(!confirm("Approve this renewal payment?")){
    return;
  }

  try{

    const profilePath =
      type === "institution"
      ? `institutions/${profileId}`
      : `teachers/${profileId}`;

    const snap =
      await get(ref(db, profilePath));

    if(!snap.exists()){
      alert("Profile not found");
      return;
    }

    const profile = snap.val();

    const ONE_DAY =
      24 * 60 * 60 * 1000;

    const MEMBERSHIP_DAYS = 366;

    const MEMBERSHIP_TIME =
      MEMBERSHIP_DAYS * ONE_DAY;

    const now = Date.now();

    const oldApprovedAt =
      Number(profile.approvedAt || 0);

    const oldExpiry =
      oldApprovedAt + MEMBERSHIP_TIME;

    let newApprovedAt;

    if(
      oldApprovedAt &&
      oldExpiry > now
    ){
      // add renewal after current expiry
      newApprovedAt = oldExpiry;
    }else{
      // expired membership
      newApprovedAt = now;
    }

    await update(
      ref(db, profilePath),
      {
        approvedAt:newApprovedAt,
        status:"approved",
        renewalStatus:"active",
        lastRenewalDate:now
      }
    );

    await update(
      ref(db, "payment2/" + paymentId),
      {
        status:"approved",
        approvedAt:now
      }
    );

    alert("Renewal approved successfully");

  }catch(err){

    console.error(err);

    alert(
      "Renewal approval failed"
    );

  }

};
/* =========================
   SEARCH
========================= */

window.renderAll =
function(){

const q =

document
.getElementById(
"search"
)
.value
.toLowerCase();

function match(x){

return (

(x.name || "")
.toLowerCase()
.includes(q)

||

(x.email || "")
.toLowerCase()
.includes(q)

||

(x.phone || "")
.toLowerCase()
.includes(q)

);

}

document
.getElementById(
"teachers"
)
.innerHTML =

teachers
.filter(match)
.map(d=>card(d,"teacher"))
.join("");

document
.getElementById(
"institutions"
)
.innerHTML =

inst
.filter(match)
.map(d=>card(d,"institution"))
.join("");

};

/* =========================

========================= */

function updateStats(){

document
.getElementById(
"tCount"
).innerText =
teachers.length;

document
.getElementById(
"iCount"
).innerText =
inst.length;

const all = [

...teachers,
...inst

];

function count(cat){

return all.filter(

x =>

(x.category || "")
.toLowerCase()

===

cat

).length;

}

document
.getElementById(
"aCount"
).innerText =
count("academic");

document
.getElementById(
"sCount"
).innerText =
count("skill");

document
.getElementById(
"spCount"
).innerText =
count("sport");

document
.getElementById(
"cCount"
).innerText =
count("creative");

}

/* Helpdesk */

onValue(

/* =========================
   INIT
========================= */

loadTeachers();

loadInstitutions();

loadPayments();
