<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GURULINK COMPLETE ADMIN</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#0d47a1;
color:#fff;
padding:18px;
text-align:center;
}

.container{
width:95%;
max-width:1400px;
margin:auto;
padding:15px;
}

/* DASHBOARD */
.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
margin-top:15px;
}

.box{
background:#fff;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.box h2{color:#0d47a1}

/* FILTER */
.filter{
display:flex;
gap:10px;
margin:15px 0;
flex-wrap:wrap;
}

input,select{
padding:10px;
flex:1;
border-radius:8px;
border:1px solid #ccc;
}

/* CARD */
.card{
background:#fff;
padding:15px;
border-radius:12px;
margin-top:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
border-left:5px solid #999;
}

.teacher{border-left-color:#1565c0;}
.institution{border-left-color:#2e7d32;}

.pending{background:#fff3e0;}
.approved{background:#e8f5e9;}

.top{
display:flex;
gap:10px;
align-items:center;
}

.photo{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
border:2px solid #1565c0;
}

.badge{
padding:4px 10px;
border-radius:20px;
font-size:12px;
color:#fff;
}

.green{background:green;}
.orange{background:orange;}

button{
padding:7px 10px;
border:none;
border-radius:6px;
cursor:pointer;
margin:3px;
color:#fff;
}

.approve{background:green;}
.delete{background:red;}
.edit{background:#0d47a1;}
.review{background:#6a1b9a;}

.editBox{
display:none;
background:#f7f7f7;
padding:10px;
margin-top:10px;
border-radius:10px;
}

.editBox input,
.editBox textarea{
width:100%;
padding:8px;
margin:5px 0;
}
</style>
</head>

<body>

<header>
<h2>GURULINK COMPLETE ADMIN PANEL</h2>
</header>

<div class="container">

<!-- DASHBOARD -->
<div class="dashboard">
<div class="box"><h2 id="tCount">0</h2><p>Teachers</p></div>
<div class="box"><h2 id="iCount">0</h2><p>Institutions</p></div>
<div class="box"><h2 id="pCount">0</h2><p>Payments</p></div>
<div class="box"><h2 id="earn">₹0</h2><p>Earnings</p></div>
</div>

<!-- FILTER -->
<div class="filter">
<input id="search" placeholder="Search name / phone / email">
<select id="filter">
<option value="all">All</option>
<option value="teacher">Teachers</option>
<option value="institution">Institutions</option>
<option value="pending">Pending</option>
<option value="approved">Approved</option>
</select>
</div>

<h3>LIST</h3>
<div id="list"></div>

<h3>PAYMENTS</h3>
<div id="payments"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getDatabase,
ref,
onValue,
update,
remove
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSyBK0Q...",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7"
});

const db = getDatabase(app);

/* DATA */
let teachers = [];
let institutions = [];

/* LOAD TEACHERS */
onValue(ref(db,"teachers"),snap=>{
teachers=[];
snap.forEach(c=>{
teachers.push({id:c.key,...c.val(),type:"teacher"});
});
render();
});

/* LOAD INSTITUTIONS */
onValue(ref(db,"institutions"),snap=>{
institutions=[];
snap.forEach(c=>{
institutions.push({id:c.key,...c.val(),type:"institution"});
});
render();
});

/* PAYMENTS */
onValue(ref(db,"payments"),snap=>{
let html="";
let total=0;

snap.forEach(c=>{
let p=c.val();
total+=Number(p.amount||0);

html+=`
<div class="card">
<p><b>${p.name}</b></p>
<p>₹${p.amount}</p>
<p>${p.status}</p>
</div>
`;
});

document.getElementById("payments").innerHTML=html;
document.getElementById("pCount").innerText=snap.size;
document.getElementById("earn").innerText="₹"+total;
});

/* RENDER */
function render(){

let search=document.getElementById("search").value.toLowerCase();
let filter=document.getElementById("filter").value;

let all=[...teachers,...institutions];

let html="";
let t=0,i=0;

all.forEach(item=>{

let text=(item.name||"")+(item.phone||"")+(item.email||"");

if(!text.toLowerCase().includes(search)) return;

if(filter!="all"){
if(filter=="teacher" && item.type!="teacher") return;
if(filter=="institution" && item.type!="institution") return;
if(filter=="pending" && item.status=="approved") return;
if(filter=="approved" && item.status!="approved") return;
}

if(item.type=="teacher") t++;
if(item.type=="institution") i++;

html+=`
<div class="card ${item.type} ${item.status||''}">

<div class="top">
<img class="photo" src="${item.photo||''}">
<div>
<h3>${item.name||""}</h3>

<span class="badge ${item.status=="approved"?"green":"orange"}">
${item.status||"pending"}
</span>
</div>
</div>

<p>📞 ${item.phone||""}</p>
<p>📧 ${item.email||""}</p>

<button class="approve" onclick="approve('${item.type}','${item.id}')">Approve</button>
<button class="delete" onclick="del('${item.type}','${item.id}')">Delete</button>
<button class="edit" onclick="toggle('${item.id}')">Edit</button>
<button class="review" onclick="review('${item.type}','${item.id}')">Review</button>

<div class="editBox" id="e_${item.id}">
<input id="n_${item.id}" value="${item.name||""}">
<input id="p_${item.id}" value="${item.phone||""}">
<input id="e_${item.id}mail" value="${item.email||""}">
<textarea id="d_${item.id}">${item.description||""}</textarea>

<button onclick="save('${item.type}','${item.id}')">Save</button>
</div>

</div>
`;
});

document.getElementById("list").innerHTML=html;
document.getElementById("tCount").innerText=t;
document.getElementById("iCount").innerText=i;
}

/* ACTIONS */
window.approve=(type,id)=>{
update(ref(db,`${type}s/${id}`),{status:"approved"});
};

window.del=(type,id)=>{
if(confirm("Delete?")){
remove(ref(db,`${type}s/${id}`));
}
};

window.toggle=(id)=>{
let box=document.getElementById("e_"+id);
box.style.display=box.style.display==="block"?"none":"block";
};

window.save=(type,id)=>{
update(ref(db,`${type}s/${id}`),{
name:document.getElementById("n_"+id).value,
phone:document.getElementById("p_"+id).value,
email:document.getElementById("e_"+id+"mail").value,
description:document.getElementById("d_"+id).value
});
alert("Updated");
};

window.review=(type,id)=>{
let r=prompt("Admin review:");
if(r){
update(ref(db,`${type}s/${id}`),{
adminReview:r
});
}
};

/* SEARCH */
document.getElementById("search").addEventListener("input",render);
document.getElementById("filter").addEventListener("change",render);

</script>

</body>
</html>
