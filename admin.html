<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GURULINK ADMIN DASHBOARD</title>

<style>

body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#0d47a1;
color:#fff;
padding:18px;
text-align:center;
}

.container{
width:95%;
max-width:1400px;
margin:auto;
padding:15px;
}

/* DASHBOARD */
.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
margin-top:15px;
}

.box{
background:#fff;
padding:15px;
border-radius:12px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.box h2{color:#0d47a1}

/* FILTER */
.filterRow{
display:flex;
gap:10px;
flex-wrap:wrap;
margin:15px 0;
}

select,input{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
flex:1;
}

/* CARDS */
.card{
background:#fff;
padding:15px;
border-radius:12px;
margin-top:15px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
border-left:6px solid #ccc;
}

.teacher{border-left-color:#1565c0;}
.institution{border-left-color:#2e7d32;}

.pending{background:#fff3e0;}
.approved{background:#e8f5e9;}

.top{
display:flex;
gap:10px;
align-items:center;
}

.photo{
width:70px;
height:70px;
border-radius:50%;
object-fit:cover;
border:2px solid #1565c0;
}

.badge{
padding:3px 10px;
border-radius:20px;
color:#fff;
font-size:12px;
}

.green{background:green;}
.orange{background:orange;}

.gallery{
display:flex;
gap:6px;
overflow:auto;
margin-top:10px;
}

.gallery img{
width:60px;
height:60px;
border-radius:8px;
object-fit:cover;
}

button{
padding:7px 10px;
border:none;
border-radius:6px;
color:#fff;
cursor:pointer;
margin:3px;
}

.edit{background:#0d47a1;}
.del{background:red;}
.approve{background:green;}
.review{background:#6a1b9a;}

/* EDIT DROPDOWN */
.editBox{
display:none;
background:#f7f7f7;
padding:10px;
margin-top:10px;
border-radius:10px;
}

.editBox input, .editBox textarea{
width:100%;
margin:5px 0;
padding:8px;
}

</style>
</head>

<body>

<header>
<h2>GURULINK ADMIN DASHBOARD</h2>
</header>

<div class="container">

<!-- DASHBOARD -->
<div class="dashboard">
<div class="box"><h2 id="tCount">0</h2><p>Teachers</p></div>
<div class="box"><h2 id="iCount">0</h2><p>Institutions</p></div>
<div class="box"><h2 id="pCount">0</h2><p>Payments</p></div>
<div class="box"><h2 id="earn">₹0</h2><p>Earnings</p></div>
</div>

<!-- FILTER -->
<div class="filterRow">
<input id="search" placeholder="Search name / phone / email">
<select id="filter">
<option value="all">All</option>
<option value="teacher">Teachers</option>
<option value="institution">Institutions</option>
<option value="pending">Pending</option>
<option value="approved">Approved</option>
</select>
</div>

<h3>Teachers & Institutions</h3>
<div id="list"></div>

<h3>Payments</h3>
<div id="payments"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getDatabase, ref, onValue,
update, remove
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* DATA STORE */
let teachersData = [];
let instData = [];

/* LOAD TEACHERS */
onValue(ref(db,"teachers"),snap=>{
teachersData = [];
snap.forEach(c=>{
teachersData.push({id:c.key,...c.val()});
});
render();
});

/* LOAD INSTITUTIONS */
onValue(ref(db,"institutions"),snap=>{
instData = [];
snap.forEach(c=>{
instData.push({id:c.key,...c.val()});
});
render();
});

/* LOAD PAYMENTS */
onValue(ref(db,"payments"),snap=>{
let html="";
let total=0;

snap.forEach(c=>{
let p=c.val();
total += Number(p.amount||0);

html+=`
<div class="card">
<p><b>${p.name}</b></p>
<p>₹${p.amount}</p>
<p>${p.status}</p>
</div>
`;
});

document.getElementById("payments").innerHTML=html;
document.getElementById("pCount").innerText=snap.size;
document.getElementById("earn").innerText="₹"+total;
});

/* RENDER MAIN LIST */
function render(){

let search = document.getElementById("search").value.toLowerCase();
let filter = document.getElementById("filter").value;

let all = [
...teachersData.map(t=>({...t,type:"teacher"})),
...instData.map(i=>({...i,type:"institution"}))
];

let html="";

let tCount=0, iCount=0;

all.forEach(item=>{

let text = (item.name||"")+(item.phone||"")+(item.email||"");

if(!text.toLowerCase().includes(search)) return;

if(filter!="all"){
if(filter=="teacher" && item.type!="teacher") return;
if(filter=="institution" && item.type!="institution") return;
if(filter=="pending" && item.status=="approved") return;
if(filter=="approved" && item.status!="approved") return;
}

if(item.type=="teacher") tCount++;
if(item.type=="institution") iCount++;

html+=`
<div class="card ${item.type} ${item.status||''}">

<div class="top">
<img class="photo" src="${item.photo||item.logo||''}">
<div>
<h3>${item.name}</h3>
<span class="badge ${item.status=="approved"?"green":"orange"}">
${item.status||"pending"}
</span>
</div>
</div>

<p>📞 ${item.phone||""}</p>
<p>📧 ${item.email||""}</p>

<button class="approve" onclick="approve('${item.type}','${item.id}')">Approve</button>
<button class="del" onclick="del('${item.type}','${item.id}')">Delete</button>
<button class="edit" onclick="toggleEdit('${item.id}')">Edit</button>
<button class="review" onclick="review('${item.id}')">Review</button>

<div class="editBox" id="edit_${item.id}">
<input id="name_${item.id}" value="${item.name||""}">
<input id="phone_${item.id}" value="${item.phone||""}">
<input id="email_${item.id}" value="${item.email||""}">
<textarea id="desc_${item.id}">${item.description||""}</textarea>
<button onclick="save('${item.type}','${item.id}')">Save</button>
</div>

</div>
`;
});

document.getElementById("list").innerHTML=html;
document.getElementById("tCount").innerText=tCount;
document.getElementById("iCount").innerText=iCount;
}

/* ACTIONS */
window.approve=(type,id)=>{
update(ref(db,`${type}s/${id}`),{status:"approved"});
};

window.del=(type,id)=>{
if(confirm("Delete?")){
remove(ref(db,`${type}s/${id}`));
}
};

window.toggleEdit=(id)=>{
let box=document.getElementById("edit_"+id);
box.style.display = box.style.display=="block"?"none":"block";
};

window.save=(type,id)=>{
update(ref(db,`${type}s/${id}`),{
name:document.getElementById("name_"+id).value,
phone:document.getElementById("phone_"+id).value,
email:document.getElementById("email_"+id).value,
description:document.getElementById("desc_"+id).value
});
alert("Updated");
};

window.review=(id)=>{
let msg=prompt("Write admin review:");
if(msg){
update(ref(db,"teachers/"+id),{adminReview:msg});
}
};

/* SEARCH */
document.getElementById("search").addEventListener("input",render);
document.getElementById("filter").addEventListener("change",render);

</script>

</body>
</html>
