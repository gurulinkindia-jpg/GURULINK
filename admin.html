<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>GURULINK Admin Panel</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{

padding:15px;

}

.container{
max-width:1000px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
}

input,button{
padding:10px;
margin:5px 0;
width:100%;

}

button{
background:#0d47a1;
color:white;
border:none;
cursor:pointer;
border-radius:6px;
}

.card{
padding:10px;
border:1px solid #ddd;

.row{
display:flex;
gap:10px;
}

.row button{

}
