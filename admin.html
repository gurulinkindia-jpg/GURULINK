<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>GURULINK Admin Panel</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

header{
background:#0d47a1;
color:white;
padding:15px;
text-align:center;
}

.container{
padding:20px;
}

.section{
margin-top:25px;
}

.card{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

button{
padding:8px 10px;
margin:5px;
border:none;
cursor:pointer;
border-radius:5px;
color:white;
}

.approve{background:green;}
.reject{background:red;}

img{
width:120px;
border-radius:6px;
}
</style>
</head>

<body>

<header>
<h1>GURULINK ADMIN PANEL</h1>
</header>

<div class="container">

<!-- PAYMENTS -->
<div class="section">
<h2>Payment Verification</h2>
<div id="payments"></div>
</div>

<!-- TEACHERS -->
<div class="section">
<h2>Teachers</h2>
<div id="teachers"></div>
</div>

<!-- INSTITUTIONS -->
<div class="section">
<h2>Institutions</h2>
<div id="institutions"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getDatabase,
ref,
onValue,
update,
remove
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.firebasestorage.app",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ================= PAYMENTS ================= */

onValue(ref(db,"payments"), (snap)=>{

let html="";

snap.forEach(child=>{

let p = child.val();

html += `
<div class="card">

<h3>Type: ${p.type}</h3>
<p>Category: ${p.category}</p>
<p>Amount: ₹${p.amount}</p>
<p>UTR: ${p.utr}</p>

${p.screenshot ? `<img src="${p.screenshot}">` : ""}

<p>Status: ${p.status || "pending"}</p>

<button class="approve" onclick="approvePayment('${child.key}','${p.type}')">Approve</button>
<button class="reject" onclick="rejectPayment('${child.key}')">Reject</button>

</div>
`;
});

document.getElementById("payments").innerHTML = html;

});

/* ================= TEACHERS ================= */

onValue(ref(db,"teachers"), (snap)=>{

let html="";

snap.forEach(child=>{

let t = child.val();

html += `
<div class="card">

<h3>${t.name}</h3>
<p>${t.category}</p>
<p>${t.subject || t.skillType || "-"}</p>
<p>Status: ${t.status}</p>

<button class="approve" onclick="approveTeacher('${child.key}')">Approve</button>

</div>
`;
});
