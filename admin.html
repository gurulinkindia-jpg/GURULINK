<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GURULINK MASTER ADMIN</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f7}

header{
background:#0d47a1;color:white;padding:15px;text-align:center
}

.container{width:95%;max-width:1400px;margin:auto;padding:15px}

/* top bar */
.topbar{
display:flex;gap:10px;flex-wrap:wrap;margin:10px 0
}

input,select{
padding:10px;border-radius:8px;border:1px solid #ccc;flex:1
}

/* cards */
.card{
background:white;padding:15px;border-radius:12px;
margin-top:10px;box-shadow:0 3px 10px rgba(0,0,0,.1)
}

.row{display:flex;gap:10px;flex-wrap:wrap}

.badge{
padding:4px 10px;border-radius:20px;font-size:12px
}

.approved{background:green;color:white}
.pending{background:orange;color:white}

button{
padding:7px 10px;border:none;border-radius:6px;
cursor:pointer;color:white;margin:3px
}

.edit{background:#0d47a1}
.del{background:red}
.approve{background:green}
.review{background:#6a1b9a}

/* full editor */
.editor{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
}

.editorBox{
background:white;
width:90%;
max-width:900px;
max-height:90vh;
overflow:auto;
padding:15px;
border-radius:12px
}

.editorBox input,.editorBox textarea, .editorBox select{
width:100%;padding:10px;margin:5px 0
}
</style>
</head>

<body>

<header>
<h2>MASTER ADMIN PANEL</h2>
</header>

<div class="container">

<div class="topbar">
<input id="search" placeholder="Search name / phone / email">
<input id="phoneSearch" placeholder="Search by phone exact">
<select id="type">
<option value="">All</option>
<option value="teacher">Teachers</option>
<option value="institution">Institutions</option>
</select>
</div>

<div id="list"></div>

</div>

<!-- EDIT MODAL -->
<div class="editor" id="editor">
<div class="editorBox">
<h3>Edit Profile</h3>
<div id="formArea"></div>
<button onclick="saveEdit()">💾 Save</button>
<button onclick="closeEdit()">❌ Close</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getDatabase, ref, onValue, update, remove
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSyBK0...",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7"
});

const db = getDatabase(app);

let all = [];
let currentEdit = null;

/* LOAD DATA */
onValue(ref(db,"teachers"),s=>{
s.forEach(c=>{
all.push({id:c.key,...c.val(),type:"teacher"});
});
render();
});

onValue(ref(db,"institutions"),s=>{
s.forEach(c=>{
all.push({id:c.key,...c.val(),type:"institution"});
});
render();
});

/* RENDER LIST */
window.render = function(){

let search = document.getElementById("search").value.toLowerCase();
let phone = document.getElementById("phoneSearch").value;
let type = document.getElementById("type").value;

let html = "";

all.forEach(x=>{

if(type && x.type !== type) return;

if(search && !(x.name||"").toLowerCase().includes(search)
&& !(x.email||"").toLowerCase().includes(search)) return;

if(phone && x.phone !== phone) return;

html += `
<div class="card">

<h3>${x.name}</h3>

<p>📞 ${x.phone}</p>
<p>📧 ${x.email||""}</p>

<span class="badge ${x.status=="approved"?"approved":"pending"}">
${x.status||"pending"}
</span>

<br><br>

<button class="approve" onclick="approve('${x.type}','${x.id}')">Approve</button>
<button class="edit" onclick='openEdit(${JSON.stringify(x)})'>Edit Full</button>
<button class="del" onclick="del('${x.type}','${x.id}')">Delete</button>

</div>
`;
});

document.getElementById("list").innerHTML = html;
}

/* APPROVE */
window.approve=(type,id)=>{
update(ref(db,`${type}s/${id}`),{status:"approved"});
}

/* DELETE */
window.del=(type,id)=>{
if(confirm("Delete?")){
remove(ref(db,`${type}s/${id}`));
}
}

/* OPEN FULL EDIT */
window.openEdit=(data)=>{
currentEdit = data;

let html = "";

for(let key in data){
if(typeof data[key] === "object") continue;

html += `
<label>${key}</label>
<input id="edit_${key}" value="${data[key]||""}">
`;
}

document.getElementById("formArea").innerHTML = html;
document.getElementById("editor").style.display="flex";
}

/* SAVE EDIT */
window.saveEdit=()=>{
let updates = {};

for(let key in currentEdit){
let el = document.getElementById("edit_"+key);
if(el){
updates[key] = el.value;
}
}

update(ref(db,`${currentEdit.type}s/${currentEdit.id}`),updates)
.then(()=>{
alert("Updated Successfully");
closeEdit();
});
}

/* CLOSE */
window.closeEdit=()=>{
document.getElementById("editor").style.display="none";
}

/* SEARCH */
document.getElementById("search").oninput=render;
document.getElementById("phoneSearch").oninput=render;
document.getElementById("type").onchange=render;

</script>

</body>
</html>
