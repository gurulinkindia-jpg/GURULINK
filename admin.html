<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GURULINK Admin</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#eef2f7;
}

header{
background:#0d47a1;
color:white;
padding:20px;
text-align:center;
}

.container{
width:95%;
max-width:1500px;
margin:auto;
padding:20px;
}

.analytics{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.box{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.box h2{
color:#0d47a1;
margin-bottom:10px;
}

.search{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-bottom:20px;
}

.section{
margin-top:30px;
}

.card{
background:white;
padding:15px;
margin-top:15px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.top{
display:flex;
gap:15px;
align-items:center;
}

.photo{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
border:2px solid #0d47a1;
}

.badge{
padding:5px 10px;
border-radius:20px;
font-size:12px;
display:inline-block;
margin-top:5px;
}

.verify{
background:green;
color:white;
}

.pending{
background:orange;
color:white;
}

.gallery{
display:flex;
gap:8px;
overflow:auto;
margin-top:10px;
}

.gallery img{
width:70px;
height:70px;
object-fit:cover;
border-radius:10px;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
cursor:pointer;
margin:5px;
color:white;
}

.approve{
background:green;
}

.delete{
background:red;
}

.edit{
background:#0d47a1;
}

.payment{
background:#6a1b9a;
}

p{
margin-top:5px;
line-height:1.5;
}

</style>
</head>

<body>

<header>
<h1>GURULINK ADMIN PANEL</h1>
</header>

<div class="container">

<div class="analytics">

<div class="box">
<h2 id="teacherCount">0</h2>
Teachers
</div>

<div class="box">
<h2 id="institutionCount">0</h2>
Institutions
</div>

<div class="box">
<h2 id="paymentCount">0</h2>
Payments
</div>

<div class="box">
<h2 id="earnings">₹0</h2>
Total Earnings
</div>

</div>

<input
id="search"
class="search"
placeholder="Search...">

<div class="section">
<h2>Teachers</h2>
<div id="teachers"></div>
</div>

<div class="section">
<h2>Institutions</h2>
<div id="institutions"></div>
</div>

<div class="section">
<h2>Payments</h2>
<div id="payments"></div>
</div>

</div>


<script type="module">

import {
initializeApp
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getDatabase,
ref,
onValue,
update,
remove
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";


const firebaseConfig={

apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"

};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);


/* TEACHERS */

onValue(ref(db,"teachers"),snap=>{

let total=0;
let html="";

snap.forEach(c=>{

total++;

let t=c.val();

let gallery="";

if(t.gallery){

t.gallery.forEach(img=>{

gallery+=`<img src="${img}">`;

});

}

html+=`

<div class="card">

<div class="top">

<img class="photo"
src="${t.photo||'https://via.placeholder.com/100'}">

<div>

<h3>${t.name||"-"}</h3>

<span class="badge ${t.status=="approved"?"verify":"pending"}">

${t.status||"pending"}

</span>

</div>

</div>

<p><b>Subject:</b> ${t.subject||"-"}</p>
<p><b>Phone:</b> ${t.phone||"-"}</p>

<div class="gallery">

${gallery}

</div>

${
t.status!="approved"

?

`<button class="approve teacherApprove"
data-id="${c.key}">
Approve
</button>`

:

`<button disabled>
Approved
</button>`

}

<button
class="edit teacherEdit"
data-id="${c.key}">
Edit
</button>

<button
class="delete teacherDelete"
data-id="${c.key}">
Delete
</button>

</div>

`;

});

teachers.innerHTML=html;

teacherCount.innerHTML=total;

});


/* INSTITUTIONS */

onValue(ref(db,"institutions"),snap=>{

let total=0;
let html="";

snap.forEach(c=>{

total++;

let t=c.val();

let gallery="";

if(t.gallery){

t.gallery.forEach(img=>{

gallery+=`<img src="${img}">`;

});

}

html+=`

<div class="card">

<h3>${t.name||"-"}</h3>

<p><b>Subject:</b>
${t.subject||"-"}
</p>

<p><b>Phone:</b>
${t.phone||"-"}
</p>

<div class="gallery">

${gallery}

</div>

${
t.status!="approved"

?

`<button class="approve instApprove"
data-id="${c.key}">
Approve
</button>`

:

`<button disabled>
Approved
</button>`

}

<button
class="edit instEdit"
data-id="${c.key}">
Edit
</button>

<button
class="delete instDelete"
data-id="${c.key}">
Delete
</button>

</div>

`;

});

institutions.innerHTML=html;

institutionCount.innerHTML=total;

});


/* PAYMENTS */

onValue(ref(db,"payments"),snap=>{

let total=0;
let earningsTotal=0;
let html="";

snap.forEach(c=>{

total++;

let p=c.val();

earningsTotal+=Number(
p.amount||0
);

html+=`

<div class="card">

<p>
<b>Name:</b>
${p.name||"Unknown"}
</p>

<p>
<b>Amount:</b>
₹${p.amount||0}
</p>

<button
class="delete paymentDelete"
data-id="${c.key}">
Delete Payment
</button>

</div>

`;

});

payments.innerHTML=html;

paymentCount.innerHTML=total;

earnings.innerHTML=
"₹"+earningsTotal;

});


/* BUTTON EVENTS */

document.addEventListener(
"click",
async(e)=>{


if(
e.target.classList.contains(
"teacherApprove"
)
){

await update(
ref(
db,
"teachers/"+e.target.dataset.id
),
{
status:"approved"
}
);

alert(
"Teacher Approved"
);

}


if(
e.target.classList.contains(
"instApprove"
)
){

await update(
ref(
db,
"institutions/"+e.target.dataset.id
),
{
status:"approved"
}
);

alert(
"Institution Approved"
);

}


if(
e.target.classList.contains(
"teacherDelete"
)
){

if(confirm(
"Delete Teacher?"
)){

remove(
ref(
db,
"teachers/"+e.target.dataset.id
)
);

}

}


if(
e.target.classList.contains(
"instDelete"
)
){

if(confirm(
"Delete Institution?"
)){

remove(
ref(
db,
"institutions/"+e.target.dataset.id
)
);

}

}


if(
e.target.classList.contains(
"paymentDelete"
)
){

if(confirm(
"Delete Payment?"
)){

remove(
ref(
db,
"payments/"+e.target.dataset.id
)
);

}

}


if(
e.target.classList.contains(
"teacherEdit"
)
){

window.location=
"edit.html?id="+
e.target.dataset.id+
"&type=teacher";

}


if(
e.target.classList.contains(
"instEdit"
)
){

window.location=
"edit.html?id="+
e.target.dataset.id+
"&type=institution";

}

});

</script>

</body>
</html>
