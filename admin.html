<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GURULINK Admin Panel</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#0d47a1;
color:white;
padding:15px;
text-align:center;
}

.container{
width:95%;
max-width:1400px;
margin:20px auto;
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:15px;
}

.card{
background:white;
padding:12px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

img{
width:70px;
height:70px;
border-radius:8px;
object-fit:cover;
margin:5px;
}

button{
padding:6px 8px;
margin:3px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
font-size:12px;
}

.approve{background:green;}
.reject{background:red;}
.delete{background:#444;}
.view{background:#1565c0;}
.edit{background:#ff9800;}

.badge{
display:inline-block;
padding:4px 8px;
background:#eee;
border-radius:6px;
font-size:11px;
margin:3px;
}
</style>
</head>

<body>

<header>
<h2>GURULINK ADMIN PANEL</h2>
</header>

<div class="container">

<!-- TEACHERS -->
<div>
<h3>Teachers</h3>
<div id="teachers"></div>
</div>

<!-- INSTITUTIONS -->
<div>
<h3>Institutions</h3>
<div id="institutions"></div>
</div>

<!-- PAYMENTS -->
<div>
<h3>Payments</h3>
<div id="payments"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ADMIN CHECK */
if(localStorage.getItem("role") !== "admin"){
alert("Access Denied!");
window.location.href = "login.html";
}

/* EXPIRE CHECK */
function isExpired(approvedAt){
if(!approvedAt) return false;
return Date.now() > approvedAt + (366*24*60*60*1000);
}

/* ================= TEACHERS ================= */
function loadTeachers(){
onValue(ref(db,"teachers"),snap=>{

let html="";

snap.forEach(c=>{
let d=c.val();
let id=c.key;
let expired=isExpired(d.approvedAt);

html+=`
<div class="card">

<h3>${d.name||"No Name"}</h3>

<span class="badge">${d.status||"pending"}</span>
${expired?`<span class="badge" style="background:red;color:white">EXPIRED</span>`:""}

<p>${d.email||"-"}</p>
<p>${d.phone||"-"}</p>
<p>${d.subjects||d.subject||"-"}</p>

<img src="${d.logo||d.photo||d.idProof||'https://via.placeholder.com/100'}">

<div>

<button class="approve" onclick="approveTeacher('${id}')">Approve</button>
<button class="reject" onclick="rejectTeacher('${id}')">Reject</button>
<button class="delete" onclick="deleteTeacher('${id}')">Delete</button>
<button class="edit" onclick="editTeacher('${id}', \`${d.name||""}\`, \`${d.phone||""}\`, \`${d.subjects||""}\`, \`${d.location||""}\`)">Edit</button>
<button class="view" onclick="viewProfile('${id}','teacher')">View</button>

</div>

</div>
`;
});

document.getElementById("teachers").innerHTML=html;
});
}

/* ================= INSTITUTIONS ================= */
function loadInstitutions(){
onValue(ref(db,"institutions"),snap=>{

let html="";

snap.forEach(c=>{
let d=c.val();
let id=c.key;
let expired=isExpired(d.approvedAt);

html+=`
<div class="card">

<h3>${d.name||"No Name"}</h3>

<span class="badge">${d.status||"pending"}</span>
${expired?`<span class="badge" style="background:red;color:white">EXPIRED</span>`:""}

<p>${d.email||"-"}</p>
<p>${d.phone||"-"}</p>

<img src="${d.logo||d.photo||'https://via.placeholder.com/100'}">

<div>

<button class="approve" onclick="approveInst('${id}')">Approve</button>
<button class="reject" onclick="rejectInst('${id}')">Reject</button>
<button class="delete" onclick="deleteInst('${id}')">Delete</button>
<button class="edit" onclick="editInst('${id}', \`${d.name||""}\`, \`${d.phone||""}\`, \`${d.location||""}\`)">Edit</button>
<button class="view" onclick="viewProfile('${id}','institution')">View</button>

</div>

</div>
`;
});

document.getElementById("institutions").innerHTML=html;
});
}

/* ================= PAYMENTS ================= */
function loadPayments(){
onValue(ref(db,"payments"),snap=>{

let html="";

snap.forEach(c=>{
let d=c.val();
let id=c.key;

html+=`
<div class="card">

<h3>Payment</h3>

<p>${d.name||"-"}</p>
<p>₹${d.amount||0}</p>
<p>${d.status||"pending"}</p>

<button class="delete" onclick="deletePayment('${id}')">Delete</button>

</div>
`;
});

document.getElementById("payments").innerHTML=html;
});
}

/* ================= ACTIONS ================= */

window.approveTeacher=async(id)=>{
await update(ref(db,"teachers/"+id),{
status:"approved",
approvedAt:Date.now()
});
};

window.rejectTeacher=async(id)=>{
await update(ref(db,"teachers/"+id),{status:"rejected"});
};

window.deleteTeacher=async(id)=>{
await remove(ref(db,"teachers/"+id));
};

window.approveInst=async(id)=>{
await update(ref(db,"institutions/"+id),{
status:"approved",
approvedAt:Date.now()
});
};

window.rejectInst=async(id)=>{
await update(ref(db,"institutions/"+id),{status:"rejected"});
};

window.deleteInst=async(id)=>{
await remove(ref(db,"institutions/"+id));
};

window.deletePayment=async(id)=>{
await remove(ref(db,"payments/"+id));
};

/* ================= EDIT ================= */

window.editTeacher=(id,name,phone,subject,location)=>{
let n=prompt("Name",name);
let p=prompt("Phone",phone);
let s=prompt("Subject",subject);
let l=prompt("Location",location);

if(n||p||s||l){
update(ref(db,"teachers/"+id),{
name:n,phone:p,subjects:s,location:l
});
}
};

window.editInst=(id,name,phone,location)=>{
let n=prompt("Name",name);
let p=prompt("Phone",phone);
let l=prompt("Location",location);

if(n||p||l){
update(ref(db,"institutions/"+id),{
name:n,phone:p,location:l
});
}
};

/* VIEW */
window.viewProfile=(id,type)=>{
window.open("profile-view.html?id="+id+"&type="+type);
};

/* INIT */
loadTeachers();
loadInstitutions();
loadPayments();

</script>

</body>
</html>
