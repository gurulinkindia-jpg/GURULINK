<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GURULINK ADMIN DASHBOARD</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#0d47a1;
color:white;
padding:18px;
text-align:center;
}

.container{
width:95%;
max-width:1400px;
margin:auto;
padding:15px;
}

/* DASHBOARD */
.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
margin-top:15px;
}

.box{
background:white;
padding:15px;
border-radius:12px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

/* FILTER */
.filterRow{
display:flex;
gap:10px;
flex-wrap:wrap;
margin:15px 0;
}

input,select{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
flex:1;
}

/* CARD */
.card{
background:white;
padding:15px;
border-radius:12px;
margin-top:15px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
border-left:6px solid #aaa;
}

.teacher{border-left-color:#1565c0;}
.institution{border-left-color:#2e7d32;}

.top{
display:flex;
gap:10px;
align-items:center;
}

.photo{
width:70px;
height:70px;
border-radius:50%;
object-fit:cover;
border:2px solid #1565c0;
}

.gallery img{
width:60px;
height:60px;
border-radius:8px;
margin:3px;
object-fit:cover;
}

button{
padding:7px 10px;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
margin:3px;
}

.approve{background:green;}
.del{background:red;}
.edit{background:#0d47a1;}
.review{background:#6a1b9a;}

/* FULL EDIT PANEL */
.editBox{
display:none;
background:#f7f7f7;
padding:10px;
border-radius:10px;
margin-top:10px;
}

.editBox input,
.editBox textarea{
width:100%;
padding:8px;
margin:5px 0;
border:1px solid #ccc;
border-radius:6px;
}

.badge{
padding:3px 10px;
border-radius:20px;
font-size:12px;
color:white;
display:inline-block;
}
</style>
</head>

<body>

<header>
<h2>GURULINK ADMIN DASHBOARD</h2>
</header>

<div class="container">

<div class="dashboard">
<div class="box"><h2 id="tCount">0</h2><p>Teachers</p></div>
<div class="box"><h2 id="iCount">0</h2><p>Institutions</p></div>
<div class="box"><h2 id="pCount">0</h2><p>Payments</p></div>
<div class="box"><h2 id="earn">₹0</h2><p>Earnings</p></div>
</div>

<div class="filterRow">
<input id="search" placeholder="Search name / phone / email">
<select id="filter">
<option value="all">All</option>
<option value="teacher">Teachers</option>
<option value="institution">Institutions</option>
<option value="pending">Pending</option>
<option value="approved">Approved</option>
</select>
</div>

<h3>Users</h3>
<div id="list"></div>

<h3>Payments</h3>
<div id="payments"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getDatabase, ref, onValue, update, remove
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let teachers=[], insts=[];

/* LOAD TEACHERS */
onValue(ref(db,"teachers"),snap=>{
teachers=[];
snap.forEach(c=>{
teachers.push({id:c.key,type:"teacher",...c.val()});
});
render();
});

/* LOAD INSTITUTIONS */
onValue(ref(db,"institutions"),snap=>{
insts=[];
snap.forEach(c=>{
insts.push({id:c.key,type:"institution",...c.val()});
});
render();
});

/* PAYMENTS */
onValue(ref(db,"payments"),snap=>{
let html="", total=0;

snap.forEach(c=>{
let p=c.val();
total += Number(p.amount||0);

html+=`
<div class="card">
<p><b>${p.name}</b></p>
<p>₹${p.amount}</p>
<p>${p.status}</p>
</div>`;
});

document.getElementById("payments").innerHTML=html;
document.getElementById("pCount").innerText=snap.size;
document.getElementById("earn").innerText="₹"+total;
});

/* RENDER */
function render(){

let search=document.getElementById("search").value.toLowerCase();
let filter=document.getElementById("filter").value;

let all=[...teachers,...insts];

let html="";
let t=0,i=0;

all.forEach(u=>{

let text=(u.name||"")+(u.phone||"")+(u.email||"");

if(!text.toLowerCase().includes(search)) return;

if(filter!="all"){
if(filter=="teacher" && u.type!="teacher") return;
if(filter=="institution" && u.type!="institution") return;
if(filter=="approved" && u.status!="approved") return;
if(filter=="pending" && u.status=="approved") return;
}

if(u.type=="teacher") t++; else i++;

html+=`
<div class="card ${u.type}">

<div class="top">
<img class="photo" src="${u.photo||u.logo||''}">
<div>
<h3>${u.name}</h3>
<span class="badge" style="background:${u.status=='approved'?'green':'orange'}">
${u.status||"pending"}
</span>
</div>
</div>

<p>📞 ${u.phone||""}</p>
<p>📧 ${u.email||""}</p>

<button class="approve" onclick="approve('${u.type}','${u.id}')">Approve</button>
<button class="del" onclick="del('${u.type}','${u.id}')">Delete</button>
<button class="edit" onclick="toggle('${u.id}')">Edit Full</button>
<button class="review" onclick="review('${u.type}','${u.id}')">Review</button>

<div class="editBox" id="box_${u.id}">

<input id="name_${u.id}" value="${u.name||''}">
<input id="phone_${u.id}" value="${u.phone||''}">
<input id="email_${u.id}" value="${u.email||''}">
<input id="location_${u.id}" value="${u.location||''}">
<textarea id="desc_${u.id}">${u.description||''}</textarea>

<input id="fee_${u.id}" value="${u.homeFee||''}" placeholder="Home Fee">

<button onclick="save('${u.type}','${u.id}')">Save</button>
</div>

</div>
`;
});

document.getElementById("list").innerHTML=html;
document.getElementById("tCount").innerText=t;
document.getElementById("iCount").innerText=i;
}

/* ACTIONS */
window.approve=(type,id)=>{
update(ref(db,`${type}s/${id}`),{status:"approved"});
};

window.del=(type,id)=>{
if(confirm("Delete?")) remove(ref(db,`${type}s/${id}`));
};

window.toggle=(id)=>{
let box=document.getElementById("box_"+id);
box.style.display = box.style.display==="block"?"none":"block";
};

window.save=(type,id)=>{
update(ref(db,`${type}s/${id}`),{
name:document.getElementById("name_"+id).value,
phone:document.getElementById("phone_"+id).value,
email:document.getElementById("email_"+id).value,
location:document.getElementById("location_"+id).value,
description:document.getElementById("desc_"+id).value,
homeFee:document.getElementById("fee_"+id).value
});
alert("Updated");
};

window.review=(type,id)=>{
let r=prompt("Admin Review:");
if(r){
update(ref(db,`${type}s/${id}`),{adminReview:r});
}
};

document.getElementById("search").addEventListener("input",render);
document.getElementById("filter").addEventListener("change",render);

</script>

</body>
</html>
