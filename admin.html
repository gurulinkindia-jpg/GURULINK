<!DOCTYPE html>
<html>
<head>
<title>GURULINK Admin Panel</title>

<style>

body{
font-family:Arial;
padding:20px;
background:#f2f2f2;
}

h1{
text-align:center;
color:#0d47a1;
}

.section{
margin-top:30px;
}

.card{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,.2);
}

button{
padding:8px 10px;
margin:5px;
border:none;
cursor:pointer;
border-radius:5px;
color:white;
}

.approve{background:green;}
.delete{background:red;}
.edit{background:orange;}

</style>

</head>

<body>

<h1>GURULINK Admin Panel</h1>

<!-- TEACHERS -->
<div class="section">
<h2>Teachers</h2>
<div id="teacherList"></div>
</div>

<!-- INSTITUTIONS -->
<div class="section">
<h2>Institutions</h2>
<div id="instList"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getDatabase,
ref,
onValue,
update,
remove
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.firebasestorage.app",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ========== TEACHERS ========== */

onValue(ref(db,"teachers"), snapshot => {

let html = "";

snapshot.forEach(child => {

let t = child.val();

html += `
<div class="card">

<h3>${t.name}</h3>
<p>${t.subject} | ${t.class}</p>
<p>${t.location}</p>
<p>Status: ${t.status}</p>

<button class="approve" onclick="approveTeacher('${child.key}')">Approve</button>
<button class="delete" onclick="deleteTeacher('${child.key}')">Delete</button>

</div>
`;

});

document.getElementById("teacherList").innerHTML = html;

});

/* ========== INSTITUTIONS ========== */

onValue(ref(db,"institutions"), snapshot => {

let html = "";

snapshot.forEach(child => {

let i = child.val();

html += `
<div class="card">

<h3>${i.name}</h3>
<p>${i.address}</p>
<p>${i.courses}</p>
<p>Status: ${i.status}</p>

<button class="approve" onclick="approveInst('${child.key}')">Approve</button>
<button class="delete" onclick="deleteInst('${child.key}')">Delete</button>

</div>
`;

});

document.getElementById("instList").innerHTML = html;

});

/* ========== FUNCTIONS ========== */

window.approveTeacher = function(id){
update(ref(db,"teachers/"+id), {status:"approved"});
};

window.deleteTeacher = function(id){
remove(ref(db,"teachers/"+id));
};

window.approveInst = function(id){
update(ref(db,"institutions/"+id), {status:"approved"});
};

window.deleteInst = function(id){
remove(ref(db,"institutions/"+id));
};

</script>

</body>
</html>
