<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Universal Login - GURULINK</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:350px;
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#1565c0;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
}

#msg{
margin-top:10px;
text-align:center;
}
</style>
</head>

<body>

<div class="box">

<h2>Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="msg"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
databaseURL:"YOUR_DB",
projectId:"YOUR_ID",
storageBucket:"YOUR_BUCKET",
messagingSenderId:"YOUR_ID",
appId:"YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const msg = document.getElementById("msg");

window.login = async function(){

const email = document.getElementById("email").value.trim().toLowerCase();
const password = document.getElementById("password").value;

if(!email || !password){
msg.innerHTML = "Enter email & password";
return;
}

msg.innerHTML = "Logging in...";

try{

// 1. AUTH LOGIN
const userCred = await signInWithEmailAndPassword(auth,email,password);
const uid = userCred.user.uid;

// 2. GET ROLE FROM DATABASE
const snap = await get(ref(db,"users/"+uid));

if(!snap.exists()){
msg.innerHTML = "User role not found";
return;
}

const data = snap.val();
const role = data.role;

// 3. SAVE SESSION
localStorage.setItem("uid",uid);
localStorage.setItem("role",role);

// 4. REDIRECT BY ROLE
setTimeout(()=>{

if(role === "student"){
window.location.href = "profile-view.html";
}

else if(role === "teacher"){
window.location.href = "teacher-dashboard.html";
}

else if(role === "institution"){
window.location.href = "institution-dashboard.html";
}

else if(role === "admin"){
window.location.href = "admin.html";
}

else{
msg.innerHTML = "Unknown role";
}

},800);

}

catch(err){
msg.innerHTML = "Invalid email or password";
}

}

</script>

</body>
</html>
