<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>student-login - GURULINK</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.box{
width:100%;
max-width:420px;
background:white;
padding:30px;
border-radius:18px;
box-shadow:0 5px 20px rgba(0,0,0,.12);
}

h2{
margin-top:0;
text-align:center;
color:#1565c0;
}

p{
text-align:center;
color:#666;
margin-bottom:20px;
}

input{
width:100%;
padding:13px;
margin:10px 0;
border:1px solid #ccc;
border-radius:10px;
font-size:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:15px;
cursor:pointer;
margin-top:10px;
font-weight:bold;
}

.loginBtn{
background:#1565c0;
color:white;
}

.switchBtn{
background:#43a047;
color:white;
}

#msg{
margin-top:15px;
text-align:center;
font-weight:bold;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="box">

<!-- LOGIN -->

<div id="loginBox">

<h2>Login</h2>

<p>
Student / Teacher / Institution / Admin
</p>

<input
type="email"
id="loginEmail"
placeholder="Enter Email">

<input
type="password"
id="loginPassword"
placeholder="Enter Password">

<button
class="loginBtn"
onclick="loginUser()">

Login

</button>

<button
class="switchBtn"
onclick="showRegister()">

New Student? Register

</button>

</div>


<!-- REGISTER -->

<div id="registerBox" class="hidden">

<h2>Student Registration</h2>

<p>
Create your student account
</p>

<input
id="regName"
placeholder="Full Name">

<input
type="email"
id="regEmail"
placeholder="Email">

<input
id="regPhone"
placeholder="Phone Number">

<input
type="password"
id="regPassword"
placeholder="Create Password">

<button
class="loginBtn"
onclick="registerStudent()">

Register

</button>

<button
class="switchBtn"
onclick="showLogin()">

Already Have Account? Login

</button>

</div>

<div id="msg"></div>

</div>

<script type="module">

import {
initializeApp
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
getDatabase,
ref,
set,
get
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",

authDomain:"gurulink-59cc7.firebaseapp.com",

databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"gurulink-59cc7",

storageBucket:"gurulink-59cc7.appspot.com",

messagingSenderId:"112148672399",

appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getDatabase(app);

const msg = document.getElementById("msg");

/* SHOW REGISTER */

window.showRegister = function(){

document
.getElementById("loginBox")
.classList.add("hidden");

document
.getElementById("registerBox")
.classList.remove("hidden");

msg.innerHTML = "";

};

/* SHOW LOGIN */

window.showLogin = function(){

document
.getElementById("registerBox")
.classList.add("hidden");

document
.getElementById("loginBox")
.classList.remove("hidden");

msg.innerHTML = "";

};

/* STUDENT REGISTER */

window.registerStudent = async function(){

const name =
document.getElementById("regName")
.value
.trim();

const email =
document.getElementById("regEmail")
.value
.trim()
.toLowerCase();

const phone =
document.getElementById("regPhone")
.value
.trim();

const password =
document.getElementById("regPassword")
.value;

if(
!name ||
!email ||
!phone ||
!password
){

msg.style.color = "red";

msg.innerHTML =
"Please fill all fields";

return;

}

msg.style.color = "#1565c0";

msg.innerHTML =
"Creating account...";

try{

const userCred =

await createUserWithEmailAndPassword(
auth,
email,
password
);

const uid =
userCred.user.uid;

/* SAVE STUDENT */

await set(
ref(db,"students/"+uid),
{

uid:uid,

name:name,

email:email,

phone:phone,

role:"student",

createdAt:Date.now()

}
);

/* SAVE USER ROLE */

await set(
ref(db,"users/"+uid),
{

uid:uid,

name:name,

email:email,

role:"student",

profileId:uid,

createdAt:Date.now()

}
);

/* SAVE SESSION */

localStorage.setItem(
"uid",
uid
);

localStorage.setItem(
"role",
"student"
);

localStorage.setItem(
"profileId",
uid
);

msg.style.color = "green";

msg.innerHTML =
"Registration Successful";

/* IMPORTANT FIX */

const redirectPage =
sessionStorage.getItem(
"redirectAfterLogin"
);

setTimeout(()=>{

/* GO TO PROFILE PAGE */

if(
redirectPage &&
redirectPage !== "null" &&
redirectPage !== "undefined"
){

sessionStorage.removeItem(
"redirectAfterLogin"
);

window.location.href =
redirectPage;

}

/* NORMAL HOME */

else{

window.location.href =
"index.html";

}

},1500);

}
catch(err){

msg.style.color = "red";

if(
err.code ===
"auth/email-already-in-use"
){

msg.innerHTML =
"Email already registered";

}
else if(
err.code ===
"auth/weak-password"
){

msg.innerHTML =
"Password must be minimum 6 characters";

}
else{

msg.innerHTML =
err.message;

}

}

};

/* UNIVERSAL LOGIN */

window.loginUser = async function(){

const email =
document.getElementById("loginEmail")
.value
.trim()
.toLowerCase();

const password =
document.getElementById("loginPassword")
.value;

if(!email || !password){

msg.style.color = "red";

msg.innerHTML =
"Enter email and password";

return;

}

msg.style.color = "#1565c0";

msg.innerHTML =
"Logging in...";

try{

const userCred =

await signInWithEmailAndPassword(
auth,
email,
password
);

const uid =
userCred.user.uid;

/* GET USER ROLE */

const snap = await get(
ref(db,"users/"+uid)
);

if(!snap.exists()){

msg.style.color = "red";

msg.innerHTML =
"User profile not found";

return;

}

const userData = snap.val();

const role = userData.role;

/* SAVE SESSION */

localStorage.setItem(
"uid",
uid
);

localStorage.setItem(
"profileId",
userData.profileId || uid
);

localStorage.setItem(
"role",
role
);

msg.style.color = "green";

msg.innerHTML =
"Login Successful";

setTimeout(()=>{

/* STUDENT */

if(role === "student"){

/* IMPORTANT FIX */

const redirectPage =
sessionStorage.getItem(
"redirectAfterLogin"
);

/* GO TO PROFILE */

if(
redirectPage &&
redirectPage !== "null" &&
redirectPage !== "undefined"
){

sessionStorage.removeItem(
"redirectAfterLogin"
);

window.location.href =
redirectPage;

}

/* NORMAL HOME */

else{

window.location.href =
"index.html";

}

}

/* TEACHER */

else if(role === "teacher"){

window.location.href =
"teacher-dashboard.html";

}

/* INSTITUTION */

else if(role === "institution"){

window.location.href =
"teacher-dashboard.html";

}

/* ADMIN */

else if(role === "admin"){

window.location.href =
"admin.html";

}

/* UNKNOWN */

else{

msg.style.color = "red";

msg.innerHTML =
"Unknown role";

}

},1000);

}
catch(err){

msg.style.color = "red";

if(
err.code ===
"auth/invalid-credential"
){

msg.innerHTML =
"Invalid email or password";

}
else{

msg.innerHTML =
err.message;

}

}

};

</script>

</body>
</html>
