<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Student Login - GURULINK</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.box{
width:100%;
max-width:420px;
background:white;
padding:30px;
border-radius:18px;
box-shadow:0 5px 20px rgba(0,0,0,.12);
}

h2{
margin-top:0;
text-align:center;
color:#1565c0;
}

p{
text-align:center;
color:#666;
margin-bottom:20px;
}

input{
width:100%;
padding:13px;
margin:10px 0;
border:1px solid #ccc;
border-radius:10px;
font-size:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:15px;
cursor:pointer;
margin-top:10px;
font-weight:bold;
}

.loginBtn{
background:#1565c0;
color:white;
}

.switchBtn{
background:#43a047;
color:white;
}

#msg{
margin-top:15px;
text-align:center;
font-weight:bold;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="box">

<h2>Login</h2>
<p>Login to continue</p>

<input type="email" id="loginEmail" placeholder="Enter Email">
<input type="password" id="loginPassword" placeholder="Enter Password">

<button class="loginBtn" onclick="loginUser()">Login</button>

<div id="msg"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const msg = document.getElementById("msg");

/* LOGIN */
window.loginUser = async function(){

const email = document.getElementById("loginEmail").value.trim().toLowerCase();
const password = document.getElementById("loginPassword").value;

if(!email || !password){
msg.style.color="red";
msg.innerHTML="Enter email & password";
return;
}

msg.style.color="#1565c0";
msg.innerHTML="Logging in...";

try{

/* 1. AUTH LOGIN */
const userCred = await signInWithEmailAndPassword(auth,email,password);
const uid = userCred.user.uid;

/* 2. FIND ROLE FROM DATABASE */
let role = null;

/* USERS NODE (PRIMARY ROLE STORE) */
const userSnap = await get(ref(db,"users/"+uid));
if(userSnap.exists()){
role = userSnap.val().role;
}

/* FALLBACK CHECKS */
if(!role){

let snap = await get(ref(db,"students/"+uid));
if(snap.exists()) role = "student";

snap = await get(ref(db,"teachers/"+uid));
if(snap.exists()) role = "teacher";

snap = await get(ref(db,"institutions/"+uid));
if(snap.exists()) role = "institution";

snap = await get(ref(db,"admins/"+uid));
if(snap.exists()) role = "admin";
}

/* NOT FOUND */
if(!role){
msg.style.color="red";
msg.innerHTML="Account exists but role not set";
return;
}

/* 3. SAVE SESSION */
localStorage.setItem("uid",uid);
localStorage.setItem("role",role);

/* 4. SUCCESS */
msg.style.color="green";
msg.innerHTML="Login Successful";

/* 5. REDIRECT */
setTimeout(()=>{

if(role === "student"){
window.location.href = "profile-view.html";
}

else if(role === "teacher"){
window.location.href = "teacher-dashboard.html";
}

else if(role === "institution"){
window.location.href = "institution-dashboard.html";
}

else if(role === "admin"){
window.location.href = "admin.html";
}

else{
window.location.href = "index.html";
}

},800);

}

catch(err){
console.log(err);
msg.style.color="red";
msg.innerHTML="Invalid email or password";
}

};

</script>

</body>
</html>
