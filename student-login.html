<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Universal Login - GURULINK</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:350px;
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:10px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#1565c0;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

#msg{
margin-top:10px;
text-align:center;
font-weight:bold;
}
</style>
</head>

<body>

<div class="box">

<h2>Universal Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="msg"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
databaseURL:"YOUR_DB",
projectId:"YOUR_ID",
storageBucket:"YOUR_BUCKET",
messagingSenderId:"YOUR_ID",
appId:"YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const msg = document.getElementById("msg");

/* LOGIN FUNCTION */
window.login = async function(){

const email = document.getElementById("email").value.trim().toLowerCase();
const password = document.getElementById("password").value;

if(!email || !password){
msg.innerHTML = "Enter email & password";
msg.style.color = "red";
return;
}

msg.innerHTML = "Logging in...";
msg.style.color = "#1565c0";

try{

/* 1. LOGIN AUTH */
const userCred = await signInWithEmailAndPassword(auth,email,password);
const uid = userCred.user.uid;

/* 2. FIND ROLE (MULTI-CHECK SYSTEM) */
let role = null;
let data = null;

/* USERS TABLE */
let snap = await get(ref(db,"users/"+uid));
if(snap.exists()){
data = snap.val();
role = data.role;
}

/* STUDENT */
if(!role){
snap = await get(ref(db,"students/"+uid));
if(snap.exists()){
role = "student";
}
}

/* TEACHER */
if(!role){
snap = await get(ref(db,"teachers/"+uid));
if(snap.exists()){
role = "teacher";
}
}

/* INSTITUTION */
if(!role){
snap = await get(ref(db,"institutions/"+uid));
if(snap.exists()){
role = "institution";
}
}

/* ADMIN (optional direct check) */
if(!role){
snap = await get(ref(db,"admins/"+uid));
if(snap.exists()){
role = "admin";
}
}

/* NO ROLE FOUND */
if(!role){
msg.style.color = "red";
msg.innerHTML = "Account exists but role not assigned";
return;
}

/* 3. SAVE SESSION */
localStorage.setItem("uid",uid);
localStorage.setItem("role",role);

/* 4. REDIRECT */
msg.style.color = "green";
msg.innerHTML = "Login Successful";

setTimeout(()=>{

if(role === "student"){
window.location.href = "profile-view.html";
}

else if(role === "teacher"){
window.location.href = "teacher-dashboard.html";
}

else if(role === "institution"){
window.location.href = "institution-dashboard.html";
}

else if(role === "admin"){
window.location.href = "admin.html";
}

else{
msg.innerHTML = "Unknown role";
}

},800);

}

catch(err){
console.log(err);
msg.style.color = "red";
msg.innerHTML = "Invalid email or password";
}

}

</script>

</body>
</html>
