<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Skill Institution Registration</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
}

header{
background:#2e7d32;
color:white;
padding:18px;
text-align:center;
}

.container{
width:90%;
max-width:800px;
margin:20px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

textarea{
height:100px;
resize:none;
}

button{
width:100%;
padding:14px;
background:#2e7d32;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.preview{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

.preview img{
width:90px;
height:90px;
border-radius:10px;
object-fit:cover;
border:1px solid #ddd;
}

.modeBox{
padding:15px;
border:1px solid #ddd;
border-radius:10px;
}

.row{
display:flex;
align-items:center;
gap:10px;
margin:10px 0;
}

.row input[type=checkbox]{
width:auto;
transform:scale(1.2);
}

.modeFee{
display:none;
padding:10px;
background:#f4f4f4;
border-radius:10px;
margin-bottom:10px;
}

</style>
</head>

<body>

<header>
<h1>Skill Institution Registration</h1>
<p>Registration Fee ₹150</p>
</header>

<div class="container">

<form id="form">

<input id="name" placeholder="Institution Name" required>
<input id="ownerName" placeholder="Owner Name" required>
<input type="date" id="establishedDate" required>

<input id="phone" placeholder="Contact Number" required>
<input id="email" placeholder="Email">
<input id="address" placeholder="Address">

<h3>Skill Categories</h3>

<div class="modeBox">

<div class="row"><input type="checkbox" class="subjectCheck" value="Computer"> Computer</div>
<div class="row"><input type="checkbox" class="subjectCheck" value="Fashion Design"> Fashion Design</div>
<div class="row"><input type="checkbox" class="subjectCheck" value="Beauty & Makeup"> Beauty & Makeup</div>
<div class="row"><input type="checkbox" class="subjectCheck" value="Cooking"> Cooking</div>
<div class="row"><input type="checkbox" class="subjectCheck" value="Photography"> Photography</div>
<div class="row"><input type="checkbox" class="subjectCheck" value="Music"> Music</div>
<div class="row"><input type="checkbox" class="subjectCheck" value="Dance"> Dance</div>
<div class="row"><input type="checkbox" class="subjectCheck" value="Graphic Design"> Graphic Design</div>

</div>

<h3>Training Modes</h3>

<div class="modeBox">

<div class="row">
<input type="checkbox" value="Online" onchange="toggleFee('online')"> Online
</div>
<div id="online" class="modeFee">
<input id="onlineFee" placeholder="Online Fee">
</div>

<div class="row">
<input type="checkbox" value="Offline" onchange="toggleFee('offline')"> Offline
</div>
<div id="offline" class="modeFee">
<input id="offlineFee" placeholder="Offline Fee">
</div>

</div>

<h3>Logo</h3>
<input type="file" id="logo" accept="image/*">
<div id="logoPreview" class="preview"></div>

<h3>ID Proof</h3>
<input type="file" id="idUpload" accept="image/*">
<div id="idPreview" class="preview"></div>

<h3>Gallery</h3>
<input type="file" id="gallery" accept="image/*" multiple>
<div id="galleryPreview" class="preview"></div>

<textarea id="description" placeholder="About Skill Institution"></textarea>

<button type="submit">Continue To Payment</button>

</form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

function toggleFee(id){
document.getElementById(id).style.display =
document.getElementById(id).style.display === "block" ? "none" : "block";
}

document.getElementById("form").addEventListener("submit", async (e)=>{
e.preventDefault();

let categories = [];
document.querySelectorAll(".subjectCheck:checked").forEach(i=>{
categories.push(i.value);
});

const data = {
name:document.getElementById("name").value,
ownerName:document.getElementById("ownerName").value,
establishedDate:document.getElementById("establishedDate").value,
phone:document.getElementById("phone").value,
email:document.getElementById("email").value,
address:document.getElementById("address").value,
categories,
onlineFee:document.getElementById("onlineFee").value,
offlineFee:document.getElementById("offlineFee").value,
description:document.getElementById("description").value,
category:"skill",
status:"pending",
createdAt:Date.now()
};

const newRef = await push(ref(db,"institutions"), data);

localStorage.setItem("institutionId", newRef.key);

window.location.href = "payment.html?type=skill";

});

</script>

</body>
</html>
