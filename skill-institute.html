<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Skill Institute Registration</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#2e7d32;
color:white;
padding:18px;
text-align:center;
}

.container{
max-width:900px;
margin:20px auto;
background:white;
padding:20px;
border-radius:12px;
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#2e7d32;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.row{
display:flex;
gap:10px;
align-items:center;
margin:6px 0;
}
</style>
</head>

<body>

<header>
<h2>Skill Institute Registration</h2>
<p>Technical • Vocational • Training • Skills</p>
</header>

<div class="container">

<form id="form">

<h3>Login Details</h3>

<input id="email" type="email" placeholder="Email" required>
<input id="password" type="password" placeholder="Password" required>

<h3>Institute Info</h3>

<input id="name" placeholder="Institute Name" required>
<input id="owner" placeholder="Owner Name" required>
<input id="phone" placeholder="Phone Number" required>
<input id="address" placeholder="Address" required>

<h3>Skill Categories</h3>

<div class="row"><input type="checkbox" value="Computer Training" class="cat"> Computer Training</div>
<div class="row"><input type="checkbox" value="Coding" class="cat"> Coding / Programming</div>
<div class="row"><input type="checkbox" value="Digital Marketing" class="cat"> Digital Marketing</div>
<div class="row"><input type="checkbox" value="Accounting" class="cat"> Accounting</div>
<div class="row"><input type="checkbox" value="Electrical" class="cat"> Electrical Training</div>
<div class="row"><input type="checkbox" value="Mechanical" class="cat"> Mechanical Training</div>
<div class="row"><input type="checkbox" value="Car Repair" class="cat"> Car Repair</div>
<div class="row"><input type="checkbox" value="Beauty & Wellness" class="cat"> Beauty & Wellness</div>

<textarea id="about" placeholder="About Institute"></textarea>

<button type="submit">Register & Continue</button>

</form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
getDatabase,
ref,
set
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

document.getElementById("form").addEventListener("submit", async (e)=>{
e.preventDefault();

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const name = document.getElementById("name").value;
const owner = document.getElementById("owner").value;
const phone = document.getElementById("phone").value;
const address = document.getElementById("address").value;
const about = document.getElementById("about").value;

const categories = [];
document.querySelectorAll(".cat:checked").forEach(c=>{
categories.push(c.value);
});

if(categories.length === 0){
alert("Select at least one skill category");
return;
}

try {

// 1. CREATE AUTH USER
const userCred = await createUserWithEmailAndPassword(auth, email, password);
const uid = userCred.user.uid;

// 2. SAVE INSTITUTE DATA (UID BASED)
await set(ref(db, "skill_institutes/" + uid), {
uid,
name,
owner,
phone,
email,
address,
about,
categories,
role:"skill_institute",
status:"pending",
createdAt:Date.now()
});

// 3. ROLE MAPPING
await set(ref(db, "users/" + uid), {
uid,
role:"skill_institute",
profileId:uid
});

alert("Skill Institute Registered Successfully");

window.location.href = "payment.html?type=skill_institute&id=" + uid;

}
catch(err){
alert(err.message);
}

});

</script>

</body>
</html>
