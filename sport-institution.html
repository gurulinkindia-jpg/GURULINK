<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Sport Institution Registration</title>

<style>

body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#1565c0;
color:white;
padding:18px;
text-align:center;
}

.container{
width:90%;
max-width:800px;
margin:20px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

textarea{
height:100px;
resize:none;
}

button{
width:100%;
padding:14px;
background:#1565c0;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.preview{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}

.preview img{
width:90px;
height:90px;
border-radius:10px;
object-fit:cover;
border:1px solid #ddd;
}

.modeBox{
border:1px solid #ddd;
padding:15px;
border-radius:10px;
}

.modeFee{
display:none;
padding:10px;
background:#f4f4f4;
border-radius:10px;
margin-bottom:10px;
}

.row{
display:flex;
align-items:center;
gap:10px;
margin:10px 0;
}

.row input{
width:auto;
transform:scale(1.2);
}

</style>
</head>

<body>

<header>
<h1>Sport Institution Registration</h1>
<p>Registration Fee ₹200</p>
</header>

<div class="container">

<form id="instForm">

<input id="name" placeholder="Institution Name" required>
<input id="phone" placeholder="Phone Number" required>

<input type="email" id="email" placeholder="Email">
<input id="website" placeholder="Website / Social Link">
<input id="address" placeholder="Address">
<input id="area" placeholder="Service Area (e.g. Beltola)">

<!-- SPORT CATEGORY -->
<select id="sport">

<option value="">Select Sport Category</option>

<option>Cricket Academy</option>
<option>Football Academy</option>
<option>Badminton Academy</option>
<option>Basketball Academy</option>
<option>Swimming Academy</option>
<option>Athletics Academy</option>
<option>Gym / Fitness Center</option>

<option value="other">Other</option>

</select>

<input id="otherSport" placeholder="Write Sport Category" style="display:none">


<h3>Training Modes</h3>

<div class="modeBox">

<div class="row">
<input type="checkbox" value="Offline Training" onchange="toggleFee('offline')">
<label>Offline Training</label>
</div>
<div id="offline" class="modeFee">
<input id="offlineFee" placeholder="Enter Fee">
</div>

<div class="row">
<input type="checkbox" value="Online Training" onchange="toggleFee('online')">
<label>Online Training</label>
</div>
<div id="online" class="modeFee">
<input id="onlineFee" placeholder="Enter Fee">
</div>

<div class="row">
<input type="checkbox" value="Hybrid Training" onchange="toggleFee('hybrid')">
<label>Hybrid Training</label>
</div>
<div id="hybrid" class="modeFee">
<input id="hybridFee" placeholder="Enter Fee">
</div>

</div>


<label><b>Logo</b></label>
<input type="file" id="logo" accept="image/*">
<div id="logoPreview" class="preview"></div>


<label><b>Gallery (Max 5)</b></label>
<input type="file" id="gallery" multiple accept="image/*">
<div id="galleryPreview" class="preview"></div>


<textarea id="description" placeholder="About Institution"></textarea>

<button type="submit">Continue To Payment</button>

</form>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const API_KEY = "31f729ff855eb2e42c00ee508a8647ea";

const form = document.getElementById("instForm");
const sport = document.getElementById("sport");
const otherSport = document.getElementById("otherSport");
const logo = document.getElementById("logo");
const gallery = document.getElementById("gallery");

const logoPreview = document.getElementById("logoPreview");
const galleryPreview = document.getElementById("galleryPreview");


/* SPORT OTHER */
sport.addEventListener("change", ()=>{
otherSport.style.display =
sport.value === "other" ? "block" : "none";
});


/* IMAGE UPLOAD */
async function upload(file){
let fd = new FormData();
fd.append("image", file);

let res = await fetch(
`https://api.imgbb.com/1/upload?key=${API_KEY}`,
{ method:"POST", body:fd }
);

let data = await res.json();
return data.data.url;
}


/* LOGO PREVIEW */
logo.addEventListener("change", ()=>{
logoPreview.innerHTML="";
if(logo.files[0]){
let img=document.createElement("img");
img.src=URL.createObjectURL(logo.files[0]);
logoPreview.appendChild(img);
}
});


/* GALLERY PREVIEW */
gallery.addEventListener("change", ()=>{
galleryPreview.innerHTML="";

if(gallery.files.length > 5){
alert("Max 5 images allowed");
gallery.value="";
return;
}

Array.from(gallery.files).forEach(file=>{
let img=document.createElement("img");
img.src=URL.createObjectURL(file);
galleryPreview.appendChild(img);
});
});


/* TOGGLE FEE */
window.toggleFee = function(id){
let box=document.getElementById(id);
box.style.display = box.style.display==="block" ? "none" : "block";
};


/* SUBMIT */
form.addEventListener("submit", async(e)=>{
e.preventDefault();

try{

let logoUrl = "";
if(logo.files[0]){
logoUrl = await upload(logo.files[0]);
}

let galleryUrls = [];
for(let f of gallery.files){
galleryUrls.push(await upload(f));
}

let modes = [];
document.querySelectorAll('input[type="checkbox"]:checked')
.forEach(c=>{
modes.push(c.value || "");
});


let newRef = await push(ref(db,"institutions"),{

name: document.getElementById("name").value || "",
phone: document.getElementById("phone").value || "",
email: document.getElementById("email").value || "",
website: document.getElementById("website").value || "",
address: document.getElementById("address").value || "",
area: document.getElementById("area").value || "",

sport:
sport.value === "other"
? otherSport.value || ""
: sport.value || "",

modes: modes,

offlineFee: document.getElementById("offlineFee").value || "",
onlineFee: document.getElementById("onlineFee").value || "",
hybridFee: document.getElementById("hybridFee").value || "",

logo: logoUrl || "",
gallery: galleryUrls || [],

description: document.getElementById("description").value || "",

category: "sport",
status: "pending"

});

const institutionId = newRef.key;
localStorage.setItem("institutionId", institutionId);

window.location.href =
"payment.html?type=institution&id=" + institutionId;

}
catch(err){
console.log(err);
alert("Error: " + err.message);
}

});

</script>

</body>
</html>
