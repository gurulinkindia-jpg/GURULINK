<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Academic Institution Registration</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
}

header{
background:#0d47a1;
color:white;
padding:18px;
text-align:center;
}

.container{
width:90%;
max-width:800px;
margin:20px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

textarea{
height:100px;
resize:none;
}

button{
width:100%;
padding:14px;
background:#1b5e20;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.preview{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.preview img{
width:90px;
height:90px;
object-fit:cover;
border-radius:10px;
}
.modeFee{display:none;padding:10px;background:#f7f7f7;border-radius:8px;}
</style>
</head>

<body>

<header>
<h1>Academic Institution Registration</h1>
<p>Registration Fee ₹200</p>
</header>

<div class="container">

<form id="form">

<input id="name" placeholder="Institution Name" required>
<input id="phone" placeholder="Contact Number" required>
<input id="email" placeholder="Email">
<input id="website" placeholder="Website / Social Link">
<input id="address" placeholder="Address">
<input id="area" placeholder="Area">

<select id="subject">
<option value="">Select Subject</option>
<option>Physics</option>
<option>Chemistry</option>
<option>Mathematics</option>
<option>Biology</option>
<option>JEE</option>
<option>NEET</option>
<option value="other">Other</option>
</select>

<input id="otherSubject" placeholder="Enter Subject" style="display:none">

<select id="class">
<option>Class 1-5</option>
<option>Class 6-8</option>
<option>Class 9-10</option>
<option>Class 11-12</option>
<option>JEE</option>
<option>NEET</option>
</select>





<div class="modeBox">

<div class="row">

<input
type="checkbox"
value="Offline Classroom"
onchange="toggleFee('offline')">

<label>Offline Classroom</label>

</div>

<div id="offline"
class="modeFee">

<input
id="offlineFee"
placeholder="Enter Offline Fee">

</div>



<div class="row">

<input
type="checkbox"
value="Online"
onchange="toggleFee('online')">

<label>Online</label>

</div>

<div id="online"
class="modeFee">

<input
id="onlineFee"
placeholder="Enter Online Fee">

</div>



<div class="row">

<input
type="checkbox"
value="Hybrid"
onchange="toggleFee('hybrid')">

<label>Hybrid</label>

</div>

<div id="hybrid"
class="modeFee">

<input
id="hybridFee"
placeholder="Enter Hybrid Fee">

</div>

</div>



<h3>Institution Logo</h3>

<input
type="file"
id="logo"
accept="image/*">

<div
id="logoPreview"
class="preview"></div>



<h3>Gallery Photos (Max 5)</h3>

<input
type="file"
id="gallery"
multiple
accept="image/*">

<div
id="galleryPreview"
class="preview"></div>


<textarea
id="description"
placeholder="About Institution"></textarea>


<button type="submit">

Continue To Payment

</button>

</form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain: "gurulink-59cc7.firebaseapp.com",
databaseURL: "https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "gurulink-59cc7",
storageBucket: "gurulink-59cc7.appspot.com",
messagingSenderId: "112148672399",
appId: "1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const API_KEY = "31f729ff855eb2e42c00ee508a8647ea";

/* ELEMENTS */
const form = document.getElementById("form");
const name = document.getElementById("name");
const phone = document.getElementById("phone");
const email = document.getElementById("email");
const website = document.getElementById("website");
const address = document.getElementById("address");
const area = document.getElementById("area");
const subject = document.getElementById("subject");
const otherSubject = document.getElementById("otherSubject");
const classInput = document.getElementById("class");
const description = document.getElementById("description");
const logo = document.getElementById("logo");
const gallery = document.getElementById("gallery");

/* UPLOAD */
async function upload(file){
let fd = new FormData();
fd.append("image", file);

let res = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`,{
method:"POST",
body:fd
});

let data = await res.json();
return data.data.url;
}

/* SUBJECT */
subject.addEventListener("change",()=>{
otherSubject.style.display =
subject.value==="other" ? "block" : "none";
});

/* SUBMIT */
form.addEventListener("submit", async (e)=>{
e.preventDefault();

try{

let logoUrl = logo.files[0] ? await upload(logo.files[0]) : "";

let galleryUrls = [];
for(let f of gallery.files){
galleryUrls.push(await upload(f));
}

let modes = [];
document.querySelectorAll('input[type="checkbox"]:checked')
.forEach(c=>modes.push(c.value));

let newRef = await push(ref(db,"institutions"),{

name: name.value,
phone: phone.value,
email: email.value,
website: website.value,
address: address.value,
area: area.value,

subject: subject.value==="other" ? otherSubject.value : subject.value,
class: classInput.value,

modes: modes,

offlineFee: document.getElementById("offlineFee").value || "",
homeFee: document.getElementById("homeFee").value || "",
onlineFee: document.getElementById("onlineFee").value || "",

logo: logoUrl,
gallery: galleryUrls,

description: description.value,
category: "academic",
status: "pending"

});

/* IMPORTANT FIX */
const id = newRef.key;
localStorage.setItem("institutionId", id);

window.location.href =
"payment.html?type=institution&id=" + id;

}catch(err){
alert("Error: " + err.message);
console.log(err);
}

});

</script>

</body>
</html>
