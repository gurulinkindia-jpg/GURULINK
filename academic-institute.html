<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Academic Institution Registration</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
}

header{
background:#e65100;
color:white;
padding:18px;
text-align:center;
}

.container{
width:90%;
max-width:800px;
margin:20px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

textarea{
height:100px;
resize:none;
}

button{
width:100%;
padding:14px;
background:#e65100;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.preview{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

.preview img{
width:90px;
height:90px;
border-radius:10px;
object-fit:cover;
border:1px solid #ddd;
}

.modeBox{
padding:15px;
border:1px solid #ddd;
border-radius:10px;
}

.row{
display:flex;
align-items:center;
gap:10px;
margin:10px 0;
}

.row input[type="checkbox"]{
width:18px;
height:18px;
margin:0;
cursor:pointer;
}

.row label{
margin:0;
cursor:pointer;
}

.modeFee{
display:none;
padding:10px;
background:#f4f4f4;
border-radius:10px;
margin-bottom:10px;
}
</style>
</head>

<body>

<header>
<h1>Academic Institution Registration</h1>
<p>Registration Fee ₹200</p>
</header>

<div class="container">

<form id="form">

<input id="name" placeholder="Institution Name" required>
<input id="phone" placeholder="Contact Number" required>
<input id="email" placeholder="Email">
<input id="website" placeholder="Website / Social Link">
<input id="address" placeholder="Address">
<input id="area" placeholder="Area">

<select id="subject">
<option value="">Select Subject</option>
<option>Physics</option>
<option>Chemistry</option>
<option>Mathematics</option>
<option>Biology</option>
<option>JEE</option>
<option>NEET</option>
<option value="other">Other</option>
</select>

<input id="otherSubject" placeholder="Enter Subject" style="display:none">

<select id="class">
<option>Class 1-5</option>
<option>Class 6-8</option>
<option>Class 9-10</option>
<option>Class 11-12</option>
<option>JEE</option>
<option>NEET</option>
</select>





<div class="modeBox">

<div class="row">

<input
type="checkbox"
value="Offline Classroom"
onchange="toggleFee('offline')">

<label>Offline Classroom</label>

</div>

<div id="offline"
class="modeFee">

<input
id="offlineFee"
placeholder="Enter Offline Fee">

</div>



<div class="row">

<input
type="checkbox"
value="Online"
onchange="toggleFee('online')">

<label>Online</label>

</div>

<div id="online"
class="modeFee">

<input
id="onlineFee"
placeholder="Enter Online Fee">

</div>



<div class="row">

<input
type="checkbox"
value="Hybrid"
onchange="toggleFee('hybrid')">

<label>Hybrid</label>

</div>

<div id="hybrid"
class="modeFee">

<input
id="hybridFee"
placeholder="Enter Hybrid Fee">

</div>

</div>



<h3>Institution Logo</h3>

<input
type="file"
id="logo"
accept="image/*">

<div
id="logoPreview"
class="preview"></div>



<h3>Gallery Photos (Max 5)</h3>

<input
type="file"
id="gallery"
multiple
accept="image/*">

<div
id="galleryPreview"
class="preview"></div>


<textarea
id="description"
placeholder="About Institution"></textarea>


<button type="submit">

Continue To Payment

</button>

</form>

</div>





<script type="module">

import {
initializeApp
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getDatabase,
ref,
push
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";


const firebaseConfig={

apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"

};

const app=initializeApp(firebaseConfig);

const db=getDatabase(app);

const API_KEY=
"31f729ff855eb2e42c00ee508a8647ea";


/* ELEMENTS */

const form=
document.getElementById("form");

const skill=
document.getElementById("skill");

const otherSkill=
document.getElementById("otherSkill");

const logo=
document.getElementById("logo");

const logoPreview=
document.getElementById("logoPreview");

const gallery=
document.getElementById("gallery");

const galleryPreview=
document.getElementById("galleryPreview");


/* IMAGE UPLOAD */

async function upload(file){

let fd=new FormData();

fd.append(
"image",
file
);

let res=await fetch(
`https://api.imgbb.com/1/upload?key=${API_KEY}`,
{
method:"POST",
body:fd
}
);

let data=await res.json();

return data.data.url;

}


/* SKILL OTHER */

skill.addEventListener(
"change",
()=>{

otherSkill.style.display=
skill.value==="other"
?
"block"
:
"none";

}
);


/* LOGO PREVIEW */

logo.addEventListener(
"change",
function(){

logoPreview.innerHTML="";

if(this.files[0]){

let img=document.createElement("img");

img.src=
URL.createObjectURL(this.files[0]);

logoPreview.appendChild(img);

}

}
);


/* GALLERY PREVIEW */

gallery.addEventListener(
"change",
function(){

galleryPreview.innerHTML="";

if(this.files.length>5){

alert("Maximum 5 photos");

this.value="";

return;

}

Array.from(this.files)
.forEach(file=>{

let img=document.createElement("img");

img.src=
URL.createObjectURL(file);

galleryPreview.appendChild(img);

});

}
);


/* SUBMIT */

form.addEventListener(
"submit",
async(e)=>{

e.preventDefault();

try{

/* LOGO */

let logoUrl="";

if(logo.files[0]){

logoUrl=
await upload(
logo.files[0]
);

}


/* GALLERY */

let galleryUrls=[];

for(let file of gallery.files){

galleryUrls.push(
await upload(file)
);

}


/* MODES */

let teachingModes=[];

document
.querySelectorAll(
'input[type="checkbox"]:checked'
)
.forEach(c=>{

teachingModes.push(
c.value
);

});


/* SAVE FIREBASE */

let newRef=
await push(
ref(
db,
"institutions"
),
{

name:
document.getElementById("name").value,

phone:
document.getElementById("phone").value,

email:
document.getElementById("email").value,

website:
document.getElementById("website").value,

address:
document.getElementById("address").value,

area:
document.getElementById("area").value,

skill:
skill.value==="other"
?
otherSkill.value
:
skill.value,

teachingModes,

offlineFee:
document.getElementById("offlineFee").value || "",

onlineFee:
document.getElementById("onlineFee").value || "",

hybridFee:
document.getElementById("hybridFee").value || "",

logo:
logoUrl,

gallery:
galleryUrls,

description:
document.getElementById("description").value,

category:"skill",

status:"pending"

}

);


/* SAVE ID */

const institutionId=
newRef.key;

localStorage.setItem(
"institutionId",
institutionId
);


/* REDIRECT PAYMENT */

window.location.href=
"payment.html?type=institution&id="+institutionId;

}
catch(error){

console.log(error);

alert(
"Submission error:\n"+
error.message
);

}

});

</script>


<script>

function toggleFee(id){

let box=
document.getElementById(id);

box.style.display=
box.style.display==="block"
?
"none"
:
"block";

}

</script>

</body>
</html>
