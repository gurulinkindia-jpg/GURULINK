<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Academic Institution Registration</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
}

header{
background:#e65100;
color:white;
padding:18px;
text-align:center;
}

.container{
width:90%;
max-width:800px;
margin:20px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

textarea{
height:100px;
resize:none;
}

button{
width:100%;
padding:14px;
background:#e65100;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.preview{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

.preview img{
width:90px;
height:90px;
object-fit:cover;
border-radius:10px;
border:1px solid #ddd;
}

.modeBox{
padding:15px;
border:1px solid #ddd;
border-radius:10px;
}

.row{
display:flex;
align-items:center;
gap:10px;
margin:10px 0;
}

.row input[type="checkbox"]{
width:18px;
height:18px;
margin:0;
}

.modeFee{
display:none;
padding:10px;
background:#f4f4f4;
border-radius:10px;
margin-bottom:10px;
}

</style>
</head>

<body>

<header>
<h1>Academic Institution Registration</h1>
<p>Registration Fee ₹200</p>
</header>

<div class="container">

<form id="form">

<input id="name" placeholder="Institution Name" required>

<input id="phone" placeholder="Contact Number" required>

<input id="email" placeholder="Email">

<input id="website" placeholder="Website">

<input id="address" placeholder="Address">

<input id="area" placeholder="Area">

<select id="subject">

<option value="">Select Subject</option>
<option>Physics</option>
<option>Chemistry</option>
<option>Mathematics</option>
<option>Biology</option>
<option>JEE</option>
<option>NEET</option>

<option value="other">
Other
</option>

</select>

<input
id="otherSubject"
placeholder="Enter Subject"
style="display:none"
>

<select id="class">

<option>Class 1-5</option>
<option>Class 6-8</option>
<option>Class 9-10</option>
<option>Class 11-12</option>
<option>JEE</option>
<option>NEET</option>

</select>


<h3>Teaching Modes</h3>

<div class="modeBox">

<div class="row">
<input type="checkbox"
value="Offline"
onchange="toggleFee('offline')">

<label>
Offline Classroom
</label>
</div>

<div id="offline"
class="modeFee">

<input
id="offlineFee"
placeholder="Enter Fee">

</div>


<div class="row">

<input
type="checkbox"
value="Online"
onchange="toggleFee('online')">

<label>
Online
</label>

</div>

<div id="online"
class="modeFee">

<input
id="onlineFee"
placeholder="Enter Fee">

</div>



<div class="row">

<input
type="checkbox"
value="Hybrid"
onchange="toggleFee('hybrid')">

<label>
Hybrid
</label>

</div>

<div id="hybrid"
class="modeFee">

<input
id="hybridFee"
placeholder="Enter Fee">

</div>

</div>


<h3>Institution Logo</h3>

<input
type="file"
id="logo"
accept="image/*">

<div id="logoPreview"
class="preview"></div>


<h3>Gallery Photos (Max 5)</h3>

<input
type="file"
id="gallery"
multiple
accept="image/*">

<div id="galleryPreview"
class="preview"></div>


<textarea
id="description"
placeholder="About Institution"></textarea>

<button type="submit">
Continue To Payment
</button>

</form>

</div>



<script>

function toggleFee(id){

let box=
document.getElementById(id);

box.style.display=

box.style.display==="block"

?

"none"

:

"block";

}

</script>

const logo=
document.getElementById("logo");

const gallery=
document.getElementById("gallery");


/* Logo Preview */

logo.addEventListener(
"change",
function(){

document.getElementById(
"logoPreview"
).innerHTML="";

if(this.files[0]){

let img=
document.createElement("img");

img.src=
URL.createObjectURL(
this.files[0]
);

document
.getElementById(
"logoPreview"
)
.appendChild(img);

/* Gallery Preview */

gallery.addEventListener(
"change",
function(){

let preview=
document.getElementById(
"galleryPreview"
);

preview.innerHTML="";

if(this.files.length>5){

alert(
"Maximum 5 photos"
);

this.value="";

return;

}

Array.from(this.files)
.forEach(file=>{

let img=
document.createElement("img");

img.src=
URL.createObjectURL(file);

preview.appendChild(img);

});

});

</script>

</body>
</html>
