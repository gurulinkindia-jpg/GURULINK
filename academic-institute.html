<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Academic Institution Registration</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
}

header{
background:#e65100;
color:white;
padding:18px;
text-align:center;
}

.container{
width:90%;
max-width:800px;
margin:20px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

textarea{
height:100px;
resize:none;
}

button{
width:100%;
padding:14px;
background:#e65100;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:disabled{
opacity:.7;
cursor:not-allowed;
}

.preview{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

.preview img{
width:90px;
height:90px;
border-radius:10px;
object-fit:cover;
border:1px solid #ddd;
}

.modeBox{
padding:15px;
border:1px solid #ddd;
border-radius:10px;
}

.row{
display:flex;
align-items:center;
gap:10px;
margin:10px 0;
}

.row input{
width:auto;
margin:0;
}

.modeFee{
display:none;
padding:10px;
background:#f4f4f4;
border-radius:10px;
margin-bottom:10px;
}

</style>
</head>

<body>

<header>
<h1>Academic Institution Registration</h1>
<p>Registration Fee ₹200</p>
</header>

<div class="container">

<form id="form">

<input id="name" placeholder="Institution Name" required>

<input id="phone" placeholder="Contact Number" required>

<input id="email"
type="email"
placeholder="Email">

<input id="website"
placeholder="Website">

<input id="address"
placeholder="Address">

<input id="area"
placeholder="Area">


<select id="subject">

<option value="">
Select Subject
</option>

<option>Physics</option>
<option>Chemistry</option>
<option>Mathematics</option>
<option>Biology</option>
<option>JEE</option>
<option>NEET</option>

<option value="other">
Other
</option>

</select>

<input
id="otherSubject"
placeholder="Enter Subject"
style="display:none">


<select id="class">

<option>Class 1-5</option>
<option>Class 6-8</option>
<option>Class 9-10</option>
<option>Class 11-12</option>
<option>JEE</option>
<option>NEET</option>

</select>


<h3>Teaching Modes</h3>

<div class="modeBox">

<div class="row">
<input
type="checkbox"
value="Offline Classroom"
onchange="toggleFee(this,'offline')">

<label>
Offline Classroom
</label>
</div>

<div id="offline"
class="modeFee">

<input
id="offlineFee"
placeholder="Enter Offline Fee">

</div>


<div class="row">
<input
type="checkbox"
value="Online"
onchange="toggleFee(this,'online')">

<label>
Online
</label>
</div>

<div id="online"
class="modeFee">

<input
id="onlineFee"
placeholder="Enter Online Fee">

</div>


<div class="row">
<input
type="checkbox"
value="Hybrid"
onchange="toggleFee(this,'hybrid')">

<label>
Hybrid
</label>
</div>

<div id="hybrid"
class="modeFee">

<input
id="hybridFee"
placeholder="Enter Hybrid Fee">

</div>

</div>


<h3>Institution Logo</h3>

<input
type="file"
id="logo"
accept="image/*">

<div
id="logoPreview"
class="preview"></div>


<h3>Gallery Photos (Max 5)</h3>

<input
type="file"
id="gallery"
multiple
accept="image/*">

<div
id="galleryPreview"
class="preview"></div>


<textarea
id="description"
placeholder="About Institution"></textarea>

<button type="submit">
Continue To Payment
</button>

</form>

</div>


<script>

function toggleFee(check,id){

let box=document.getElementById(id);

box.style.display=
check.checked
?
"block"
:
"none";

}

</script>


<script type="module">

import {
initializeApp
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getDatabase,
ref,
get
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";


const firebaseConfig={

apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"

};

const app=
initializeApp(firebaseConfig);

const db=
getDatabase(app);


async function loadPayments(){

try{

const paymentsRef=
ref(
db,
"payments"
);

const snapshot=
await get(paymentsRef);

const container=
document.getElementById(
"paymentList"
);

container.innerHTML="";


if(!snapshot.exists()){

container.innerHTML=
"<h3>No Payments Found</h3>";

return;

}


const payments=
snapshot.val();


for(let paymentId in payments){

const payment=
payments[paymentId];


let institutionName=
"NOT FOUND";

let categoryName=
"NOT FOUND";


if(payment.institutionId){

const institutionRef=
ref(
db,
"institutions/"+payment.institutionId
);

const institutionSnap=
await get(
institutionRef
);

if(
institutionSnap.exists()
){

const institution=
institutionSnap.val();


institutionName=

institution.name ||
"NOT FOUND";


categoryName=

institution.skill ||

institution.subject ||

"NOT FOUND";

}

}


container.innerHTML+=`

<div style="
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
">

<b>Name:</b>
${institutionName}

<br><br>

<b>Subject / Skill:</b>
${categoryName}

<br><br>

<b>Type:</b>
${payment.type || "-"}

<br><br>

<b>Amount:</b>
₹${payment.amount || 0}

<br><br>

<b>Status:</b>
${payment.status || "-"}

<br><br>

<b>Date:</b>
${new Date(
payment.date || Date.now()
).toLocaleString()}

</div>

`;

}

}
catch(error){

console.log(error);

alert(
"Error:\n"+
error.message
);

}

}


loadPayments();

</script>



<div id="paymentList"></div>

</body>
</html>
