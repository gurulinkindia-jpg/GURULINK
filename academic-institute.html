<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Institution Registration</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f7}
header{background:#0d47a1;color:white;padding:18px;text-align:center}
.container{width:90%;max-width:800px;margin:20px auto;background:white;padding:25px;border-radius:15px}
input,select,textarea{width:100%;padding:12px;margin:10px 0;border:1px solid #ccc;border-radius:8px}
button{width:100%;padding:14px;background:#1b5e20;color:white;border:none;border-radius:10px;cursor:pointer}
.modeFee{display:none;padding:10px;background:#f7f7f7;margin-top:5px;border-radius:8px}
</style>

</head>

<body>

<header>
<h1>Academic Institution Registration</h1>
<p>Registration Fee ₹200</p>
</header>

<div class="container">

<form id="form">

<input id="name" placeholder="Institution Name" required>
<input id="phone" placeholder="Phone" required>
<input id="email" placeholder="Email">
<input id="website" placeholder="Website">
<input id="address" placeholder="Address">
<input id="area" placeholder="Area">

<select id="subject">
<option value="">Select Subject</option>
<option>Physics</option>
<option>Math</option>
<option>NEET</option>
<option value="other">Other</option>
</select>

<input id="otherSubject" style="display:none" placeholder="Other Subject">

<select id="class">
<option>Class 1-5</option>
<option>Class 6-8</option>
<option>Class 9-10</option>
<option>Class 11-12</option>
<option>JEE</option>
<option>NEET</option>
</select>

<h3>Modes</h3>

<label><input type="checkbox" value="Offline" onclick="toggleFee('offline')"> Offline</label>
<div id="offline" class="modeFee"><input id="offlineFee"></div>

<label><input type="checkbox" value="Home Tuition" onclick="toggleFee('home')"> Home</label>
<div id="home" class="modeFee"><input id="homeFee"></div>

<label><input type="checkbox" value="Online" onclick="toggleFee('online')"> Online</label>
<div id="online" class="modeFee"><input id="onlineFee"></div>

<textarea id="description" placeholder="About Institution"></textarea>

<button type="submit">Continue To Payment</button>

</form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
apiKey:"AIzaSyBK0Q...",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ELEMENTS (IMPORTANT FIX) */
const form = document.getElementById("form");
const subject = document.getElementById("subject");
const otherSubject = document.getElementById("otherSubject");

/* TOGGLE */
window.toggleFee = function(id){
document.getElementById(id).style.display =
document.getElementById(id).style.display === "block" ? "none" : "block";
};

/* SUBJECT */
subject.addEventListener("change", ()=>{
otherSubject.style.display =
subject.value === "other" ? "block" : "none";
});

/* SUBMIT */
form.addEventListener("submit", async (e)=>{
e.preventDefault();

/* SAVE */
let newRef = await push(ref(db,"institutions"),{
name: document.getElementById("name").value,
phone: document.getElementById("phone").value,
email: document.getElementById("email").value,
website: document.getElementById("website").value,
address: document.getElementById("address").value,
area: document.getElementById("area").value,
subject: subject.value === "other" ? otherSubject.value : subject.value,
class: document.getElementById("class").value,
offlineFee: document.getElementById("offlineFee").value,
homeFee: document.getElementById("homeFee").value,
onlineFee: document.getElementById("onlineFee").value,
description: document.getElementById("description").value,
category:"academic",
status:"pending"
});

/* ✅ FIX: SAME SYSTEM AS TEACHER */
localStorage.setItem("institutionId", newRef.key);

window.location.href = "payment.html?type=institution";

});

</script>

</body>
</html>
