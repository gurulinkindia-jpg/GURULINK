<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Payment Success2</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:90%;
max-width:400px;
background:white;
padding:30px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

h2{color:#1565c0;margin-top:0;}

p{font-size:15px;line-height:1.6;}

.loader{
width:50px;
height:50px;
border:5px solid #ddd;
border-top:5px solid #1565c0;
border-radius:50%;
margin:20px auto;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

.success{color:green;font-weight:bold;}
.error{color:red;font-weight:bold;}
</style>
</head>

<body>

<div class="box">
<h2>Payment Processing</h2>
<div class="loader" id="loader"></div>
<p id="msg">Saving payment details...</p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, push, get, set, update } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* URL PARAMS */

const params = new URLSearchParams(window.location.search);

let type =
  params.get("type") ||
  localStorage.getItem("paymentType") ||
  localStorage.getItem("renewRole") ||
  localStorage.getItem("role") ||
  "teacher";

let id = params.get("id");

if (!id || id === "null" || id === "undefined") {
  id =
    localStorage.getItem("profileId") ||
    localStorage.getItem("teacherId") ||
    localStorage.getItem("institutionId") ||
    localStorage.getItem("paymentProfileId") ||
    localStorage.getItem("renewProfileId") ||
    localStorage.getItem(type + "Id");
}

console.log("FINAL TYPE:", type);
console.log("FINAL ID:", id);

/* FINAL CHECK */
if (!id || id === "null" || id === "undefined") {
  document.getElementById("loader").style.display = "none";
  document.getElementById("msg").innerHTML =
    '<span class="error">Profile ID missing after payment.</span><br><br>Please login again or contact support.';
  throw new Error("Profile ID Missing");
}

/* SAVE AGAIN FOR MOBILE WEBVIEW */
localStorage.setItem("profileId", id);
localStorage.setItem("paymentProfileId", id);
localStorage.setItem("renewProfileId", id);

localStorage.setItem("role", type);
localStorage.setItem("paymentType", type);
localStorage.setItem("renewRole", type);

/* PAYMENT AMOUNT */
const amount = 399;

/* MAIN */
async function savePayment() {

  try {

    let profilePath = "";

    const cleanType = (type || "").toLowerCase();

    if (cleanType.includes("teacher")) {
      profilePath = "teachers/" + id;
    } else if (cleanType.includes("institution")) {
      profilePath = "institutions/" + id;
    } else {
      throw new Error("Invalid type: " + type);
    }

    /* GET PROFILE */
    const snap = await get(ref(db, profilePath));

    if (!snap.exists()) {
      throw new Error("Profile not found in database");
    }

    const user = snap.val();

    /* PAYMENT RECORD */
    const paymentRef = push(ref(db, "payment2"));

    await set(paymentRef, {
      paymentId: paymentRef.key,
      profileId: id,
      uid: id,
      type: type,

      renewal: true,

      name: user.name || "",
      ownerName: user.ownerName || "",

      email: user.email || "",
      phone: user.phone || "",

      amount: amount,
      status: "paid",

      date: new Date().toLocaleString(),
      createdAt: Date.now()
    });

    /* UPDATE PROFILE */
    await update(ref(db, profilePath), {
      paymentStatus: "paid",
      approvedAt: Date.now(),
      lastRenewalDate: Date.now(),
      renewalStatus: "active"
    });

    /* SUCCESS */
    document.getElementById("loader").style.display = "none";
    document.getElementById("msg").innerHTML =
      '<span class="success">Payment successful! Redirecting...</span>';

  setTimeout(() => {
  window.location.href = "https://www.gurulink.co.in/renewal-success.html";
}, 2000);

  } catch (err) {

    console.log(err);

    document.getElementById("loader").style.display = "none";
    document.getElementById("msg").innerHTML =
      '<span class="error">Payment failed.</span><br><br>' + err.message;

  }

}

savePayment();

</script>

</body>
</html>
