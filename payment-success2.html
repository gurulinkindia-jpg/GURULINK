<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Payment Successful</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,.1);
text-align:center;
max-width:500px;
width:90%;
}

.successIcon{
font-size:70px;
color:#43a047;
}

h2{
color:#43a047;
}

.info{
margin-top:15px;
padding:15px;
background:#f5f5f5;
border-radius:10px;
text-align:left;
}

.loader{
margin-top:20px;
color:#1565c0;
font-weight:bold;
}

</style>

</head>

<body>

<div class="card">

<div class="successIcon">
✅
</div>

<h2>
Payment Successful
</h2>

<p>
Your Membership Has Been Renewed
For 365 Days.
</p>

<div class="info">

<p>
<b>Payment ID:</b>
<span id="paymentId">
Loading...
</span>
</p>

<p>
<b>Profile ID:</b>
<span id="profileId">
Loading...
</span>
</p>

<p>
<b>Plan:</b>
365 Days
</p>

<p>
<b>Amount:</b>
₹399
</p>

</div>

<div class="loader">

Updating Membership...

</div>

</div>

<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getDatabase,
ref,
update
}
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig={

apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",

authDomain:
"gurulink-59cc7.firebaseapp.com",

databaseURL:
"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"gurulink-59cc7",

storageBucket:
"gurulink-59cc7.appspot.com",

messagingSenderId:
"112148672399",

appId:
"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"

};

const app=
initializeApp(firebaseConfig);

const db=
getDatabase(app);

const profileId=
localStorage.getItem(
"renewProfileId"
);

const role=
localStorage.getItem(
"renewRole"
);

const paymentId=
localStorage.getItem(
"paymentId"
);

document.getElementById(
"profileId"
).innerText=
profileId || "";

document.getElementById(
"paymentId"
).innerText=
paymentId || "";

if(
profileId &&
role
){

const dbPath=
role==="teacher"
?
"teachers/"+profileId
:
"institutions/"+profileId;

await update(

ref(db,dbPath),

{

approvedAt:
Date.now(),

lastRenewal:
Date.now(),

renewalAmount:
399,

membershipStatus:
"active"

}

);

}

setTimeout(()=>{

location.href=
"teacher-dashboard.html";

},5000);

</script>

</body>
</html>
