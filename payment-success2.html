<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Payment Success2</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:90%;
max-width:400px;
background:white;
padding:30px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

h2{color:#1565c0;margin-top:0;}

p{font-size:15px;line-height:1.6;}

.loader{
width:50px;
height:50px;
border:5px solid #ddd;
border-top:5px solid #1565c0;
border-radius:50%;
margin:20px auto;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

.success{color:green;font-weight:bold;}
.error{color:red;font-weight:bold;}
.debug{font-size:12px;color:#555;word-break:break-all;}
</style>
</head>

<body>

<div class="box">
<h2>Payment Processing</h2>
<div class="loader" id="loader"></div>
<p id="msg">Saving payment details...</p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, push, get, set, update } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const loader = document.getElementById("loader");
const msg = document.getElementById("msg");

const params = new URLSearchParams(window.location.search);

let type = "";
let id = "";

const returnData = params.get("returnData");

if (returnData) {
  try {
    const decoded = atob(returnData);
    const parts = decoded.split("||");

    type = parts[0] || "";
    id = parts[1] || "";
  } catch (err) {
    console.log("returnData decode failed:", err);
  }
}

type =
  type ||
  params.get("type") ||
  params.get("notes[type]") ||
  params.get("notes.type") ||
  sessionStorage.getItem("paymentType") ||
  localStorage.getItem("paymentType") ||
  "";

id =
  id ||
  params.get("id") ||
  params.get("reference_id") ||
  params.get("razorpay_payment_link_reference_id") ||
  sessionStorage.getItem("paymentProfileId") ||
  localStorage.getItem("paymentProfileId") ||
  localStorage.getItem(type + "Id") ||
  localStorage.getItem("teacherId") ||
  localStorage.getItem("institutionId") ||
  "";

if (type) {
  type = type.toLowerCase();
}

console.log("SUCCESS2 URL:", window.location.href);
console.log("RETURN DATA:", returnData);
console.log("FINAL TYPE:", type);
console.log("FINAL ID:", id);

if (!id || id === "null" || id === "undefined") {
  loader.style.display = "none";
  msg.innerHTML =
    '<span class="error">Profile ID missing.</span><br><br>' +
    '<span class="debug">' + window.location.href + '</span>';
  throw new Error("Profile ID Missing");
}

if (!type || type === "null" || type === "undefined") {
  loader.style.display = "none";
  msg.innerHTML =
    '<span class="error">Account type missing.</span><br><br>' +
    '<span class="debug">' + window.location.href + '</span>';
  throw new Error("Payment Type Missing");
}

const amount = 399;

async function savePayment() {
  try {
    let profilePath = "";

    if (type.includes("teacher")) {
      profilePath = "teachers/" + id;
    } else if (type.includes("institution")) {
      profilePath = "institutions/" + id;
    } else {
      throw new Error("Invalid type: " + type);
    }

    const snap = await get(ref(db, profilePath));

    if (!snap.exists()) {
      throw new Error("Profile not found in database");
    }

    const user = snap.val();
    const paymentRef = push(ref(db, "payment2"));

    await set(paymentRef, {
      paymentId: paymentRef.key,
      profileId: id,
      uid: id,
      type: type,
      renewal: true,
      name: user.name || "",
      ownerName: user.ownerName || "",
      email: user.email || "",
      phone: user.phone || "",
      amount: amount,
      status: "paid",
      date: new Date().toLocaleString(),
      createdAt: Date.now()
    });

    await update(ref(db, profilePath), {
      paymentStatus: "paid",
      approvedAt: Date.now(),
      lastRenewalDate: Date.now(),
      renewalStatus: "active"
    });

    localStorage.removeItem("paymentProfileId");
    localStorage.removeItem("paymentType");
    sessionStorage.removeItem("paymentProfileId");
    sessionStorage.removeItem("paymentType");

    loader.style.display = "none";
    msg.innerHTML =
      '<span class="success">Payment successful! Redirecting...</span>';

    setTimeout(() => {
      window.location.href = "login.html";
    }, 2000);

  } catch (err) {
    console.log(err);

    loader.style.display = "none";
    msg.innerHTML =
      '<span class="error">Payment failed.</span><br><br>' + err.message;
  }
}

savePayment();
</script>

</body>
</html>
