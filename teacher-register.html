<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Teacher Registration - GURULINK</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

header{
background:#0d47a1;
color:white;
padding:15px;
text-align:center;
}

.container{
width:90%;
max-width:600px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
}

input,select{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:12px;
background:green;
color:white;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>Teacher Registration</h1>
<p id="categoryTitle"></p>
</header>

<div class="container">

<form id="teacherForm">

<input type="text" id="name" placeholder="Full Name" required>
<input type="tel" id="phone" placeholder="Phone Number" required>

<input type="text" id="qualification" placeholder="Qualification">

<input type="text" id="experience" placeholder="Experience">

<!-- COMMON FIELD -->
<div id="academicFields">
<input type="text" id="subject" placeholder="Subject">
<input type="text" id="class" placeholder="Class (e.g. 9-10)">
</div>

<!-- CREATIVE -->
<div id="creativeFields" style="display:none;">
<select id="creativeType">
<option>Music</option>
<option>Dance</option>
<option>Drawing</option>
<option>Photography</option>
</select>
</div>

<!-- SKILL -->
<div id="skillFields" style="display:none;">
<select id="skillType">
<option>Coding</option>
<option>Spoken English</option>
<option>Computer</option>
<option>Digital Marketing</option>
</select>
</div>

<input type="text" id="location" placeholder="Location">
<input type="number" id="fee" placeholder="Monthly Fee">

<button type="submit">Continue to Payment</button>

</form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.firebasestorage.app",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* GET CATEGORY FROM URL */
const params = new URLSearchParams(window.location.search);
const category = params.get("category") || "academic";

document.getElementById("categoryTitle").innerText =
"Category: " + category.toUpperCase();

/* SHOW/HIDE FIELDS */
if(category === "creative"){
document.getElementById("academicFields").style.display="none";
document.getElementById("creativeFields").style.display="block";
}

if(category === "skill"){
document.getElementById("academicFields").style.display="none";
document.getElementById("skillFields").style.display="block";
}

/* SUBMIT */
document.getElementById("teacherForm").addEventListener("submit", async function(e){
e.preventDefault();

let data = {
name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
qualification:document.getElementById("qualification").value,
experience:document.getElementById("experience").value,
location:document.getElementById("location").value,
fee:document.getElementById("fee").value,

category:category,
type:"teacher",
status:"pending"
};

/* CATEGORY SPECIFIC */
if(category === "academic"){
data.subject = document.getElementById("subject").value;
data.class = document.getElementById("class").value;
}

if(category === "creative"){
data.skillType = document.getElementById("creativeType").value;
}

if(category === "skill"){
data.skillType = document.getElementById("skillType").value;
}

/* SAVE */
push(ref(db,"teachers"), data);

/* PAYMENT REDIRECT */
window.location.href =
"payment.html?type=teacher&category=" + category;

});

</script>

</body>
</html>
