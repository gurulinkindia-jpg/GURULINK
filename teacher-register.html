<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Teacher Registration</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
}

header{
background:#0d47a1;
color:white;
padding:18px;
text-align:center;
}

.container{
width:90%;
max-width:750px;
margin:20px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,
select,
textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

textarea{
height:100px;
resize:none;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#1b5e20;
color:white;
font-size:16px;
cursor:pointer;
margin-top:20px;
}

button:hover{
opacity:.9;
}

.preview{
display:flex;
flex-wrap:wrap;
gap:10px;
margin:10px 0;
}

.preview img{
width:80px;
height:80px;
border-radius:10px;
object-fit:cover;
border:1px solid #ccc;
}

.modeBox{
padding:15px;
border:1px solid #ddd;
border-radius:10px;
margin-top:10px;
}

.modeLabel{
display:flex;
align-items:center;
gap:10px;
font-size:15px;
margin:10px 0;
cursor:pointer;
}

.modeLabel input[type="checkbox"]{
width:18px;
height:18px;
margin:0;
}

.modeFee{
display:none;
padding:10px;
margin:10px 0;
background:#f7f7f7;
border-radius:10px;
}

.note{
font-size:12px;
color:#666;
}

h3{
color:#0d47a1;
}

.loading{
display:none;
color:green;
font-weight:bold;
text-align:center;
margin-top:10px;
}

</style>
</head>

<body>

<header>

<h1>Teacher Registration</h1>

</header>

<div class="container">

<form id="teacherForm">

<input
id="name"
placeholder="Full Name"
required>

<input
id="phone"
placeholder="Phone Number"
required>

<input
id="email"
type="email"
placeholder="Email">

<input
id="website"
placeholder="Website / Social Link">

<input
id="qualification"
placeholder="Qualification">

<input
id="experience"
placeholder="Experience">

<input
id="subject"
placeholder="Subject">

<input
id="class"
placeholder="Class Example: Class 9-10">

<input
id="location"
placeholder="Preferred Teaching Area Example: Beltola">


<h3>Teaching Modes</h3>

<div class="modeBox">

<label class="modeLabel">

<input
type="checkbox"
onchange="toggleFee('home')">

<span>Home Tuition</span>

</label>

<div
id="home"
class="modeFee">

<input
id="homeFee"
placeholder="Enter Home Tuition Fee Example ₹500-1000">

</div>



<label class="modeLabel">

<input
type="checkbox"
onchange="toggleFee('group')">

<span>Group Tuition</span>

</label>

<div
id="group"
class="modeFee">

<input
id="groupFee"
placeholder="Enter Group Tuition Fee">

</div>



<label class="modeLabel">

<input
type="checkbox"
onchange="toggleFee('onlineIndividual')">

<span>Online Individual</span>

</label>

<div
id="onlineIndividual"
class="modeFee">

<input
id="onlineIndividualFee"
placeholder="Enter Online Individual Fee">

</div>



<label class="modeLabel">

<input
type="checkbox"
onchange="toggleFee('onlineGroup')">

<span>Online Group</span>

</label>

<div
id="onlineGroup"
class="modeFee">

<input
id="onlineGroupFee"
placeholder="Enter Online Group Fee">

</div>

</div>


<label><b>Profile Photo</b></label>

<input
type="file"
id="photo"
accept="image/*">

<div
id="photoPreview"
class="preview"></div>


<label><b>Gallery Photos (Maximum 5)</b></label>

<input
type="file"
id="gallery"
multiple
accept="image/*">

<p class="note">
Maximum 5 photos
</p>

<div
id="galleryPreview"
class="preview"></div>


<textarea
id="description"
placeholder="About Teacher"></textarea>

<div
class="loading"
id="loading">

Uploading Images Please Wait...

</div>


<button
type="submit">

Continue To Payment

</button>

</form>

</div>



<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getDatabase,
ref,
push
}
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";



const firebaseConfig={

apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"

};


const app=
initializeApp(
firebaseConfig
);

const db=
getDatabase(app);



const API_KEY=
"31f729ff855eb2e42c00ee508a8647ea";



async function upload(file){

let fd=
new FormData();

fd.append(
"image",
file
);

let res=
await fetch(
`https://api.imgbb.com/1/upload?key=${API_KEY}`,
{
method:"POST",
body:fd
}
);

let data=
await res.json();

return data.data.url;

}



/* PROFILE PREVIEW */

photo.onchange=function(){

photoPreview.innerHTML="";

if(this.files[0]){

let img=
document.createElement(
"img"
);

img.src=
URL.createObjectURL(
this.files[0]
);

photoPreview.appendChild(
img
);

}

}



/* GALLERY PREVIEW */

gallery.onchange=function(){

galleryPreview.innerHTML="";

if(this.files.length>5){

alert(
"Maximum 5 photos allowed"
);

this.value="";

return;

}

[...this.files]
.forEach(file=>{

let img=
document.createElement(
"img"
);

img.src=
URL.createObjectURL(
file
);

galleryPreview.appendChild(
img
);

});

}



/* SUBMIT */

teacherForm
.addEventListener(
"submit",
async(e)=>{

e.preventDefault();

loading.style.display=
"block";


try{

let profileURL="";

if(photo.files[0]){

profileURL=
await upload(
photo.files[0]
);

}


/* upload all gallery */

let galleryUrls=[];

if(gallery.files.length>0){

galleryUrls=
await Promise.all(

[...gallery.files]
.map(file=>
upload(file)
)

);

}



let data={

name:
name.value,

phone:
phone.value,

email:
email.value,

website:
website.value,

qualification:
qualification.value,

experience:
experience.value,

subject:
subject.value,

class:
class.value,

location:
location.value,

description:
description.value,

photo:
profileURL,

gallery:
galleryUrls,

fees:{

home:
homeFee.value,

group:
groupFee.value,

onlineIndividual:
onlineIndividualFee.value,

onlineGroup:
onlineGroupFee.value

},

status:
"pending"

};


await push(
ref(
db,
"teachers"
),
data
);


window.location.href=
"payment.html?type=teacher";


}catch(err){

alert(
"Upload Failed"
);

console.log(err);

}

loading.style.display=
"none";

});

</script>


<script>

function toggleFee(id){

let box=
document.getElementById(
id
);

box.style.display=

box.style.display==="block"

?

"none"

:

"block";

}

</script>

</body>
</html>
