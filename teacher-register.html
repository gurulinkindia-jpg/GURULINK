<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Teacher Registration</title>

<style>

body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#0d47a1;
color:white;
padding:18px;
text-align:center;
}

.container{
width:90%;
max-width:750px;
margin:20px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

textarea{
height:100px;
resize:none;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#1b5e20;
color:white;
font-size:16px;
cursor:pointer;
margin-top:20px;
}

.preview{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.preview img{
width:80px;
height:80px;
border-radius:10px;
object-fit:cover;
border:1px solid #ccc;
}

.modeBox{
padding:10px;
border:1px solid #ddd;
border-radius:10px;
margin-top:10px;
}

.modeFee{
display:none;
padding:10px;
margin-top:10px;
background:#f7f7f7;
border-radius:10px;
}

label{
display:block;
margin:8px 0;
}

</style>
</head>

<body>

<header>

<h1>Teacher Registration</h1>

</header>

<div class="container">

<form id="teacherForm">

<input id="name"
placeholder="Full Name"
required>

<input id="phone"
placeholder="Phone Number"
required>

<input id="email"
placeholder="Email">

<input id="website"
placeholder="Website">

<input id="qualification"
placeholder="Qualification">

<input id="experience"
placeholder="Experience">

<input id="subject"
placeholder="Subject">

<input id="class"
placeholder="Class">

<input id="location"
placeholder="Preferred Teaching Area">

<h3>Teaching Modes</h3>

<div class="modeBox">

<label>

<input
type="checkbox"
value="Home Tuition"
onchange="toggleFee('home')">

Home Tuition

</label>

<div
id="home"
class="modeFee">

<input
id="homeFee"
placeholder="Enter Home Tuition Fee Example ₹500-1000">

</div>


<label>

<input
type="checkbox"
value="Group Tuition"
onchange="toggleFee('group')">

Group Tuition

</label>

<div
id="group"
class="modeFee">

<input
id="groupFee"
placeholder="Enter Group Tuition Fee">

</div>


<label>

<input
type="checkbox"
value="Online Individual"
onchange="toggleFee('onlineIndividual')">

Online Individual

</label>

<div
id="onlineIndividual"
class="modeFee">

<input
id="onlineIndividualFee"
placeholder="Enter Online Individual Fee">

</div>


<label>

<input
type="checkbox"
value="Online Group"
onchange="toggleFee('onlineGroup')">

Online Group

</label>

<div
id="onlineGroup"
class="modeFee">

<input
id="onlineGroupFee"
placeholder="Enter Online Group Fee">

</div>

</div>


<label>Profile Photo</label>

<input
type="file"
id="photo"
accept="image/*">

<div
id="photoPreview"
class="preview"></div>


<label>Gallery Photos (Max 5)</label>

<input
type="file"
id="gallery"
multiple
accept="image/*">

<div
id="galleryPreview"
class="preview"></div>


<textarea
id="description"
placeholder="Description"></textarea>

<button type="submit">

Continue To Payment

</button>

</form>

</div>


<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getDatabase,
ref,
push
}
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";


const firebaseConfig={

apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"

};

const app=initializeApp(firebaseConfig);

const db=getDatabase(app);


const API_KEY="31f729ff855eb2e42c00ee508a8647ea";


async function upload(file){

let fd=new FormData();

fd.append("image",file);

let res=
await fetch(
`https://api.imgbb.com/1/upload?key=${API_KEY}`,
{
method:"POST",
body:fd
}
);

let data=
await res.json();

return data.data.url;

}


/* PROFILE PREVIEW */

photo.onchange=function(){

photoPreview.innerHTML="";

let img=
document.createElement("img");

img.src=
URL.createObjectURL(
this.files[0]
);

photoPreview.appendChild(img);

}


/* GALLERY */

gallery.onchange=function(){

galleryPreview.innerHTML="";

if(this.files.length>5){

alert("Maximum 5");

return;

}

for(let file of this.files){

let img=
document.createElement("img");

img.src=
URL.createObjectURL(file);

galleryPreview.appendChild(img);

}

}



/* SUBMIT */

teacherForm.addEventListener(
"submit",
async(e)=>{

e.preventDefault();

let profile="";

if(photo.files[0]){

profile=
await upload(
photo.files[0]
);

}

let galleryUrls=[];

for(let file of gallery.files){

galleryUrls.push(
await upload(file)
);

}


let data={

name:
document.getElementById("name").value,

phone:
document.getElementById("phone").value,

email:
document.getElementById("email").value,

website:
document.getElementById("website").value,

qualification:
document.getElementById("qualification").value,

experience:
document.getElementById("experience").value,

subject:
document.getElementById("subject").value,

class:
document.getElementById("class").value,

location:
document.getElementById("location").value,

description:
document.getElementById("description").value,

photo:profile,

gallery:galleryUrls,

fees:{

home:
homeFee.value,

group:
groupFee.value,

onlineIndividual:
onlineIndividualFee.value,

onlineGroup:
onlineGroupFee.value

},

status:"pending"

};


await push(
ref(db,"teachers"),
data
);

window.location.href=
"payment.html?type=teacher";

});

</script>


<script>

function toggleFee(id){

let box=
document.getElementById(id);

box.style.display=
box.style.display==="block"
?
"none"
:
"block";

}

</script>

</body>
</html>
