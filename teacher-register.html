<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Teacher Registration - GURULINK</title>

<style>

body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#0d47a1;
color:white;
padding:18px;
text-align:center;
}

.container{
width:90%;
max-width:700px;
margin:20px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

textarea{
height:100px;
resize:none;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#1b5e20;
color:white;
font-size:16px;
cursor:pointer;
}

.preview{
display:flex;
gap:10px;
flex-wrap:wrap;
margin:10px 0;
}

.preview img{
width:80px;
height:80px;
border-radius:10px;
object-fit:cover;
border:1px solid #ccc;
}

.note{
font-size:12px;
color:#666;
}

</style>
</head>

<body>

<header>

<h1>Teacher Registration</h1>
<p id="categoryTitle"></p>

</header>

<div class="container">

<form id="teacherForm">

<input type="text"
id="name"
placeholder="Full Name"
required>

<input type="tel"
id="phone"
placeholder="Phone Number"
required>

<input type="email"
id="email"
placeholder="Email Address">

<input type="url"
id="website"
placeholder="Website / Social Link">

<input type="text"
id="qualification"
placeholder="Qualification">

<input type="text"
id="experience"
placeholder="Experience">


<!-- ACADEMIC -->

<div id="academicFields">

<input type="text"
id="subject"
placeholder="Subject">

<input type="text"
id="class"
placeholder="Class Example: Class 9-10">

</div>


<!-- CREATIVE -->

<div id="creativeFields"
style="display:none">

<select id="creativeType">

<option>Music</option>
<option>Dance</option>
<option>Drawing</option>
<option>Photography</option>

</select>

</div>


<!-- SKILL -->

<div id="skillFields"
style="display:none">

<select id="skillType">

<option>Coding</option>
<option>Spoken English</option>
<option>Computer</option>
<option>Digital Marketing</option>

</select>

</div>


<input type="text"
id="location"
placeholder="Preferred Teaching Area Example: Beltola">


<!-- TUITION TYPE -->

<label>Teaching Mode</label>

<select id="tuitionType">

<option value="">Select</option>

<option>Home Tuition</option>

<option>Group Tuition</option>

<option>Online Individual</option>

<option>Online Group</option>

</select>


<!-- RANGE -->

<label>Fee Range Example</label>

<select id="feeRange">

<option>Select Range</option>

<option>Home Tuition : ₹500–1000 per class</option>

<option>Group Tuition : ₹1000–2000 monthly</option>

<option>Group Tuition : ₹10000–20000 yearly</option>

<option>Online Individual : ₹400–900 per class</option>

<option>Online Group : ₹1000–2000 monthly</option>

<option>Online Group : ₹10000–20000 yearly</option>

</select>


<input
type="number"
id="fee"
placeholder="Enter Your Fee Amount">


<label>Profile Photo</label>

<input
type="file"
id="photo"
accept="image/*">

<div id="photoPreview"
class="preview"></div>


<label>Gallery Photos (Max 5)</label>

<input
type="file"
id="gallery"
multiple
accept="image/*">

<div id="galleryPreview"
class="preview"></div>


<textarea
id="description"
placeholder="About Teacher"></textarea>


<button type="submit">

Continue To Payment

</button>

</form>

</div>


<script type="module">

import {
initializeApp
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getDatabase,
ref,
push
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig={

apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.firebasestorage.app",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"

};

const app=initializeApp(firebaseConfig);

const db=getDatabase(app);

const API_KEY=
"31f729ff855eb2e42c00ee508a8647ea";


const params=
new URLSearchParams(
window.location.search
);

const category=
params.get("category") ||
"academic";


document.getElementById(
"categoryTitle"
).innerText=
"Category : "+
category.toUpperCase();



if(category==="creative"){

academicFields.style.display="none";
creativeFields.style.display="block";

}

if(category==="skill"){

academicFields.style.display="none";
skillFields.style.display="block";

}



/* PREVIEW PROFILE */

photo.onchange=function(){

photoPreview.innerHTML="";

let file=this.files[0];

if(file){

let img=document.createElement("img");

img.src=
URL.createObjectURL(file);

photoPreview.appendChild(img);

}

};



/* GALLERY PREVIEW */

gallery.onchange=function(){

galleryPreview.innerHTML="";

if(this.files.length>5){

alert("Maximum 5 photos");

this.value="";

return;

}

for(let file of this.files){

let img=
document.createElement("img");

img.src=
URL.createObjectURL(file);

galleryPreview.appendChild(img);

}

};



async function upload(file){

let fd=
new FormData();

fd.append(
"image",
file
);

let res=
await fetch(
`https://api.imgbb.com/1/upload?key=${API_KEY}`,
{
method:"POST",
body:fd
}
);

let data=
await res.json();

return data.data.url;

}



teacherForm.addEventListener(
"submit",
async function(e){

e.preventDefault();

let photoURL="";

let galleryURLs=[];


/* upload profile */

if(photo.files[0]){

photoURL=
await upload(
photo.files[0]
);

}


/* upload gallery */

for(let file of gallery.files){

let url=
await upload(file);

galleryURLs.push(url);

}



let data={

name:name.value,
phone:phone.value,
email:email.value,
website:website.value,
qualification:qualification.value,
experience:experience.value,

location:location.value,

tuitionType:tuitionType.value,

feeRange:feeRange.value,

fee:fee.value,

description:description.value,

photo:photoURL,

gallery:galleryURLs,

category:category,

type:"teacher",

status:"pending"

};



if(category==="academic"){

data.subject=
subject.value;

data.class=
class.value;

}


if(category==="creative"){

data.skillType=
creativeType.value;

}


if(category==="skill"){

data.skillType=
skillType.value;

}


await push(
ref(db,"teachers"),
data
);


window.location.href=
"payment.html?type=teacher";

});

</script>

</body>
</html>
