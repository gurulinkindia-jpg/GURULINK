<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Teacher Registration - GURULINK</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
}

header{
background:#0d47a1;
color:white;
padding:18px;
text-align:center;
}

.container{
width:90%;
max-width:750px;
margin:20px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,
select,
textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

textarea{
height:100px;
resize:none;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#1b5e20;
color:white;
font-size:16px;
cursor:pointer;
margin-top:15px;
}

button:hover{
opacity:.9;
}

.preview{
display:flex;
flex-wrap:wrap;
gap:10px;
margin:10px 0;
}

.preview img{
width:80px;
height:80px;
border-radius:10px;
object-fit:cover;
border:1px solid #ccc;
}

.note{
font-size:12px;
color:#666;
}

.modeBox{
padding:12px;
border:1px solid #ccc;
border-radius:8px;
margin-top:10px;
}

.modeBox label{
display:block;
margin:8px 0;
}

h4{
color:#0d47a1;
margin-top:20px;
}

</style>

</head>

<body>

<header>

<h1>Teacher Registration</h1>
<p id="categoryTitle"></p>

</header>

<div class="container">

<form id="teacherForm">

<input
type="text"
id="name"
placeholder="Full Name"
required>

<input
type="tel"
id="phone"
placeholder="Phone Number"
required>

<input
type="email"
id="email"
placeholder="Email Address">

<input
type="url"
id="website"
placeholder="Website / Social Link">

<input
type="text"
id="qualification"
placeholder="Qualification">

<input
type="text"
id="experience"
placeholder="Experience">


<!-- Academic -->

<div id="academicFields">

<input
type="text"
id="subject"
placeholder="Subject">

<input
type="text"
id="class"
placeholder="Class Example: Class 9-10">

</div>


<!-- Creative -->

<div
id="creativeFields"
style="display:none">

<select id="creativeType">

<option>Music</option>
<option>Dance</option>
<option>Drawing</option>
<option>Photography</option>

</select>

</div>


<!-- Skill -->

<div
id="skillFields"
style="display:none">

<select id="skillType">

<option>Coding</option>
<option>Spoken English</option>
<option>Computer</option>
<option>Digital Marketing</option>

</select>

</div>


<input
type="text"
id="location"
placeholder="Preferred Teaching Area Example: Beltola">


<h4>Teaching Mode</h4>

<div class="modeBox">

<label>
<input
type="checkbox"
name="mode"
value="Home Tuition">
Home Tuition
</label>

<label>
<input
type="checkbox"
name="mode"
value="Group Tuition">
Group Tuition
</label>

<label>
<input
type="checkbox"
name="mode"
value="Online Individual">
Online Individual
</label>

<label>
<input
type="checkbox"
name="mode"
value="Online Group">
Online Group
</label>

</div>


<input
type="text"
id="feeRange"
placeholder="Fee Example: ₹500-1000 per class or ₹1000-2000 monthly">


<input
type="number"
id="fee"
placeholder="Enter Your Fee Amount">



<label><b>Profile Photo</b></label>

<input
type="file"
id="photo"
accept="image/*">

<div
id="photoPreview"
class="preview"></div>

<p
id="photoStatus"
style="color:green"></p>



<label><b>Gallery Photos (Maximum 5)</b></label>

<input
type="file"
id="gallery"
multiple
accept="image/*">

<div
id="galleryPreview"
class="preview"></div>

<p
id="galleryStatus"
style="color:green"></p>


<textarea
id="description"
placeholder="About Teacher"></textarea>


<button type="submit">

Continue To Payment

</button>

</form>

</div>


<script type="module">

import {
initializeApp
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getDatabase,
ref,
push
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";



const firebaseConfig={

apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.firebasestorage.app",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"

};


const app=
initializeApp(
firebaseConfig
);

const db=
getDatabase(
app
);


/* CATEGORY */

const params=
new URLSearchParams(
window.location.search
);

const category=
params.get("category")
||"academic";


document.getElementById(
"categoryTitle"
).innerText=
"Category: "+
category.toUpperCase();


if(category==="creative"){

document.getElementById(
"academicFields"
).style.display="none";

document.getElementById(
"creativeFields"
).style.display="block";

}


if(category==="skill"){

document.getElementById(
"academicFields"
).style.display="none";

document.getElementById(
"skillFields"
).style.display="block";

}



/* IMGBB */

const API_KEY=
"31f729ff855eb2e42c00ee508a8647ea";


async function upload(file){

let fd=
new FormData();

fd.append(
"image",
file
);

let res=
await fetch(
`https://api.imgbb.com/1/upload?key=${API_KEY}`,
{
method:"POST",
body:fd
}
);

let data=
await res.json();

return data.data.url;

}



/* PROFILE PREVIEW */

document
.getElementById(
"photo"
)
.addEventListener(
"change",
function(){

let file=
this.files[0];

let preview=
document.getElementById(
"photoPreview"
);

preview.innerHTML="";

if(file){

let img=
document.createElement(
"img"
);

img.src=
URL.createObjectURL(
file
);

preview.appendChild(
img
);

document.getElementById(
"photoStatus"
).innerHTML=
"✓ Profile photo selected";

}

}
);



/* GALLERY PREVIEW */

document
.getElementById(
"gallery"
)
.addEventListener(
"change",
function(){

let preview=
document.getElementById(
"galleryPreview"
);

preview.innerHTML="";


if(this.files.length>5){

alert(
"Maximum 5 photos allowed"
);

this.value="";

return;

}

for(let file of this.files){

let img=
document.createElement(
"img"
);

img.src=
URL.createObjectURL(
file
);

preview.appendChild(
img
);

}

document.getElementById(
"galleryStatus"
).innerHTML=
"✓ "+
this.files.length+
" photos selected";

}
);



/* SUBMIT */

document
.getElementById(
"teacherForm"
)
.addEventListener(
"submit",
async function(e){

e.preventDefault();

let profileURL="";

let galleryURLs=[];



if(
document.getElementById(
"photo"
).files[0]
){

profileURL=
await upload(
document.getElementById(
"photo"
).files[0]
);

}



for(let file of
document.getElementById(
"gallery"
).files){

let url=
await upload(
file
);

galleryURLs.push(
url
);

}



let modes=
[...document.querySelectorAll(
'input[name="mode"]:checked'
)]
.map(
x=>x.value
);



let data={

name:name.value,
phone:phone.value,
email:email.value,
website:website.value,
qualification:qualification.value,
experience:experience.value,
location:location.value,

teachingMode:modes,

feeRange:feeRange.value,
fee:fee.value,

description:description.value,

photo:profileURL,

gallery:galleryURLs,

category:category,

type:"teacher",

status:"pending"

};



if(category==="academic"){

data.subject=
subject.value;

data.class=
class.value;

}


if(category==="creative"){

data.skillType=
creativeType.value;

}


if(category==="skill"){

data.skillType=
skillType.value;

}



await push(
ref(
db,
"teachers"
),
data
);


window.location.href=
"payment.html?type=teacher";

});

</script>

</body>
</html>
