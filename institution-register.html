<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Institution Registration - GURULINK</title>

<style>

body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#0d47a1;
color:white;
padding:18px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.2);
}

.container{
width:90%;
max-width:650px;
margin:25px auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h2{
text-align:center;
color:#0d47a1;
margin-bottom:20px;
}

label{
font-weight:bold;
font-size:14px;
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0 18px;
border:1px solid #ccc;
border-radius:8px;
outline:none;
transition:0.2s;
}

input:focus,textarea:focus{
border-color:#0d47a1;
box-shadow:0 0 5px rgba(13,71,161,.2);
}

button{
width:100%;
padding:14px;
background:linear-gradient(135deg,#1b5e20,#43a047);
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

button:hover{
transform:scale(1.02);
}

.note{
font-size:12px;
color:#666;
margin-top:-10px;
margin-bottom:10px;
}

</style>
</head>

<body>

<header>
<h1>GURULINK</h1>
<p>Institution Registration</p>
</header>

<div class="container">

<h2>Register Your Institution</h2>

<form id="instForm">

<label>Institution Name</label>
<input type="text" id="name" required>

<label>Address</label>
<textarea id="address" required></textarea>

<label>Courses Offered</label>
<input type="text" id="courses" placeholder="JEE, NEET, Class 10 etc">

<label>Contact Number</label>
<input type="tel" id="phone" required>

<label>Institution Logo</label>
<input type="file" id="logo" accept="image/*">
<div class="note">Upload logo (auto upload to imgbb)</div>

<button type="submit">Register Institution</button>

</form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.firebasestorage.app",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* IMGBB UPLOAD */
async function uploadToImgBB(file){

const apiKey = "31f729ff855eb2e42c00ee508a8647ea";

const formData = new FormData();
formData.append("image", file);

const res = await fetch(
`https://api.imgbb.com/1/upload?key=${apiKey}`,
{
method:"POST",
body:formData
}
);

const data = await res.json();

if(data.success){
return data.data.url;
}else{
throw new Error("Image upload failed");
}

}

/* SUBMIT */
document.getElementById("instForm")
.addEventListener("submit", async function(e){

e.preventDefault();

/* LOGO UPLOAD */
let logoFile = document.getElementById("logo").files[0];
let logoURL = "";

if(logoFile){
logoURL = await uploadToImgBB(logoFile);
}

const data = {

name:document.getElementById("name").value,
address:document.getElementById("address").value,
courses:document.getElementById("courses").value,
phone:document.getElementById("phone").value,

logo:logoURL,
status:"pending",
paymentStatus:"unpaid"

};

push(ref(db,"institutions"), data);

/* REDIRECT TO PAYMENT PAGE */
window.location.href = "payment.html";

});

</script>

</body>
</html>
