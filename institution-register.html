<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Institution Registration - GURULINK</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

header{
background:#0d47a1;
color:white;
padding:15px;
text-align:center;
}

.container{
width:90%;
max-width:600px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
}

input,select,textarea{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:green;
color:white;
border:none;
cursor:pointer;
}
</style>

</head>

<body>

<header>
<h1>Institution Registration</h1>
<p id="categoryTitle"></p>
</header>

<div class="container">

<form id="instForm">

<input type="text" id="name" placeholder="Institution Name" required>
<textarea id="address" placeholder="Address" required></textarea>

<input type="text" id="phone" placeholder="Contact Number" required>

/* COMMON CATEGORY FIELD */
<select id="categoryField">
<option value="">Select Type</option>
</select>

<!-- ACADEMIC -->
<div id="academicFields">
<input type="text" id="courses" placeholder="Courses (JEE, NEET, Class 10)">
</div>

<!-- CREATIVE -->
<div id="creativeFields" style="display:none;">
<input type="text" id="creativeCourses" placeholder="Creative Courses (Music, Dance, Art)">
</div>

<!-- SKILL -->
<div id="skillFields" style="display:none;">
<input type="text" id="skillCourses" placeholder="Skill Courses (Coding, English, Digital Marketing)">
</div>

<label>Logo (ImgBB link or URL)</label>
<input type="text" id="logo" placeholder="Paste image link">

<button type="submit">Continue to Payment</button>

</form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.firebasestorage.app",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* GET CATEGORY */
const params = new URLSearchParams(window.location.search);
const category = params.get("category") || "academic";

document.getElementById("categoryTitle").innerText =
"Category: " + category.toUpperCase();

/* SHOW CATEGORY UI */
if(category === "academic"){
document.getElementById("academicFields").style.display="block";
document.getElementById("creativeFields").style.display="none";
document.getElementById("skillFields").style.display="none";
}

if(category === "creative"){
document.getElementById("academicFields").style.display="none";
document.getElementById("creativeFields").style.display="block";
document.getElementById("skillFields").style.display="none";
}

if(category === "skill"){
document.getElementById("academicFields").style.display="none";
document.getElementById("creativeFields").style.display="none";
document.getElementById("skillFields").style.display="block";
}

/* SUBMIT */
document.getElementById("instForm").addEventListener("submit", async function(e){
e.preventDefault();

let data = {
name:document.getElementById("name").value,
address:document.getElementById("address").value,
phone:document.getElementById("phone").value,
logo:document.getElementById("logo").value,

category:category,
type:"institution",
status:"pending"
};

/* CATEGORY DATA */
if(category === "academic"){
data.courses = document.getElementById("courses").value;
}

if(category === "creative"){
data.courses = document.getElementById("creativeCourses").value;
}

if(category === "skill"){
data.courses = document.getElementById("skillCourses").value;
}

/* SAVE */
push(ref(db,"institutions"), data);

/* PAYMENT */
window.location.href =
"payment.html?type=institution&category=" + category;

});

</script>

</body>
</html>
