<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Checking Account</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:15px;
box-sizing:border-box;
}

.box{
background:white;
padding:25px;
border-radius:15px;
width:100%;
max-width:420px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

h2{
color:#1565c0;
margin-top:0;
}

p{
color:#555;
font-size:14px;
line-height:1.5;
}

button{
padding:14px;
border:none;
border-radius:10px;
font-size:15px;
cursor:pointer;
}

.register{
background:#1565c0;
color:white;
}

.later{
background:#e0e0e0;
color:#222;
}

.termsBox{
margin-top:12px;
padding:10px;
background:#f7f7f7;
border:1px solid #ddd;
border-radius:8px;
text-align:left;
font-size:13px;
color:#555;
}

.termsBox label{
display:flex;
gap:8px;
align-items:flex-start;
}

.termsBox input{
margin-top:2px;
}

.btnRow{
display:flex;
gap:10px;
margin-top:15px;
}

.btnRow button{
flex:1;
}

@media(max-width:480px){
.box{
padding:20px;
border-radius:12px;
}

.btnRow{
flex-direction:column;
}

.btnRow button{
width:100%;
}
}
</style>
</head>

<body>

<div class="box">

<h2 id="title">Checking Account...</h2>

<div id="content">
Please wait...
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getDatabase,
ref,
get
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const phone =
(localStorage.getItem("phone") || "")
.replace("+91","")
.replace(/\s/g,"");

const otpRole =
localStorage.getItem("otpRole") ||
localStorage.getItem("role");

const title =
document.getElementById("title");

const content =
document.getElementById("content");

function cleanPhone(num){
return String(num || "")
.replace("+91","")
.replace(/\s/g,"")
.replace(/\D/g,"");
}

window.goRegister = function(page){

const agree =
document.getElementById("termsCheck");

if(!agree || !agree.checked){
alert("Please accept the Terms & Conditions.");
return;
}

location.href = page;

};

window.goLater = function(){

const agree =
document.getElementById("termsCheck");

if(!agree || !agree.checked){
alert("Please accept the Terms & Conditions.");
return;
}

location.href = "index.html";

};

function showNotRegistered(titleText,message,registerPage){

title.textContent = titleText;

content.innerHTML = `

<p>${message}</p>

<div class="termsBox">
<label>
<input type="checkbox" id="termsCheck">
<span>
I accept the Terms & Conditions. I understand that GURULINK is only a linking platform between students, parents, teachers and institutions.
</span>
</label>
</div>

<div class="btnRow">

<button
class="register"
onclick="goRegister('${registerPage}')">
Register Now
</button>

<button
class="later"
onclick="goLater()">
Register Later
</button>

</div>

`;

}

async function checkTeacher(){

try{

if(!phone){
title.textContent = "Phone Number Missing";
content.innerHTML = `
<p>Please login again with OTP.</p>
<button class="register" style="width:100%;" onclick="location.href='otp-login.html'">
OTP Login
</button>
`;
return;
}

/* STUDENT / PARENT FLOW */
if(otpRole === "student"){

const snap = await get(ref(db,"students"));
let found = false;

if(snap.exists()){

snap.forEach(child=>{

const d = child.val();

const dbPhone =
cleanPhone(
d.phone ||
d.mobile ||
""
);

if(dbPhone === cleanPhone(phone)){

found = true;

localStorage.setItem("role","student");
localStorage.setItem("studentId",child.key);
localStorage.setItem("profileId",child.key);

location.href = "index.html";

}

});

}

if(found) return;

showNotRegistered(
"Student / Parent Not Registered",
"This mobile number is not registered as Student / Parent.",
"student-registration.html"
);

return;
}

/* TEACHER FLOW */
if(otpRole === "teacher" || otpRole === "teacher_institute"){

const snap = await get(ref(db,"teachers"));
let found = false;

if(snap.exists()){

snap.forEach(child=>{

const d = child.val();

const dbPhone =
cleanPhone(
d.phone ||
d.mobile ||
d.alternatePhone ||
""
);

if(dbPhone === cleanPhone(phone)){

found = true;

localStorage.setItem("role","teacher");
localStorage.setItem("teacherId",child.key);
localStorage.setItem("profileId",child.key);

location.href = "teacher-dashboard.html";

}

});

}

if(found) return;

showNotRegistered(
"Teacher Not Registered",
"This mobile number is not registered as Teacher.",
"register.html"
);

return;
}

/* INSTITUTION FLOW */
if(otpRole === "institution"){

const snap = await get(ref(db,"institutions"));
let found = false;

if(snap.exists()){

snap.forEach(child=>{

const d = child.val();

const dbPhone =
cleanPhone(
d.phone ||
d.mobile ||
d.alternatePhone ||
""
);

if(dbPhone === cleanPhone(phone)){

found = true;

localStorage.setItem("role","institution");
localStorage.setItem("institutionId",child.key);
localStorage.setItem("profileId",child.key);

location.href = "institution-dashboard.html";

}

});

}

if(found) return;

showNotRegistered(
"Institution Not Registered",
"This mobile number is not registered as Institution.",
"register.html"
);

return;
}

title.textContent = "Role Not Found";

content.innerHTML = `
<p>Please select your role again.</p>
<button class="register" style="width:100%;" onclick="location.href='role-select.html'">
Select Role
</button>
`;

}catch(err){

console.error(err);

title.textContent = "Error";
content.innerHTML = err.message;

}

}

checkTeacher();

</script>

</body>
</html>
