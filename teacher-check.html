<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0, viewport-fit=cover">
<title>Checking Account</title>

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#e3f2fd,#eef2f7,#ffffff);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
min-height:100dvh;
padding:15px;
}

.box{
background:white;
padding:25px;
border-radius:18px;
width:100%;
max-width:420px;
text-align:center;
box-shadow:0 8px 25px rgba(0,0,0,.15);
}

h2{
color:#1565c0;
margin-top:0;
}

p{
color:#555;
font-size:14px;
line-height:1.5;
}

button{
padding:14px;
border:none;
border-radius:10px;
font-size:15px;
cursor:pointer;
}

.register{
background:#1565c0;
color:white;
}

.later{
background:#e0e0e0;
color:#222;
}





.btnRow{
display:flex;
gap:10px;
margin-top:15px;
}

.btnRow button{
flex:1;
}

@media(max-width:480px){
.box{
padding:20px;
border-radius:14px;
}

.btnRow{
flex-direction:column;
}

.btnRow button{
width:100%;
}
}

.termsBox{
margin-top:12px;
border:1px solid #ddd;
border-radius:8px;
background:#fafafa;
padding:10px;
}

.termsContent{
height:80px;
overflow-y:auto;
font-size:12px;
color:#666;
line-height:1.5;
padding-right:5px;
margin-bottom:10px;
text-align:left;
}

.agreeRow{
display:flex;
gap:8px;
align-items:flex-start;
font-size:13px;
color:#444;
text-align:left;
cursor:pointer;
}

.agreeRow input{
margin-top:2px;
}
</style>
<link rel="icon" type="image/png" href="https://i.ibb.co/0RT0BQKq/GURULINK-Logo-1.png">
<link rel="shortcut icon" href="https://i.ibb.co/0RT0BQKq/GURULINK-Logo-1.png">
<link rel="apple-touch-icon" href="https://i.ibb.co/0RT0BQKq/GURULINK-Logo-1.png">

<link rel="stylesheet" href="gurulink-theme.css?v=2">
<script src="gurulink-theme.js?v=2"></script>
</head>

<body>

<div class="box">

<h2 id="title">Checking Account...</h2>

<div id="content">
Please wait...
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getDatabase,
ref,
get,
set
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig={
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const phone =
(localStorage.getItem("phone") || "")
.replace("+91","")
.replace(/\s/g,"")
.replace(/\D/g,"");

const otpRole =
localStorage.getItem("otpRole") ||
localStorage.getItem("role");

const isNewAuthUser =
localStorage.getItem("isNewAuthUser") === "true";

const title =
document.getElementById("title");

const content =
document.getElementById("content");

function finishRedirect(defaultPage){
const redirect =
sessionStorage.getItem("postLoginRedirect");

if(redirect){
sessionStorage.removeItem("postLoginRedirect");
location.href = redirect;
return;
}

location.href = defaultPage;
}

function cleanPhone(num){
return String(num || "")
.replace("+91","")
.replace(/\s/g,"")
.replace(/\D/g,"");
}

function applyLimitedAccessRole(){
if(otpRole === "student"){
localStorage.setItem("role","student_guest");
}
else if(otpRole === "teacher" || otpRole === "teacher_institute"){
localStorage.setItem("role","teacher_guest");
}
else if(otpRole === "institution"){
localStorage.setItem("role","institution_guest");
}
else{
localStorage.setItem("role","guest");
}
}

window.goRegister = function(page){

const agree =
document.getElementById("termsCheck");

if(!agree || !agree.checked){
alert("Please accept the Terms & Conditions.");
return;
}

location.href = page;

};





window.goLater = function(){

const agree =
document.getElementById("termsCheck");

if(!agree || !agree.checked){
alert("Please accept the Terms & Conditions.");
return;
}

 applyLimitedAccessRole();

 finishRedirect("index.html");

};





function showRegisterChoice(titleText,message,registerPage){

title.textContent = titleText;

content.innerHTML = `

<p>${message}</p>



<div class="termsBox">

<div class="termsContent">

<b>Terms & Conditions</b><br><br>

- GURULINK is only a linking platform between students, parents, teachers and institutions.<br><br>

- GURULINK is not responsible for fees, payments, refunds, disputes or legal matters between users.<br><br>

- Users are responsible for verifying identities and information before entering into any agreement.<br><br>

- By continuing, you agree to the <a href="terms-of-use.html" target="_blank" style="color:#1565c0;font-weight:bold;">Terms of Use</a> and <a href="privacy-policy.html" target="_blank" style="color:#1565c0;font-weight:bold;">Privacy Policy</a>.

</div>

<label class="agreeRow">

<input
type="checkbox"
id="termsCheck">

<span>
I have read and accept the Terms & Conditions.
</span>

</label>

</div>



<div class="btnRow">

<button
class="register"
onclick="goRegister('${registerPage}')">
Register Now
</button>

<button
class="later"
onclick="goLater()">
Register Later
</button>

</div>

`;

}

function handleNotRegistered(titleText,message,registerPage){
if(isNewAuthUser){
showRegisterChoice(titleText,message,registerPage);
return;
}

applyLimitedAccessRole();
finishRedirect("index.html");
}

async function findByPhone(path, phone){

const snap =
await get(ref(db,path));

let result = null;

if(snap.exists()){

snap.forEach(child=>{

if(result) return;

const d = child.val();

const dbPhone =
cleanPhone(
d.phone ||
d.mobile ||
d.alternatePhone ||
""
);

if(dbPhone === cleanPhone(phone)){
result = {
id: child.key,
data: d
};
}

});

}

return result;

}

async function linkCurrentAuthUser(profileId, role, profileData){

if(!auth.currentUser || !profileId || !role){
return;
}

const currentUser = auth.currentUser;
const cleanRole = String(role || "").trim().toLowerCase();
const data = profileData || {};
const resolvedName =
data.name ||
data.ownerName ||
localStorage.getItem("name") ||
"";

await set(ref(db,"users/" + currentUser.uid),{
uid:currentUser.uid,
name:resolvedName,
email:currentUser.email || data.email || "",
phone:cleanPhone(currentUser.phoneNumber || phone || data.phone || ""),
role:cleanRole,
profileId:profileId,
linkedRole:cleanRole,
updatedAt:Date.now()
});

}

async function checkAccount(){

try{

if(!phone){

title.textContent =
"Phone Number Missing";

content.innerHTML = `

<p>Please login again with OTP.</p>

<button
class="register"
style="width:100%;"
onclick="location.href='otp-login.html'">
OTP Login
</button>

`;

return;

}

/* STUDENT */
if(otpRole === "student"){

const student =
await findByPhone("students",phone);

if(student){

localStorage.setItem("role","student");
localStorage.setItem("studentId",student.id);
localStorage.setItem("profileId",student.id);

await linkCurrentAuthUser(student.id,"student",student.data);

finishRedirect("student-dashboard.html");
return;

}

handleNotRegistered(
"Student / Parent Not Registered",
"This mobile number is not registered as Student / Parent. You can register now or continue later.",
"student-registration.html"
);

return;

}

/* TEACHER / INSTITUTE */
if(otpRole === "teacher" || otpRole === "teacher_institute"){

const teacher =
await findByPhone("teachers",phone);

if(teacher){

localStorage.setItem("role","teacher");
localStorage.setItem("teacherId",teacher.id);
localStorage.setItem("profileId",teacher.id);

await linkCurrentAuthUser(teacher.id,"teacher",teacher.data);

finishRedirect("teacher-dashboard.html");
return;

}

const institution =
await findByPhone("institutions",phone);

if(institution){

localStorage.setItem("role","institution");
localStorage.setItem("institutionId",institution.id);
localStorage.setItem("profileId",institution.id);

await linkCurrentAuthUser(institution.id,"institution",institution.data);

finishRedirect("teacher-dashboard.html");
return;

}

handleNotRegistered(
"Teacher / Institution Not Registered",
"This mobile number is not registered as Teacher or Institution. You can register now or continue later.",
"register.html"
);

return;

}

/* INSTITUTION */
if(otpRole === "institution"){

const institution =
await findByPhone("institutions",phone);

if(institution){

localStorage.setItem("role","institution");
localStorage.setItem("institutionId",institution.id);
localStorage.setItem("profileId",institution.id);

await linkCurrentAuthUser(institution.id,"institution",institution.data);

finishRedirect("teacher-dashboard.html");
return;

}

handleNotRegistered(
"Institution Not Registered",
"This mobile number is not registered as Institution. You can register now or continue later.",
"register.html"
);

return;

}

/* FALLBACK CHECK ALL */
const student =
await findByPhone("students",phone);

if(student){

localStorage.setItem("role","student");
localStorage.setItem("studentId",student.id);
localStorage.setItem("profileId",student.id);

await linkCurrentAuthUser(student.id,"student",student.data);

finishRedirect("student-dashboard.html");
return;

}

const teacher =
await findByPhone("teachers",phone);

if(teacher){

localStorage.setItem("role","teacher");
localStorage.setItem("teacherId",teacher.id);
localStorage.setItem("profileId",teacher.id);

await linkCurrentAuthUser(teacher.id,"teacher",teacher.data);

finishRedirect("teacher-dashboard.html");
return;

}

const institution =
await findByPhone("institutions",phone);

if(institution){

localStorage.setItem("role","institution");
localStorage.setItem("institutionId",institution.id);
localStorage.setItem("profileId",institution.id);

await linkCurrentAuthUser(institution.id,"institution",institution.data);

finishRedirect("teacher-dashboard.html");
return;

}

handleNotRegistered(
"Account Not Registered",
"This mobile number is not registered. You can register now or continue later.",
"register.html"
);

}catch(err){

console.error(err);

title.textContent =
"Error";

content.innerHTML =
err.message;

}

}

onAuthStateChanged(auth,(user)=>{

if(!user){

title.textContent =
"Login Required";

content.innerHTML = `

<p>Your OTP login session was not found. Please login again.</p>

<button
class="register"
style="width:100%;"
onclick="location.href='otp-login.html'">
OTP Login
</button>

`;

return;

}

checkAccount();

});

</script>

</body>
</html>
