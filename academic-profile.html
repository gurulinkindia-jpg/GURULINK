<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Academic Profile - GURULINK</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: linear-gradient(135deg, #d9efff, #f4f9ff, #ffffff);
  padding-bottom: 40px;
}

header {
  padding: 30px;
  text-align: center;
  background: rgba(255, 255, 255, 0.4);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255, 255, 255, 0.6);
}

.container {
  width: 95%;
  max-width: 1300px;
  margin: auto;
  padding: 20px;
}

.filters {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  padding: 20px;
  margin-bottom: 20px;
  background: rgba(255, 255, 255, 0.45);
  border-radius: 20px;
}

.filters input,
.filters select {
  padding: 12px;
  border: none;
  border-radius: 10px;
  outline: none;
  font-size: 14px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 20px;
}

.card {
  background: rgba(255, 255, 255, 0.45);
  border-radius: 20px;
  padding: 15px;
  border: 1px solid #ddd;
}

.card.teacher {
  border-left: 6px solid #1976d2;
}

.card.institution {
  border-left: 6px solid #e91e63;
}

.top {
  display: flex;
  gap: 15px;
}

.photo {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  object-fit: cover;
}

.badge {
  display: inline-block;
  margin: 3px;
  padding: 5px 10px;
  background: #fff;
  border-radius: 20px;
  font-size: 12px;
}

.verify {
  background: #2196f3;
  color: white;
}

.btn {
  margin-top: 10px;
  padding: 7px 12px;
  border: none;
  border-radius: 8px;
  background: #1976d2;
  color: white;
  cursor: pointer;
}

.details {
  margin-top: 10px;
  font-size: 14px;
  line-height: 1.6;
}

.empty {
  text-align: center;
  padding: 20px;
  background: white;
  border-radius: 15px;
}
</style>
<link rel="icon" type="image/png" href="https://i.ibb.co/0RT0BQKq/GURULINK-Logo-1.png">
<link rel="shortcut icon" href="https://i.ibb.co/0RT0BQKq/GURULINK-Logo-1.png">
<link rel="apple-touch-icon" href="https://i.ibb.co/0RT0BQKq/GURULINK-Logo-1.png">

<link rel="stylesheet" href="gurulink-theme.css?v=2">
<script src="gurulink-theme.js?v=2"></script>
</head>

<body>

<header>
<h1>Academic Profile</h1>
<p>Find Teachers & Institutes</p>
</header>

<div class="container">

<div class="filters">

<input type="text" id="search" placeholder="Search teacher, location" />

<select id="classFilter">
<option value="">All Classes</option>
<option value="play group">Play Group</option>
<option value="nursery">Nursery</option>
<option value="lkg">LKG</option>
<option value="ukg">UKG</option>
<option value="class 1">Class 1</option>
<option value="class 2">Class 2</option>
<option value="class 3">Class 3</option>
<option value="class 4">Class 4</option>
<option value="class 5">Class 5</option>
<option value="class 6">Class 6</option>
<option value="class 7">Class 7</option>
<option value="class 8">Class 8</option>
<option value="class 9">Class 9</option>
<option value="class 10">Class 10</option>
<option value="class 11">Class 11</option>
<option value="class 12">Class 12</option>
<option value="jee">IIT JEE</option>
<option value="neet">NEET</option>
</select>

</div>

<div id="grid" class="grid"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain: "gurulink-59cc7.firebaseapp.com",
databaseURL: "https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "gurulink-59cc7",
storageBucket: "gurulink-59cc7.appspot.com",
messagingSenderId: "112148672399",
appId: "1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let teachers = [];
let institutes = [];
let ratingMap = {};

/* ONLY ACADEMIC */
onValue(ref(db, "teachers"), (snap) => {
teachers = [];

snap.forEach((c) => {
const d = c.val();

if (
(d.status || "").toLowerCase() === "approved" &&
(d.category || "").toLowerCase() === "academic"
) {
teachers.push({ ...d, id: c.key, type: "Teacher" });
}
});

render();
});

onValue(ref(db, "institutions"), (snap) => {
institutes = [];

snap.forEach((c) => {
const d = c.val();

if (
(d.status || "").toLowerCase() === "approved" &&
(d.category || "").toLowerCase() === "academic"
) {
institutes.push({ ...d, id: c.key, type: "Institution" });
}
});

render();
});

onValue(ref(db, "reviews"), (snap) => {
ratingMap = {};

snap.forEach((typeSnap) => {
const collection = typeSnap.key;

typeSnap.forEach((profileSnap) => {
let total = 0;
let count = 0;

profileSnap.forEach((reviewSnap) => {
const rating = Number(reviewSnap.val()?.rating || 0);
if(rating > 0){
total += rating;
count++;
}
});

if(count){
ratingMap[collection + "/" + profileSnap.key] = {
avg: total / count,
count
};
}
});
});

render();
});

function getAllProfiles() {
return [...teachers, ...institutes];
}

/* CLASS FIX */
function classMatch(userClass, selectedClass) {
if (!selectedClass) return true;
if (!userClass) return false;

const list = (userClass + "")
.toLowerCase()
.split(",")
.map(x => x.trim());

return list.includes(selectedClass.toLowerCase());
}

/* SEARCH */
function similar(a, b) {
return (a || "").toLowerCase().includes((b || "").toLowerCase());
}

function ratingInfo(profile){
const collection = profile.type === "Institution" ? "institutions" : "teachers";
return ratingMap[collection + "/" + profile.id] || {avg:0,count:0};
}

function sortByRating(list){
return [...list].sort((a,b)=>{
const ar = ratingInfo(a);
const br = ratingInfo(b);

if(br.avg !== ar.avg) return br.avg - ar.avg;
if(br.count !== ar.count) return br.count - ar.count;

return (a.name || "").localeCompare(b.name || "");
});
}

/* VIEW BUTTON FIX */
function showGuestAccessPopup(onLogin){
const oldPopup = document.getElementById("guestAccessPopup");
if(oldPopup) oldPopup.remove();

const popup = document.createElement("div");
popup.id = "guestAccessPopup";
popup.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:18px;z-index:9999;";
popup.innerHTML = `
<div style="width:100%;max-width:430px;background:white;border-radius:16px;box-shadow:0 18px 45px rgba(0,0,0,.28);overflow:hidden;">
<div style="background:#00897b;color:white;padding:18px 20px;">
<h3 style="margin:0;font-size:20px;">Limited Access</h3>
</div>
<div style="padding:20px;">
<p style="margin:0 0 12px;line-height:1.6;color:#333;font-size:14px;">You are using limited access. For complete access, please log in as a Teacher / Institution or Student / Parent.</p>
<p style="margin:0 0 12px;line-height:1.6;color:#333;font-size:14px;">GURULINK is only a linking platform between students, parents, teachers, and institutions. GURULINK never shares or misuses your personal data.</p>
<p style="margin:0;line-height:1.6;color:#333;font-size:14px;">After login, you and the teacher or institution can contact each other directly by phone call, WhatsApp, or chat.</p>
<div style="display:flex;gap:10px;margin-top:18px;">
<button type="button" id="guestCancelBtn" style="flex:1;width:auto;padding:12px;background:#eceff1;color:#263238;border:none;border-radius:10px;font-size:14px;">Cancel</button>
<button type="button" id="guestLoginBtn" style="flex:1;width:auto;padding:12px;background:#00897b;color:white;border:none;border-radius:10px;font-size:14px;">Login Now</button>
</div>
</div>
</div>
`;

document.body.appendChild(popup);
document.getElementById("guestCancelBtn").onclick = () => popup.remove();
document.getElementById("guestLoginBtn").onclick = () => {
popup.remove();
onLogin();
};
}

function openProfileWithLogin(id){
const viewerId =
localStorage.getItem("uid") ||
localStorage.getItem("profileId");

const viewerRole =
(localStorage.getItem("role") || "").toLowerCase();

const profileUrl = "profile-view.html?id=" + id;

if(!viewerId || viewerRole === "guest"){
showGuestAccessPopup(() => {
localStorage.removeItem("selectedRole");
sessionStorage.setItem("postLoginRedirect", profileUrl);
window.location.href =
"otp-login.html?return=" + encodeURIComponent(profileUrl);
});
return;
}

window.location.href = profileUrl;
}

document.addEventListener("click", (event) => {

const button = event.target.closest(".view");
if (!button) return;

const profileId = button.dataset.id;

openProfileWithLogin(profileId);
});

/* EVENTS */
document.getElementById("search").addEventListener("input", render);
document.getElementById("classFilter").addEventListener("change", render);

/* RENDER */
function render() {

const all = getAllProfiles();

const search = document.getElementById("search").value.trim().toLowerCase();
const selectedClass = document.getElementById("classFilter").value;

const filtered = all.filter((item) => {

const name = (item.name || "").toLowerCase();
const location = (item.location || item.address || "").toLowerCase();

if (search && !(similar(name, search) || similar(location, search))) {
return false;
}

if (selectedClass && !classMatch(item.class, selectedClass)) {
return false;
}

return true;
});

const grid = document.getElementById("grid");

const sorted = sortByRating(filtered);

if (!sorted.length) {
grid.innerHTML = `<div class="empty">No Academic Profiles Found</div>`;
return;
}

grid.innerHTML = sorted.map((item) => `
<div class="card ${item.type.toLowerCase()}">

<div class="top">

<img class="photo" src="${item.photo || item.logo || 'https://via.placeholder.com/100'}">

<div>

<h3>${item.name || "-"}</h3>

<div class="badge">${item.type}</div>

<div class="badge verify">
${(item.status || "").toLowerCase() === "approved" ? "Verified" : "Not Verified"}
</div>

<button class="btn view" data-id="${item.id}">
View Details
</button>

</div>
</div>

<div class="details">
<b>Class:</b> ${item.class || "-"} <br>
<b>Location:</b> ${item.location || item.address || "-"}
</div>

</div>
`).join("");

}

</script>

</body>
</html>
