<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Skill Teacher Registration</title>

<style>

body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#e65100;
color:white;
padding:18px;
text-align:center;
}

.container{
width:90%;
max-width:750px;
margin:20px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

textarea{
height:100px;
resize:none;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#e65100;
color:white;
font-size:16px;
cursor:pointer;
margin-top:20px;
}

.preview{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

.preview img{
width:80px;
height:80px;
object-fit:cover;
border-radius:10px;
border:1px solid #ddd;
}

.modeBox{
border:1px solid #ddd;
padding:15px;
border-radius:10px;
}

.modeItem{
margin-bottom:15px;
}

.modeItem label{
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
}

.modeItem input[type="checkbox"]{
width:auto;
}

.modeFee{
display:none;
margin-top:10px;
}

</style>
</head>

<body>

<header>

<h1>Skill Teacher Registration</h1>

</header>

<div class="container">

<form id="teacherForm">

<input
id="name"
placeholder="Full Name"
required>

<input
id="phone"
placeholder="Phone Number"
required>

<input
id="email"
type="email"
placeholder="Email">

<input
id="website"
placeholder="Website / Social Link">

<input
id="qualification"
placeholder="Qualification">

<input
id="experience"
placeholder="Experience">


<h3>Skill Subject</h3>

<select id="subject">

<option value="">
Select Skill Subject
</option>

<option>Computer</option>
<option>Coding</option>
<option>Spoken English</option>
<option>Digital Marketing</option>
<option>Hand Craft</option>
<option>Embroidery</option>
<option>Cake Making</option>
<option>Cooking</option>
<option>Beautician</option>
<option>Tailoring</option>
<option>Graphic Design</option>
<option>Video Editing</option>

<option value="other">
Other
</option>

</select>

<input
id="customSubject"
placeholder="Write Subject Name"
style="display:none"
>


<input
id="location"
placeholder="Preferred Teaching Area Example: Beltola"
>


<h3>Teaching Modes</h3>

<div class="modeBox">

<div class="modeItem">

<label>

<input
type="checkbox"
onchange="toggleFee('homeFeeBox')">

Home Tuition

</label>

<div
id="homeFeeBox"
class="modeFee">

<input
id="homeFee"
placeholder="Enter Home Tuition Fee">

</div>

</div>


<div class="modeItem">

<label>

<input
type="checkbox"
onchange="toggleFee('groupFeeBox')">

Group Tuition

</label>

<div
id="groupFeeBox"
class="modeFee">

<input
id="groupFee"
placeholder="Enter Group Tuition Fee">

</div>

</div>


<div class="modeItem">

<label>

<input
type="checkbox"
onchange="toggleFee('onlineFeeBox')">

Online Individual

</label>

<div
id="onlineFeeBox"
class="modeFee">

<input
id="onlineFee"
placeholder="Enter Online Fee">

</div>

</div>


<div class="modeItem">

<label>

<input
type="checkbox"
onchange="toggleFee('onlineGroupFeeBox')">

Online Group

</label>

<div
id="onlineGroupFeeBox"
class="modeFee">

<input
id="onlineGroupFee"
placeholder="Enter Online Group Fee">

</div>

</div>

</div>


<h3>Profile Photo</h3>

<input
type="file"
id="photo"
accept="image/*">

<div
id="photoPreview"
class="preview"></div>


<h3>Gallery Photos (Max 5)</h3>

<input
type="file"
id="gallery"
multiple
accept="image/*">

<div
id="galleryPreview"
class="preview"></div>


<textarea
id="description"
placeholder="About Teacher"></textarea>


<button type="submit">

Continue To Payment

</button>

</form>

</div>


<script type="module">

import {
initializeApp
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getDatabase,
ref,
push
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";


const firebaseConfig={

apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"

};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const API_KEY="31f729ff855eb2e42c00ee508a8647ea";


/* ELEMENTS */

const teacherForm=document.getElementById("teacherForm");
const subject=document.getElementById("subject");
const customSubject=document.getElementById("customSubject");
const photo=document.getElementById("photo");
const photoPreview=document.getElementById("photoPreview");
const gallery=document.getElementById("gallery");
const galleryPreview=document.getElementById("galleryPreview");


/* IMAGE UPLOAD */

async function upload(file){

try{

let fd=new FormData();

fd.append("image",file);

let res=await fetch(
`https://api.imgbb.com/1/upload?key=${API_KEY}`,
{
method:"POST",
body:fd
}
);

let data=await res.json();

if(!data.success){

throw new Error("Upload failed");

}

return data.data.url;

}
catch(err){

console.log(err);

return "";

}

}


/* SUBJECT */

subject.addEventListener(
"change",
()=>{

customSubject.style.display=
subject.value==="other"
?
"block"
:
"none";

}
);


/* PROFILE PREVIEW */

photo.addEventListener(
"change",
()=>{

photoPreview.innerHTML="";

if(photo.files[0]){

let img=document.createElement("img");

img.src=
URL.createObjectURL(
photo.files[0]
);

photoPreview.appendChild(img);

}

}
);


/* GALLERY PREVIEW */

gallery.addEventListener(
"change",
()=>{

galleryPreview.innerHTML="";

if(gallery.files.length>5){

alert(
"Maximum 5 photos allowed"
);

gallery.value="";

return;

}

Array.from(
gallery.files
)
.forEach(file=>{

let img=
document.createElement("img");

img.src=
URL.createObjectURL(file);

galleryPreview.appendChild(img);

});

}
);


/* FORM SUBMIT */

teacherForm.addEventListener(
"submit",
async(e)=>{

e.preventDefault();

try{

const btn=
teacherForm.querySelector(
"button"
);

btn.disabled=true;

btn.innerHTML=
"Submitting...";


/* PHOTO */

let photoUrl="";

if(photo.files[0]){

photoUrl=
await upload(
photo.files[0]
);

}


/* GALLERY */

let galleryUrls=[];

for(let file of gallery.files){

let url=
await upload(file);

if(url){

galleryUrls.push(url);

}

}


/* SUBJECT */

let subjectName=

subject.value==="other"

?

customSubject.value.trim()

:

subject.value;


/* TEACHING MODES */

let teachingModes=[];

document
.querySelectorAll(
'input[type="checkbox"]:checked'
)
.forEach(c=>{

let text=
c.parentElement.innerText.trim();

teachingModes.push(text);

});


/* SAVE FIREBASE */

let newRef=
await push(
ref(db,"teachers"),
{

name:
document.getElementById("name").value.trim(),

phone:
document.getElementById("phone").value.trim(),

email:
document.getElementById("email").value.trim(),

website:
document.getElementById("website").value.trim(),

qualification:
document.getElementById("qualification").value.trim(),

experience:
document.getElementById("experience").value.trim(),

subject:
subjectName,

location:
document.getElementById("location").value.trim(),

teachingModes:
teachingModes,

homeFee:
document.getElementById("homeFee").value || "",

groupFee:
document.getElementById("groupFee").value || "",

onlineIndividualFee:
document.getElementById("onlineFee").value || "",

onlineGroupFee:
document.getElementById("onlineGroupFee").value || "",

description:
document.getElementById("description").value.trim(),

photo:
photoUrl,

gallery:
galleryUrls,

category:"skill",

type:"teacher",

status:"pending",

createdAt:
Date.now()

}

);


/* SAVE GENERATED ID */

const teacherId=
newRef.key;

localStorage.setItem(
"teacherId",
teacherId
);


/* PAYMENT REDIRECT */

window.location.href=
"payment.html?type=teacher&id="+teacherId;


}
catch(err){

console.log(err);

alert(
"Error: "+
err.message
);

}
finally{

const btn=
teacherForm.querySelector(
"button"
);

btn.disabled=false;

btn.innerHTML=
"Continue To Payment";

}

});

</script>


<script>

function toggleFee(id){

let box=
document.getElementById(id);

box.style.display=

box.style.display==="block"

?

"none"

:

"block";

}

</script>

</body>
</html>
