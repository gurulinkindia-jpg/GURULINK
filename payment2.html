<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GURULINK Payment2</title>

<style>
body{font-family:Arial;background:#eef2f7;padding:20px;}
.container{max-width:500px;margin:auto;background:white;padding:25px;border-radius:15px;text-align:center;box-shadow:0 5px 15px rgba(0,0,0,.15);}
button{width:100%;padding:14px;border:none;border-radius:10px;background:#1b5e20;color:white;font-size:16px;cursor:pointer;}
.amount{font-size:25px;font-weight:bold;margin:20px;}
</style>
</head>

<body>
<div class="container">
<h2>GURULINK Renewal Payment</h2>
<div id="feeText" class="amount"></div>
<button id="payBtn">Continue To Payment</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const params = new URLSearchParams(window.location.search);

function cleanValue(value) {
  if (!value) return "";
  value = String(value).trim();
  if (
    value === "null" ||
    value === "undefined" ||
    value === "..." ||
    value === "[object Object]"
  ) return "";
  return value;
}

const type = cleanValue(
  params.get("type") ||
  localStorage.getItem("paymentType") ||
  localStorage.getItem("renewRole") ||
  localStorage.getItem("role") ||
  "teacher"
).toLowerCase();

let id = cleanValue(
  params.get("id") ||
  localStorage.getItem("profileId") ||
  localStorage.getItem("teacherId") ||
  localStorage.getItem("institutionId") ||
  localStorage.getItem("paymentProfileId") ||
  localStorage.getItem("renewProfileId") ||
  ""
);

if (!id) {
  alert("Profile ID missing. Please login again and open payment from dashboard.");
  throw new Error("Missing profileId");
}

if (!type) {
  alert("Account type missing. Please login again and open payment from dashboard.");
  throw new Error("Missing type");
}

const amount = 399;

function savePaymentData() {
  localStorage.setItem("profileId", id);
  localStorage.setItem("paymentProfileId", id);
  localStorage.setItem("renewProfileId", id);
  localStorage.setItem("role", type);
  localStorage.setItem("paymentType", type);
  localStorage.setItem("renewRole", type);

  sessionStorage.setItem("profileId", id);
  sessionStorage.setItem("paymentProfileId", id);
  sessionStorage.setItem("renewProfileId", id);
  sessionStorage.setItem("role", type);
  sessionStorage.setItem("paymentType", type);
  sessionStorage.setItem("renewRole", type);

  if (window.AndroidPayment) {
    AndroidPayment.savePaymentContext(id, type);
  }
}

function createToken() {
  return "renew_" + Date.now() + "_" + Math.random().toString(36).slice(2);
}

async function createPaymentLink() {
  const token = createToken();

  await set(ref(db, "pendingPayments/" + token), {
    token: token,
    profileId: id,
    type: type,
    flow: "renewal",
    amount: amount,
    status: "pending",
    createdAt: Date.now()
  });

  const successUrl =
    "https://www.gurulink.co.in/payment-success2.html?token=" +
    encodeURIComponent(token);

  if (type === "teacher" || type === "teacher_institute") {
    return (
      "https://rzp.io/rzp/6jCbwy7?redirect=true" +
      "&reference_id=" + encodeURIComponent(token) +
      "&redirect_url=" + encodeURIComponent(successUrl)
    );
  }

  if (type === "institution") {
    return (
      "https://rzp.io/rzp/poQdXFn?redirect=true" +
      "&reference_id=" + encodeURIComponent(token) +
      "&redirect_url=" + encodeURIComponent(successUrl)
    );
  }

  throw new Error("Invalid type: " + type);
}

document.getElementById("feeText").innerText =
  "Renewal Fee ₹" + amount;

document.getElementById("payBtn").onclick = async function () {
  try {
    const btn = document.getElementById("payBtn");
    btn.disabled = true;
    btn.innerText = "Opening Payment...";

    savePaymentData();

    const paymentLink = await createPaymentLink();

    setTimeout(function () {
      window.location.href = paymentLink;
    }, 300);

  } catch (err) {
    alert("Unable to start payment: " + err.message);
    const btn = document.getElementById("payBtn");
    btn.disabled = false;
    btn.innerText = "Continue To Payment";
  }
};
</script>
</body>
</html>
