<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>GURULINK Payment2</title>

<style>

body{
font-family:Arial;
background:#eef2f7;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#1b5e20;
color:white;
font-size:16px;
cursor:pointer;
}

.amount{
font-size:25px;
font-weight:bold;
margin:20px;
}

</style>

</head>

<body>

<div class="container">

<h2>GURULINK Payment</h2>

<div id="feeText" class="amount"></div>

<button id="payBtn">
Continue To Payment
</button>

</div>

<script>

const params = new URLSearchParams(window.location.search);

/* ✅ TYPE: URL first, then storage fallback */
const type =
  params.get("type") ||
  localStorage.getItem("paymentType") ||
  localStorage.getItem("renewRole") ||
  localStorage.getItem("role") ||
  "teacher";

/* ✅ PROFILE ID: URL first, then all storage fallbacks */
let id = params.get("id");

if (!id) {
  id =
    localStorage.getItem("profileId") ||
    localStorage.getItem("teacherId") ||
    localStorage.getItem("institutionId") ||
    localStorage.getItem("paymentProfileId") ||
    localStorage.getItem("renewProfileId");
}

/* ✅ SAFE CHECK */
if (!id) {
  alert("Profile ID missing. Please login again and open payment from dashboard.");
  throw new Error("Missing profileId");
}

/* ✅ SAVE IMMEDIATELY FOR MOBILE WEBVIEW / RAZORPAY RETURN */
localStorage.setItem("profileId", id);
localStorage.setItem("paymentProfileId", id);
localStorage.setItem("renewProfileId", id);

localStorage.setItem("role", type);
localStorage.setItem("paymentType", type);
localStorage.setItem("renewRole", type);

/* 💰 AMOUNT */
let amount = 399;
let paymentLink = "";

/* ✅ VALID ACCOUNT TYPES */
if (type === "teacher" || type === "teacher_institute" || type === "institution") {

  paymentLink =
    "https://rzp.io/rzp/6jCbwy7?redirect=true&redirect_url=" +
    encodeURIComponent(
      "https://gurulink.onrender.com/payment-success2.html?type=" +
      encodeURIComponent(type) +
      "&id=" +
      encodeURIComponent(id)
    );

} else {
  alert("Invalid account type: " + type);
  throw new Error("Invalid type");
}

/* SHOW AMOUNT */
document.getElementById("feeText").innerText =
  "Registration Fee ₹" + amount;

/* BUTTON CLICK */
document.getElementById("payBtn").onclick = function () {

  localStorage.setItem("profileId", id);
  localStorage.setItem("paymentProfileId", id);
  localStorage.setItem("renewProfileId", id);

  localStorage.setItem("role", type);
  localStorage.setItem("paymentType", type);
  localStorage.setItem("renewRole", type);

  window.location.href = paymentLink;
};

</script>

</body>
</html>
