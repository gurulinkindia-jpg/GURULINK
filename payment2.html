<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>GURULINK Payment2</title>

<style>

body{
font-family:Arial;
background:#eef2f7;
padding:20px;
}

.container{

max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.15);

}

button{

width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#1b5e20;
color:white;
font-size:16px;
cursor:pointer;

}

.amount{

font-size:25px;
font-weight:bold;
margin:20px;

}

</style>

</head>

<body>

<div class="container">

<h2>GURULINK Payment</h2>

<div id="feeText" class="amount"></div>

<button id="payBtn">

Continue To Payment

</button>

</div>










<script>

const params = new URLSearchParams(window.location.search);

const id = params.get("id");
const type = params.get("type");

/* ❗ STOP if ID missing */
if (!id) {
  alert("Profile ID missing. Please go back to dashboard.");
  throw new Error("Missing profileId");
}

/* 💰 Set amount + payment link */
let amount = 1;
let paymentLink = "";

if (type === "teacher") {

  amount = 1;

  paymentLink =
    "https://rzp.io/rzp/6jCbwy7?redirect=true&redirect_url=" +
    encodeURIComponent(
      "https://gurulink.onrender.com/payment-success2.html?type=teacher&id=" + id
    );

} 
else if (type === "institution") {

  amount = 2;

  paymentLink =
    "https://rzp.io/rzp/6jCbwy7?redirect=true&redirect_url=" +
    encodeURIComponent(
      "https://gurulink.onrender.com/payment-success2.html?type=institution&id=" + id
    );
}

/* 📌 Show fee on page */
document.getElementById("feeText").innerText =
  "Registration Fee ₹" + amount;

/* 🟢 Payment button click */
document.getElementById("payBtn").onclick = () => {

  window.location.href = paymentLink;

};

</script>

</body>

</html>
