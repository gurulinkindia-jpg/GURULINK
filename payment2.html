<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Renew Membership - GURULINK</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
}

.container{
max-width:600px;
margin:40px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

h2{
text-align:center;
color:#1565c0;
margin-bottom:20px;
}

.info{
padding:15px;
background:#f5f5f5;
border-radius:10px;
margin-top:15px;
}

.row{
margin-bottom:12px;
}

.payBtn{
width:100%;
padding:15px;
border:none;
background:#43a047;
color:white;
font-size:18px;
border-radius:10px;
cursor:pointer;
margin-top:20px;
}

.payBtn:hover{
opacity:.9;
}

</style>
</head>

<body>

<div class="container">

<h2>Renew Membership</h2>

<div class="info">

<div class="row">
<b>Profile Name:</b>
<span id="name">Loading...</span>
</div>

<div class="row">
<b>Role:</b>
<span id="roleText">Loading...</span>
</div>

<div class="row">
<b>Plan:</b>
365 Days Membership
</div>

<div class="row">
<b>Amount:</b>
₹399
</div>

</div>

<button
class="payBtn"
id="payBtn">
Pay ₹399
</button>

</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getDatabase,
ref,
get
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",

authDomain:"gurulink-59cc7.firebaseapp.com",

databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"gurulink-59cc7",

storageBucket:"gurulink-59cc7.appspot.com",

messagingSenderId:"112148672399",

appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const profileId =
localStorage.getItem("renewProfileId");

const role =
localStorage.getItem("renewRole");

if(!profileId || !role){

alert("Renewal Session Expired");

location.href="login.html";

}

const dbPath =
role==="teacher"
?
"teachers/"+profileId
:
"institutions/"+profileId;

let profileData = {};

async function loadProfile(){

const snap =
await get(ref(db,dbPath));

if(!snap.exists()){

alert("Profile Not Found");
return;

}

profileData = snap.val();

document.getElementById("name").innerText =
profileData.name || "Unknown";

document.getElementById("roleText").innerText =
role.toUpperCase();

}

loadProfile();

document.getElementById("payBtn").onclick = function(){

var options = {

key:"rzp_live_SwAMX5YRz3G7MB",

amount:100,

currency:"INR",

name:"GURULINK",

description:"365 Days Membership Renewal",

prefill:{

name:profileData.name || "",

email:profileData.email || "",

contact:profileData.phone || ""

},

theme:{
color:"#1565c0"
},

handler:function(response){

console.log("HANDLER FIRED");
console.log(response);

alert("SUCCESS");

}

modal:{

ondismiss:function(){

console.log("Payment Closed");

}

}

};
console.log("Opening Razorpay", options);
var rzp = new Razorpay(options);

rzp.open();

};

</script>

</body>
</html>
