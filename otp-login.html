<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GURULINK OTP Login</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:90%;
max-width:400px;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.15);
text-align:center;
}

h2{color:#1565c0;margin-bottom:10px;}
p{color:#666;margin-bottom:20px;}

input{
width:100%;
padding:14px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#1565c0;
color:white;
font-size:16px;
cursor:pointer;
margin-bottom:10px;
}

button:hover{background:#0d47a1;}

#otpSection{display:none;}

.role{
font-weight:bold;
color:#2e7d32;
margin-bottom:15px;
}

.small{
font-size:13px;
color:#888;
}
</style>
</head>

<body>

<div class="box">

<h2>GURULINK</h2>

<div class="role" id="roleText"></div>

<p>Login with Mobile OTP</p>

<input type="tel" id="phone" placeholder="Enter Mobile Number" maxlength="10">

<button id="sendOtpBtn">Send OTP</button>

<div id="otpSection">
<input type="text" id="otp" placeholder="Enter OTP">
<button id="verifyBtn">Verify OTP</button>
</div>

<div id="recaptcha-container"></div>

<div class="small">Enter your mobile number and verify OTP.</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getAuth,
RecaptchaVerifier,
signInWithPhoneNumber
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
getDatabase
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

/* FIREBASE */

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

/* ROLE */
const role = localStorage.getItem("selectedRole");



if (!role) {
alert("Role not selected");
location.href = "role-select.html";
}

document.getElementById("roleText").textContent =
role === "teacher_institute"
? "Teacher / Institute Login"
: "Parent / Student Login";

/* RECAPTCHA */
window.recaptchaVerifier = new RecaptchaVerifier(
auth,
"recaptcha-container",
{ size: "normal" }
);

/* SEND OTP */
document.getElementById("sendOtpBtn").onclick = async () => {
try {
const mobile = document.getElementById("phone").value.trim();

if (mobile.length !== 10) {
alert("Enter valid mobile number");
return;
}

const phoneNumber = "+91" + mobile;

const confirmationResult = await signInWithPhoneNumber(
auth,
phoneNumber,
window.recaptchaVerifier
);

window.confirmationResult = confirmationResult;

document.getElementById("otpSection").style.display = "block";

alert("OTP Sent Successfully");

} catch (err) {
console.error(err);
alert(err.message);
}
};

/* VERIFY OTP */
document.getElementById("verifyBtn").onclick = async () => {
try {

const code = document.getElementById("otp").value.trim();

if (!code) {
alert("Enter OTP");
return;
}

const result = await window.confirmationResult.confirm(code);
const user = result.user;

const phone = user.phoneNumber.replace("+91", "");
const uid = user.uid;

/* SAVE LOCAL */
localStorage.setItem("phone", phone);
localStorage.setItem("uid", uid);
localStorage.setItem("role", role);







/* FINAL REDIRECT */
/* FINAL REDIRECT */
localStorage.setItem("otpRole", role);

}
};

/* CHECK TEACHER / INSTITUTE */
async function checkTeacherFlow(phone, uid) {

let found = false;

/* CHECK TEACHERS */
const teacherSnap = await get(ref(db, "teachers"));

teacherSnap.forEach(child => {
const d = child.val();
const dbPhone = String(d.phone || "").replace(/\s/g, "");

if (dbPhone === phone) {
found = true;

localStorage.setItem("role", "teacher");
localStorage.setItem("profileId", child.key);

location.href = "teacher-dashboard.html";
}
});

if (found) return;

/* CHECK INSTITUTIONS */
const instSnap = await get(ref(db, "institutions"));

instSnap.forEach(child => {
const d = child.val();
const dbPhone = String(d.phone || "").replace(/\s/g, "");

if (dbPhone === phone) {
found = true;

localStorage.setItem("role", "institution");
localStorage.setItem("profileId", child.key);

location.href = "institute-dashboard.html";
}
});

if (found) return;

/* NOT REGISTERED */
location.href = "teacher-check.html";

</script>

</body>
</html>
