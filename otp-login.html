<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GURULINK OTP Login</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:90%;
max-width:400px;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.15);
text-align:center;
}

h2{
margin-bottom:10px;
color:#1565c0;
}

p{
color:#666;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#1565c0;
color:white;
font-size:16px;
cursor:pointer;
margin-bottom:10px;
}

button:hover{
background:#0d47a1;
}

#otpSection{
display:none;
}

.role{
font-weight:bold;
color:#2e7d32;
margin-bottom:15px;
}

.small{
font-size:13px;
color:#888;
}
</style>
</head>

<body>

<div class="box">

<h2>GURULINK</h2>

<div class="role" id="roleText"></div>

<p>Login with Mobile OTP</p>

<input
type="tel"
id="phone"
placeholder="Enter Mobile Number"
maxlength="10">

<button id="sendOtpBtn">
Send OTP
</button>

<div id="otpSection">

<input
type="text"
id="otp"
placeholder="Enter OTP">

<button id="verifyBtn">
Verify OTP
</button>

</div>

<div id="recaptcha-container"></div>

<div class="small">
Use test numbers configured in Firebase during development.
</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getAuth,
RecaptchaVerifier,
signInWithPhoneNumber
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig={
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const role =
localStorage.getItem("selectedRole") || "student";

document.getElementById("roleText").textContent =
role === "teacher"
? "Teacher / Institute Login"
: "Parent / Student Login";

/* Invisible reCAPTCHA */

window.recaptchaVerifier =
new RecaptchaVerifier(
auth,
"recaptcha-container",
{
size:"invisible"
}
);

/* SEND OTP */

document
.getElementById("sendOtpBtn")
.onclick = async ()=>{

try{

const mobile =
document.getElementById("phone")
.value
.trim();

if(mobile.length !== 10){

alert("Enter valid mobile number");
return;

}

const phoneNumber =
"+91" + mobile;

const appVerifier =
window.recaptchaVerifier;

const confirmationResult =
await signInWithPhoneNumber(
auth,
phoneNumber,
appVerifier
);

window.confirmationResult =
confirmationResult;

document
.getElementById("otpSection")
.style.display = "block";

alert("OTP Sent");

}catch(err){

console.error(err);
alert(err.message);

}

};

/* VERIFY OTP */

document
.getElementById("verifyBtn")
.onclick = async ()=>{

try{

const code =
document.getElementById("otp")
.value
.trim();

if(!code){

alert("Enter OTP");
return;

}

const result =
await window
.confirmationResult
.confirm(code);

const user = result.user;

localStorage.setItem(
"phone",
user.phoneNumber
);

localStorage.setItem(
"role",
role
);

localStorage.setItem(
"uid",
user.uid
);

/* Redirect */

if(role === "teacher"){

location.href =
"teacher-check.html";

}else{

location.href =
"student-dashboard.html";

}

}catch(err){

console.error(err);
alert("Invalid OTP");

}

};

</script>

</body>
</html>
