<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Creative Teacher Registration</title>

<style>

body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#6a1b9a;
color:white;
padding:18px;
text-align:center;
}

.container{
width:90%;
max-width:750px;
margin:20px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

textarea{
height:100px;
resize:none;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#6a1b9a;
color:white;
font-size:16px;
cursor:pointer;
margin-top:20px;
}

.preview{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

.preview img{
width:80px;
height:80px;
object-fit:cover;
border-radius:10px;
border:1px solid #ddd;
}

.modeBox{
border:1px solid #ddd;
padding:15px;
border-radius:10px;
}

.modeItem{
margin-bottom:15px;
}

.modeItem label{
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
}

.modeItem input[type="checkbox"]{
width:auto;
}

.modeFee{
display:none;
margin-top:10px;
}

</style>
</head>

<body>

<header>

<h1>Creative Teacher Registration</h1>

</header>

<div class="container">

<form id="teacherForm">

<input id="name" placeholder="Full Name" required>

<input id="phone" placeholder="Phone Number" required>

<input id="email" type="email" placeholder="Email">

<input id="website" placeholder="Website / Social Link">

<input id="qualification" placeholder="Qualification">

<input id="experience" placeholder="Experience">


<h3>Creative Subject</h3>

<select id="subject">

<option value="">Select Creative Subject</option>

<option>Music</option>
<option>Dance</option>
<option>Singing</option>
<option>Drawing</option>
<option>Painting</option>
<option>Photography</option>
<option>Guitar</option>
<option>Piano</option>
<option>Acting</option>
<option>Art & Craft</option>

<option value="other">
Other
</option>

</select>

<input
id="customSubject"
placeholder="Write Subject Name"
style="display:none"
>


<input
id="location"
placeholder="Preferred Teaching Area Example: Beltola"
>


<h3>Teaching Modes</h3>

<div class="modeBox">

<div class="modeItem">

<label>

<input type="checkbox"
onchange="toggleFee('homeFeeBox')">

Home Tuition

</label>

<div id="homeFeeBox" class="modeFee">

<input
id="homeFee"
placeholder="Enter Home Tuition Fee"
>

</div>

</div>


<div class="modeItem">

<label>

<input type="checkbox"
onchange="toggleFee('groupFeeBox')">

Group Tuition

</label>

<div id="groupFeeBox" class="modeFee">

<input
id="groupFee"
placeholder="Enter Group Tuition Fee"
>

</div>

</div>


<div class="modeItem">

<label>

<input type="checkbox"
onchange="toggleFee('onlineFeeBox')">

Online Individual

</label>

<div id="onlineFeeBox" class="modeFee">

<input
id="onlineFee"
placeholder="Enter Online Fee"
>

</div>

</div>


<div class="modeItem">

<label>

<input type="checkbox"
onchange="toggleFee('onlineGroupFeeBox')">

Online Group

</label>

<div id="onlineGroupFeeBox" class="modeFee">

<input
id="onlineGroupFee"
placeholder="Enter Online Group Fee"
>

</div>

</div>

</div>


<h3>Profile Photo</h3>

<input
type="file"
id="photo"
accept="image/*"
>

<div
id="photoPreview"
class="preview">
</div>


<h3>Gallery (Max 5)</h3>

<input
type="file"
id="gallery"
multiple
accept="image/*"
>

<div
id="galleryPreview"
class="preview">
</div>


<textarea
id="description"
placeholder="About Teacher">
</textarea>

<button type="submit">

Continue To Payment

</button>

</form>

</div>

<script type="module">

import {
initializeApp
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getDatabase,
ref,
push
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";


const firebaseConfig={

apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"

};

const app=initializeApp(firebaseConfig);

const db=getDatabase(app);

const API_KEY="31f729ff855eb2e42c00ee508a8647ea";


async function upload(file){

let fd=new FormData();

fd.append("image",file);

let res=await fetch(
`https://api.imgbb.com/1/upload?key=${API_KEY}`,
{
method:"POST",
body:fd
}
);

let data=await res.json();

return data.data.url;

}


/* Other subject */

subject.onchange=function(){

customSubject.style.display=
this.value==="other"
?
"block"
:
"none";

}


/* Photo Preview */

photo.addEventListener(
"change",
function(){

photoPreview.innerHTML="";

if(this.files[0]){

let img=document.createElement("img");

img.src=
URL.createObjectURL(
this.files[0]
);

photoPreview.appendChild(img);

}

}
);


/* Gallery Preview */

gallery.addEventListener(
"change",
function(){

galleryPreview.innerHTML="";

if(this.files.length>5){

alert("Maximum 5 photos");

this.value="";

return;

}

[...this.files].forEach(file=>{

let img=
document.createElement("img");

img.src=
URL.createObjectURL(file);

galleryPreview.appendChild(img);

});

}
);



teacherForm.addEventListener(
"submit",
async(e)=>{

e.preventDefault();

let profile="";

if(photo.files[0]){

profile=
await upload(
photo.files[0]
);

}

let galleryUrls=[];

for(let file of gallery.files){

galleryUrls.push(
await upload(file)
);

}


let subjectName=
subject.value==="other"
?
customSubject.value
:
subject.value;


let data={

name:name.value,
phone:phone.value,
email:email.value,
website:website.value,
qualification:qualification.value,
experience:experience.value,

subject:subjectName,

location:location.value,

description:description.value,

fees:{

home:homeFee.value,
group:groupFee.value,
online:onlineFee.value,
onlineGroup:onlineGroupFee.value

},

photo:profile,

gallery:galleryUrls,

category:"creative",

type:"teacher",

status:"pending"

};


await push(
ref(db,"teachers"),
data
);

window.location.href=
"payment.html?type=teacher";

});

</script>


<script>

function toggleFee(id){

let box=
document.getElementById(id);

box.style.display=
box.style.display==="block"
?
"none"
:
"block";

}

</script>

</body>
</html>
