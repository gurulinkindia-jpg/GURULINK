<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Creative Teacher Registration</title>

<style>

body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#6a1b9a;
color:white;
padding:18px;
text-align:center;
}

.container{
width:90%;
max-width:800px;
margin:20px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

textarea{
height:100px;
resize:none;
}

button{
width:100%;
padding:14px;
background:#6a1b9a;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.preview{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}

.preview img{
width:90px;
height:90px;
border-radius:10px;
object-fit:cover;
border:1px solid #ddd;
}

.modeBox{
border:1px solid #ddd;
padding:15px;
border-radius:10px;
}

.modeFee{
display:none;
padding:10px;
background:#f4f4f4;
border-radius:10px;
margin-bottom:10px;
}

.row{
display:flex;
align-items:center;
gap:10px;
margin:10px 0;
}

.row input{
width:auto;
transform:scale(1.2);
}

</style>
</head>

<body>

<header>
<h1>Creative Teacher Registration</h1>
<p>Registration Fee ₹100</p>
</header>

<div class="container">

<form id="teacherForm">

<input id="name" placeholder="Full Name" required>

<input id="phone" placeholder="Phone Number" required>

<input type="email"
id="email"
placeholder="Email">

<input id="website"
placeholder="Website / Social Link">

<input id="qualification"
placeholder="Qualification">

<input id="experience"
placeholder="Experience">


<select id="subject">

<option value="">
Select Creative Subject
</option>

<option>Music</option>
<option>Dance</option>
<option>Singing</option>
<option>Drawing</option>
<option>Painting</option>
<option>Photography</option>
<option>Guitar</option>
<option>Piano</option>
<option>Acting</option>
<option>Art & Craft</option>

<option value="other">
Other
</option>

</select>


<input
id="customSubject"
placeholder="Write Subject"
style="display:none">


<input
id="location"
placeholder="Preferred Teaching Area">



<h3>Teaching Modes</h3>

<div class="modeBox">

<div class="row">
<input type="checkbox"
value="Home Tuition"
id="homeCheck"
onchange="toggleFee('home')">

<label>Home Tuition</label>
</div>

<div id="home" class="modeFee">
<input id="homeFee"
placeholder="Enter Home Fee">
</div>



<div class="row">
<input type="checkbox"
value="Group Tuition"
id="groupCheck"
onchange="toggleFee('group')">

<label>Group Tuition</label>
</div>

<div id="group"
class="modeFee">

<input id="groupFee"
placeholder="Enter Group Fee">

</div>



<div class="row">
<input type="checkbox"
value="Online Individual"
id="individualCheck"
onchange="toggleFee('individual')">

<label>Online Individual</label>
</div>

<div id="individual"
class="modeFee">

<input
id="onlineIndividualFee"
placeholder="Enter Online Fee">

</div>



<div class="row">
<input type="checkbox"
value="Online Group"
id="onlineCheck"
onchange="toggleFee('online')">

<label>Online Group</label>
</div>

<div id="online"
class="modeFee">

<input
id="onlineGroupFee"
placeholder="Enter Online Group Fee">

</div>

</div>


<h3>Profile Photo</h3>

<input
type="file"
id="photo"
accept="image/*">

<div id="photoPreview"
class="preview"></div>


<h3>Gallery (Max 5)</h3>

<input
type="file"
id="gallery"
multiple
accept="image/*">

<div id="galleryPreview"
class="preview"></div>


<textarea
id="description"
placeholder="About Teacher"></textarea>


<button type="submit">

Continue To Payment

</button>

</form>

</div>



<script type="module">

import {
initializeApp
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getDatabase,
ref,
push
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";


const firebaseConfig={

apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"

};


const app=initializeApp(firebaseConfig);

const db=getDatabase(app);

const API_KEY="31f729ff855eb2e42c00ee508a8647ea";



async function upload(file){

let fd=new FormData();

fd.append("image",file);

let res=await fetch(
`https://api.imgbb.com/1/upload?key=${API_KEY}`,
{
method:"POST",
body:fd
});

let data=await res.json();

return data.data.url;

}


/* SUBJECT */

subject.onchange=()=>{

customSubject.style.display=
subject.value==="other"
?
"block"
:
"none";

};


/* PHOTO PREVIEW */

photo.onchange=function(){

photoPreview.innerHTML="";

if(this.files[0]){

let img=document.createElement("img");

img.src=
URL.createObjectURL(this.files[0]);

photoPreview.appendChild(img);

}

};



/* GALLERY PREVIEW */

gallery.onchange=function(){

galleryPreview.innerHTML="";

if(this.files.length>5){

alert("Maximum 5 photos");

this.value="";

return;

}

Array.from(this.files)
.forEach(file=>{

let img=document.createElement("img");

img.src=
URL.createObjectURL(file);

galleryPreview.appendChild(img);

});

};



teacherForm.addEventListener(
"submit",
async(e)=>{

e.preventDefault();

try{

let photoUrl="";

if(photo.files[0]){

photoUrl=
await upload(photo.files[0]);

}


let galleryUrls=[];

for(let file of gallery.files){

galleryUrls.push(
await upload(file)
);

}


let teachingModes=[];

document
.querySelectorAll(
'input[type="checkbox"]:checked'
)
.forEach(c=>{

teachingModes.push(
c.value
);

});


await push(
ref(db,"teachers"),
{

name:name.value,
phone:phone.value,
email:email.value,
website:website.value,
qualification:qualification.value,
experience:experience.value,

subject:
subject.value==="other"
?
customSubject.value
:
subject.value,

location:location.value,

teachingModes,

homeFee:homeFee.value,
groupFee:groupFee.value,
onlineIndividualFee:onlineIndividualFee.value,
onlineGroupFee:onlineGroupFee.value,

photo:photoUrl,
gallery:galleryUrls,

description:description.value,

category:"creative",
status:"pending"

});

window.location.href=
"payment.html?type=teacher&category=creative";

}
catch(error){

console.log(error);

alert(
"Submission error"
);

}

});

</script>


<script>

function toggleFee(id){

let box=
document.getElementById(id);

box.style.display=
box.style.display==="block"
?
"none"
:
"block";

}

</script>

</body>
</html>
