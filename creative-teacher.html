<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Creative Teacher Registration</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#7b1fa2;
color:white;
padding:18px;
text-align:center;
}

.container{
max-width:900px;
margin:20px auto;
background:white;
padding:20px;
border-radius:12px;
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#7b1fa2;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.row{
display:flex;
align-items:center;
gap:10px;
margin:6px 0;
}
</style>
</head>

<body>

<header>
<h2>Creative Teacher Registration</h2>
<p>Music • Dance • Art • Design</p>
</header>

<div class="container">

<form id="form">

<h3>Login Details</h3>
<input id="email" type="email" placeholder="Email" required>
<input id="password" type="password" placeholder="Password" required>

<h3>Basic Information</h3>
<input id="name" placeholder="Full Name" required>
<input id="phone" placeholder="Phone Number" required>
<input id="experience" placeholder="Experience (Years)">
<input id="address" placeholder="Address">

<h3>Creative Skills</h3>

<div class="row"><input type="checkbox" value="Music" class="skill"> Music</div>
<div class="row"><input type="checkbox" value="Dance" class="skill"> Dance</div>
<div class="row"><input type="checkbox" value="Painting" class="skill"> Painting</div>
<div class="row"><input type="checkbox" value="Photography" class="skill"> Photography</div>
<div class="row"><input type="checkbox" value="Graphic Design" class="skill"> Graphic Design</div>
<div class="row"><input type="checkbox" value="Fashion Design" class="skill"> Fashion Design</div>
<div class="row"><input type="checkbox" value="Acting" class="skill"> Acting</div>

<textarea id="bio" placeholder="Short Bio"></textarea>

<button type="submit">Register & Continue</button>

</form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
getDatabase,
ref,
set
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

document.getElementById("form").addEventListener("submit", async (e)=>{
e.preventDefault();

const email = emailInput.value;
const password = passwordInput.value;

const name = document.getElementById("name").value;
const phone = document.getElementById("phone").value;
const experience = document.getElementById("experience").value;
const address = document.getElementById("address").value;
const bio = document.getElementById("bio").value;

const skills = [];
document.querySelectorAll(".skill:checked").forEach(s=>{
skills.push(s.value);
});

if(skills.length === 0){
alert("Select at least one skill");
return;
}

try {

// 1. CREATE AUTH USER
const userCred = await createUserWithEmailAndPassword(auth, email, password);
const uid = userCred.user.uid;

// 2. SAVE PROFILE (UID BASED)
await set(ref(db, "creative_teachers/" + uid), {
uid,
name,
phone,
email,
experience,
address,
skills,
bio,
role:"creative_teacher",
status:"pending",
createdAt:Date.now()
});

// 3. ROLE MAPPING (IMPORTANT FOR LOGIN SYSTEM)
await set(ref(db, "users/" + uid), {
uid,
role:"creative_teacher",
profileId:uid
});

alert("Registration Successful");

// 4. PAYMENT REDIRECT
window.location.href = "payment.html?type=creative_teacher&id=" + uid;

}
catch(err){
alert(err.message);
}

});

</script>

</body>
</html>
