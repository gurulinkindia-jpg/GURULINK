<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Academic Teacher Registration</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
}

header{
background:#0d47a1;
color:white;
padding:18px;
text-align:center;
}

.container{
width:90%;
max-width:800px;
margin:20px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

textarea{
height:100px;
resize:none;
}

button{
width:100%;
padding:14px;
background:#1b5e20;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.preview{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

.preview img{
width:90px;
height:90px;
border-radius:10px;
object-fit:cover;
border:1px solid #ccc;
}

.modeBox{
padding:15px;
border:1px solid #ddd;
border-radius:10px;
}

.row{
display:flex;
align-items:center;
gap:10px;
margin:10px 0;
}

.row input[type=checkbox]{
width:auto;
transform:scale(1.2);
}

.modeFee{
display:none;
padding:10px;
background:#f7f7f7;
border-radius:10px;
margin-bottom:10px;
}

</style>
</head>

<body>

<header>
<h1>Academic Teacher Registration</h1>
<p>Registration Fee ₹100</p>
</header>

<div class="container">

<form id="form">




<input id="name" placeholder="Full Name" required>




<input id="phone" placeholder="Phone Number" required>




<input type="email"
id="email"
placeholder="Email">




<input
id="website"
placeholder="Website / Social Link">




<input
id="qualification"
placeholder="Qualification">




<input
id="experience"
placeholder="Experience">








<h3>Subjects (Select Multiple)</h3>

<div class="modeBox">

<div class="row">
<input type="checkbox" value="Physics" class="subjectCheck"> Physics
</div>

<div class="row">
<input type="checkbox" value="Chemistry" class="subjectCheck"> Chemistry
</div>

<div class="row">
<input type="checkbox" value="Mathematics" class="subjectCheck"> Mathematics
</div>

<div class="row">
<input type="checkbox" value="Biology" class="subjectCheck"> Biology
</div>

<div class="row">
<input type="checkbox" value="English" class="subjectCheck"> English
</div>

<div class="row">
<input type="checkbox" value="Hindi" class="subjectCheck"> Hindi
</div>

<div class="row">
<input type="checkbox" value="Assamese" class="subjectCheck"> Assamese
</div>

<div class="row">
<input type="checkbox" value="SST" class="subjectCheck"> SST
</div>

<div class="row">
<input type="checkbox" value="other" id="otherCheck"> Other
</div>

<input id="otherSubject"
placeholder="Write Other Subject"
style="display:none;margin-top:10px">

</div>







<input
id="class"
placeholder="Class Example: Class 9-10">






<input
id="location"
placeholder="Preferred Teaching Area">



<input id="mapLink" placeholder="Google Map Location Link (Paste URL)">






<h3>Teaching Modes</h3>

<div class="modeBox">




<div class="row">

<input
type="checkbox"
value="Home Tuition"
id="homeCheck"
onchange="toggleFee('home')">

<label>Home Tuition</label>

</div>

<div id="home" class="modeFee">

<input
id="homeFee"
placeholder="Enter Home Tuition Fee">

</div>








<div class="row">

<input
type="checkbox"
value="Group Tuition"
id="groupCheck"
onchange="toggleFee('group')">

<label>Group Tuition</label>

</div>

<div id="group" class="modeFee">

<input
id="groupFee"
placeholder="Enter Group Tuition Fee">

</div>








<div class="row">

<input
type="checkbox"
value="Online Individual"
id="individualCheck"
onchange="toggleFee('individual')">

<label>Online Individual</label>

</div>

<div id="individual" class="modeFee">

<input
id="onlineIndividualFee"
placeholder="Enter Online Individual Fee">

</div>









<div class="row">

<input
type="checkbox"
value="Online Group"
id="onlineCheck"
onchange="toggleFee('online')">

<label>Online Group</label>

</div>

<div id="online" class="modeFee">

<input
id="onlineGroupFee"
placeholder="Enter Online Group Fee">

</div>

</div>





<h3>Profile Photo</h3>

<input
type="file"
id="photo"
accept="image/*">

<div
class="preview"
id="photoPreview"></div>




<h3>Gallery Photos (Max 5)</h3>

<input
type="file"
id="gallery"
multiple
accept="image/*">

<div
class="preview"
id="galleryPreview"></div>


<textarea
id="description"
placeholder="About Teacher"></textarea>


<button type="submit">

Continue To Payment

</button>

</form>

</div>


<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getDatabase,
ref,
push
}
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";


const firebaseConfig={

apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"

};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const API_KEY="31f729ff855eb2e42c00ee508a8647ea";






/* GET ELEMENTS */

const form=document.getElementById("form");

const subject=document.getElementById("subject");
const otherSubject=document.getElementById("otherSubject");

const photo=document.getElementById("photo");
const photoPreview=document.getElementById("photoPreview");

const gallery=document.getElementById("gallery");
const galleryPreview=document.getElementById("galleryPreview");






/* IMAGE UPLOAD */

async function upload(file){

let fd=new FormData();

fd.append("image",file);

let res=await fetch(
`https://api.imgbb.com/1/upload?key=${API_KEY}`,
{
method:"POST",
body:fd
}
);

let data=await res.json();

return data.data.url;

}






/* SUBJECT */

const otherCheck = document.getElementById("otherCheck");
const otherSubject = document.getElementById("otherSubject");

otherCheck.addEventListener("change", () => {
otherSubject.style.display = otherCheck.checked ? "block" : "none";
});






/* PROFILE PREVIEW */

photo.addEventListener(
"change",
function(){

photoPreview.innerHTML="";

if(this.files.length>0){

let img=document.createElement("img");

img.src=
URL.createObjectURL(
this.files[0]
);

photoPreview.appendChild(img);

}

}
);






/* GALLERY PREVIEW */

gallery.addEventListener(
"change",
function(){

galleryPreview.innerHTML="";

if(this.files.length>5){

alert(
"Maximum 5 photos"
);

this.value="";

return;

}

Array.from(this.files)
.forEach(file=>{

let img=
document.createElement("img");

img.src=
URL.createObjectURL(file);

galleryPreview.appendChild(img);

});

}
);





/* SUBMIT */

form.addEventListener(
"submit",
async function(e){

e.preventDefault();

try{

let profileUrl="";

if(photo.files[0]){

profileUrl=
await upload(
photo.files[0]
);

}


/* GALLERY */

let galleryUrls=[];

for(let file of gallery.files){

let url=
await upload(file);

galleryUrls.push(url);

}


/* TEACHING MODES */

let teachingModes=[];

document
.querySelectorAll(
'input[type="checkbox"]:checked'
)
.forEach(item=>{

teachingModes.push(
item.value
);

});








/* SUBJECTS COLLECT */
let subjects = [];

document.querySelectorAll(".subjectCheck:checked").forEach(item => {
    if (item.value !== "other") {
        subjects.push(item.value);
    }
});

if (otherCheck.checked && otherSubject.value.trim() !== "") {
    subjects.push(otherSubject.value);
}








/* SAVE FIREBASE */

let newRef = await push(ref(db,"teachers"), {

    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    email: document.getElementById("email").value,
    website: document.getElementById("website").value,
    qualification: document.getElementById("qualification").value,
    experience: document.getElementById("experience").value,

    subjects: subjects,   // ✅ FIX HERE
    mapLink: document.getElementById("mapLink").value, // ✅ NEW

    class: document.getElementById("class").value,
    location: document.getElementById("location").value,

    teachingModes: teachingModes,

    homeFee: document.getElementById("homeFee").value,
    groupFee: document.getElementById("groupFee").value,
    onlineIndividualFee: document.getElementById("onlineIndividualFee").value,
    onlineGroupFee: document.getElementById("onlineGroupFee").value,

    photo: profileUrl,
    gallery: galleryUrls,

    description: document.getElementById("description").value,

    category: "academic",
    status: "pending"
});


alert(
"Form saved successfully"
);







/* OPEN PAYMENT PAGE */

const teacherId = newRef.key;

localStorage.setItem("teacherId", teacherId);

window.location.href =
"payment.html?type=teacher";

}
catch(error){

console.log(error);

alert(
"Error:\n"+
error.message
);

}

}
);


</script>


<script>

function toggleFee(id){

let box=
document.getElementById(id);

box.style.display=
box.style.display==="block"
?
"none"
:
"block";

}

</script>

</body>
</html>
