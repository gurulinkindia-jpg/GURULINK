<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Academic Teacher Registration</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#0d47a1;
color:white;
padding:18px;
text-align:center;
}

.container{
max-width:900px;
margin:20px auto;
background:white;
padding:20px;
border-radius:12px;
}

input,select,textarea{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#0d47a1;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.row{
display:flex;
gap:10px;
align-items:center;
margin:8px 0;
}

.preview img{
width:80px;
height:80px;
object-fit:cover;
border-radius:10px;
margin:5px;
}
</style>
</head>

<body>

<header>
<h2>Academic Teacher Registration</h2>
<p>Secure Login-Based System</p>
</header>

<div class="container">

<form id="form">

<h3>Login Details</h3>

<input id="email" type="email" placeholder="Email" required>
<input id="password" type="password" placeholder="Password" required>

<h3>Basic Info</h3>

<input id="name" placeholder="Full Name" required>
<input id="phone" placeholder="Phone Number" required>
<input id="qualification" placeholder="Qualification">

<h3>Subjects</h3>

<div class="row"><input type="checkbox" value="Physics" class="sub"> Physics</div>
<div class="row"><input type="checkbox" value="Chemistry" class="sub"> Chemistry</div>
<div class="row"><input type="checkbox" value="Maths" class="sub"> Maths</div>
<div class="row"><input type="checkbox" value="Biology" class="sub"> Biology</div>
<div class="row"><input type="checkbox" value="English" class="sub"> English</div>

<textarea id="address" placeholder="Address"></textarea>

<button type="submit">Register & Continue</button>

</form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
getDatabase,
ref,
set
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

document.getElementById("form").addEventListener("submit", async (e)=>{
e.preventDefault();

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const name = document.getElementById("name").value;
const phone = document.getElementById("phone").value;
const qualification = document.getElementById("qualification").value;
const address = document.getElementById("address").value;

const subjects = [];
document.querySelectorAll(".sub:checked").forEach(s=>{
subjects.push(s.value);
});

try {

// 1. CREATE AUTH USER
const userCred = await createUserWithEmailAndPassword(auth, email, password);
const uid = userCred.user.uid;

// 2. SAVE TEACHER PROFILE
await set(ref(db, "teachers/" + uid), {
uid,
name,
phone,
email,
qualification,
subjects,
address,
role:"teacher",
status:"pending",
createdAt:Date.now()
});

// 3. SAVE USER ROLE
await set(ref(db, "users/" + uid), {
uid,
role:"teacher",
profileId:uid
});

// 4. REDIRECT
alert("Registration Successful");
window.location.href = "payment.html?type=teacher&id=" + uid;

}
catch(err){
alert(err.message);
}

});

</script>

</body>
</html>
