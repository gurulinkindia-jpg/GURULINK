<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Academic Teacher Registration</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#0d47a1;
color:white;
padding:18px;
text-align:center;
}

.container{
width:90%;
max-width:800px;
margin:20px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}

textarea{height:100px}

button{
width:100%;
padding:14px;
background:#1b5e20;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

.modeFee{display:none;background:#f7f7f7;padding:10px;margin-top:5px;border-radius:8px}
.preview img{width:90px;height:90px;object-fit:cover;border-radius:8px}
</style>
</head>

<body>

<header>
<h1>Academic Teacher Registration</h1>
<p>Registration Fee ₹100</p>
</header>

<div class="container">

<form id="form">

<input id="name" placeholder="Full Name" required>
<input id="phone" placeholder="Phone Number" required>
<input id="email" placeholder="Email">

<input id="website" placeholder="Website">
<input id="qualification" placeholder="Qualification">
<input id="experience" placeholder="Experience">

<select id="subject">
<option value="">Select Subject</option>
<option>Physics</option>
<option>Chemistry</option>
<option>Mathematics</option>
<option>Biology</option>
<option value="other">Other</option>
</select>

<input id="otherSubject" style="display:none" placeholder="Write Subject">

<input id="class" placeholder="Class">
<input id="location" placeholder="Location">

<h3>Modes</h3>

<label><input type="checkbox" value="Home Tuition" onclick="toggleFee('home')"> Home Tuition</label>
<div id="home" class="modeFee"><input id="homeFee" placeholder="Fee"></div>

<label><input type="checkbox" value="Group Tuition" onclick="toggleFee('group')"> Group Tuition</label>
<div id="group" class="modeFee"><input id="groupFee" placeholder="Fee"></div>

<label><input type="checkbox" value="Online Individual" onclick="toggleFee('individual')"> Online Individual</label>
<div id="individual" class="modeFee"><input id="onlineIndividualFee" placeholder="Fee"></div>

<label><input type="checkbox" value="Online Group" onclick="toggleFee('online')"> Online Group</label>
<div id="online" class="modeFee"><input id="onlineGroupFee" placeholder="Fee"></div>

<h3>Photo</h3>
<input type="file" id="photo">

<h3>Gallery</h3>
<input type="file" id="gallery" multiple>

<textarea id="description" placeholder="About Teacher"></textarea>

<button type="submit">Continue To Payment</button>

</form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0Q...",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* TOGGLE */
window.toggleFee = function(id){
document.getElementById(id).style.display =
document.getElementById(id).style.display === "block" ? "none" : "block";
};

/* SUBJECT */
subject.addEventListener("change",()=>{
otherSubject.style.display =
subject.value==="other" ? "block" : "none";
});

/* SUBMIT */
form.addEventListener("submit", async (e)=>{
e.preventDefault();

/* SAVE TEACHER */
let newRef = await push(ref(db,"teachers"),{
name: name.value,
phone: phone.value,
email: email.value,
website: website.value,
qualification: qualification.value,
experience: experience.value,
subject: subject.value==="other"?otherSubject.value:subject.value,
class: class.value,
location: location.value,
homeFee: homeFee.value,
groupFee: groupFee.value,
onlineIndividualFee: onlineIndividualFee.value,
onlineGroupFee: onlineGroupFee.value,
description: description.value,
status:"pending",
category:"academic"
});

/* 🔥 IMPORTANT FIX */
window.location.href =
"payment.html?type=teacher&id=" + newRef.key;

});

</script>

</body>
</html>
