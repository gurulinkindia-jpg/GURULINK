<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Academic Teacher Registration</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
}

header{
background:#0d47a1;
color:white;
padding:18px;
text-align:center;
}

.container{
width:90%;
max-width:800px;
margin:20px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

textarea{
height:100px;
resize:none;
}

button{
width:100%;
padding:14px;
background:#1b5e20;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.preview{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

.preview img{
width:90px;
height:90px;
border-radius:10px;
object-fit:cover;
border:1px solid #ccc;
}

.modeBox{
padding:15px;
border:1px solid #ddd;
border-radius:10px;
}

.row{
display:flex;
align-items:center;
gap:10px;
margin:10px 0;
}

.row input[type=checkbox]{
width:auto;
transform:scale(1.2);
}

.modeFee{
display:none;
padding:10px;
background:#f7f7f7;
border-radius:10px;
margin-bottom:10px;
}

</style>
</head>

<body>

<header>
<h1>Academic Teacher Registration</h1>
<p>Registration Fee ₹100</p>
</header>

<div class="container">

<form id="form">




<input id="name" placeholder="Full Name" required>




<input id="phone" placeholder="Phone Number" required>




<input type="email"
id="email"
placeholder="Email">




<input
id="website"
placeholder="Website / Social Link: eg. FB, X, etc">




<input
id="qualification"
placeholder="Qualification">




<input
id="experience"
placeholder="Experience: 6 yeays, 8 Month">








<h3>Subjects (More then one can be selected)</h3>

<div class="modeBox">

<div class="row">
<input type="checkbox" value="Physics" class="subjectCheck"> Physics
</div>

<div class="row">
<input type="checkbox" value="Chemistry" class="subjectCheck"> Chemistry
</div>

<div class="row">
<input type="checkbox" value="Mathematics" class="subjectCheck"> Mathematics
</div>

<div class="row">
<input type="checkbox" value="Biology" class="subjectCheck"> Biology
</div>

<div class="row">
<input type="checkbox" value="English" class="subjectCheck"> English
</div>

<div class="row">
<input type="checkbox" value="Hindi" class="subjectCheck"> Hindi
</div>

<div class="row">
<input type="checkbox" value="Assamese" class="subjectCheck"> Assamese
</div>

<div class="row">
<input type="checkbox" value="SST" class="subjectCheck"> SST
</div>

<div class="row">
<input type="checkbox" value="other" id="otherCheck"> Other
</div>

<input id="otherSubject"
placeholder="Write Other Subject"
style="display:none;margin-top:10px">

</div>







<input
id="class"
placeholder="Class Example: Class 9-10, IIT-JEE, etc ">






<input
id="location"
placeholder="Preferred Teaching Area. Eg. Delhi, beltola, etc.">



<input id="mapLink" placeholder="Google Map Location Link (Paste URL)">






<h3>Teaching Modes</h3>

<div class="modeBox">




<div class="row">

<input
type="checkbox"
value="Home Tuition"
id="homeCheck"
onchange="toggleFee('home')">

<label>Home Tuition</label>

</div>

<div id="home" class="modeFee">

<input
id="homeFee"
placeholder="Enter Home Tuition Fee: 900-1000 Perclass, 8000 Mongthly ">

</div>








<div class="row">

<input
type="checkbox"
value="Group Tuition"
id="groupCheck"
onchange="toggleFee('group')">

<label>Group Tuition</label>

</div>

<div id="group" class="modeFee">

<input
id="groupFee"
placeholder="Enter Group Tuition Fee:  10000 Yearly, 2000 Mongthly">

</div>








<div class="row">

<input
type="checkbox"
value="Online Individual"
id="individualCheck"
onchange="toggleFee('individual')">

<label>Online Individual</label>

</div>

<div id="individual" class="modeFee">

<input
id="onlineIndividualFee"
placeholder="Enter Online Individual Fee: Fee 900-1000 Perclass, 8000 Mongthly">

</div>









<div class="row">

<input
type="checkbox"
value="Online Group"
id="onlineCheck"
onchange="toggleFee('online')">

<label>Online Group</label>

</div>

<div id="online" class="modeFee">

<input
id="onlineGroupFee"
placeholder="Enter Online Group Fee: 10000 Yearly, 2000 Mongthly">

</div>

</div>





<h3>Profile Photo</h3>

<input
type="file"
id="photo"
accept="image/*">

<div
class="preview"
id="photoPreview"></div>



<h3>Identity Proof (Upload any one)</h3>

<select id="idType">
  <option value="">Select ID Type</option>
  <option value="Aadhaar">Aadhaar Card</option>
  <option value="Driving License">Driving License</option>
  <option value="Voter ID">Voter ID</option>
  <option value="Passport">Passport</option>
</select>

<input type="file" id="idUpload" accept="image/*">

<div class="preview" id="idPreview"></div>




<h3>Gallery Photos (Max 5)</h3>

<input type="file" id="gallery" accept="image/*" multiple style="display:none">

<button type="button" onclick="document.getElementById('gallery').click()">
    📸 Add Gallery Images
</button>

<div class="preview" id="galleryPreview"></div>







<div style="margin-top:20px; padding:15px; background:#f5f5f5; border-radius:10px;">

<input type="checkbox" id="declaration" required>

<label for="declaration" style="font-size:14px; line-height:1.5;">
I hereby declare that all the information provided by me in this form is true and correct to the best of my knowledge and belief. I understand that if any information is found to be false or incorrect, my application may be rejected or necessary action may be taken against me. I also agree to follow all the rules, regulations, and responsibilities assigned by the GURULINK, powered by G10 Group.
</label>

</div>





<textarea
id="description"
placeholder="About Teacher"></textarea>





<button type="submit">

Continue To Payment

</button>

</form>

</div>


<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getDatabase,
ref,
push
}
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";


const firebaseConfig={

apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"

};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const API_KEY="31f729ff855eb2e42c00ee508a8647ea";






/* GET ELEMENTS */

const form=document.getElementById("form");

const idUpload = document.getElementById("idUpload");
const idTypeSelect = document.getElementById("idType");







const photo=document.getElementById("photo");
const photoPreview=document.getElementById("photoPreview");

const gallery=document.getElementById("gallery");
const galleryPreview=document.getElementById("galleryPreview");






/* IMAGE UPLOAD */

async function upload(file){

let fd=new FormData();

fd.append("image",file);

let res=await fetch(
`https://api.imgbb.com/1/upload?key=${API_KEY}`,
{
method:"POST",
body:fd
}
);

let data=await res.json();

return data.data.url;

}






/* ID UPLOAD */




idUpload.addEventListener("change", function () {
    idPreview.innerHTML = "";

    if (this.files.length > 0) {
        let img = document.createElement("img");
        img.src = URL.createObjectURL(this.files[0]);
        idPreview.appendChild(img);
    }
});












/* SUBJECT */

const otherCheck = document.getElementById("otherCheck");
const otherSubject = document.getElementById("otherSubject");

otherCheck.addEventListener("change", () => {
    if (otherCheck.checked) {
        otherSubject.style.display = "block";
        otherSubject.required = true;
    } else {
        otherSubject.style.display = "none";
        otherSubject.value = "";
        otherSubject.required = false;
    }
});






/* PROFILE PREVIEW */

photo.addEventListener(
"change",
function(){

photoPreview.innerHTML="";

if(this.files.length>0){

let img=document.createElement("img");

img.src=
URL.createObjectURL(
this.files[0]
);

photoPreview.appendChild(img);

}

}
);






/* GALLERY PREVIEW */

let selectedFiles = [];

gallery.addEventListener("change", function () {

    let newFiles = Array.from(this.files);

    // limit check
    if (selectedFiles.length + newFiles.length > 5) {
        alert("Maximum 5 photos allowed (Photo of the teacher teaching, with students, etc)");
        return;
    }

    selectedFiles.push(...newFiles);

    renderPreview();

    // reset input so same file can be selected again
    this.value = "";
});

function renderPreview() {
    galleryPreview.innerHTML = "";

    selectedFiles.forEach(file => {
        let img = document.createElement("img");
        img.src = URL.createObjectURL(file);
        galleryPreview.appendChild(img);
    });
}







/* SUBMIT */

form.addEventListener(
"submit",
async function(e){

e.preventDefault();

try{






let profileUrl = "";

if (photo.files[0]) {
    profileUrl = await upload(photo.files[0]);
}

/* ✅ ADD THIS HERE (ID SECTION) */
let idUrl = "";
let idType = idTypeSelect.value;

if (idUpload.files.length > 0) {
    idUrl = await upload(idUpload.files[0]);
}



/* GALLERY */

let galleryUrls=[];

for (let file of selectedFiles){

let url=
await upload(file);

galleryUrls.push(url);

}






/* TEACHING MODES */

let teachingModes=[];

document
.querySelectorAll(
'input[type="checkbox"]:checked'
)
.forEach(item=>{

teachingModes.push(
item.value
);

});








/* SUBJECTS COLLECT */
let subjects = [];

document.querySelectorAll(".subjectCheck:checked").forEach(item => {
    if (item.value !== "other") {
        subjects.push(item.value);
    }
});

if (otherCheck.checked && otherSubject.value.trim() !== "") {
    subjects.push(otherSubject.value);
}








/* SAVE FIREBASE */

let newRef = await push(ref(db,"teachers"), {

    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    email: document.getElementById("email").value,
    website: document.getElementById("website").value,
    qualification: document.getElementById("qualification").value,
    experience: document.getElementById("experience").value,

    subjects: subjects,
    mapLink: document.getElementById("mapLink").value,

    class: document.getElementById("class").value,
    location: document.getElementById("location").value,

    teachingModes: teachingModes,

    homeFee: document.getElementById("homeFee").value,
    groupFee: document.getElementById("groupFee").value,
    onlineIndividualFee: document.getElementById("onlineIndividualFee").value,
    onlineGroupFee: document.getElementById("onlineGroupFee").value,

    photo: profileUrl,
    gallery: galleryUrls,

    idType: idType,          // ✅ FIXED
    idProof: idUrl,          // ✅ FIXED
    declarationAccepted: document.getElementById("declaration").checked, // ✅ FIXED

    description: document.getElementById("description").value,

    category: "academic",
    status: "pending"
});


alert("Form saved successfully");









/* OPEN PAYMENT PAGE */

const teacherId = newRef.key;

localStorage.setItem("teacherId", teacherId);




window.location.href =
"payment.html?type=teacher";

}
catch(error){

console.log(error);

alert(
"Error:\n"+
error.message
);

}

}
);


</script>


<script>

function toggleFee(id){

let box=
document.getElementById(id);

box.style.display=
box.style.display==="block"
?
"none"
:
"block";

}

</script>

</body>
</html>
