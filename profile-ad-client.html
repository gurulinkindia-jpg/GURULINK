<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GURULINK Advertisement</title>
  <style>
    :root{
      --blue:#1565c0;
      --green:#2e7d32;
      --dark:#12233d;
      --muted:#61738d;
      --line:#d9e4f1;
      --bg:#eef4fb;
      --card:#ffffff;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:linear-gradient(180deg,#edf4fd 0%,#f8fbff 100%);
      color:var(--dark);
    }

    .page{
      max-width:1020px;
      margin:0 auto;
      padding:18px;
    }

    .topBar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:16px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:bold;
      font-size:24px;
    }

    .brand img{
      width:46px;
      height:46px;
      object-fit:contain;
    }

    .brand .guru{
      color:var(--blue);
    }

    .brand .link{
      color:var(--green);
    }

    .topActions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .topActions button,
    .actionGrid button{
      border:none;
      border-radius:12px;
      padding:12px 14px;
      cursor:pointer;
      color:#fff;
      font-weight:bold;
      font:inherit;
    }

    .backBtn{ background:#455a64; }
    .homeBtn{ background:#3949ab; }
    .shareBtn{ background:linear-gradient(135deg,#ff7043,#f4511e); }
    .profileBtn{ background:#1565c0; }
    .callBtn{ background:#2e7d32; }
    .waBtn{ background:#43a047; }
    .webBtn{ background:#00897b; }

    .heroCard,
    .infoCard{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:0 10px 28px rgba(15,23,42,.06);
      overflow:hidden;
    }

    .heroCard{
      margin-bottom:18px;
    }

    .heroImage{
      width:100%;
      display:block;
      background:#dce9f9;
      aspect-ratio:1200/630;
      object-fit:cover;
    }

    .heroBody{
      padding:20px;
      display:grid;
      gap:14px;
    }

    .heroBody h1{
      margin:0;
      font-size:32px;
      line-height:1.2;
      color:#114da3;
    }

    .heroMeta{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .metaPill{
      display:inline-flex;
      align-items:center;
      padding:9px 12px;
      border-radius:999px;
      background:#edf5ff;
      color:#1c4d87;
      border:1px solid #d5e4f6;
      font-size:13px;
      font-weight:bold;
    }

    .heroBody p{
      margin:0;
      color:var(--muted);
      line-height:1.7;
    }

    .actionGrid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:10px;
    }

    .infoCard{
      padding:20px;
    }

    .infoCard h2{
      margin:0 0 14px;
      font-size:24px;
      color:#114da3;
    }

    .details{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }

    .detailItem{
      border:1px solid #dbe7f4;
      border-radius:16px;
      padding:14px;
      background:#fbfdff;
    }

    .detailItem strong{
      display:block;
      margin-bottom:6px;
      color:#1b4f8f;
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:.4px;
    }

    .detailItem span{
      color:var(--dark);
      line-height:1.6;
    }

    .message{
      padding:26px;
      text-align:center;
      color:var(--muted);
    }

    .shareOverlay{
      position:fixed;
      inset:0;
      background:rgba(15,23,42,.48);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:1000;
    }

    .shareOverlay.show{
      display:flex;
    }

    .shareModal{
      width:min(420px,100%);
      background:#fff;
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:0 20px 50px rgba(15,23,42,.22);
      padding:20px;
    }

    .shareModalTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:8px;
    }

    .shareModalTop h3{
      margin:0;
      font-size:22px;
      color:#114da3;
    }

    .shareCloseBtn{
      background:#eef5ff;
      color:#1b4f8f;
      border:1px solid #d5e4f6;
      border-radius:12px;
      padding:10px 12px;
      font-weight:bold;
      cursor:pointer;
    }

    .shareModal p{
      margin:0 0 14px;
      color:var(--muted);
      line-height:1.6;
      font-size:14px;
    }

    .shareChoiceGrid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
    }

    .shareChoiceBtn{
      border:none;
      border-radius:14px;
      padding:14px 12px;
      color:#fff;
      font:inherit;
      font-weight:bold;
      cursor:pointer;
    }

    .facebookBtn{ background:#1877f2; }
    .whatsappShareBtn{ background:#25d366; }
    .copyBtn{ background:#3949ab; }
    .systemBtn{ background:#ff7043; }

    @media(max-width:760px){
      .page{
        padding:14px;
      }

      .topBar{
        flex-direction:column;
        align-items:stretch;
      }

      .topActions,
      .actionGrid,
      .details{
        grid-template-columns:1fr 1fr;
      }

      .topActions{
        display:grid;
      }

      .heroBody h1{
        font-size:26px;
      }
    }

    @media(max-width:520px){
      .brand{
        font-size:20px;
      }

      .topActions,
      .actionGrid,
      .details{
        grid-template-columns:1fr;
      }

      .shareChoiceGrid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topBar">
      <div class="brand">
        <img src="https://i.ibb.co/0RT0BQKq/GURULINK-Logo-1.png" alt="GURULINK">
        <div><span class="guru">GURU</span><span class="link">LINK</span></div>
      </div>

      <div class="topActions">
        <button class="backBtn" onclick="goBackSmart()">Back</button>
        <button class="homeBtn" onclick="location.href='index.html'">Home</button>
        <button class="shareBtn" onclick="shareAdvertisement()">Share Ad</button>
      </div>
    </div>

    <div id="content" class="message">Loading advertisement...</div>
  </div>

  <div id="shareOverlay" class="shareOverlay">
    <div class="shareModal">
      <div class="shareModalTop">
        <h3>Share Advertisement</h3>
        <button class="shareCloseBtn" type="button" onclick="closeShareChooser()">Close</button>
      </div>
      <p>
        Share the public advertisement link so Facebook or WhatsApp can load the saved ad image and keep the post clickable.
      </p>
      <div class="shareChoiceGrid">
        <button class="shareChoiceBtn facebookBtn" type="button" onclick="shareViaFacebook()">Facebook</button>
        <button class="shareChoiceBtn whatsappShareBtn" type="button" onclick="shareViaWhatsApp()">WhatsApp</button>
        <button class="shareChoiceBtn copyBtn" type="button" onclick="copyAdvertisementLink()">Copy Link</button>
        <button id="systemShareBtn" class="shareChoiceBtn systemBtn" type="button" onclick="shareViaSystem()">System Share</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

    const firebaseConfig = {
      apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
      authDomain:"gurulink-59cc7.firebaseapp.com",
      databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId:"gurulink-59cc7",
      storageBucket:"gurulink-59cc7.firebasestorage.app",
      messagingSenderId:"112148672399",
      appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const WEBSITE_BASE = "https://guru-link.onrender.com/";
    const currentProfileId = new URLSearchParams(location.search).get("id") || "";
    const content = document.getElementById("content");
    const shareOverlay = document.getElementById("shareOverlay");
    const systemShareBtn = document.getElementById("systemShareBtn");

    let data = null;
    let roleType = "";

    function getPrimaryProfileImage(profileData){
      const images = Array.isArray(profileData?.profileImages) ? profileData.profileImages : [];
      const normalized = images
        .map(item => typeof item === "string" ? { url:item } : item)
        .filter(item => item && item.url);

      const selected =
        normalized[Number(profileData?.primaryProfileImage || 0)] ||
        normalized[0];

      return selected?.url || profileData?.photo || profileData?.profilePic || profileData?.logo || "";
    }

    function normalizeWebsiteUrl(url){
      const value = String(url || "").trim();
      if(!value){
        return "";
      }
      return /^https?:\/\//i.test(value) ? value : "https://" + value;
    }

    function formatList(value){
      if(Array.isArray(value)){
        return value.filter(Boolean).join(", ");
      }
      if(value && typeof value === "object"){
        return Object.values(value).filter(Boolean).join(", ");
      }
      return String(value || "").trim();
    }

    function getAreaLine(profileData){
      return [profileData?.area, profileData?.state].filter(Boolean).join(", ");
    }

    function getDashboardPath(){
      const viewerRole = String(
        localStorage.getItem("role") ||
        sessionStorage.getItem("role") ||
        ""
      ).toLowerCase();

      if(viewerRole === "student" || viewerRole === "parent"){
        return "student-dashboard.html";
      }

      if(viewerRole === "teacher" || viewerRole === "institution" || viewerRole === "teacher_institute"){
        return "teacher-dashboard.html";
      }

      if(viewerRole === "admin"){
        return "admin.html";
      }

      return "index.html";
    }

    window.goBackSmart = function(){
      if(history.length > 1){
        history.back();
        return;
      }
      location.href = getDashboardPath();
    };

    function getAdPageUrl(){
      return WEBSITE_BASE + "profile-ad.html?id=" + encodeURIComponent(currentProfileId);
    }

    function getAdSharePayload(){
      const shareUrl = getAdPageUrl();
      const shareText = "Check out this profile advertisement on GURULINK.";
      const shareMessage = shareText + "\n\n" + shareUrl;
      return { shareUrl, shareText, shareMessage };
    }

    window.closeShareChooser = function(){
      shareOverlay.classList.remove("show");
    };

    function openShareChooser(){
      if(!data){
        return;
      }
      shareOverlay.classList.add("show");
    }

    window.shareViaFacebook = function(){
      const payload = getAdSharePayload();
      window.open(
        "https://www.facebook.com/sharer/sharer.php?u=" + encodeURIComponent(payload.shareUrl),
        "_blank",
        "noopener"
      );
    };

    window.shareViaWhatsApp = function(){
      const payload = getAdSharePayload();
      window.open(
        "https://wa.me/?text=" + encodeURIComponent(payload.shareMessage),
        "_blank",
        "noopener"
      );
    };

    window.copyAdvertisementLink = async function(){
      const payload = getAdSharePayload();
      try{
        if(navigator.clipboard && navigator.clipboard.writeText){
          await navigator.clipboard.writeText(payload.shareUrl);
          alert("Advertisement link copied.");
          return;
        }
      }
      catch(err){
        console.log("Clipboard copy skipped:", err);
      }

      prompt("Copy this advertisement link:", payload.shareUrl);
    };

    window.shareViaSystem = async function(){
      const payload = getAdSharePayload();
      if(!navigator.share){
        alert("System share is not available here. Use Facebook, WhatsApp, or Copy Link.");
        return;
      }

      try{
        await navigator.share({
          title:"GURULINK Advertisement",
          text:payload.shareText,
          url:payload.shareUrl
        });
      }
      catch(err){
        console.log("System share skipped:", err);
      }
    };

    async function fetchShareFileFromUrl(url){
      if(!url || !navigator.canShare){
        return null;
      }

      try{
        const response = await fetch(url, { mode:"cors" });
        if(!response.ok){
          return null;
        }
        const blob = await response.blob();
        const file = new File([blob], "gurulink-advertisement.png", {
          type: blob.type || "image/png"
        });

        if(navigator.canShare({ files:[file] })){
          return file;
        }
      }
      catch(err){
        console.log("Ad image share file skipped:", err);
      }

      return null;
    }

    window.shareAdvertisement = function(){
      openShareChooser();
    };

    function renderProfile(){
      const heroImage =
        data.advertisementCardImage ||
        getPrimaryProfileImage(data) ||
        "https://via.placeholder.com/1200x630?text=GURULINK+Advertisement";

      const website = normalizeWebsiteUrl(data.website || "");
      const phone = String(data.phone || "").trim();
      const whatsapp = phone ? "https://wa.me/91" + phone.replace(/\D/g,"") : "";
      const fullProfileUrl = "profile-view.html?id=" + encodeURIComponent(currentProfileId);

      content.className = "";
      content.innerHTML = `
        <section class="heroCard">
          <img class="heroImage" src="${heroImage}" alt="Advertisement image">
          <div class="heroBody">
            <h1>${data.name || "GURULINK Profile"}</h1>

            <div class="heroMeta">
              <span class="metaPill">${roleType}</span>
              ${data.categoryName || data.category ? `<span class="metaPill">${data.categoryName || data.category}</span>` : ""}
              ${getAreaLine(data) ? `<span class="metaPill">${getAreaLine(data)}</span>` : ""}
            </div>

            <p>${data.description || "Connect on GURULINK for classes, training, admissions, and learning opportunities."}</p>

            <div class="actionGrid">
              <button class="profileBtn" onclick="location.href='${fullProfileUrl}'">View Full Profile</button>
              ${phone ? `<button class="callBtn" onclick="location.href='tel:${phone}'">Call</button>` : ""}
              ${whatsapp ? `<button class="waBtn" onclick="window.open('${whatsapp}','_blank')">WhatsApp</button>` : ""}
              ${website ? `<button class="webBtn" onclick="window.open('${website}','_blank')">Website</button>` : ""}
            </div>
          </div>
        </section>

        <section class="infoCard">
          <h2>Profile Summary</h2>
          <div class="details">
            <div class="detailItem">
              <strong>Subjects / Skills</strong>
              <span>${formatList(data.subjects) || "Not added"}</span>
            </div>
            <div class="detailItem">
              <strong>Teaching Modes</strong>
              <span>${formatList(data.teachingModes) || "Not added"}</span>
            </div>
            <div class="detailItem">
              <strong>Class / Preparation</strong>
              <span>${data.class || "Not added"}</span>
            </div>
            <div class="detailItem">
              <strong>Address</strong>
              <span>${[data.area, data.state, data.pinCode].filter(Boolean).join(", ") || "Not added"}</span>
            </div>
          </div>
        </section>
      `;
    }

    async function load(){
      if(!currentProfileId){
        content.className = "message";
        content.textContent = "No profile ID found.";
        return;
      }

      let snap = await get(child(ref(db), "teachers/" + currentProfileId));
      if(snap.exists()){
        data = snap.val();
        roleType = "Teacher / Trainer";
      }

      if(!data){
        const altSnap = await get(child(ref(db), "institutions/" + currentProfileId));
        if(altSnap.exists()){
          data = altSnap.val();
          roleType = "Institute";
        }
      }

      if(!data){
        content.className = "message";
        content.textContent = "Advertisement profile not found.";
        return;
      }

      document.title = (data.name || "GURULINK") + " Advertisement";
      renderProfile();
      systemShareBtn.style.display = navigator.share ? "" : "none";
    }

    shareOverlay.addEventListener("click", (event) => {
      if(event.target === shareOverlay){
        closeShareChooser();
      }
    });

    load().catch(err => {
      console.error(err);
      content.className = "message";
      content.textContent = "Could not load the advertisement page right now.";
    });
  </script>
</body>
</html>
