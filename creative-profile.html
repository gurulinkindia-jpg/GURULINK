<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Creative Profile - GURULINK</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#d9efff,#f4f9ff,#fff);
padding-bottom:40px;
}

header{
padding:30px;
text-align:center;
background:rgba(255,255,255,.4);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,.6);
}

.container{
width:95%;
max-width:1300px;
margin:auto;
padding:20px;
}

/* FILTERS */

.filters{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
background:rgba(255,255,255,.45);
border-radius:20px;
margin-bottom:20px;
}

.filters input,
.filters select{
padding:12px;
border:none;
border-radius:10px;
outline:none;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
}

/* CARD */

.card{
background:rgba(255,255,255,.45);
border-radius:20px;
padding:15px;
border:1px solid #ddd;
position:relative;
}

.card.teacher{
border-left:6px solid #1976d2;
}

.card.institution{
border-left:6px solid #e91e63;
}

/* TOP */

.top{
display:flex;
gap:15px;
}

/* PHOTO */

.photo{
width:70px;
height:70px;
border-radius:50%;
object-fit:cover;
}

/* BADGES */

.badge{
background:#fff;
padding:5px 10px;
border-radius:20px;
font-size:12px;
margin:3px;
display:inline-block;
}

.verify{
background:#2196f3;
color:#fff;
}

/* BUTTON */

.btn{
margin-top:10px;
padding:10px 14px;
border:none;
background:#1976d2;
color:#fff;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

/* DETAILS */

.details{
margin-top:10px;
font-size:14px;
line-height:1.7;
}

/* EMPTY */

.empty{
text-align:center;
padding:20px;
background:#fff;
border-radius:15px;
}

</style>
</head>





<body>

<header>
<h1>Creative Profile</h1>
<p>Find Creative Teachers & Institutes</p>
</header>

<div class="container">

<div class="filters">

<input
id="search"
placeholder="Search name / location">

<select id="subjectFilter">

<option value="">
All Creative Subjects
</option>

<option>Music</option>
<option>Dance</option>
<option>Drawing</option>
<option>Singing</option>
<option>Photography</option>
<option>Painting</option>
<option>Guitar</option>
<option>Piano</option>
<option>Art & Craft</option>

</select>

<select id="modeFilter">

<option value="">
All Modes
</option>

<option>Home Tuition</option>
<option>Group Tuition</option>
<option>Online Individual</option>
<option>Online Group</option>

</select>

</div>

<div id="grid" class="grid"></div>

</div>










<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
  authDomain: "gurulink-59cc7.firebaseapp.com",
  databaseURL: "https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "gurulink-59cc7",
  storageBucket: "gurulink-59cc7.appspot.com",
  messagingSenderId: "112148672399",
  appId: "1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let teachers = [];
let institutions = [];

/* LOAD TEACHERS */
onValue(ref(db, "teachers"), (snap) => {

  teachers = [];

  snap.forEach((c) => {

    const d = c.val();

    if (
      d.status === "approved" &&
      (d.category || "").toLowerCase() === "creative"
    ) {
      teachers.push({
        ...d,
        id: c.key,
        type: "Teacher"
      });
    }

  });

  render();
});

/* LOAD INSTITUTIONS */
onValue(ref(db, "institutions"), (snap) => {

  institutions = [];

  snap.forEach((c) => {

    const d = c.val();

    if (
      d.status === "approved" &&
      (d.category || "").toLowerCase() === "creative"
    ) {
      institutions.push({
        ...d,
        id: c.key,
        type: "Institution"
      });
    }

  });

  render();
});

/* GET ALL */
function getAllProfiles() {
  return [...teachers, ...institutions];
}

/* SEARCH HELP */
function similar(a, b) {
  return (a || "").toLowerCase().includes((b || "").toLowerCase());
}

/* CLASS-LIKE SUBJECT MATCH */
function subjectMatch(userSubject, selectedSubject) {
  if (!selectedSubject) return true;
  if (!userSubject) return false;

  if (Array.isArray(userSubject)) {
    return userSubject.some(s =>
      s.toLowerCase().includes(selectedSubject.toLowerCase())
    );
  }

  return userSubject
    .toLowerCase()
    .includes(selectedSubject.toLowerCase());
}

/* MODE MATCH */
function modeMatch(modes, selectedMode) {
  if (!selectedMode) return true;

  const list = modes || [];

  return list.includes(selectedMode);
}

/* =========================
   VIEW BUTTON (LIKE ACADEMIC)
========================= */

document.addEventListener("click", (e) => {

  const btn = e.target.closest(".view");
  if (!btn) return;

  const id = btn.dataset.id;

  const uid =
    localStorage.getItem("uid") ||
    localStorage.getItem("studentUid") ||
    localStorage.getItem("teacherUid") ||
    localStorage.getItem("adminUid") ||
    localStorage.getItem("institutionId");

  if (!uid) {

    const redirectURL = "profile-view.html?id=" + id;

    sessionStorage.setItem("redirectAfterLogin", redirectURL);

    alert("Please login first");

    window.location.href = "student-login.html";
    return;
  }

  window.location.href = "profile-view.html?id=" + id;
});

/* FILTER EVENTS */
document.getElementById("search").addEventListener("input", render);
document.getElementById("subjectFilter").addEventListener("change", render);
document.getElementById("modeFilter").addEventListener("change", render);

/* RENDER */
function render() {

  const all = getAllProfiles();

  const search = document.getElementById("search").value.trim().toLowerCase();
  const subject = document.getElementById("subjectFilter").value;
  const mode = document.getElementById("modeFilter").value;

  const filtered = all.filter((x) => {

    const name = (x.name || "").toLowerCase();
    const location = (x.location || x.address || "").toLowerCase();

    /* SEARCH */
    if (search && !(similar(name, search) || similar(location, search))) {
      return false;
    }

    /* SUBJECT */
    if (!subjectMatch(x.subjects || x.subject, subject)) {
      return false;
    }

    /* MODE */
    if (!modeMatch(x.teachingModes || x.modes, mode)) {
      return false;
    }

    return true;
  });

  const grid = document.getElementById("grid");

  if (!filtered.length) {
    grid.innerHTML = `
      <div class="empty">
        No Creative Profiles Found
      </div>
    `;
    return;
  }

  grid.innerHTML = filtered.map((x) => `

    <div class="card ${x.type.toLowerCase()}">

      <div class="top">

        <img
          class="photo"
          src="${x.photo || x.logo || 'https://via.placeholder.com/100'}"
        >

        <div>

          <h3>${x.name || "-"}</h3>

          <div class="badge">${x.type}</div>

          <div class="badge">${x.category || "creative"}</div>

         <div class="badge verify">
  ${
    x.status === "approved"
      ? "✅ Verified"
      : "❌ Not Verified"
  }
</div>

          <button
            class="btn view"
            data-id="${x.id}"
          >
            View Details
          </button>

        </div>

      </div>

     


	<div class="details">

  <b>Subject:</b>
  ${
    Array.isArray(x.subjects)
      ? x.subjects.join(", ")
      : (x.subject || "-")
  }

  <br>

  <b>Mode:</b>
  ${(x.teachingModes || x.modes || []).join(", ") || "-"}

  <br>

  ${x.type === "Teacher" ? `
  <b>Experience:</b>
  ${x.experience || "-"} Years
  <br>
  ` : `
  <b>Established:</b>
  ${
    x.establishedDate
      ? new Date(x.establishedDate).getFullYear()
      : "-"
  }
  <br>
  `}

  <b>Location:</b>
  ${x.location || x.address || "-"}

</div>

    </div>

  `).join("");
}

</script>

</body>
</html>
