<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GURULINK</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(
135deg,
#dff1ff,
#f4f9ff,
#ffffff
);
}

header{
padding:35px;
text-align:center;
background:rgba(255,255,255,.35);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,.5);
color:#1565c0;
}

header h1{
font-size:35px;
margin-bottom:10px;
}

header p{
opacity:.8;
}

.container{
width:95%;
max-width:1400px;
margin:auto;
padding:25px;
}

.filters{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:15px;

padding:20px;

background:
rgba(
255,
255,
255,
0.4
);

backdrop-filter:
blur(20px);

border-radius:25px;

margin-bottom:30px;

box-shadow:
0 10px 30px rgba(
0,
0,
0,
0.05
);

}

.filters input,
.filters select{

padding:14px;

border:none;

outline:none;

border-radius:15px;

background:white;

font-size:14px;

}

#dynamicFilters{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:15px;

grid-column:1/-1;

}

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(340px,1fr));

gap:25px;

}

.card{

background:
rgba(
255,
255,
255,
0.4
);

backdrop-filter:
blur(20px);

border-radius:25px;

padding:20px;

border:
1px solid rgba(
255,
255,
255,
0.5
);

box-shadow:
0 10px 30px rgba(
0,
0,
0,
0.05
);

transition:.4s;

}

.card:hover{

transform:
translateY(-8px);

}

.top{

display:flex;
gap:15px;
align-items:center;

}

.photo{

width:90px;
height:90px;

border-radius:50%;

object-fit:cover;

border:4px solid white;

}

.badges{

margin-top:8px;

}

.badge{

display:inline-block;

padding:6px 12px;

margin:3px;

font-size:12px;

border-radius:20px;

background:white;

color:#1565c0;

}

.verify{

background:#2196f3;
color:white;

}

.details{

margin-top:15px;
line-height:1.8;
font-size:14px;
color:#444;

}

.gallery{

display:flex;
gap:8px;
overflow:auto;
margin-top:15px;

}

.gallery img{

width:70px;
height:70px;

border-radius:10px;

object-fit:cover;

}

.mode{

margin-top:10px;

padding:10px;

border-radius:15px;

background:
rgba(
255,
255,
255,
0.5
);

}

.empty{

padding:30px;

border-radius:20px;

text-align:center;

background:white;

}

</style>
</head>

<body>

<header>

<h1>GURULINK</h1>

<p>Find Teachers & Institutions</p>

</header>

<div class="container">

<div class="filters">

<input
id="search"
placeholder="Search name/location">

<select id="category">

<option value="">
All Categories
</option>

<option value="academic">
Academic
</option>

<option value="creative">
Creative
</option>

<option value="skill">
Skill
</option>

</select>

<div id="dynamicFilters"></div>

</div>

<div
id="grid"
class="grid">
</div>

</div>


<script type="module">

import{
initializeApp
}
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import{
getDatabase,
ref,
onValue
}
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";


const firebaseConfig={

apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"

};

const app=
initializeApp(firebaseConfig);

const db=
getDatabase(app);

let all=[];


/* DYNAMIC FILTERS */

const category=
document.getElementById(
"category"
);

const dynamic=
document.getElementById(
"dynamicFilters"
);


category.addEventListener(
"change",
showFilters
);


showFilters();


function showFilters(){

let html="";

if(category.value==="academic"){

html=`

<select id="classFilter">

<option value="">
All Classes
</option>

<option>Class 1-5</option>
<option>Class 6-8</option>
<option>Class 9-10</option>
<option>Class 11-12</option>
<option>JEE</option>
<option>NEET</option>

</select>


<select id="subjectFilter">

<option value="">
All Subjects
</option>

<option>Mathematics</option>
<option>Physics</option>
<option>Chemistry</option>
<option>Biology</option>
<option>English</option>

</select>


<select id="modeFilter">

<option value="">
Teaching Mode
</option>

<option>Home Tuition</option>
<option>Group Tuition</option>
<option>Online Individual</option>
<option>Online Group</option>

</select>

`;

}


if(category.value==="creative"){

html=`

<select id="subjectFilter">

<option value="">
Creative Subject
</option>

<option>Music</option>
<option>Dance</option>
<option>Drawing</option>
<option>Singing</option>

</select>


<select id="modeFilter">

<option value="">
Teaching Mode
</option>

<option>Offline</option>
<option>Online</option>
<option>Hybrid</option>

</select>

`;

}


if(category.value==="skill"){

html=`

<select id="subjectFilter">

<option value="">
Skill Subject
</option>

<option>Computer</option>
<option>Embroidery</option>
<option>Cake Making</option>
<option>Hand Craft</option>

</select>


<select id="modeFilter">

<option value="">
Teaching Mode
</option>

<option>Offline</option>
<option>Online</option>
<option>Hybrid</option>

</select>

`;

}

dynamic.innerHTML=
html;


document
.querySelectorAll(
"#dynamicFilters select"
)
.forEach(el=>{

el.addEventListener(
"change",
render
);

});

}


/* LOAD TEACHERS */

onValue(
ref(db,"teachers"),
snap=>{

all=[];

snap.forEach(c=>{

let d=c.val();

if(
d.status==="approved"
){

all.push({

...d,
type:"Teacher"

});

}

});

loadInstitutions();

});


function loadInstitutions(){

onValue(
ref(db,"institutions"),
snap=>{

snap.forEach(c=>{

let d=c.val();

if(
d.status==="approved"
){

all.push({

...d,
type:"Institution"

});

}

});

render();

});

}



function render(){

let search=
document
.getElementById(
"search"
)
.value
.toLowerCase();

let cat=
category.value;

let classFilter=
document.getElementById(
"classFilter"
)?.value || "";

let subjectFilter=
document.getElementById(
"subjectFilter"
)?.value || "";

let modeFilter=
document.getElementById(
"modeFilter"
)?.value || "";


let filtered=
all.filter(x=>{


if(
cat &&
x.category!==cat
)
return false;


if(
search &&
!(
x.name?.toLowerCase()
.includes(search)

||

x.location?.toLowerCase()
.includes(search)

||

x.address?.toLowerCase()
.includes(search)
)
)
return false;


if(
classFilter &&
x.class!==classFilter
)
return false;


let subject=

x.subject ||
x.skillType ||
x.creativeType ||
"";


if(
subjectFilter &&
subject!==subjectFilter
)
return false;


let modes=
x.teachingModes ||
[];


if(
modeFilter &&
!modes.includes(
modeFilter
)
)
return false;


return true;

});


let html="";


if(filtered.length===0){

grid.innerHTML=

`
<div class="empty">

No results found

</div>
`;

return;

}



filtered.forEach(x=>{

let gallery="";

if(
Array.isArray(
x.gallery
)
){

x.gallery.forEach(img=>{

gallery+=
`<img src="${img}">`;

});

}


let modeHTML="";

(
x.teachingModes||
[]
).forEach(m=>{

modeHTML+=
`✓ ${m}<br>`;

});


html+=`

<div class="card">

<div class="top">

<img
class="photo"
src="${
x.photo||
x.logo||
'https://via.placeholder.com/100'
}">

<div>

<h2>

${x.name||"-"}

</h2>

<div class="badges">

<span class="badge">

${x.type}

</span>

<span class="badge">

${x.category}

</span>

<span class="badge verify">

Verified

</span>

</div>

</div>

</div>


<div class="details">

<b>Subject:</b>
${subject||"-"}

<br>

<b>Location:</b>
${x.location||x.address||"-"}

<br>

<b>Phone:</b>
${x.phone||"-"}

<br>

<b>Experience:</b>
${x.experience||"-"}

</div>


<div class="mode">

<b>Teaching Modes</b>

<br><br>

${modeHTML||"-"}

</div>


<div class="gallery">

${gallery}

</div>

</div>

`;

});


grid.innerHTML=
html;

}



document
.querySelectorAll(
"input,select"
)
.forEach(el=>{

el.addEventListener(
"input",
render
);

el.addEventListener(
"change",
render
);

});

</script>

</body>
</html>
