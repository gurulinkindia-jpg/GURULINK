<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1, viewport-fit=cover">
<title>GURULINK</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
background:
linear-gradient(
135deg,
#dcefff,
#eef7ff,
#ffffff
);
padding-bottom:50px;
}

header{
padding:35px;
text-align:center;
background:rgba(255,255,255,.35);
backdrop-filter:blur(25px);
border-bottom:1px solid rgba(255,255,255,.5);
}

header h1{
font-size:38px;
color:#1976d2;
}

header p{
margin-top:8px;
color:#555;
}

.container{
width:95%;
max-width:1400px;
margin:auto;
padding:25px;
}

.filters{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:15px;

padding:20px;

background:
rgba(255,255,255,.4);

backdrop-filter:
blur(25px);

border-radius:25px;

margin-bottom:30px;

box-shadow:
0 10px 30px rgba(0,0,0,.05);

}

.filters input,
.filters select{

padding:14px;

border:none;

outline:none;

border-radius:15px;

background:
rgba(255,255,255,.8);

}

#dynamicFilters{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:15px;

grid-column:1/-1;

}

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(340px,1fr));

gap:25px;

}

.card{

background:
rgba(255,255,255,.35);

backdrop-filter:
blur(25px);

border-radius:25px;

padding:20px;

border:
1px solid rgba(255,255,255,.5);

box-shadow:
0 10px 30px rgba(0,0,0,.06);

transition:.4s;

}

.card:hover{

transform:
translateY(-8px);

}
/* TYPE COLORS */

.card.teacher{
border-left:6px solid #1976d2;
}

.card.institution{
border-left:6px solid #e91e63;
}

/* CATEGORY COLORS */

.card.academic{
background:linear-gradient(
135deg,
rgba(25,118,210,.10),
rgba(255,255,255,.6)
);
}

.card.creative{
background:linear-gradient(
135deg,
rgba(156,39,176,.10),
rgba(255,255,255,.6)
);
}

.card.skill{
background:linear-gradient(
135deg,
rgba(255,152,0,.10),
rgba(255,255,255,.6)
);
}

.card.sport{
background:linear-gradient(
135deg,
rgba(76,175,80,.10),
rgba(255,255,255,.6)
);
}
.top{

display:flex;
gap:15px;
align-items:center;

}

.photo{

width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:4px solid white;

}

.badges{

margin-top:8px;

}

.badge{

display:inline-block;
padding:6px 12px;
margin:3px;
font-size:12px;
border-radius:20px;
background:white;
color:#1976d2;

}

.verify{

background:#2196f3;
color:white;

}

.rating-badge{
background:#fff3cd;
color:#c77700;
font-weight:bold;
}

.details{

margin-top:15px;
line-height:1.8;
color:#444;

}

.mode{

margin-top:15px;
padding:12px;
border-radius:15px;
background:
rgba(255,255,255,.45);

}

.gallery{

display:flex;
gap:8px;
overflow:auto;
margin-top:15px;

}

.gallery img{

width:70px;
height:70px;
border-radius:10px;
object-fit:cover;

}

.empty{

padding:30px;
text-align:center;
border-radius:20px;
background:white;

}
.floating-buttons{
position:fixed;
right:14px;
bottom:16px;
display:flex;
flex-direction:column;
gap:10px;
z-index:99999;
}

.float-btn{
min-width:92px;
height:42px;
padding:0 16px;
border:none;
border-radius:999px;
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
font-size:14px;
font-weight:700;
letter-spacing:0;
cursor:pointer;
box-shadow:0 10px 22px rgba(0,0,0,.18);
backdrop-filter:blur(14px);
-webkit-backdrop-filter:blur(14px);
transition:transform .2s ease, box-shadow .2s ease, opacity .2s ease;
}

.float-btn:hover{
transform:translateY(-2px);
box-shadow:0 14px 28px rgba(0,0,0,.22);
}

.float-btn:active{
transform:translateY(0);
opacity:.92;
}

.home-btn{
background:linear-gradient(135deg,#1976d2,#1257a6);
color:#fff;
}

.back-btn{
background:linear-gradient(135deg,#43a047,#2e7d32);
color:#fff;
}

@media(max-width:768px){
.floating-buttons{
right:12px;
bottom:14px;
gap:8px;
}

.float-btn{
min-width:84px;
height:38px;
padding:0 14px;
font-size:13px;
box-shadow:0 8px 18px rgba(0,0,0,.16);
}
}
</style>
<link rel="icon" type="image/png" href="https://i.ibb.co/0RT0BQKq/GURULINK-Logo-1.png">
<link rel="shortcut icon" href="https://i.ibb.co/0RT0BQKq/GURULINK-Logo-1.png">
<link rel="apple-touch-icon" href="https://i.ibb.co/0RT0BQKq/GURULINK-Logo-1.png">

<link rel="stylesheet" href="gurulink-theme.css?v=2">
<script src="gurulink-theme.js?v=2"></script>
</head>

<body>

<header>

<h1>GURULINK</h1>

<p>Find Teachers & Institutions</p>

</header>


<div class="container">

<div class="filters">

<input
id="search"
placeholder="Search name / state">

<select id="category">

<option value="">
All Categories
</option>

<option value="academic">
Academics, Education & Career Development
</option>

<option value="creative">
Arts & Creativity
</option>

<option value="skill">
Professional Skills
</option>

<option value="sport">
Sports & Fitness
</option>

</select>

<input
id="stateFilter"
placeholder="State">

<input
id="areaFilter"
placeholder="Area">

<input
id="subjectSearch"
placeholder="Subject / Skill / Activity">

<div id="dynamicFilters"></div>

</div>


<div
id="grid"
class="grid">
</div>

</div>







<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
  authDomain: "gurulink-59cc7.firebaseapp.com",
  databaseURL: "https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "gurulink-59cc7",
  storageBucket: "gurulink-59cc7.appspot.com",
  messagingSenderId: "112148672399",
  appId: "1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let teachers = [];
let institutions = [];
let ratingMap = {};

/* =========================
   LOAD DATA (FIXED STRUCTURE)
========================= */

function loadData() {

  onValue(ref(db, "teachers"), (snap) => {
    teachers = [];

    snap.forEach((c) => {

      const d = c.val();

      if (
        (d.status || "").toLowerCase() === "approved" &&
        isPublicProfile(d)
      ) {
        teachers.push({
          ...d,
          id: c.key,
          type: "Teacher"
        });
      }

    });

    render();
  });

  onValue(ref(db, "institutions"), (snap) => {
    institutions = [];

    snap.forEach((c) => {

      const d = c.val();

      if (
        (d.status || "").toLowerCase() === "approved" &&
        isPublicProfile(d)
      ) {
        institutions.push({
          ...d,
          id: c.key,
          type: "Institution"
        });
      }

    });

    render();
  });
}

loadData();

onValue(ref(db, "reviews"), (snap) => {
  ratingMap = {};

  snap.forEach((typeSnap) => {
    const collection = typeSnap.key;

    typeSnap.forEach((profileSnap) => {
      let total = 0;
      let count = 0;

      profileSnap.forEach((reviewSnap) => {
        const rating = Number(reviewSnap.val()?.rating || 0);
        if (rating > 0) {
          total += rating;
          count++;
        }
      });

      if (count) {
        ratingMap[collection + "/" + profileSnap.key] = {
          avg: total / count,
          count
        };
      }
    });
  });

  render();
});

/* =========================
   HELPERS
========================= */

function similar(a, b) {
  return (a || "").toLowerCase().includes((b || "").toLowerCase());
}

function isPublicProfile(profile) {
  return profile.publicVisible !== false &&
    profile.publicVisible !== "false";
}

function publicRankValue(profile) {
  const rank = Number(profile.publicRank);
  return Number.isFinite(rank) && rank > 0 ? rank : null;
}

function ratingInfo(profile) {
  const collection = profile.type === "Institution" ? "institutions" : "teachers";
  return ratingMap[collection + "/" + profile.id] || { avg: 0, count: 0 };
}

function sortPublicProfiles(list) {
  return [...list].sort((a, b) => {
    const aRank = publicRankValue(a);
    const bRank = publicRankValue(b);

    if (aRank !== null || bRank !== null) {
      if (aRank === null) return 1;
      if (bRank === null) return -1;
      if (aRank !== bRank) return aRank - bRank;
    }

    const ar = ratingInfo(a);
    const br = ratingInfo(b);

    if (br.avg !== ar.avg) return br.avg - ar.avg;
    if (br.count !== ar.count) return br.count - ar.count;

    return (a.name || "").localeCompare(b.name || "");
  });
}

function getAllProfiles() {
  return [...teachers, ...institutions];
}

const categoryLabels = {
  academic: "Academics, Education & Career Development",
  creative: "Arts & Creativity",
  skill: "Professional Skills",
  sport: "Sports & Fitness"
};

function categoryLabel(value) {
  return categoryLabels[value] || value || "-";
}

function getStateText(profile) {
  return profile.address || profile.state || profile.location || "";
}

function getAreaText(profile) {
  return profile.area || profile.city || profile.town || "";
}

function getSubjectText(profile) {
  if (profile.subjects) {
    if (Array.isArray(profile.subjects)) return profile.subjects.join(", ");
    if (typeof profile.subjects === "object") return Object.values(profile.subjects).join(", ");
    return String(profile.subjects);
  }

  return profile.subject || profile.skillType || profile.creativeType || profile.course || "Not Mentioned";
}

function getModesText(profile) {
  if (profile.teachingModes) {
    if (Array.isArray(profile.teachingModes)) return profile.teachingModes.join(", ");
    if (typeof profile.teachingModes === "object") return Object.values(profile.teachingModes).join(", ");
    return String(profile.teachingModes);
  }

  return "Not Mentioned";
}

/* =========================
   CATEGORY CHANGE -> RESET FILTERS
========================= */

const category = document.getElementById("category");
const dynamic = document.getElementById("dynamicFilters");
const urlParams =
new URLSearchParams(window.location.search);





const searchFromHome =
urlParams.get("search");

if(searchFromHome){

document.getElementById("search").value =
searchFromHome;

setTimeout(render,500);

}





category.addEventListener("change", showFilters);










function showFilters() {

  let html = "";

  if (category.value === "academic") {
    html = `
      <select id="classFilter">
        <option value="">All Classes</option>
        <option>Class 1-5</option>
        <option>Class 6-8</option>
        <option>Class 9-10</option>
        <option>Class 11-12</option>
      </select>

      <select id="subjectFilter">
        <option value="">All Academic Subjects</option>
        <option>Mathematics</option>
        <option>Physics</option>
        <option>Chemistry</option>
        <option>Biology</option>
      </select>
    `;
  }

  else if (category.value === "creative") {
    html = `
      <select id="subjectFilter">
        <option value="">All Arts & Creativity</option>
        <option>Music</option>
        <option>Dance</option>
        <option>Drawing</option>
      </select>
    `;
  }

  else if (category.value === "skill") {
    html = `
      <select id="subjectFilter">
        <option value="">All Professional Skills</option>
        <option>Computer</option>
        <option>Embroidery</option>
        <option>Cake Making</option>
      </select>
    `;
  }

  else if (category.value === "sport") {
    html = `
      <select id="subjectFilter">
        <option value="">All Sports & Fitness</option>
        <option>Cricket</option>
        <option>Football</option>
        <option>Yoga</option>
      </select>
    `;
  }

  dynamic.innerHTML = html;

  document.querySelectorAll("select, input").forEach(el => {
    el.oninput = render;
    el.onchange = render;
  });
}

showFilters();

/* =========================
   VIEW PROFILE (LOGIN SAFE)
========================= */

function showGuestAccessPopup(onLogin){
  const popup = document.createElement("div");
  popup.id = "guestAccessPopup";
  popup.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:18px;z-index:9999;";
  popup.innerHTML = `
    <div style="width:100%;max-width:430px;background:white;border-radius:16px;box-shadow:0 18px 45px rgba(0,0,0,.28);overflow:hidden;">
      <div style="background:#00897b;color:white;padding:18px 20px;">
        <h3 style="margin:0;font-size:20px;">Limited Access</h3>
      </div>
      <div style="padding:20px;">
        <p style="margin:0 0 12px;line-height:1.6;color:#333;font-size:14px;">
          You are using limited access. For complete access, please log in as a Teacher / Institution or Student / Parent.
        </p>
        <p style="margin:0 0 12px;line-height:1.6;color:#333;font-size:14px;">
          GURULINK is only a linking platform between students, parents, teachers, and institutions. GURULINK never shares or misuses your personal data.
        </p>
        <p style="margin:0;line-height:1.6;color:#333;font-size:14px;">
          After login, you and the teacher or institution can contact each other directly by phone call, WhatsApp, or chat.
        </p>
        <div style="display:flex;gap:10px;margin-top:18px;">
          <button type="button" id="guestCancelBtn" style="flex:1;width:auto;padding:12px;background:#eceff1;color:#263238;border:none;border-radius:10px;font-size:14px;">Cancel</button>
          <button type="button" id="guestLoginBtn" style="flex:1;width:auto;padding:12px;background:#00897b;color:white;border:none;border-radius:10px;font-size:14px;">Login Now</button>
        </div>
      </div>
    </div>
  `;

  document.body.appendChild(popup);
  document.getElementById("guestCancelBtn").onclick = () => popup.remove();
  document.getElementById("guestLoginBtn").onclick = () => {
    popup.remove();
    onLogin();
  };
}

function openProfileWithLogin(id){
  const viewerId =
    localStorage.getItem("uid") ||
    localStorage.getItem("profileId");

  const viewerRole =
    (localStorage.getItem("role") || "").toLowerCase();

  const profileUrl = "profile-view.html?id=" + id;

  if(!viewerId || viewerRole === "guest"){
    showGuestAccessPopup(() => {
      localStorage.removeItem("selectedRole");
      sessionStorage.setItem("postLoginRedirect", profileUrl);
      window.location.href =
        "otp-login.html?return=" + encodeURIComponent(profileUrl);
    });
    return;
  }

  window.location.href = profileUrl;
}

document.addEventListener("click", (e) => {

  const card = e.target.closest(".card");
  if (!card) return;

  const id = card.dataset.id;
  if (!id) return;

  openProfileWithLogin(id);
});


function viewProfile(id){

openProfileWithLogin(id);

}

window.viewProfile = viewProfile;

/* =========================
   RENDER
========================= */

function render() {

  const grid = document.getElementById("grid");

  const search = document.getElementById("search").value.trim().toLowerCase();
  const cat = category.value;
  const stateFilter = document.getElementById("stateFilter").value.trim().toLowerCase();
  const areaFilter = document.getElementById("areaFilter").value.trim().toLowerCase();
  const subjectSearch = document.getElementById("subjectSearch").value.trim().toLowerCase();

  const subjectFilter = document.getElementById("subjectFilter")?.value || "";
  const classFilter = document.getElementById("classFilter")?.value || "";

  const filtered = getAllProfiles().filter((x) => {

    /* CATEGORY */
    if (cat && x.category !== cat) return false;

   


const stateText = getStateText(x);
const areaText = getAreaText(x);
const subject = getSubjectText(x);

const searchableText = `
${x.name || ""}
${stateText}
${areaText}
${x.address || ""}
${x.subject || ""}
${x.skillType || ""}
${x.creativeType || ""}
${x.course || ""}
${Array.isArray(x.subjects)
? x.subjects.join(" ")
: Object.values(x.subjects || {}).join(" ")
}
`.toLowerCase();

if(
search &&
!searchableText.includes(search)
){
return false;
}

if (
  stateFilter &&
  !stateText.toLowerCase().includes(stateFilter)
) {
  return false;
}

if (
  areaFilter &&
  !areaText.toLowerCase().includes(areaFilter)
) {
  return false;
}

if (
  subjectSearch &&
  !subject.toLowerCase().includes(subjectSearch)
) {
  return false;
}

    /* SUBJECT */
    if (
      subjectFilter &&
      !subject.toLowerCase().includes(subjectFilter.toLowerCase())
    ) {
      return false;
    }

    /* CLASS */
    if (classFilter && x.class !== classFilter) {
      return false;
    }

    return true;
  });

  const sorted = sortPublicProfiles(filtered);

  if (!sorted.length) {
    grid.innerHTML = `
      <div class="empty">
        No Results Found
      </div>
    `;
    return;
  }

  
  
  
  
grid.innerHTML = sorted.map((x) => {

const subject = getSubjectText(x);
const stateText = getStateText(x) || "-";
const areaText = getAreaText(x) || "-";
const modeText = getModesText(x);
const rating = ratingInfo(x);
const extraField =
x.type === "Teacher"
?
`<b>Experience:</b> ${x.experience || "-"} Years`
:
`<b>Established:</b> ${
   x.establishedDate
   ? new Date(x.establishedDate).getFullYear()
   : "-"
 }`;

return `

<div
class="card ${x.type.toLowerCase()} ${x.category || ''}"
data-id="${x.id}">

<div class="top">

<img
class="photo"
src="${x.photo || x.logo || 'https://via.placeholder.com/100'}"
>

<div>

<h2>${x.name || "-"}</h2>

<div class="badges">

<span class="badge">${x.type}</span>

<span class="badge">
${x.categoryName || categoryLabel(x.category)}
</span>

<span class="badge rating-badge">
${rating.avg ? rating.avg.toFixed(1) + " / 5" : "New"}${rating.count ? " (" + rating.count + ")" : ""}
</span>

<span class="badge verify">
Verified
</span>

</div>

</div>

</div>

<div class="details">

<b style="color:red;">
Subject:
</b>

<span>
${subject}
</span>

<br><br>

${extraField}

<br>

<b>State:</b>
${stateText}

<br>

<b>Area:</b>
${areaText}

<br>
<b>Mode:</b>
${modeText}

</div>

<div style="margin-top:15px;">

<button
onclick="event.stopPropagation();window.viewProfile('${x.id}')"
style="
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#1976d2;
color:white;
font-size:15px;
font-weight:bold;
cursor:pointer;
">
View Details
</button>

</div>

</div>

`;

}).join("");
}

</script>
<!-- Floating Buttons -->
<div class="floating-buttons">

<a href="index.html" class="float-btn home-btn">
Home
</a>

<button class="float-btn back-btn" onclick="history.back()">
Back
</button>

</div>
</body>
</html>
