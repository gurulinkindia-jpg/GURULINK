<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Find Teacher - GURULINK</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
}

header{
background:#0d47a1;
color:white;
text-align:center;
padding:18px;
}

.container{
width:95%;
max-width:1100px;
margin:auto;
padding:20px;
}

/* FILTERS */
.filters{
background:white;
padding:15px;
border-radius:10px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
margin-bottom:20px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

.filters input,
.filters select{
padding:10px;
border:1px solid #ccc;
border-radius:8px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:15px;
}

/* CARD */
.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,.1);
transition:0.2s;
}

.card:hover{
transform:scale(1.02);
}

.photo{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
margin-bottom:10px;
}

.badge{
display:inline-block;
padding:4px 8px;
background:#e0e0e0;
border-radius:5px;
font-size:12px;
margin:2px 2px 2px 0;
}

.empty{
text-align:center;
padding:20px;
background:white;
border-radius:10px;
}

</style>

</head>

<body>

<header>
<h1>GURULINK</h1>
<p>Find Verified Teachers</p>
</header>

<div class="container">

<!-- FILTERS -->
<div class="filters">

<input type="text" id="search" placeholder="Search name/location">

<select id="filterCategory">
<option value="">All Categories</option>
<option value="academic">Academic</option>
<option value="creative">Creative</option>
<option value="skill">Skill</option>
</select>

<select id="filterClass">
<option value="">All Classes</option>
<option>Class 1-5</option>
<option>Class 6-8</option>
<option>Class 9-10</option>
<option>Class 11-12</option>
<option>JEE</option>
<option>NEET</option>
</select>

<select id="filterSubject">
<option value="">All Subjects/Skill</option>
<option>Mathematics</option>
<option>Physics</option>
<option>Chemistry</option>
<option>Biology</option>
<option>English</option>
<option>Coding</option>
<option>Music</option>
<option>Dance</option>
<option>Drawing</option>
</select>

<select id="filterMode">
<option value="">All Modes</option>
<option>Home Tuition</option>
<option>Online</option>
<option>Tuition Centre</option>
</select>

<input type="number" id="maxFee" placeholder="Max Fee">

</div>

<!-- TEACHERS -->
<div id="teacherGrid" class="grid"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.firebasestorage.app",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let allTeachers = [];

function renderTeachers(){

let search = document.getElementById("search").value.toLowerCase();
let category = document.getElementById("filterCategory").value;
let cls = document.getElementById("filterClass").value;
let subject = document.getElementById("filterSubject").value;
let mode = document.getElementById("filterMode").value;
let maxFee = document.getElementById("maxFee").value;

let filtered = allTeachers.filter(t => {

if(t.status !== "approved") return false;

if(category && t.category !== category) return false;

if(search &&
!t.name?.toLowerCase().includes(search) &&
!t.location?.toLowerCase().includes(search)
) return false;

if(cls && t.class !== cls) return false;

if(subject){
let value = t.subject || t.skillType || "";
if(value !== subject) return false;
}

if(mode && t.mode !== mode) return false;

if(maxFee && Number(t.fee) > Number(maxFee)) return false;

return true;
});

let html = "";

if(filtered.length === 0){
document.getElementById("teacherGrid").innerHTML =
`<div class="empty">No teachers found</div>`;
return;
}

filtered.forEach(t => {

let subjectShow = t.subject || t.skillType || "-";

html += `
<div class="card">

<img class="photo" src="${t.photo || 'https://via.placeholder.com/100'}">

<h3>${t.name}</h3>

<div class="badge">${t.category}</div>
<div class="badge">${subjectShow}</div>
<div class="badge">${t.class || "N/A"}</div>
<div class="badge">${t.mode}</div>

<p><b>Location:</b> ${t.location}</p>
<p><b>Fee:</b> ₹${t.fee}</p>

<p><b>Qualification:</b> ${t.qualification || "N/A"}</p>
<p><b>Experience:</b> ${t.experience || "N/A"}</p>

</div>
`;
});

document.getElementById("teacherGrid").innerHTML = html;
}

/* LOAD DATA */
onValue(ref(db,"teachers"), snapshot => {

allTeachers = [];

snapshot.forEach(child => {
allTeachers.push(child.val());
});

renderTeachers();

});

/* LIVE FILTERS */
document.querySelectorAll("input,select")
.forEach(el => {
el.addEventListener("input", renderTeachers);
el.addEventListener("change", renderTeachers);
});

</script>

</body>
</html>
