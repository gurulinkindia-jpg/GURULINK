<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Find Teachers - GURULINK</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#eef2f7;
}

header{
background:#0d47a1;
color:white;
padding:18px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,.2);
}

.container{
width:95%;
max-width:1300px;
margin:auto;
padding:20px;
}


/* FILTER */

.filters{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:20px;

display:grid;
grid-template-columns:
repeat(auto-fit,minmax(160px,1fr));

gap:10px;

box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.filters input,
.filters select{

padding:12px;
border-radius:10px;
border:1px solid #ccc;

}


/* GRID */

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(320px,1fr));

gap:20px;

}


/* CARD */

.card{

background:white;
border-radius:15px;
padding:18px;

box-shadow:
0 5px 15px rgba(0,0,0,.1);

transition:.3s;

}

.card:hover{

transform:translateY(-5px);

}


.top{

display:flex;
align-items:center;
gap:15px;

margin-bottom:10px;

}

.photo{

width:90px;
height:90px;

border-radius:50%;

object-fit:cover;

border:3px solid #0d47a1;

}


.badge{

display:inline-block;

padding:5px 10px;

background:#e3f2fd;

border-radius:20px;

font-size:12px;

margin:3px;

}


.verify{

background:#1b5e20;
color:white;

}


.gallery{

display:flex;
gap:6px;
overflow:auto;
margin-top:10px;

}

.gallery img{

width:70px;
height:70px;

border-radius:8px;

object-fit:cover;

}

.empty{

background:white;

padding:20px;

border-radius:15px;

text-align:center;

}

.desc{

margin-top:10px;

font-size:14px;

color:#444;

line-height:1.5;

}

.mode{

margin-top:8px;

padding:8px;

background:#f4f4f4;

border-radius:10px;

font-size:13px;

}

</style>
</head>

<body>

<header>

<h1>GURULINK</h1>

<p>Find Verified Teachers</p>

</header>


<div class="container">

<div class="filters">

<input
type="text"
id="search"
placeholder="Search name/location">

<select id="category">

<option value="">All Category</option>
<option value="academic">Academic</option>
<option value="creative">Creative</option>
<option value="skill">Skill</option>

</select>


<select id="subject">

<option value="">All Subject/Skills</option>

<option>Mathematics</option>
<option>Physics</option>
<option>Chemistry</option>
<option>Biology</option>
<option>English</option>

<option>Music</option>
<option>Dance</option>
<option>Drawing</option>
<option>Singing</option>

<option>Computer</option>
<option>Embroidery</option>
<option>Cake Making</option>
<option>Hand Craft</option>

</select>


<select id="mode">

<option value="">Teaching Mode</option>

<option>Home Tuition</option>
<option>Group Tuition</option>
<option>Online Individual</option>
<option>Online Group</option>

</select>


</div>

<div id="teacherGrid"
class="grid"></div>

</div>


<script type="module">

import{
initializeApp
}

from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";


import{

getDatabase,
ref,
onValue

}

from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";



const firebaseConfig={

apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",

authDomain:"gurulink-59cc7.firebaseapp.com",

databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"gurulink-59cc7",

storageBucket:"gurulink-59cc7.appspot.com",

messagingSenderId:"112148672399",

appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"

};


const app=
initializeApp(firebaseConfig);

const db=
getDatabase(app);


let allTeachers=[];



function renderTeachers(){

let search=
document.getElementById("search")
.value
.toLowerCase();

let category=
document.getElementById("category")
.value;

let subject=
document.getElementById("subject")
.value;

let mode=
document.getElementById("mode")
.value;



let filtered=
allTeachers.filter(t=>{


if(
t.status!="approved"
)
return false;


if(
category &&
t.category!=category
)
return false;


if(
search &&
!t.name?.toLowerCase().includes(search) &&
!t.location?.toLowerCase().includes(search)
)
return false;



let teacherSubject=
t.subject ||
t.skillType ||
"";


if(
subject &&
teacherSubject!=subject
)
return false;



if(
mode &&
!(
t.teachingModes?.includes(mode)
)
)
return false;



return true;

});


let html="";


if(filtered.length===0){

document.getElementById(
"teacherGrid"
).innerHTML=

`<div class='empty'>
No teachers found
</div>`;

return;

}



filtered.forEach(t=>{


let gallery="";

if(t.gallery){

t.gallery.forEach(img=>{

gallery+=
`<img src="${img}">`;

});

}


let modeText="";

if(t.teachingModes){

t.teachingModes.forEach(m=>{

modeText+=
`<div>${m}</div>`;

});

}



html+=`

<div class="card">

<div class="top">

<img
class="photo"
src="${t.photo||'https://via.placeholder.com/100'}">

<div>

<h3>

${t.name}

</h3>

<div class="badge">

${t.category}

</div>

<div class="badge">

${teacherSubject}

</div>

${
t.status=="approved"

?

`<div class="badge verify">
✓ Verified
</div>`

:

""

}

</div>

</div>


<p>

<b>Area:</b>

${t.location||"-"}

</p>


<p>

<b>Qualification:</b>

${t.qualification||"-"}

</p>


<p>

<b>Experience:</b>

${t.experience||"-"}

</p>


<div class="mode">

<b>Teaching Mode:</b>

${modeText}

</div>


<div class="mode">

<b>Fees:</b>

₹${t.homeFee||"-"} Home<br>

₹${t.groupFee||"-"} Group<br>

₹${t.onlineIndividualFee||"-"} Online Individual<br>

₹${t.onlineGroupFee||"-"} Online Group

</div>


<div class="desc">

${t.description||""}

</div>


<div class="gallery">

${gallery}

</div>


</div>

`;

});


document.getElementById(
"teacherGrid"
).innerHTML=
html;

}



/* LOAD TEACHERS */

onValue(
ref(db,"teachers"),
(snapshot)=>{

allTeachers=[];


snapshot.forEach(child=>{

allTeachers.push(
child.val()
);

});


renderTeachers();

});



document
.querySelectorAll(
"input,select"
)
.forEach(el=>{

el.addEventListener(
"input",
renderTeachers
);

el.addEventListener(
"change",
renderTeachers
);

});

</script>

</body>
</html>
