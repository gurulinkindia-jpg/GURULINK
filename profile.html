<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GURULINK</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(
135deg,
#d7ecff,
#edf7ff,
#f9fbfd
);
padding-bottom:50px;
}

header{

padding:35px;
text-align:center;
color:#0d47a1;

backdrop-filter:blur(15px);

background:rgba(
255,
255,
255,
0.4
);

border-bottom:1px solid rgba(
255,
255,
255,
0.5
);

box-shadow:
0 8px 20px rgba(
0,
0,
0,
0.05
);

}

header h1{

font-size:35px;
margin-bottom:8px;

}

header p{

font-size:15px;
opacity:.8;

}


.container{

width:95%;
max-width:1400px;
margin:auto;
padding:20px;

}

.filters{

display:grid;

grid-template-columns:
repeat(
auto-fit,
minmax(220px,1fr)
);

gap:15px;

padding:20px;

background:rgba(
255,
255,
255,
0.45
);

backdrop-filter:blur(20px);

border-radius:25px;

border:1px solid rgba(
255,
255,
255,
0.4
);

margin-bottom:30px;

box-shadow:
0 10px 25px rgba(
0,
0,
0,
0.05
);

}

.filters input,
.filters select{

padding:14px;

border:none;

outline:none;

border-radius:15px;

background:rgba(
255,
255,
255,
0.7
);

font-size:14px;

}


.grid{

display:grid;

grid-template-columns:
repeat(
auto-fit,
minmax(340px,1fr)
);

gap:25px;

}


.card{

background:rgba(
255,
255,
255,
0.35
);

backdrop-filter:
blur(20px);

border-radius:25px;

padding:20px;

border:1px solid rgba(
255,
255,
255,
0.5
);

box-shadow:
0 10px 25px rgba(
0,
0,
0,
0.06
);

transition:.4s;

}

.card:hover{

transform:
translateY(-7px);

}

.top{

display:flex;
gap:15px;
align-items:center;

}

.photo{

width:90px;
height:90px;

border-radius:50%;

object-fit:cover;

border:4px solid white;

box-shadow:
0 5px 15px rgba(
0,
0,
0,
0.1
);

}

.badges{

margin-top:8px;

}

.badge{

display:inline-block;

padding:6px 12px;

border-radius:20px;

margin:3px;

font-size:12px;

background:white;

color:#0d47a1;

}

.verify{

background:#1e88e5;
color:white;

}

.details{

margin-top:15px;

line-height:1.8;

font-size:14px;

color:#444;

}

.gallery{

display:flex;
gap:8px;
overflow:auto;

margin-top:15px;

}

.gallery img{

width:70px;
height:70px;

border-radius:10px;
object-fit:cover;

}

.empty{

padding:30px;

text-align:center;

background:white;

border-radius:20px;

}

</style>
</head>

<body>

<header>

<h1>GURULINK</h1>

<p>Find Verified Teachers & Institutions</p>

</header>


<div class="container">

<div class="filters">

<input
id="search"
placeholder="Search name/location">

<select id="category">

<option value="">
All Categories
</option>

<option value="academic">
Academic
</option>

<option value="creative">
Creative
</option>

<option value="skill">
Skill
</option>

</select>

</div>


<div
id="grid"
class="grid">
</div>

</div>


<script type="module">

import{
initializeApp
}
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import{
getDatabase,
ref,
onValue
}
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";


const firebaseConfig={

apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",

authDomain:"gurulink-59cc7.firebaseapp.com",

databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"gurulink-59cc7",

storageBucket:"gurulink-59cc7.appspot.com",

messagingSenderId:"112148672399",

appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"

};


const app=
initializeApp(firebaseConfig);

const db=
getDatabase(app);

let all=[];


/* TEACHERS */

onValue(
ref(db,"teachers"),
snap=>{

snap.forEach(c=>{

let data=c.val();

if(
data.status==="approved"
){

all.push({

...data,
type:"Teacher"

});

}

});

render();

});


/* INSTITUTIONS */

onValue(
ref(db,"institutions"),
snap=>{

snap.forEach(c=>{

let data=c.val();

if(
data.status==="approved"
){

all.push({

...data,
type:"Institution"

});

}

});

render();

});



function render(){

let search=
document
.getElementById(
"search"
)
.value
.toLowerCase();

let category=
document
.getElementById(
"category"
)
.value;


let filtered=
all.filter(x=>{


if(
category &&
x.category!=category
)
return false;


if(
search &&
!(
x.name?.toLowerCase()
.includes(search)

||

x.location?.toLowerCase()
.includes(search)

||

x.address?.toLowerCase()
.includes(search)
)
)
return false;


return true;

});


let html="";


if(
filtered.length==0
){

grid.innerHTML=

`
<div class="empty">

No results found

</div>
`;

return;

}



filtered.forEach(x=>{


let gallery="";

if(
Array.isArray(
x.gallery
)
){

x.gallery.forEach(img=>{

gallery+=
`<img src="${img}">`;

});

}


html+=`

<div class="card">

<div class="top">

<img
class="photo"
src="${
x.photo||
x.logo||
'https://via.placeholder.com/100'
}">


<div>

<h2>
${x.name||"-"}
</h2>

<div class="badges">

<span class="badge">

${x.type}

</span>

<span class="badge">

${x.category||"-"}

</span>

<span class="badge verify">

✓ Verified

</span>

</div>

</div>

</div>


<div class="details">

<b>Subject:</b>
${x.subject||"-"}

<br>

<b>Location:</b>
${x.location||
x.address||
"-"}

<br>

<b>Phone:</b>
${x.phone||"-"}

<br>

<b>Experience:</b>
${x.experience||"-"}

<br>

<b>Description:</b>

${x.description||"-"}

</div>


<div class="gallery">

${gallery}

</div>

</div>

`;

});


document
.getElementById(
"grid"
)
.innerHTML=html;

}



document
.querySelectorAll(
"input,select"
)
.forEach(el=>{

el.addEventListener(
"input",
render
);

el.addEventListener(
"change",
render
);

});

</script>

</body>
</html>
