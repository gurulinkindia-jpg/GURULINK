<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>GURULINK</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(
135deg,
#0d47a1,
#4a148c,
#00695c
);
padding-bottom:50px;
}

header{

padding:30px;
text-align:center;
color:white;

backdrop-filter:blur(15px);

background:rgba(255,255,255,.1);

border-bottom:1px solid rgba(255,255,255,.2);

}

header h1{

font-size:35px;
margin-bottom:10px;

}

header p{

opacity:.9;

}

.container{

width:95%;
max-width:1400px;
margin:auto;
padding:20px;

}

.filters{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(200px,1fr));

gap:15px;

padding:20px;

background:
rgba(255,255,255,.15);

backdrop-filter:blur(20px);

border-radius:25px;

border:
1px solid rgba(255,255,255,.2);

margin-bottom:30px;

}

.filters input,
.filters select{

padding:14px;

border:none;

outline:none;

border-radius:12px;

background:
rgba(255,255,255,.2);

color:white;

backdrop-filter:blur(20px);

}

.filters input::placeholder{

color:white;

}

.filters option{

color:black;

}

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(350px,1fr));

gap:25px;

}

.card{

padding:20px;

border-radius:25px;

background:
rgba(255,255,255,.12);

backdrop-filter:blur(20px);

border:
1px solid rgba(255,255,255,.2);

color:white;

transition:.4s;

overflow:hidden;

}

.card:hover{

transform:
translateY(-8px)
scale(1.02);

}

.top{

display:flex;

gap:15px;

align-items:center;

margin-bottom:15px;

}

.photo{

width:90px;
height:90px;

border-radius:50%;

object-fit:cover;

border:
3px solid rgba(255,255,255,.5);

}

.badges{

margin-top:5px;

}

.badge{

display:inline-block;

padding:6px 12px;

border-radius:20px;

font-size:12px;

margin:3px;

background:
rgba(255,255,255,.2);

}

.verify{

background:#00c853;

}

.details{

margin-top:15px;

line-height:1.8;

font-size:14px;

}

.mode{

margin-top:12px;

padding:12px;

border-radius:12px;

background:
rgba(255,255,255,.1);

}

.gallery{

display:flex;

gap:8px;

overflow:auto;

margin-top:15px;

}

.gallery img{

width:70px;
height:70px;

border-radius:10px;

object-fit:cover;

}

.empty{

text-align:center;

padding:50px;

font-size:20px;

color:white;

background:
rgba(255,255,255,.1);

border-radius:20px;

}

</style>
</head>

<body>

<header>

<h1>GURULINK</h1>

<p>
Find Verified Teachers & Institutions
</p>

</header>

<div class="container">

<div class="filters">

<input
id="search"
placeholder="Search name/location">

<select id="category">

<option value="">
All Categories
</option>

<option value="academic">
Academic
</option>

<option value="creative">
Creative
</option>

<option value="skill">
Skill
</option>

</select>

<select id="subject">

<option value="">
All Subjects
</option>

<option>
Mathematics
</option>

<option>
Physics
</option>

<option>
Chemistry
</option>

<option>
Biology
</option>

<option>
English
</option>

<option>
Music
</option>

<option>
Computer
</option>

</select>

</div>

<div
id="teacherGrid"
class="grid">

</div>

</div>
<script type="module">

import{
initializeApp
}
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import{
getDatabase,
ref,
get
}
from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig={

apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"

};

const app=
initializeApp(firebaseConfig);

const db=
getDatabase(app);

let all=[];

async function loadData(){

let teacherSnap=
await get(
ref(db,"teachers")
);

let instSnap=
await get(
ref(db,"institutions")
);

all=[];

if(teacherSnap.exists()){

teacherSnap.forEach(c=>{

all.push({

id:c.key,
type:"teacher",
...c.val()

});

});

}

if(instSnap.exists()){

instSnap.forEach(c=>{

all.push({

id:c.key,
type:"institution",
...c.val()

});

});

}

render();

}

function render(){

let search=
document
.getElementById("search")
.value
.toLowerCase();

let category=
document
.getElementById("category")
.value;

let subject=
document
.getElementById("subject")
.value;

let html="";

let filtered=
all.filter(t=>{

if(t.status!="approved")
return false;

let sub=
t.subject||
t.skill||
t.creative||
"";

if(
search &&
!(
t.name?.toLowerCase()
.includes(search)
)
)
return false;

if(
category &&
t.category!=category
)
return false;

if(
subject &&
sub!=subject
)
return false;

return true;

});

if(!filtered.length){

teacherGrid.innerHTML=
`
<div class="empty">
No Results Found
</div>
`;

return;

}

filtered.forEach(t=>{

let gallery="";

if(Array.isArray(t.gallery)){

t.gallery.forEach(img=>{

gallery+=
`<img src="${img}">`;

});

}

html+=`

<div class="card">

<div class="top">

<img
class="photo"
src="${
t.photo||
t.logo||
'https://via.placeholder.com/100'
}">

<div>

<h2>
${t.name||"-"}
</h2>

<div class="badges">

<span class="badge">
${t.category||"-"}
</span>

<span class="badge">
${t.subject||
t.skill||
"-"}
</span>

<span class=
"badge verify">

✓ Verified

</span>

</div>

</div>

</div>

<div class="details">

<div>
📍
${t.location||
t.area||
"-"}
</div>

<div>
🎓
${t.qualification||
"Institution"}
</div>

<div>
⭐
${t.experience||
"-"}
</div>

</div>

<div class="mode">

${t.description||""}

</div>

<div class="gallery">

${gallery}

</div>

</div>

`;

});

teacherGrid.innerHTML=
html;

}

document
.querySelectorAll(
"input,select"
)
.forEach(el=>{

el.addEventListener(
"input",
render
);

});

loadData();

</script>

</body>
</html>
