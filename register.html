<style>

/* ================= GLOBAL ================= */
body{
margin:0;
font-family:Arial,sans-serif;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* ================= HEADER ================= */
header{
padding:20px;
text-align:center;
font-size:22px;
font-weight:bold;
background: rgba(255,255,255,0.08);
backdrop-filter: blur(10px);
border-bottom:1px solid rgba(255,255,255,0.2);
}

/* ================= CONTAINER ================= */
.container{
max-width:1100px;
margin:auto;
padding:20px;
}

/* ================= NOTE BOX ================= */
.note{
background: rgba(255,255,255,0.08);
backdrop-filter: blur(10px);
padding:20px;
border-radius:15px;
margin-bottom:25px;
border:1px solid rgba(255,255,255,0.2);
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.note h2{
margin-top:0;
color:#00e5ff;
}

.note p{
color:#e0e0e0;
line-height:1.6;
}

/* ================= GRID ================= */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:18px;
}

/* ================= CARD STYLE ================= */
.sub-wrap{
display:flex;
align-items:center;
gap:15px;
padding:15px;
border-radius:15px;
background: rgba(255,255,255,0.07);
backdrop-filter: blur(10px);
border:1px solid rgba(255,255,255,0.2);
transition:0.3s;
box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

.sub-wrap:hover{
transform:translateY(-5px) scale(1.02);
border:1px solid #00e5ff;
box-shadow:0 0 20px #00e5ff;
}

/* ================= ICON ================= */
.sub-icon{
width:55px;
height:55px;
border-radius:50%;
overflow:hidden;
flex-shrink:0;
border:2px solid #00e5ff;
box-shadow:0 0 10px #00e5ff;
}

.sub-icon img{
width:100%;
height:100%;
object-fit:cover;
}

/* ================= BUTTON ================= */
.sub-btn{
flex:1;
padding:12px 14px;
border:none;
border-radius:10px;
font-size:14px;
color:white;
cursor:pointer;
font-weight:bold;
letter-spacing:0.3px;
transition:0.3s;
position:relative;
overflow:hidden;
}

/* glowing animation border */
.sub-btn::before{
content:"";
position:absolute;
top:-2px;
left:-2px;
right:-2px;
bottom:-2px;
background: linear-gradient(45deg,#00e5ff,#ff00ff,#00ff88,#00e5ff);
background-size:400%;
z-index:-1;
filter:blur(6px);
animation: glow 6s linear infinite;
}

@keyframes glow{
0%{background-position:0 0;}
100%{background-position:400% 0;}
}

/* ================= BUTTON COLORS ================= */
.academic{ background:#1565c0; }
.skill{ background:#6a1b9a; }
.sports{ background:#2e7d32; }
.creative{ background:#ef6c00; }
.student{ background:#00838f; }

/* ================= TOP BUTTONS ================= */
.topButtons{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.topButtons a{
padding:10px 14px;
background:rgba(255,255,255,0.1);
border:1px solid rgba(255,255,255,0.2);
color:white;
text-decoration:none;
border-radius:8px;
transition:0.3s;
}

.topButtons a:hover{
background:#00e5ff;
color:black;
}

/* ================= RESPONSIVE ================= */
@media(max-width:600px){
.sub-wrap{
flex-direction:column;
text-align:center;
}
.sub-btn{
width:100%;
}
}

</style>
</head>
