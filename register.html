<style>

}

header{
display:flex;
align-items:center;
gap:12px;
padding:15px 20px;
background: rgba(255,255,255,0.08);
backdrop-filter: blur(10px);
border-bottom:1px solid rgba(255,255,255,0.2);
}

.header-logo{
width:40px;
height:40px;
border-radius:50%;
overflow:hidden;
border:2px solid #00e5ff;

.header-logo img{
width:100%;
height:100%;

}

.header-title{
font-size:20px;
font-weight:bold;
}

.container{
max-width:1100px;

padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:18px;
}

.card{
background: rgba(255,255,255,0.07);
backdrop-filter: blur(10px);
border:1px solid rgba(255,255,255,0.2);
border-radius:15px;
padding:16px;
display:flex;
gap:15px;
align-items:center;
box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

.icon{
width:70px;
height:70px;
border-radius:50%;
overflow:hidden;
border:3px solid #00e5ff;
}

.icon img{
width:100%;
height:100%;
object-fit:cover;
}

.content{
flex:1;
display:flex;
flex-direction:column;
gap:6px;
}

.sub-text{
font-size:12px;
opacity:0.8;
}

.title{
font-size:16px;
font-weight:bold;
}

.card-btn{
border:none;
border-radius:10px;
padding:10px;
cursor:pointer;
font-weight:bold;
color:white;
border:2px solid #ffd600;
position:relative;
overflow:hidden;
}

.card-btn::before{
content:"";
position:absolute;
inset:-2px;
background: linear-gradient(45deg,#00e5ff,#ff00ff,#00ff88,#00e5ff);
background-size:400%;
filter:blur(6px);
z-index:-1;
animation: glow 6s linear infinite;
}

@keyframes glow{
0%{background-position:0 0;}
100%{background-position:400% 0;}
}
</style>
</head>
