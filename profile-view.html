<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Profile View - GURULINK</title>

<style>
body{
font-family:Arial;
background:#f5f7ff;
padding:20px;
}

.box{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.header{
display:flex;
gap:15px;
align-items:center;
}

img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
}

.badge{
display:inline-block;
padding:5px 10px;
background:#1976d2;
color:white;
border-radius:20px;
font-size:12px;
margin:5px 3px;
}

.actions a{
display:inline-block;
margin:8px 5px;
padding:10px 12px;
border-radius:10px;
text-decoration:none;
color:white;
font-weight:bold;
}

.call{background:#25D366}
.whatsapp{background:#128C7E}
.website{background:#1976d2}

.section{
margin-top:15px;
padding:10px;
background:#f9f9ff;
border-radius:10px;
}

.star{
color:orange;
font-size:18px;
}

.reviewBox{
margin-top:10px;
border-top:1px solid #ddd;
padding-top:10px;
}

input,textarea,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
background:#1976d2;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.reviewItem{
padding:10px;
border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<div class="box" id="profile">Loading...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, get, child, onValue, push, set }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db = getDatabase(app);

const id = new URLSearchParams(location.search).get("id");

let data, type;

async function load(){

if(!id){
document.getElementById("profile").innerHTML="No ID Found";
return;
}

let snap = await get(child(ref(db),"teachers/"+id));
type = "Teacher";

if(snap.exists()){
data = snap.val();
}
else{
let snap2 = await get(child(ref(db),"institutions/"+id));
if(snap2.exists()){
data = snap2.val();
type = "Institution";
}
}

if(!data){
document.getElementById("profile").innerHTML="Profile Not Found";
return;
}

renderProfile();
loadReviews();
}

function renderProfile(){

document.getElementById("profile").innerHTML=`

<div class="header">
<img src="${data.photo||data.logo||'https://via.placeholder.com/120'}">

<div>
<h2>${data.name||"-"}</h2>

<div>
<span class="badge">${type}</span>
<span class="badge">${data.category||"-"}</span>
</div>

<p><b>Qualification:</b> ${data.qualification||"Not added"}</p>
<p><b>Experience:</b> ${data.experience||"Not added"}</p>
</div>
</div>

<div class="section">
<p><b>Subject:</b> ${data.subject||"-"}</p>
<p><b>Location:</b> ${data.location||data.address||"-"}</p>
<p><b>Phone:</b> ${data.phone||"-"}</p>
<p><b>Notes:</b> ${data.notes||"No notes"}</p>
</div>

<div class="actions">
<a class="call" href="tel:${data.phone}">📞 Call</a>
<a class="whatsapp" target="_blank"
href="https://wa.me/${data.phone}">💬 WhatsApp</a>

${data.website?`<a class="website" target="_blank" href="${data.website}">🌐 Website</a>`:""}
</div>

<div class="section">
<h3>⭐ Rating</h3>
<div id="avgRating">Loading rating...</div>
</div>

<div class="section reviewBox">

<h3>Write Review</h3>

<input id="rname" placeholder="Your name">
<select id="rrating">
<option value="5">⭐⭐⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="2">⭐⭐</option>
<option value="1">⭐</option>
</select>

<textarea id="rtext" placeholder="Write your review"></textarea>

<button onclick="submitReview()">Submit Review</button>

<h3 style="margin-top:15px">All Reviews</h3>
<div id="reviews"></div>

</div>
`;
}

window.submitReview = function(){

const name = document.getElementById("rname").value;
const rating = document.getElementById("rrating").value;
const text = document.getElementById("rtext").value;

push(ref(db,`reviews/${type.toLowerCase()}s/${id}`),{
name,
rating:Number(rating),
text,
time:Date.now()
});

alert("Review added!");
};

function loadReviews(){

onValue(ref(db,`reviews/${type.toLowerCase()}s/${id}`),snap=>{

let total=0,count=0,html="";

snap.forEach(r=>{
const d=r.val();
total+=Number(d.rating);
count++;

html+=`
<div class="reviewItem">
<b>${d.name}</b> - ⭐ ${d.rating}
<p>${d.text}</p>
</div>
`;
});

const avg = count? (total/count).toFixed(1):0;

document.getElementById("avgRating").innerHTML=
`⭐ ${avg} / 5 (${count} reviews)`;

document.getElementById("reviews").innerHTML=
html || "No reviews yet";
});
}

load();

</script>

</body>
</html>
