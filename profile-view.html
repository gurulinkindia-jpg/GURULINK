<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Profile View - GURULINK</title>

<style>

body{
font-family:Arial;
background:#f5f7ff;
padding:20px;
}

.box{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.header{
display:flex;
gap:15px;
align-items:center;
}

img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
}

.badge{
display:inline-block;
padding:5px 10px;
background:#1976d2;
color:white;
border-radius:20px;
font-size:12px;
margin:5px 3px;
}

.actions{
margin-top:10px;
}

.actions a{
display:inline-block;
margin:6px 5px;
padding:10px 12px;
border-radius:10px;
text-decoration:none;
color:white;
font-weight:bold;
}

.call{background:#25D366}
.whatsapp{background:#128C7E}
.website{background:#1976d2}

.section{
margin-top:15px;
padding:12px;
background:#f9f9ff;
border-radius:10px;
}

.reviewItem{
padding:12px;
background:white;
border-radius:10px;
margin-top:10px;
border-left:4px solid #1976d2;
box-shadow:0 2px 8px rgba(0,0,0,.05);
}

.gallery{
display:flex;
overflow-x:auto;
gap:15px;
padding:10px 0;
scroll-behavior:smooth;
scroll-snap-type:x mandatory;
}

.gallery::-webkit-scrollbar{
height:8px;
}

.gallery::-webkit-scrollbar-thumb{
background:#1976d2;
border-radius:20px;
}

.gallery img{
min-width:280px;
width:280px;
height:180px;
border-radius:15px;
object-fit:cover;
scroll-snap-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.15);
transition:.3s;
cursor:pointer;
}

.gallery img:hover{
transform:scale(1.03);
}

.modeBox{
padding:10px;
background:#eef3ff;
border-radius:10px;
margin-top:6px;
}

iframe{
width:100%;
height:250px;
border:0;
border-radius:10px;
margin-top:10px;
}

input,textarea,select{
width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:10px;
margin-top:10px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#1976d2;
color:white;
font-size:15px;
cursor:pointer;
margin-top:10px;
}

.ratingCard{
text-align:center;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.bigRating{
font-size:40px;
font-weight:bold;
color:#1976d2;
}

.starText{
font-size:24px;
color:orange;
}

.reviewForm{
background:white;
padding:15px;
border-radius:15px;
margin-top:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

</style>
</head>

<body>

<div class="box" id="profile">
Loading...
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getDatabase,
ref,
get,
child,
onValue,
push
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const app=initializeApp({

apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app"

});

const db=getDatabase(app);

const id=new URLSearchParams(location.search).get("id");

let data,type;

async function load(){

if(!id){
profile.innerHTML="No ID Found";
return;
}

let snap=await get(child(ref(db),"teachers/"+id));

type="Teacher";

if(snap.exists()){
data=snap.val();
}else{

let snap2=await get(
child(ref(db),"institutions/"+id)
);

if(snap2.exists()){
data=snap2.val();
type="Institution";
}

}

if(!data){

profile.innerHTML="Profile Not Found";
return;

}

renderProfile();
loadReviews();

}

function renderProfile(){

const subjects=
Array.isArray(data.subjects)
?data.subjects
:data.subject
?[data.subject]
:[];

const modes=[];

if(data.homeFee)
modes.push(`🏠 Home Tuition - ₹${data.homeFee}`);

if(data.groupFee)
modes.push(`👨‍🏫 Group Tuition - ₹${data.groupFee}`);

if(data.onlineIndividualFee)
modes.push(`💻 Online Individual - ₹${data.onlineIndividualFee}`);

if(data.onlineGroupFee)
modes.push(`🖥 Online Group - ₹${data.onlineGroupFee}`);

let mapHTML="";

if(data.mapLink){

let embed=data.mapLink;

if(embed.includes("google.com/maps")){
embed=embed.replace("/maps","/maps/embed");
}

mapHTML=`

<div class="section">

<h3>📍 Google Map</h3>

<a href="${data.mapLink}" target="_blank">
Open Map
</a>

<iframe src="${embed}"></iframe>

</div>

`;

}

profile.innerHTML=`

<div class="header">

<img src="${data.photo||data.logo||'https://via.placeholder.com/120'}">

<div>

<h2>${data.name||"-"}</h2>

<div>

<span class="badge">${type}</span>

<span class="badge">
${data.category||"-"}
</span>

</div>

${type==="Teacher" ? `

<p><b>Qualification:</b>
${data.qualification||"-"}
</p>

<p><b>Experience:</b>
${data.experience||"-"}
</p>

` : `

<p><b>Owner Name:</b>
${data.ownerName||"-"}
</p>

<p><b>Established Date:</b>
${data.establishedDate||"-"}
</p>

`}

</div>

</div>

<div class="section">

<p><b>Subjects:</b>
${subjects.join(", ")||"-"}
</p>

<p><b>Location:</b>
${data.location || data.address || data.area || "-"}
</p>

<p><b>Phone:</b>
${data.phone||"-"}
</p>

${data.alternatePhone ? `

<p><b>Alternate Phone:</b>
${data.alternatePhone}
</p>

` : ""}

${data.email ? `

<p><b>Email:</b>
${data.email}
</p>

` : ""}

<p><b>Description:</b>
${data.description||data.notes||"-"}
</p>



</div>

<div class="actions">

<a class="call"
href="tel:${data.phone||""}">
📞 Call
</a>

<a class="whatsapp"
target="_blank"
href="https://wa.me/${data.phone||""}">
💬 WhatsApp
</a>

${data.website
?`<a class="website"
target="_blank"
href="${data.website}">
🌐 Website
</a>`
:""}

</div>

${mapHTML}

${modes.length?`

<div class="section">

<h3>💰 Teaching Modes</h3>

${modes.map(m=>
`<div class="modeBox">${m}</div>`
).join("")}

</div>

`:""}

${data.gallery?.length?`

<div class="section">

<h3>📸 Gallery</h3>

<div class="gallery">

${data.gallery.map(
img=>`
<img 
src="${img}"
onclick="window.open('${img}','_blank')">
`
).join("")}

</div>

</div>

`:""}

<div class="section">

<div class="ratingCard">

<div class="bigRating"
id="avgRating">

0.0

</div>

<div class="starText">
⭐⭐⭐⭐⭐
</div>

<div id="totalReviews">
0 Reviews
</div>

</div>

<div class="reviewForm">

<h3>✍️ Write Review</h3>

<input
id="rname"
placeholder="Your name">

<select id="rrating">

<option value="5">
⭐⭐⭐⭐⭐ Excellent
</option>

<option value="4">
⭐⭐⭐⭐ Very Good
</option>

<option value="3">
⭐⭐⭐ Good
</option>

<option value="2">
⭐⭐ Average
</option>

<option value="1">
⭐ Poor
</option>

</select>

<textarea
id="rtext"
placeholder="Share your experience">
</textarea>

<button onclick="submitReview()">
Submit Review
</button>

</div>

<div style="margin-top:15px">

<h3>💬 User Reviews</h3>

<div id="reviews">
No reviews yet
</div>

</div>

</div>

`;

}

window.submitReview=function(){

push(
ref(db,
`reviews/${type.toLowerCase()}s/${id}`),
{
name:rname.value,
rating:Number(rrating.value),
text:rtext.value,
time:Date.now()
}
);

alert("Review added");

}

function loadReviews(){

onValue(
ref(db,
`reviews/${type.toLowerCase()}s/${id}`),

snap=>{

let total=0;
let count=0;
let html="";

snap.forEach(r=>{

const d=r.val();

total+=d.rating;
count++;

html+=`

<div class="reviewItem">

<b>${d.name}</b>

<div>
${"⭐".repeat(d.rating)}
</div>

<p>${d.text}</p>

</div>

`;

});

let avg=
count?
(total/count).toFixed(1)
:"0.0";

avgRating.innerHTML=avg;

totalReviews.innerHTML=
`${count} Reviews`;

reviews.innerHTML=
html||"No reviews yet";

});

}

load();

</script>

</body>
</html>
