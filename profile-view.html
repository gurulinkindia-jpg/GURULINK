<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Profile View</title>

<style>
body{
font-family:Arial;
background:#f5f7ff;
padding:20px;
}

.box{
max-width:850px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.top{
display:flex;
gap:15px;
align-items:center;
}

img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:3px solid #eee;
}

.badge{
display:inline-block;
padding:5px 10px;
background:#1976d2;
color:white;
border-radius:20px;
font-size:12px;
margin:5px 3px;
}

.section{
margin-top:15px;
padding:12px;
background:#f8f9ff;
border-radius:10px;
}

.actions a{
display:inline-block;
margin:8px 5px 0 0;
padding:10px 12px;
border-radius:10px;
color:white;
text-decoration:none;
font-size:14px;
}

.call{background:#1976d2}
.whatsapp{background:#25D366}
.website{background:#ff9800}

/* gallery */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(100px,1fr));
gap:8px;
margin-top:10px;
}

.gallery img{
width:100%;
height:90px;
border-radius:10px;
object-fit:cover;
}

/* rating */
.stars{
color:#ff9800;
font-size:18px;
margin:5px 0;
}

/* review */
.review{
background:#fff;
border:1px solid #eee;
padding:10px;
border-radius:10px;
margin-top:8px;
}

textarea{
width:100%;
padding:10px;
margin-top:8px;
border-radius:10px;
border:1px solid #ddd;
}

button{
margin-top:8px;
padding:8px 12px;
border:none;
background:#1976d2;
color:white;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box" id="profile">Loading...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, get, child }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db = getDatabase(app);

const id = new URLSearchParams(location.search).get("id");

async function load(){

if(!id){
document.getElementById("profile").innerHTML="No ID Found";
return;
}

let snap = await get(child(ref(db),"teachers/"+id));
let data = null;
let type = "Teacher";

if(snap.exists()){
data = snap.val();
}else{
let snap2 = await get(child(ref(db),"institutions/"+id));
if(snap2.exists()){
data = snap2.val();
type = "Institution";
}
}

if(!data){
document.getElementById("profile").innerHTML="Profile Not Found";
return;
}

/* FAKE GALLERY fallback (if not in DB) */
let gallery = data.gallery || [
"https://via.placeholder.com/200",
"https://via.placeholder.com/201",
"https://via.placeholder.com/202"
];

document.getElementById("profile").innerHTML = `

<div class="top">
<img src="${data.photo||data.logo||'https://via.placeholder.com/120'}">

<div>
<h2>${data.name||"-"}</h2>

<div>
<span class="badge">${type}</span>
<span class="badge">${data.category||"-"}</span>
</div>

<div class="stars">★★★★★ (4.5)</div>

</div>
</div>

<div class="section">
<p><b>Subject:</b> ${data.subject||"-"}</p>
<p><b>Qualification:</b> ${data.qualification||"Not added"}</p>
<p><b>Experience:</b> ${data.experience||"Not added"}</p>
<p><b>Location:</b> ${data.location||"-"}</p>
<p><b>Phone:</b> ${data.phone||"-"}</p>
<p><b>About:</b> ${data.note||"No description available"}</p>
</div>

<div class="actions">
<a class="call" href="tel:${data.phone}">📞 Call</a>
<a class="whatsapp" href="https://wa.me/${data.phone}" target="_blank">💬 WhatsApp</a>
<a class="website" href="${data.website||'#'}" target="_blank">🌐 Website</a>
</div>

<div class="section">
<h3>Gallery</h3>
<div class="gallery">
${gallery.map(img=>`<img src="${img}">`).join("")}
</div>
</div>

<div class="section">
<h3>Reviews</h3>

<div class="review">⭐ 5 - Excellent teaching!</div>
<div class="review">⭐ 4 - Very good experience.</div>

<textarea placeholder="Write a review..."></textarea>
<button>Submit Review</button>
</div>

`;

}

load();

</script>

</body>
</html>
