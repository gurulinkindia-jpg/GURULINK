<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Profile View - GURULINK</title>

<style>
body{
font-family:Arial;
background:#f5f7ff;
padding:20px;
}

.box{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.header{
display:flex;
gap:15px;
align-items:center;
}

img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
}

.badge{
display:inline-block;
padding:5px 10px;
background:#1976d2;
color:white;
border-radius:20px;
font-size:12px;
margin:5px 3px;
}

.actions{
margin-top:10px;
}

.actions a{
display:inline-block;
margin:6px 5px;
padding:10px 12px;
border-radius:10px;
text-decoration:none;
color:white;
font-weight:bold;
}

.call{background:#25D366}
.whatsapp{background:#128C7E}
.website{background:#1976d2}

.section{
margin-top:15px;
padding:12px;
background:#f9f9ff;
border-radius:10px;
}

.reviewItem{
padding:10px;
border-bottom:1px solid #eee;
}

.gallery{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

.gallery img{
width:100px;
height:100px;
border-radius:10px;
object-fit:cover;
}

.modeBox{
padding:10px;
background:#eef3ff;
border-radius:10px;
margin-top:6px;
}

.reviewCard{
background:#fff;
padding:12px;
border-radius:10px;
border:1px solid #eee;
margin-top:8px;
}

iframe{
width:100%;
height:250px;
border:0;
border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="box" id="profile">Loading...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, get, child, onValue, push }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db = getDatabase(app);

const id = new URLSearchParams(location.search).get("id");

let data, type;

async function load(){

if(!id){
document.getElementById("profile").innerHTML="No ID Found";
return;
}

let snap = await get(child(ref(db),"teachers/"+id));
type = "Teacher";

if(snap.exists()){
data = snap.val();
}
else{
let snap2 = await get(child(ref(db),"institutions/"+id));
if(snap2.exists()){
data = snap2.val();
type = "Institution";
}
}

if(!data){
document.getElementById("profile").innerHTML="Profile Not Found";
return;
}

renderProfile();
loadReviews();
}

function renderProfile(){

const subjects =
Array.isArray(data.subjects)
? data.subjects
: data.subject
? (typeof data.subject === "string" ? data.subject.split(",") : [])
: [];

// teaching modes only if exist
const modes = [];
if(data.homeFee) modes.push(`Home Tuition - ₹${data.homeFee}`);
if(data.groupFee) modes.push(`Group Tuition - ₹${data.groupFee}`);
if(data.onlineIndividualFee) modes.push(`Online Individual - ₹${data.onlineIndividualFee}`);
if(data.onlineGroupFee) modes.push(`Online Group - ₹${data.onlineGroupFee}`);

// FIX MAP EMBED
let mapHTML = "";
if(data.mapLink){
let embed = data.mapLink;

if(embed.includes("google.com/maps")){
embed = embed.replace("/maps", "/maps/embed");
}

mapHTML = `
<div class="section">
<h3>📍 Google Map</h3>

<a href="${data.mapLink}" target="_blank">Open Map</a>

<iframe src="${embed}" allowfullscreen></iframe>
</div>
`;
}

document.getElementById("profile").innerHTML = `
<div class="header">
<img src="${data.photo||data.logo||'https://via.placeholder.com/120'}">

<div>
<h2>${data.name||"-"}</h2>

<div>
<span class="badge">${type}</span>
<span class="badge">${data.category||"-"}</span>
</div>

<p><b>Qualification:</b> ${data.qualification||"Not added"}</p>
<p><b>Experience:</b> ${data.experience||"Not added"}</p>
</div>
</div>

<div class="section">
<p><b>Subjects:</b> ${subjects.length ? subjects.join(", ") : "-"}</p>
<p><b>Location:</b> ${data.location||"-"}</p>
<p><b>Phone:</b> ${data.phone||"-"}</p>
<p><b>Notes:</b> ${data.description||data.notes||"-"}</p>
</div>

<!-- ACTIONS ABOVE MAP -->
<div class="actions">
<a class="call" href="tel:${data.phone||""}">📞 Call</a>
<a class="whatsapp" target="_blank"
href="https://wa.me/${data.phone||""}">💬 WhatsApp</a>

${data.website ? `<a class="website" target="_blank" href="${data.website}">🌐 Website</a>` : ""}
</div>

<!-- MAP -->
${mapHTML}

<!-- TEACHING MODES -->
${modes.length ? `
<div class="section">
<h3>💰 Teaching Modes</h3>
${modes.map(m => `<div class="modeBox">${m}</div>`).join("")}
</div>
` : ""}

<!-- GALLERY -->
${data.gallery && data.gallery.length ? `
<div class="section">
<h3>📸 Gallery</h3>
<div class="gallery">
${data.gallery.map(img => `<img src="${img}">`).join("")}
</div>
</div>
` : ""}

<!-- RATING -->
<div class="section">
<h3>⭐ Rating</h3>
<div id="avgRating">Loading...</div>
</div>

<!-- REVIEW -->
<div class="section reviewCard">

<h3>Write Review</h3>

<input id="rname" placeholder="Your name">

<select id="rrating">
<option value="5">⭐⭐⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="2">⭐⭐</option>
<option value="1">⭐</option>
</select>

<textarea id="rtext" placeholder="Write review"></textarea>

<button onclick="submitReview()">Submit Review</button>

<h3 style="margin-top:15px">All Reviews</h3>
<div id="reviews"></div>

</div>
`;
}

window.submitReview = function(){

const name = document.getElementById("rname").value;
const rating = document.getElementById("rrating").value;
const text = document.getElementById("rtext").value;

push(ref(db,`reviews/${type.toLowerCase()}s/${id}`),{
name,
rating:Number(rating),
text,
time:Date.now()
});

alert("Review added!");
};

function loadReviews(){

onValue(ref(db,`reviews/${type.toLowerCase()}s/${id}`),snap=>{

let total=0,count=0,html="";

snap.forEach(r=>{
const d=r.val();
total+=Number(d.rating);
count++;

html+=`
<div class="reviewItem">
<b>${d.name}</b> - ⭐ ${d.rating}
<p>${d.text}</p>
</div>
`;
});

document.getElementById("avgRating").innerHTML =
`⭐ ${count ? (total/count).toFixed(1) : 0} / 5 (${count})`;

document.getElementById("reviews").innerHTML =
html || "No reviews yet";
});
}

load();

</script>

</body>
</html>
