<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Profile View - GURULINK</title>

<style>

body{
font-family:Arial;
background:#f5f7ff;
padding:20px 20px 130px;
margin:0;
}

.box{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.header{
display:flex;
flex-direction:column;
gap:12px;
align-items:flex-start;
}

.headerTop{
display:flex;
gap:12px;
align-items:center;
flex-wrap:wrap;
}

.headerInfo{
width:100%;
}

.mainPhoto{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:4px solid #1976d2;
}

.badge{
display:inline-block;
padding:5px 10px;
background:#1976d2;
color:white;
border-radius:20px;
font-size:12px;
margin:5px 3px;
}

.actions{
margin-top:15px;
display:grid;
grid-template-columns:repeat(3,minmax(0,1fr));
gap:8px;
}

.actions a,
.actions button{
padding:10px 5px;
border-radius:10px;
text-decoration:none;
color:white;
font-weight:bold;
font-size:13px;
text-align:center;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}
@media(max-width:480px){

.actions a,
.actions button{
font-size:12px;
padding:10px 3px;
}

.actions{
grid-template-columns:repeat(3,minmax(0,1fr));
}

}

.call{background:#4caf50}
.whatsapp{background:#009688}
.emailBtn{background:#3949ab}
.website{background:#1565c0}
.youtubeBtn{background:#d32f2f}



.saveContact{
background:#ff5722;
}





.section{
margin-top:20px;
padding:15px;
background:#f9f9ff;
border-radius:12px;
}

.topRatingCard{
min-width:130px;
padding:10px 12px;
background:white;
border:1px solid #d9e3f5;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.05);
}

.topRatingText{
font-size:12px;
font-weight:bold;
color:#d32f2f;
margin-bottom:6px;
}

.topStars{
font-size:22px;
line-height:1;
color:#fbc02d;
letter-spacing:1px;
}

.topMeta{
display:flex;
flex-direction:column;
gap:5px;
margin-top:8px;
}

.topMeta .badge{
margin:0;
font-size:11px;
padding:4px 8px;
text-align:center;
}

.infoStack{
display:flex;
flex-direction:column;
gap:10px;
}

.infoGrid{
display:grid;
grid-template-columns:repeat(2,minmax(0,1fr));
gap:10px;
}

.infoBlock{
padding:12px;
background:white;
border:1px solid #d9e3f5;
border-radius:12px;
line-height:1.6;
min-width:0;
}

.infoBlock.compact{
display:flex;
flex-wrap:wrap;
align-items:baseline;
gap:6px;
}

.infoTitle{
font-size:13px;
font-weight:bold;
color:#1e3a66;
margin-bottom:6px;
}

.infoValue{
font-size:14px;
line-height:1.6;
color:#222;
word-break:break-word;
}

.infoBlock.compact .infoTitle{
margin-bottom:0;
white-space:nowrap;
}

.infoBlock.compact .infoValue{
flex:1 1 140px;
min-width:0;
}

.infoLines{
margin-top:6px;
display:flex;
flex-direction:column;
gap:4px;
}

@media(max-width:640px){
.infoGrid{
grid-template-columns:1fr;
}
}

.detailsDescription{
padding:12px;
background:white;
border:1px solid #d9e3f5;
border-radius:12px;
line-height:1.6;
word-break:break-word;
}

.reviewItem{
padding:12px;
background:white;
border-radius:10px;
margin-top:10px;
border-left:4px solid #1976d2;
box-shadow:0 2px 8px rgba(0,0,0,.05);
}

.gallery{
display:flex;
overflow-x:auto;
gap:15px;
padding:10px 0;
scroll-behavior:smooth;
}

.gallery img{
min-width:280px;
width:280px;
height:180px;
border-radius:15px;
object-fit:cover;
box-shadow:0 5px 15px rgba(0,0,0,.15);
cursor:pointer;
}

.modeBox{
padding:10px;
background:#eef3ff;
border-radius:10px;
margin-top:8px;
}

iframe{
width:100%;
height:250px;
border:0;
border-radius:10px;
margin-top:10px;
}

input,textarea,select{
width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:10px;
margin-top:10px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#1976d2;
color:white;
font-size:15px;
cursor:pointer;
margin-top:10px;
}

.ratingCard{
text-align:center;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.bigRating{
font-size:40px;
font-weight:bold;
color:#1976d2;
}

.starText{
font-size:24px;
color:orange;
}

.reviewForm{
background:white;
padding:15px;
border-radius:15px;
margin-top:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.loading{
text-align:center;
font-size:20px;
padding:50px;
}

right:16px;
bottom:calc(env(safe-area-inset-bottom, 0px) + 16px);

height:40px;
padding:0 14px;
margin-top:0;
border-radius:999px;
display:flex;

align-items:center;
color:white;
font-size:13px;
line-height:1;
font-weight:bold;
text-decoration:none;

border:none;
cursor:pointer;
white-space:nowrap;
box-sizing:border-box;

.homeBtn{

}

.dashboardBtn{

}

.backBtn{

}

@media(max-width:768px){
body{
padding:12px 12px 150px;
}

.floatingNav{
left:12px;
right:12px;
bottom:calc(env(safe-area-inset-bottom, 0px) + 54px);
flex-direction:row;

}

.floatingBtn{

min-width:0;

padding:0 6px;

}


.payFee{
background:#ff9800;
}

.bankBox{
display:none;
margin-top:15px;
padding:15px;
background:#fff8e1;
border-radius:10px;
border:1px solid #ffd54f;
}

.bankQr{
width:120px;
height:120px;
object-fit:contain;
border:1px solid #ddd;
border-radius:10px;
margin-top:10px;
}

.demoBox{
margin-top:15px;
padding:15px;
background:#f3f9ff;
border:1px solid #bbdefb;
border-radius:12px;
}

.demoBox h3{
margin:0 0 8px;
color:#1565c0;
}

.demoBox p{
font-size:13px;
line-height:1.5;
color:#555;
}

.demoChat{
background:white;
border:1px solid #d6e8ff;
border-radius:12px;
padding:10px;
}

.demoChat textarea{
height:90px;
resize:vertical;
}

.demoSubmit{
background:#6a1b9a;
}

.demoSuccess{
display:none;
margin-top:10px;
padding:12px;
background:#e8f5e9;
border:1px solid #a5d6a7;
border-radius:10px;
color:#1b5e20;
font-weight:bold;
line-height:1.5;
}
</style>

<body>

<div class="box" id="profile">
<div class="loading">Loading Profile...</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getDatabase,
ref,
get,
child,
onValue,
push,
set
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const profile = document.getElementById("profile");
const id = new URLSearchParams(location.search).get("id");

let data = null;
let type = "";

function getAuthUser(){
return new Promise((resolve)=>{
const unsubscribe = onAuthStateChanged(auth,(user)=>{
unsubscribe();
resolve(user || null);
});

setTimeout(()=>{
resolve(auth.currentUser || null);
},1200);
});
}

/* MARK VIEW */
async function markView() {
  const authUser = await getAuthUser();

  const viewerId =
    localStorage.getItem("uid") ||
    localStorage.getItem("profileId") ||
    (authUser ? authUser.uid : "");

  const viewedProfileId = id;
  const viewerRole = (localStorage.getItem("role") || "").toLowerCase();

  if (!viewedProfileId) return;

  try {
    const isRegisteredTeacherOrInstitution =
      viewerRole === "teacher" ||
      viewerRole === "institution";

    const isGuestViewer =
      !viewerId ||
      viewerRole === "guest";

    const viewId =
      viewerId ||
      "guest_" + Date.now() + "_" + Math.floor(Math.random() * 9999);

    let viewerData = {
      name:"",
      email:"",
      phone:""
    };

    if (viewerId) {
      const paths = [];

      if (viewerRole === "student" || viewerRole === "parent") {
        paths.push("students/" + viewerId);
      }

      if (viewerRole === "teacher") {
        paths.push("teachers/" + viewerId);
      }

      if (viewerRole === "institution") {
        paths.push("institutions/" + viewerId);
      }

      paths.push("users/" + viewerId);
      paths.push("students/" + viewerId);

      for (const path of paths) {
        const snap = await get(ref(db, path));

        if (snap.exists()) {
          viewerData = {
            ...viewerData,
            ...snap.val()
          };
        }
      }
    }

    const displayName = isRegisteredTeacherOrInstitution
      ? (viewerRole === "teacher" ? "Teacher" : "Institution")
      : (
        isGuestViewer
          ? "Guest"
          : (viewerData.name || (viewerRole === "parent" ? "Parent" : "Student"))
      );

    const displayPhone = isRegisteredTeacherOrInstitution
      ? ""
      : (
        viewerData.phone ||
        viewerData.alternatePhone ||
        (authUser ? authUser.phoneNumber : "") ||
        localStorage.getItem("phone") ||
        ""
      );

    await set(
      ref(db, `profileViews/${viewedProfileId}/${viewId}`),
      {
        viewerId:viewId,
        studentId:viewId,
        viewerRole:viewerRole || "guest",
        name:displayName,
        email:viewerData.email || (authUser ? authUser.email : "") || localStorage.getItem("email") || "",
        phone:displayPhone,
        time: Date.now()
      }
    );

  } catch (err) {
    console.log("View not saved", err);
  }
}

/* LOAD PROFILE */
async function load(){

if(!id){
profile.innerHTML = "<h2>No ID Found</h2>";
return;
}

/* SAVE VIEW */
markView();

/* TEACHER */
let snap = await get(child(ref(db),"teachers/"+id));

if(snap.exists()){
data = snap.val();
type = "Teacher";
}

/* INSTITUTION */
if(!data){
let snap2 = await get(child(ref(db),"institutions/"+id));

if(snap2.exists()){
data = snap2.val();
type = "Institution";
}
}

/* NOT FOUND */
if(!data){
profile.innerHTML = "<h2>Profile Not Found</h2>";
return;
}

renderProfile();
loadReviews();
}

/* RENDER PROFILE */
function renderProfile(){

const visibility = data.publicVisibility || {};

function canShow(key){
return visibility[key] !== false;
}

function showValue(key){
return canShow(key) && data[key];
}

function esc(value){
return String(value ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
}

function externalUrl(value){
const text = String(value ?? "").trim();
if(!text) return "";
return /^https?:\/\//i.test(text) ? text : `https://${text}`;
}

function formatExperience(value){
const text = String(value ?? "").trim();
if(!text) return "";
return /year/i.test(text) ? esc(text) : `${esc(text)} years`;
}

function getCategoryLabel(){
const raw = String(data.categoryName || data.category || "").trim();
if(!raw) return "";
const normalized = raw.toLowerCase();
if(normalized === "skill") return "Professional Skill";
if(normalized === "sport") return "Sports & Fitness";
if(normalized === "creative") return "Arts & Creativity";
if(normalized === "academic") return "Academic";
return esc(raw);
}

const subjects = Array.isArray(data.subjects) ? data.subjects : [];
const teachingModes = Array.isArray(data.teachingModes) ? data.teachingModes : [];
const addressLines = [];
const categoryLabel = canShow("categoryName") ? getCategoryLabel() : "";
const websiteLink = showValue("website") ? externalUrl(data.website) : "";
const youtubeRaw =
  (canShow("youtube") && data.youtube) ||
  (canShow("youtubeLink") && data.youtubeLink) ||
  (canShow("youtubeChannel") && data.youtubeChannel) ||
  (canShow("youtubeUrl") && data.youtubeUrl) ||
  data.youtubeChanel ||
  "";
const youtubeLink = youtubeRaw ? externalUrl(youtubeRaw) : "";

if(showValue("address")) addressLines.push(`<div><b>State:</b> ${esc(data.address)}</div>`);
if(showValue("area")) addressLines.push(`<div><b>Area / City or Town:</b> ${esc(data.area)}</div>`);
if(showValue("pinCode")) addressLines.push(`<div><b>PIN Code:</b> ${esc(data.pinCode)}</div>`);

const modes = [];
if(showValue("homeFee")) modes.push(`Home Tuition - Rs ${esc(data.homeFee)}`);
if(showValue("groupFee")) modes.push(`Group / Team - Rs ${esc(data.groupFee)}`);
if(showValue("superGroupFee")) modes.push(`Super Group - Rs ${esc(data.superGroupFee)}`);
if(showValue("onlineFee")) modes.push(`Online - Rs ${esc(data.onlineFee)}`);
if(showValue("individualFee")) modes.push(`Individual / Personal - Rs ${esc(data.individualFee)}`);
if(showValue("otherMode") || showValue("otherModeFee")) modes.push(`${esc(data.otherMode || "Other Mode")} ${data.otherModeFee ? "- Rs " + esc(data.otherModeFee) : ""}`);
const subjectText =
canShow("subjects") ? (subjects.map(esc).join(", ") || "-") : "";
const modeText =
modes.length
? modes.join("<br>")
: (canShow("teachingModes") && teachingModes.length ? teachingModes.map(esc).join(", ") : "");
const classText =
showValue("class") ? esc(data.class) : "";
const experienceText =
showValue("experience") ? formatExperience(data.experience) : "";
const qualificationText =
showValue("qualification") ? esc(data.qualification) : "";
const boardText =
showValue("board") ? esc(data.board) : "";
const ownerText =
showValue("ownerName") ? esc(data.ownerName) : "";
const establishedText =
showValue("establishedDate") ? esc(data.establishedDate) : "";

let galleryHTML = "";
let gallery = data.gallery || [];

if (typeof gallery === "object" && !Array.isArray(gallery)) {
gallery = Object.values(gallery);
}

gallery = gallery.filter(img => typeof img === "string" && img.length > 5);

if (canShow("gallery") && gallery.length > 0) {
galleryHTML = `
<div class="section">
<h3>Gallery</h3>
<div class="gallery">
${gallery.map(img => `<img src="${esc(img)}" onclick="window.open('${esc(img)}','_blank')">`).join("")}
</div>
</div>
`;
}

const descriptionHTML =
showValue("description")
? `
<div class="section">
<h3>Description</h3>
<div class="detailsDescription">${esc(data.description)}</div>
</div>
`
: "";

let mapHTML = "";

if (canShow("mapUrl") && (data.mapLink || data.mapUrl)) {
let iframeHTML = "";

if (canShow("mapLink") && data.mapLink) {
const src = data.mapLink.match(/src="([^"]+)"/)?.[1];
if (src) {
iframeHTML = `<iframe src="${esc(src)}" allowfullscreen loading="lazy"></iframe>`;
}
}

mapHTML = `
<div class="section">
<h3>Google Map</h3>
${showValue("mapUrl") ? `<a href="${esc(data.mapUrl)}" target="_blank" style="display:inline-block;padding:12px 20px;background:#1976d2;color:white;text-decoration:none;border-radius:10px;font-weight:bold;margin-bottom:10px;">Open Google Maps</a>` : ""}
${iframeHTML}
</div>
`;
}

const profileImage = data.photo || data.profilePic || data.logo || "https://via.placeholder.com/120";

profile.innerHTML = `
<div class="header">
<div class="headerTop">
${canShow("logo") ? `<img class="mainPhoto" src="${esc(profileImage)}">` : ""}

<div class="topRatingCard">
<div class="topRatingText" id="topRatingText">Rating: 0.0 stars</div>
<div class="topStars" id="topStars">&#9734;&#9734;&#9734;&#9734;&#9734;</div>
<div class="topMeta">
<span class="badge">${esc(type)}</span>
${categoryLabel ? `<span class="badge">${categoryLabel}</span>` : ""}
</div>
</div>
</div>

<div class="headerInfo">
${canShow("name") ? `<h2>${esc(data.name || "-")}</h2>` : `<h2>GURULINK Profile</h2>`}
</div>
</div>

<div class="section">
<div class="infoStack">
${subjectText ? `
<div class="infoBlock">
<div class="infoTitle">Subjects / Skills / Activities</div>
<div class="infoValue">${subjectText}</div>
</div>
` : ""}
${modeText ? `
<div class="infoBlock">
<div class="infoTitle">Teaching / Training Modes</div>
<div class="infoValue">${modeText}</div>
</div>
` : ""}
<div class="infoGrid">
${classText ? `
<div class="infoBlock compact">
<div class="infoTitle">Class / Preparation For</div>
<div class="infoValue">${classText}</div>
</div>
` : ""}
${boardText ? `
<div class="infoBlock compact">
<div class="infoTitle">Board / Type of Exam</div>
<div class="infoValue">${boardText}</div>
</div>
` : ""}
${experienceText ? `
<div class="infoBlock compact">
<div class="infoTitle">Experience</div>
<div class="infoValue">${experienceText}</div>
</div>
` : ""}
${qualificationText ? `
<div class="infoBlock compact">
<div class="infoTitle">Qualification</div>
<div class="infoValue">${qualificationText}</div>
</div>
` : ""}
${ownerText ? `
<div class="infoBlock compact">
<div class="infoTitle">Owner / Director</div>
<div class="infoValue">${ownerText}</div>
</div>
` : ""}
${establishedText ? `
<div class="infoBlock compact">
<div class="infoTitle">Established Date</div>
<div class="infoValue">${establishedText}</div>
</div>
` : ""}
</div>
${addressLines.length ? `
<div class="infoBlock">
<div class="infoTitle">Address</div>
<div class="infoLines">${addressLines.join("")}</div>
</div>
` : ""}
</div>
</div>

<div class="actions">
${showValue("phone") ? `<a class="call" href="tel:${esc(data.phone)}">Call</a>` : ""}
${showValue("phone") ? `<a class="whatsapp" target="_blank" href="https://wa.me/${esc(data.phone)}">WhatsApp</a>` : ""}
${showValue("email") ? `<a class="emailBtn" href="mailto:${esc(data.email)}">Email</a>` : ""}
${showValue("phone") || showValue("email") ? `<button class="saveContact" onclick="saveContact()">Save Contact</button>` : ""}
${websiteLink ? `<a class="website" target="_blank" href="${esc(websiteLink)}">Website</a>` : ""}
${youtubeLink ? `<a class="youtubeBtn" target="_blank" href="${esc(youtubeLink)}">YouTube</a>` : ""}
${(
data.showBankDetails !== false &&
(data.qrImage || (data.accountHolderName && data.bankName && data.accountNumber))
) ? `<button class="payFee" onclick="showPaymentNotice()">Pay Fee</button>` : ""}
</div>

<div class="demoBox">
<h3>Request Demo Class / Practice</h3>
<p>Send one short demo class or practice request to this ${esc(type.toLowerCase())}. Your message will be visible to them for 15 days.</p>
<div class="demoChat" id="demoChatBox">
<input id="demoName" placeholder="Your Name">
<input id="demoPhone" placeholder="Phone Number">
<textarea id="demoMessage" placeholder="Write your demo class request"></textarea>
<button class="demoSubmit" onclick="submitDemoRequest()">Send Demo Request</button>
</div>
<div class="demoSuccess" id="demoSuccessBox">
Your request has been sent. Soon the teacher/institute will contact you.
</div>
</div>

${data.showBankDetails !== false ? `
<div id="bankBox" class="bankBox">
<h3>Payment Details</h3>
${data.accountHolderName ? `<p><b>Account Holder:</b> ${esc(data.accountHolderName)}</p>` : ""}
${data.bankName ? `<p><b>Bank Name:</b> ${esc(data.bankName)}</p>` : ""}
${data.accountNumber ? `<p><b>Account Number:</b> ${esc(data.accountNumber)}</p>` : ""}
${data.ifsc ? `<p><b>IFSC Code:</b> ${esc(data.ifsc)}</p>` : ""}
${data.upiId ? `<p><b>UPI ID:</b> ${esc(data.upiId)}</p>` : ""}
${data.qrImage ? `<img src="${esc(data.qrImage)}" class="bankQr" alt="QR Code">` : ""}
</div>
` : ""}

${mapHTML}
${galleryHTML}
${descriptionHTML}

<div class="section">
<div class="ratingCard">
<div class="bigRating" id="avgRating">0.0</div>
<div class="starText">*****</div>
<div id="totalReviews">0 Reviews</div>
</div>

<div class="reviewForm">
<h3>Write Review</h3>
<input id="rname" placeholder="Your Name">
<select id="rrating">
<option value="5">5 Stars</option>
<option value="4">4 Stars</option>
<option value="3">3 Stars</option>
<option value="2">2 Stars</option>
<option value="1">1 Star</option>
</select>
<textarea id="rtext" placeholder="Write review"></textarea>
<button onclick="submitReview()">Submit Review</button>
</div>

<div id="reviews">No Reviews Yet</div>
</div>
`;
}
/* REVIEWS */
function loadReviews(){

onValue(ref(db,`reviews/${type.toLowerCase()}s/${id}`),(snap)=>{

let total=0,count=0,html="";

snap.forEach(item=>{
const d=item.val();
total+=d.rating;
count++;

html+=`
<div class="reviewItem">
<b>${d.name}</b>
<div>${"&#9733;".repeat(d.rating)}</div>
<p>${d.text}</p>
</div>`;
});

const avgValue =
count ? (total/count).toFixed(1) : "0.0";

document.getElementById("avgRating").innerText =
avgValue;

const roundedStars =
Math.round(Number(avgValue));

const starLine =
"&#9733;".repeat(roundedStars) +
"&#9734;".repeat(5-roundedStars);

const topRatingText =
document.getElementById("topRatingText");

const topStars =
document.getElementById("topStars");

const bottomStars =
document.querySelector(".starText");

if(topRatingText){
topRatingText.innerText = `Rating: ${avgValue} stars`;
}

if(topStars){
topStars.innerHTML = starLine;
}

if(bottomStars){
bottomStars.innerHTML = starLine;
}

document.getElementById("totalReviews").innerText =
count + " Reviews";

document.getElementById("reviews").innerHTML =
html || "No Reviews Yet";

});
}

/* SUBMIT REVIEW */
window.submitReview = async function(){

const name=document.getElementById("rname").value;
const rating=Number(document.getElementById("rrating").value);
const text=document.getElementById("rtext").value;

if(!name||!text){
alert("Fill all fields");
return;
}

await push(ref(db,`reviews/${type.toLowerCase()}s/${id}`),{
name,rating,text,time:Date.now()
});

alert("Review submitted");
document.getElementById("rname").value="";
document.getElementById("rtext").value="";
};

window.submitDemoRequest = async function(){

const name =
document.getElementById("demoName").value.trim();

const phone =
document.getElementById("demoPhone").value.trim();

const message =
document.getElementById("demoMessage").value.trim();

if(!name || !phone || !message){
alert("Please enter name, phone number, and demo request message.");
return;
}

const requestKey =
phone.replace(/\D/g,"");

if(requestKey.length < 6){
alert("Please enter a valid phone number.");
return;
}

try{

await set(ref(db,`demoRequests/${id}/${requestKey}`),{
profileId:id,
profileType:type,
name:name,
phone:phone,
message:message,
status:"new",
createdAt:Date.now(),
expiresAt:Date.now() + (15 * 24 * 60 * 60 * 1000)
});

document.getElementById("demoChatBox").style.display = "none";
document.getElementById("demoSuccessBox").style.display = "block";

document.getElementById("demoName").value = "";
document.getElementById("demoPhone").value = "";
document.getElementById("demoMessage").value = "";

}
catch(err){
console.error(err);
alert("You have already sent a demo request. Soon the teacher/institute will contact you.");
document.getElementById("demoChatBox").style.display = "none";
document.getElementById("demoSuccessBox").style.display = "block";
}

};

"Please verify all payment details before proceeding.\n\n" +

);

};

window.toggleBankDetails = function(){

const box =
document.getElementById("bankBox");

if(!box) return;

box.style.display =
box.style.display === "block"
? "none"
: "block";

};






window.saveContact = function(){

const name =
(data.name || "GURULINK Contact");

const phone =
(data.phone || "");

const email =
(data.email || "");

const vcf = `
BEGIN:VCARD
VERSION:3.0
FN:${name}
TEL:${phone}
EMAIL:${email}
END:VCARD
`;

const blob = new Blob(
[vcf],
{type:"text/vcard"}
);

const url =
URL.createObjectURL(blob);

const a =
document.createElement("a");

a.href = url;
a.download =
name.replace(/\s+/g,"_") + ".vcf";

document.body.appendChild(a);
a.click();
document.body.removeChild(a);

URL.revokeObjectURL(url);

};

function getDashboardPath(){
const viewerRole = String(
localStorage.getItem("role") ||
sessionStorage.getItem("role") ||
""
).toLowerCase();

if(
viewerRole === "student" ||
viewerRole === "parent"
){
return "student-dashboard.html";
}

if(
viewerRole === "teacher" ||
viewerRole === "institution" ||
viewerRole === "teacher_institute"
){
return "teacher-dashboard.html";
}

if(viewerRole === "admin"){
return "admin.html";
}

return "otp-login.html";
}

window.goBackSmart = function(){
if(window.history.length > 1){
window.history.back();
return;
}

const fallback =
getDashboardPath() === "otp-login.html"
? "index.html"
: getDashboardPath();

window.location.href = fallback;
};







window.addEventListener("load",()=>{
const dashboardBtn =
document.getElementById("dashboardBtn");

if(dashboardBtn){
dashboardBtn.href = getDashboardPath();
}
});

load();
