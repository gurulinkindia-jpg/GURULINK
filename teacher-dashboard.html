<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - GURULINK</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#1565c0;
color:white;
padding:15px;
text-align:center;
}

.container{
width:95%;
max-width:900px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

button{
padding:12px;
width:100%;
margin-top:10px;
background:#1565c0;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

button.logout{
background:red;
}

.section{
margin-top:15px;
padding:10px;
border:1px solid #ddd;
border-radius:8px;
}

.viewerCard{
padding:10px;
border:1px solid #ddd;
border-radius:8px;
margin-top:8px;
background:#f9f9ff;
}

.preview img{
width:90px;
height:90px;
object-fit:cover;
border-radius:8px;
margin-right:8px;
}

.galleryPreview img{
width:80px;
height:80px;
object-fit:cover;
border-radius:8px;
margin:5px;
}

#content{display:none}

.roleBadge{
display:inline-block;
padding:5px 12px;
background:#0d47a1;
color:white;
border-radius:20px;
font-size:13px;
margin-top:5px;
}

.analyticsBox{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.card{
flex:1;
min-width:150px;
background:#eef3ff;
padding:10px;
border-radius:10px;
text-align:center;
}
</style>
</head>

<body>

<header>
<h2>Dashboard</h2>
<div class="roleBadge" id="roleText">Loading...</div>
</header>

<div class="container">

<div id="loading">Loading profile...</div>

<div id="content">

<!-- 📊 ANALYTICS -->
<div class="section">
<h3>📊 Analytics</h3>
<div class="analyticsBox">
<div class="card">
<h2 id="totalViews">0</h2>
<p>Total Views</p>
</div>

<div class="card">
<h2 id="recentViews">0</h2>
<p>Recent (24h)</p>
</div>
</div>
</div>

<!-- 👁 VIEWERS -->
<div class="section">
<h3>👀 Profile Views</h3>
<div id="viewers">Loading...</div>
</div>

<!-- PROFILE -->
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<input id="experience" placeholder="Experience / Year">
<input id="location" placeholder="Location">

<textarea id="description" placeholder="About"></textarea>

<div class="section">
<h4>Subjects</h4>
<input id="subjects">
</div>

<div class="section">
<h4>Teaching Modes</h4>
<input id="modes">
</div>

<div class="section">
<h4>Fee</h4>
<input id="fee">
</div>

<!-- 📸 GALLERY -->
<div class="section">
<h4>Gallery Upload</h4>

<div class="galleryPreview" id="galleryPreview"></div>

<input type="file" id="gallery" multiple>
</div>

<div class="section">
<h4>Profile Photo</h4>
<input type="file" id="photo">
</div>

<button onclick="saveData()">Save Changes</button>
<button class="logout" onclick="logout()">Logout</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getDatabase,
ref,
get,
update,
onValue
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

import {
getAuth,
signOut
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
apiKey:"AIzaSyBK0Q...",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};






const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const uid = localStorage.getItem("uid");
const role = localStorage.getItem("role");
const profileId = localStorage.getItem("profileId");

console.log("uid =", uid);
console.log("role =", role);
console.log("profileId =", profileId);

alert(
"uid = " + uid +
"\nrole = " + role +
"\nprofileId = " + profileId
);

document.getElementById("roleText").innerText =
(role || "guest").toUpperCase();






const dbPath = role==="teacher"
? "teachers/"+profileId
: "institutions/"+profileId;
alert("DB PATH = " + dbPath);

const el = (id)=>document.getElementById(id);

/* LOAD PROFILE */
async function loadProfile(){

const snap = await get(ref(db, dbPath));
if(!snap.exists()) return;

const d = snap.val();

el("name").value = d.name||"";
el("phone").value = d.phone||"";
el("email").value = d.email||"";
el("experience").value = d.experience||"";
el("location").value = d.location||"";
el("description").value = d.description||"";

el("subjects").value = Array.isArray(d.subjects)?d.subjects.join(","):"";
el("modes").value = Array.isArray(d.teachingModes)?d.teachingModes.join(","):"";
el("fee").value = d.fee||"";

/* gallery preview */
if(d.gallery){
el("galleryPreview").innerHTML =
d.gallery.map(img=>`<img src="${img}">`).join("");
}

el("loading").style.display="none";
el("content").style.display="block";
}

/* 👁 VIEWERS + ANALYTICS FIX */
function loadViewers(){

const viewerRef = ref(db, `profileViews/${profileId}`);

onValue(viewerRef, (snap)=>{

let html="";
let total=0;
let recent=0;
let now=Date.now();

snap.forEach(child=>{

const v = child.val();
total++;

if(v.time && now - v.time < 86400000){
recent++;
}

html += `
<div class="viewerCard">
<b>${v.name || "Student"}</b><br>
📧 ${v.email || "-"}<br>
📞 ${v.phone || "-"}<br>
🕒 ${new Date(v.time).toLocaleString()}
</div>
`;
});

el("viewers").innerHTML = total?html:"No views yet";
el("totalViews").innerText = total;
el("recentViews").innerText = recent;

});

}

/* IMAGE UPLOAD */
async function upload(file){
let fd = new FormData();
fd.append("image", file);

let res = await fetch(
`https://api.imgbb.com/1/upload?key=31f729ff855eb2e42c00ee508a8647ea`,
{method:"POST", body:fd}
);

let data = await res.json();
return data?.data?.url || "";
}

/* SAVE */
window.saveData = async function(){

const file = el("photo").files[0];
const galleryFiles = el("gallery").files;

let updateData = {
name: el("name").value,
phone: el("phone").value,
email: el("email").value,
experience: el("experience").value,
location: el("location").value,
description: el("description").value,
subjects: el("subjects").value.split(",").map(x=>x.trim()).filter(Boolean),
teachingModes: el("modes").value.split(",").map(x=>x.trim()).filter(Boolean),
fee: el("fee").value
};

if(file){
updateData.photo = await upload(file);
}

/* 📸 MULTI GALLERY */
if(galleryFiles.length){
let urls=[];
for(let f of galleryFiles){
urls.push(await upload(f));
}
updateData.gallery = urls;
}

await update(ref(db, dbPath), updateData);

alert("Profile Updated Successfully");
};

/* LOGOUT */
window.logout = async function(){
await signOut(auth);
localStorage.clear();
location.href="login.html";
};

loadProfile();
loadViewers();

</script>

</body>
</html>
