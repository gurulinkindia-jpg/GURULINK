<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GURULINK Teacher Dashboard</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#1565c0;
color:white;
padding:15px;
text-align:center;
}

.container{
width:95%;
max-width:900px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

button{
padding:12px;
width:100%;
margin-top:10px;
background:#1565c0;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

button.logout{background:red;}
button.renew{background:green;}

.section{
margin-top:15px;
padding:10px;
border:1px solid #ddd;
border-radius:8px;
}

.viewerCard{
padding:10px;
border:1px solid #ddd;
border-radius:8px;
margin-top:8px;
background:#f9f9ff;
}

#content{display:none}

.roleBadge{
display:inline-block;
padding:5px 12px;
background:#0d47a1;
color:white;
border-radius:20px;
font-size:13px;
margin-top:5px;
}

.expiryBox{
padding:10px;
margin-top:10px;
background:#fff3cd;
border:1px solid #ffeeba;
border-radius:8px;
}
</style>
</head>

<body>

<header>
<h2>GURULINK DASHBOARD</h2>
<div class="roleBadge" id="roleText">GUEST</div>
</header>

<div class="container">

<div id="loading">Loading profile...</div>

<div id="content">

<div class="expiryBox" id="expiryBox">Loading expiry...</div>

<div class="section">
<h3>📊 Analytics</h3>
<h2 id="totalViews">0</h2>
<p>Total Views</p>
</div>

<div class="section">
<h3>👁 Views</h3>
<div id="viewers"></div>
</div>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<input id="experience" placeholder="Experience">
<input id="location" placeholder="Location">
<textarea id="description" placeholder="About"></textarea>

<input id="subjects" placeholder="Subjects (comma separated)">
<input id="modes" placeholder="Modes (comma separated)">
<input id="fee" placeholder="Fee">

<button onclick="saveData()">Save Changes</button>

<button class="renew" onclick="renewProfile()">Renew 365 Days</button>

<button class="logout" onclick="logout()">Logout</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getDatabase, ref, get, update, onValue
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

import {
getAuth, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
apiKey:"YOUR_KEY",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

/* ======================
   SAFE SESSION FIX
====================== */

let profileId = localStorage.getItem("profileId");
let role = localStorage.getItem("role");

document.getElementById("roleText").innerText = (role || "GUEST").toUpperCase();

/* If opened directly without login */
if(!profileId || !role){
document.getElementById("loading").innerHTML =
"❌ Please login first. Redirecting...";
setTimeout(()=>location.href="login.html",2000);
throw new Error("No session");
}

const dbPath = (role==="teacher")
? "teachers/"+profileId
: "institutions/"+profileId;

const el = (id)=>document.getElementById(id);

/* ======================
   EXPIRY SYSTEM (365 DAYS)
====================== */

function getExpiryText(start){
if(!start) return "Not Approved Yet";

const now = Date.now();
const end = start + (365*24*60*60*1000);

if(now > end) return "❌ Expired";

const days = Math.ceil((end-now)/(1000*60*60*24));
return "⏳ " + days + " days remaining";
}

/* ======================
   LOAD PROFILE
====================== */

async function loadProfile(){

const snap = await get(ref(db, dbPath));
if(!snap.exists()){
el("loading").innerHTML="Profile not found";
return;
}

const d = snap.val();

el("name").value = d.name||"";
el("phone").value = d.phone||"";
el("email").value = d.email||"";
el("experience").value = d.experience||"";
el("location").value = d.location||"";
el("description").value = d.description||"";

el("subjects").value = (d.subjects||[]).join(",");
el("modes").value = (d.teachingModes||[]).join(",");
el("fee").value = d.fee||"";

el("expiryBox").innerHTML =
"Status: "+(d.status||"pending")+"<br>"+
getExpiryText(d.approvedAt);

el("loading").style.display="none";
el("content").style.display="block";
}

/* ======================
   VIEW ANALYTICS
====================== */

function loadViews(){

onValue(ref(db,`profileViews/${profileId}`),(snap)=>{

let html="";
let total=0;

snap.forEach(c=>{
total++;
const v=c.val();

html+=`
<div class="viewerCard">
<b>${v.name||"Student"}</b><br>
${v.email||""}<br>
${new Date(v.time).toLocaleString()}
</div>`;
});

el("viewers").innerHTML = html;
el("totalViews").innerText = total;

});

}

/* ======================
   SAVE PROFILE
====================== */

window.saveData = async function(){

await update(ref(db, dbPath),{
name:el("name").value,
phone:el("phone").value,
email:el("email").value,
experience:el("experience").value,
location:el("location").value,
description:el("description").value,
subjects:el("subjects").value.split(","),
teachingModes:el("modes").value.split(","),
fee:el("fee").value
});

alert("Saved Successfully");
};

/* ======================
   RENEW SYSTEM (FIXED)
====================== */

window.renewProfile = function(){

const profileId =
localStorage.getItem("profileId");

const role =
localStorage.getItem("role");

if(!profileId){
alert("Profile ID missing. Please login again.");
return;
}

const type =
role === "institution"
? "institution"
: "teacher";

window.location.href =
`payment.html?type=${type}&id=${profileId}&renew=true`;

};

/* ======================
   LOGOUT FIXED
====================== */

window.logout = async function(){
try{
await signOut(auth);
}catch(e){}

localStorage.clear();
location.href="login.html";
};

/* INIT */
loadProfile();
loadViews();

</script>

</body>
</html>
