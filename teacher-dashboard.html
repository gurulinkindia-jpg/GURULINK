<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#1565c0;
color:white;
padding:15px;
text-align:center;
}

.container{
width:95%;
max-width:900px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input,select,textarea{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:12px;
width:100%;
margin-top:10px;
background:#1565c0;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.preview img{
width:90px;
height:90px;
object-fit:cover;
border-radius:8px;
margin:5px;
}

.section{
margin-top:15px;
padding:10px;
border:1px solid #ddd;
border-radius:8px;
}
</style>
</head>

<body>

<header>
<h2>Teacher Dashboard</h2>
</header>

<div class="container">

<div id="loading">Loading profile...</div>

<div id="content" style="display:none;">

<h3>Edit Profile</h3>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">

<input id="experience" placeholder="Experience">
<input id="location" placeholder="Location">

<textarea id="description" placeholder="About You"></textarea>

<div class="section">
<h4>Sports (comma separated)</h4>
<input id="sports">
</div>

<div class="section">
<h4>Training Modes</h4>
<input id="modes">
</div>

<div class="section">
<h4>Fees</h4>
<input id="fee">
</div>

<div class="section">
<h4>Profile Photo</h4>
<div id="photoPreview" class="preview"></div>
<input type="file" id="photo">
</div>

<button onclick="saveData()">Save Changes</button>
<button style="background:red" onclick="logout()">Logout</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

/* SECURITY CHECK */
const uid = localStorage.getItem("uid");
const profileId = localStorage.getItem("profileId");
const role = localStorage.getItem("role");

if(!uid || role !== "teacher"){
alert("Access Denied");
window.location.href = "login.html";
}

/* LOAD DATA */
async function loadData(){

const snap = await get(ref(db,"teachers/"+profileId));

if(!snap.exists()){
alert("Profile not found");
return;
}

const d = snap.val();

/* fill data */
document.getElementById("name").value = d.name || "";
document.getElementById("phone").value = d.phone || "";
document.getElementById("email").value = d.email || "";
document.getElementById("experience").value = d.experience || "";
document.getElementById("location").value = d.location || "";
document.getElementById("description").value = d.description || "";
document.getElementById("sports").value = (d.sports || []).join(", ");
document.getElementById("modes").value = (d.teachingModes || []).join(", ");
document.getElementById("fee").value = d.fee || "";

/* photo */
if(d.photo){
document.getElementById("photoPreview").innerHTML =
`<img src="${d.photo}">`;
}

document.getElementById("loading").style.display="none";
document.getElementById("content").style.display="block";
}

loadData();

/* IMAGE UPLOAD */
const API_KEY = "31f729ff855eb2e42c00ee508a8647ea";

async function upload(file){
let fd = new FormData();
fd.append("image",file);

let res = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`,{
method:"POST",
body:fd
});

let data = await res.json();
return data.data.url;
}

/* SAVE */
window.saveData = async function(){

let photoUrl = "";

if(document.getElementById("photo").files[0]){
photoUrl = await upload(document.getElementById("photo").files[0]);
}

await update(ref(db,"teachers/"+profileId),{

name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
email:document.getElementById("email").value,
experience:document.getElementById("experience").value,
location:document.getElementById("location").value,
description:document.getElementById("description").value,
sports:document.getElementById("sports").value.split(",").map(x=>x.trim()),
teachingModes:document.getElementById("modes").value.split(",").map(x=>x.trim()),
fee:document.getElementById("fee").value,
photo:photoUrl || undefined

});

alert("Updated Successfully");
};

/* LOGOUT */
window.logout = async function(){
await signOut(auth);
localStorage.clear();
window.location.href = "login.html";
};

</script>

</body>
</html>
