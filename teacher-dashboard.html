<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - GURULINK</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#1565c0;
color:white;
padding:15px;
text-align:center;
}

.container{
width:95%;
max-width:900px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

button{
padding:12px;
width:100%;
margin-top:10px;
background:#1565c0;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

button.logout{background:red;}

.section{
margin-top:15px;
padding:10px;
border:1px solid #ddd;
border-radius:8px;
background:#fafbff;
}

.viewerCard{
padding:10px;
border:1px solid #ddd;
border-radius:8px;
margin-top:8px;
background:#f9f9ff;
}

.preview img{
width:90px;
height:90px;
object-fit:cover;
border-radius:8px;
margin:5px;
}

.galleryPreview img{
width:80px;
height:80px;
object-fit:cover;
border-radius:8px;
margin:5px;
}

#content{display:none}

.roleBadge{
display:inline-block;
padding:5px 12px;
background:#0d47a1;
color:white;
border-radius:20px;
font-size:13px;
margin-top:5px;
}

.analyticsBox{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.analyticsCard{
flex:1;
min-width:120px;
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
text-align:center;
}

.big{
font-size:20px;
font-weight:bold;
color:#1565c0;
}
</style>
</head>

<body>

<header>
<h2>Dashboard</h2>
<div class="roleBadge" id="roleText">Loading...</div>
</header>

<div class="container">

<div id="loading">Loading profile...</div>

<div id="content">

<!-- 👀 VIEWERS -->
<div class="section">
<h3>👀 Profile Views</h3>
<div class="analyticsBox">
<div class="analyticsCard">
<div class="big" id="totalViews">0</div>
Total Views
</div>
<div class="analyticsCard">
<div class="big" id="todayViews">0</div>
Today
</div>
<div class="analyticsCard">
<div class="big" id="weekViews">0</div>
Weekly
</div>
</div>

<div id="viewers"></div>
</div>

<!-- 🔔 NOTIFICATIONS -->
<div class="section">
<h3>🔔 Notifications</h3>
<div id="notifications">No notifications</div>
</div>

<!-- PROFILE -->
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<input id="experience" placeholder="Experience / Year">
<input id="location" placeholder="Location">

<textarea id="description" placeholder="About"></textarea>

<div class="section">
<h4>Subjects</h4>
<input id="subjects">
</div>

<div class="section">
<h4>Modes</h4>
<input id="modes">
</div>

<div class="section">
<h4>Fee</h4>
<input id="fee">
</div>

<!-- 📸 MAIN PHOTO -->
<div class="section">
<h4>Profile Photo</h4>
<div class="preview" id="photoPreview"></div>
<input type="file" id="photo">
</div>

<!-- 📸 GALLERY (NEW) -->
<div class="section">
<h4>Gallery Upload</h4>
<div class="galleryPreview" id="galleryPreview"></div>
<input type="file" id="gallery" multiple>
</div>

<button onclick="saveData()">Save Changes</button>
<button class="logout" onclick="logout()">Logout</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getDatabase,
ref,
get,
update,
onValue,
push
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

import {
getAuth,
signOut
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const uid = localStorage.getItem("uid");
const role = localStorage.getItem("role");
const profileId = localStorage.getItem("profileId");

if(!uid || !role || !profileId){
alert("Access Denied");
location.href="login.html";
}

document.getElementById("roleText").innerText = role.toUpperCase();

const dbPath = role==="teacher"
? "teachers/"+profileId
: "institutions/"+profileId;

const el = (id)=>document.getElementById(id);

/* LOAD PROFILE */
async function loadProfile(){
const snap = await get(ref(db,dbPath));
if(!snap.exists()) return;

const d = snap.val();

el("name").value=d.name||"";
el("phone").value=d.phone||"";
el("email").value=d.email||"";
el("experience").value=d.experience||"";
el("location").value=d.location||"";
el("description").value=d.description||"";
el("subjects").value=(d.subjects||[]).join(", ");
el("modes").value=(d.teachingModes||[]).join(", ");
el("fee").value=d.fee||"";

if(d.photo) el("photoPreview").innerHTML=`<img src="${d.photo}">`;

if(d.gallery){
el("galleryPreview").innerHTML =
d.gallery.map(g=>`<img src="${g}">`).join("");
}

el("loading").style.display="none";
el("content").style.display="block";
}

/* VIEWERS + ANALYTICS */
function loadAnalytics(){

const refV = ref(db,"profileViews/"+profileId);

onValue(refV,(snap)=>{

let total=0;
let today=0;
let week=0;
let html="";

const now = Date.now();

snap.forEach(v=>{

const d = v.val();
total++;

const diff = now - d.time;

if(diff < 86400000) today++;
if(diff < 7*86400000) week++;

html += `<div class="viewerCard">
<b>${d.name}</b><br>
${d.email}
</div>`;
});

el("totalViews").innerText=total;
el("todayViews").innerText=today;
el("weekViews").innerText=week;

el("viewers").innerHTML=html||"No views";

});
}

/* NOTIFICATIONS */
function loadNotifications(){

const r1 = ref(db,"profileViews/"+profileId);
onValue(r1,(snap)=>{
let html="";
snap.forEach(v=>{
html+=`<div>👁 New profile view from ${v.val().name}</div>`;
});
el("notifications").innerHTML=html||"No notifications";
});
}

/* UPLOAD */
async function upload(file){
let fd=new FormData();
fd.append("image",file);
let res=await fetch(
`https://api.imgbb.com/1/upload?key=31f729ff855eb2e42c00ee508a8647ea`,
{method:"POST",body:fd}
);
let data=await res.json();
return data.data.url;
}

/* SAVE */
window.saveData=async function(){

const file=el("photo").files[0];
const galleryFiles=el("gallery").files;

let galleryUrls=[];

for(let f of galleryFiles){
let url=await upload(f);
galleryUrls.push(url);
}

let updateData={
name:el("name").value,
phone:el("phone").value,
email:el("email").value,
experience:el("experience").value,
location:el("location").value,
description:el("description").value,
subjects:el("subjects").value.split(",").map(x=>x.trim()),
teachingModes:el("modes").value.split(",").map(x=>x.trim()),
fee:el("fee").value
};

if(file){
updateData.photo=await upload(file);
}

if(galleryUrls.length){
updateData.gallery=galleryUrls;
}

await update(ref(db,dbPath),updateData);

alert("Updated Successfully");
};

window.logout=async()=>{
await signOut(auth);
localStorage.clear();
location.href="login.html";
};

loadProfile();
loadAnalytics();
loadNotifications();

</script>
</body>
</html>
