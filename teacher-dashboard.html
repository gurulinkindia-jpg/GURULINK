<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - GURULINK</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#1565c0;
color:white;
padding:15px;
text-align:center;
}

.container{
width:95%;
max-width:900px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

button{
padding:12px;
width:100%;
margin-top:10px;
background:#1565c0;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

button.logout{
background:red;
}

.section{
margin-top:15px;
padding:10px;
border:1px solid #ddd;
border-radius:8px;
}

.viewerCard{
padding:10px;
border:1px solid #ddd;
border-radius:8px;
margin-top:8px;
background:#f9f9ff;
}

.preview img{
width:90px;
height:90px;
object-fit:cover;
border-radius:8px;
margin:5px;
}

.galleryPreview img{
width:80px;
height:80px;
object-fit:cover;
border-radius:6px;
margin:5px;
}

#content{display:none}

.roleBadge{
display:inline-block;
padding:5px 12px;
background:#0d47a1;
color:white;
border-radius:20px;
font-size:13px;
margin-top:5px;
}

.analytics{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}

.card{
flex:1;
background:#fff;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
text-align:center;
}
</style>
</head>

<body>

<header>
<h2>Dashboard</h2>
<div class="roleBadge" id="roleText">Loading...</div>
</header>

<div class="container">

<div id="loading">Loading profile...</div>

<div id="content">

<!-- ANALYTICS -->
<div class="section">
<h3>📊 Analytics</h3>
<div class="analytics">
<div class="card">
Total Views<br><b id="totalViews">0</b>
</div>
<div class="card">
Today<br><b id="todayViews">0</b>
</div>
<div class="card">
This Week<br><b id="weekViews">0</b>
</div>
</div>
</div>

<!-- VIEWERS -->
<div class="section">
<h3>👀 Profile Views</h3>
<div id="viewers">Loading...</div>
</div>

<!-- PROFILE FORM -->
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<input id="experience" placeholder="Experience / Year">
<input id="location" placeholder="Location">

<textarea id="description" placeholder="About"></textarea>

<div class="section">
<h4>Subjects</h4>
<input id="subjects">
</div>

<div class="section">
<h4>Modes</h4>
<input id="modes">
</div>

<div class="section">
<h4>Fee</h4>
<input id="fee">
</div>

<!-- PHOTO -->
<div class="section">
<h4>Profile Photo</h4>
<div class="preview" id="photoPreview"></div>
<input type="file" id="photo">
</div>

<!-- GALLERY -->
<div class="section">
<h4>Gallery Upload</h4>
<input type="file" id="gallery" multiple>
<div class="galleryPreview" id="galleryPreview"></div>
</div>

<button onclick="saveData()">Save Changes</button>
<button class="logout" onclick="logout()">Logout</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getDatabase,
ref,
get,
update,
onValue,
push
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

import {
getAuth,
signOut
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const uid = localStorage.getItem("uid");
const role = localStorage.getItem("role");
const profileId = localStorage.getItem("profileId");

if(!uid || !role || !profileId){
alert("Access Denied");
location.href = "login.html";
}

document.getElementById("roleText").innerText = role.toUpperCase();

const dbPath = role === "teacher"
? "teachers/" + profileId
: "institutions/" + profileId;

const el = (id)=>document.getElementById(id);

/* LOAD PROFILE */
async function loadProfile(){

const snap = await get(ref(db, dbPath));
if(!snap.exists()) return;

const d = snap.val();

el("name").value = d.name || "";
el("phone").value = d.phone || "";
el("email").value = d.email || "";
el("experience").value = d.experience || "";
el("location").value = d.location || "";
el("description").value = d.description || "";

el("subjects").value = (d.subjects||[]).join(", ");
el("modes").value = (d.teachingModes||[]).join(", ");
el("fee").value = d.fee || "";

if(d.photo){
el("photoPreview").innerHTML = `<img src="${d.photo}">`;
}

renderAnalytics(d);
}

loadProfile();

/* VIEWERS */
function loadViewers(){

onValue(ref(db, `profileViews/${profileId}`), snap=>{

let html="";
let count=0;
let today=0;
let week=0;
let now=Date.now();

snap.forEach(c=>{
let v=c.val();
count++;

let diff = now - v.time;

if(diff < 86400000) today++;
if(diff < 7*86400000) week++;

html += `
<div class="viewerCard">
<b>${v.name}</b><br>
${v.email || ""}<br>
🕒 ${new Date(v.time).toLocaleString()}
</div>`;
});

el("viewers").innerHTML = html || "No views";

el("totalViews").innerText = count;
el("todayViews").innerText = today;
el("weekViews").innerText = week;

});
}

loadViewers();

/* GALLERY PREVIEW */
document.getElementById("gallery").addEventListener("change", e=>{
let preview = "";
for(let f of e.target.files){
preview += `<img src="${URL.createObjectURL(f)}">`;
}
el("galleryPreview").innerHTML = preview;
});

/* UPLOAD */
async function upload(file){
let fd=new FormData();
fd.append("image",file);
let r=await fetch("https://api.imgbb.com/1/upload?key=31f729ff855eb2e42c00ee508a8647ea",{method:"POST",body:fd});
let d=await r.json();
return d?.data?.url || "";
}

/* SAVE */
window.saveData = async function(){

let file = el("photo").files[0];
let galleryFiles = el("gallery").files;

let data = {
name:el("name").value,
phone:el("phone").value,
email:el("email").value,
experience:el("experience").value,
location:el("location").value,
description:el("description").value,
subjects:el("subjects").value.split(",").map(x=>x.trim()),
teachingModes:el("modes").value.split(",").map(x=>x.trim()),
fee:el("fee").value
};

if(file) data.photo = await upload(file);

if(galleryFiles.length){
data.gallery = [];
for(let f of galleryFiles){
data.gallery.push(await upload(f));
}
}

await update(ref(db, dbPath), data);

alert("Updated Successfully");
};

/* LOGOUT */
window.logout = async function(){
await signOut(auth);
localStorage.clear();
location.href="login.html";
};

</script>
</body>
</html>
