<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard - GURULINK</title>

<style>

body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#1565c0;
color:white;
padding:15px;
text-align:center;
}

.container{
width:95%;
max-width:900px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

button{
padding:12px;
width:100%;
margin-top:10px;
background:#1565c0;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

button.logout{
background:red;
}

.preview img{
width:90px;
height:90px;
object-fit:cover;
border-radius:8px;
margin:5px;
}

.section{
margin-top:15px;
padding:10px;
border:1px solid #ddd;
border-radius:8px;
}

#content{
display:none;
}

.roleBadge{
display:inline-block;
padding:5px 12px;
background:#1565c0;
color:white;
border-radius:20px;
font-size:13px;
margin-top:5px;
}

</style>
</head>

<body>

<header>
<h2>Dashboard</h2>
<div class="roleBadge" id="roleText">Loading...</div>
</header>

<div class="container">

<div id="loading">Loading your profile...</div>

<div id="content">

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<input id="experience" placeholder="Experience / Established Year">
<input id="location" placeholder="Location / Address">

<textarea id="description" placeholder="About"></textarea>

<div class="section">
<h4>Subjects</h4>
<input id="subjects">
</div>

<div class="section">
<h4>Teaching Modes</h4>
<input id="modes">
</div>

<div class="section">
<h4>Fee</h4>
<input id="fee">
</div>

<div class="section">
<h4>Profile Photo</h4>
<div id="photoPreview"></div>
<input type="file" id="photo">
</div>

<!-- ✅ FIXED STUDENT SECTION -->
<div class="section">
<h3>👀 Interested Students</h3>
<div id="studentList">Loading students...</div>
</div>

<button onclick="saveData()">Save Changes</button>
<button class="logout" onclick="logout()">Logout</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getDatabase,
ref,
get,
update,
onValue
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

import {
getAuth,
signOut
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

/* USER */
const uid = localStorage.getItem("uid");
const role = localStorage.getItem("role");
const profileId = localStorage.getItem("profileId");

/* SECURITY */
if(!uid || !profileId){
alert("Access Denied");
window.location.href = "login.html";
}

/* DB PATH */
const dbPath =
role === "teacher"
? "teachers/" + profileId
: "institutions/" + profileId;

/* LOAD PROFILE */
async function loadProfile(){

const snap = await get(ref(db, dbPath));

if(!snap.exists()){
alert("Profile not found");
return;
}

const d = snap.val();

document.getElementById("name").value = d.name || "";
document.getElementById("phone").value = d.phone || "";
document.getElementById("email").value = d.email || "";
document.getElementById("experience").value = d.experience || "";
document.getElementById("location").value = d.location || "";
document.getElementById("description").value = d.description || "";

document.getElementById("loading").style.display = "none";
document.getElementById("content").style.display = "block";

loadInterestedStudents(); // ✅ IMPORTANT FIX
}

loadProfile();

/* ✅ FIXED INTERESTED STUDENTS */
function loadInterestedStudents(){

const list = document.getElementById("studentList");

onValue(ref(db, "profileViews/" + profileId), async (snap)=>{

if(!snap.exists()){
list.innerHTML = "No interested students yet";
return;
}

const data = snap.val();
let html = "";

for(const studentId in data){

try{
const studentSnap = await get(ref(db, "students/" + studentId));

if(studentSnap.exists()){
const s = studentSnap.val();

html += `
<div style="padding:10px;border:1px solid #ddd;margin:10px 0;border-radius:8px">
<b>${s.name || "Unknown"}</b><br>
📧 ${s.email || "No Email"}<br>
📞 ${s.phone || "No Phone"}<br>
</div>
`;
}
}catch(e){
console.log(e);
}

}

list.innerHTML = html || "No valid students found";
});

}

/* SAVE */
window.saveData = async function(){

let updateData = {
name: name.value,
phone: phone.value,
email: email.value,
experience: experience.value,
location: location.value,
description: description.value,
subjects: subjects.value.split(",").map(x=>x.trim()),
teachingModes: modes.value.split(",").map(x=>x.trim()),
fee: fee.value
};

await update(ref(db, dbPath), updateData);

alert("Updated");
};

/* LOGOUT */
window.logout = async function(){
await signOut(auth);
localStorage.clear();
location.href="login.html";
};

</script>

</body>
</html>
