<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - GURULINK</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#1565c0;
color:white;
padding:15px;
text-align:center;
}

.container{
width:95%;
max-width:900px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#1565c0;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button.logout{
background:red;
}

.section{
margin-top:15px;
padding:10px;
border:1px solid #ddd;
border-radius:8px;
}

.preview img{
width:80px;
height:80px;
border-radius:10px;
object-fit:cover;
}

.studentCard{
background:#f9f9ff;
padding:10px;
margin-top:8px;
border-left:4px solid #1565c0;
border-radius:8px;
}
</style>
</head>

<body>

<header>
<h2>Dashboard</h2>
<div id="roleText">Loading...</div>
</header>

<div class="container">

<div id="loading">Loading...</div>

<div id="content" style="display:none">

<h3>Edit Profile</h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<input id="experience" placeholder="Experience / Year">
<input id="location" placeholder="Location">

<textarea id="description" placeholder="Description"></textarea>

<div class="section">
<h4>Subjects</h4>
<input id="subjects" placeholder="Math, Physics">
</div>

<div class="section">
<h4>Teaching Modes</h4>
<input id="modes" placeholder="Online, Offline">
</div>

<div class="section">
<h4>Fee</h4>
<input id="fee">
</div>

<div class="section">
<h4>Photo</h4>
<div class="preview" id="photoPreview"></div>
<input type="file" id="photo">
</div>

<button onclick="saveData()">Save Changes</button>

<button class="logout" onclick="logout()">Logout</button>

<hr>

<h3>👀 Students Who Viewed Your Profile</h3>
<div id="views">Loading views...</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getDatabase,
ref,
get,
update,
onValue
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

import {
getAuth,
signOut
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

/* USER DATA */
const uid = localStorage.getItem("uid");
const role = localStorage.getItem("role");
const profileId = localStorage.getItem("profileId");

if(!uid || !role){
alert("Login required");
location.href="login.html";
}

const dbPath =
role === "teacher"
? "teachers/" + profileId
: "institutions/" + profileId;

/* LOAD PROFILE */
async function loadProfile(){

const snap = await get(ref(db, dbPath));

if(!snap.exists()){
alert("Profile not found");
return;
}

const d = snap.val();

name.value = d.name || "";
phone.value = d.phone || "";
email.value = d.email || "";
experience.value = d.experience || d.establishedDate || "";
location.value = d.location || "";
description.value = d.description || "";

subjects.value = (d.subjects || []).join(", ");
modes.value = (d.teachingModes || []).join(", ");
fee.value = d.fee || "";

if(d.photo){
photoPreview.innerHTML = `<img src="${d.photo}">`;
}

loading.style.display="none";
content.style.display="block";

loadViews();
}

loadProfile();

/* IMAGE UPLOAD */
const API_KEY = "31f729ff855eb2e42c00ee508a8647ea";

async function upload(file){
let fd = new FormData();
fd.append("image", file);

let res = await fetch(
`https://api.imgbb.com/1/upload?key=${API_KEY}`,
{ method:"POST", body:fd }
);

let data = await res.json();
return data?.data?.url || "";
}

/* SAVE PROFILE */
window.saveData = async function(){

let file = photo.files[0];
let photoUrl = "";

if(file){
photoUrl = await upload(file);
}

let updateData = {
name:name.value,
phone:phone.value,
email:email.value,
experience:experience.value,
location:location.value,
description:description.value,
subjects:subjects.value.split(",").map(x=>x.trim()).filter(Boolean),
teachingModes:modes.value.split(",").map(x=>x.trim()).filter(Boolean),
fee:fee.value
};

if(photoUrl){
updateData.photo = photoUrl;
}

await update(ref(db, dbPath), updateData);

alert("Updated!");
};

/* LOAD STUDENT VIEWS */
function loadViews(){

onValue(ref(db, "profileViews/" + profileId), (snap)=>{

let html = "";

snap.forEach(child=>{

let d = child.val();

html += `
<div class="studentCard">
<b>${d.name || "Unknown"}</b><br>
📧 ${d.email || "-"}<br>
📞 ${d.phone || "-"}
</div>
`;

});

views.innerHTML = html || "No views yet";

});
}

/* LOGOUT */
window.logout = async function(){
await signOut(auth);
localStorage.clear();
location.href="login.html";
};

</script>

</body>
</html>
