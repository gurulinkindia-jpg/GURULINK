<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - GURULINK</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#1565c0;
color:white;
padding:15px;
text-align:center;
}

.container{
width:95%;
max-width:900px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

button{
padding:12px;
width:100%;
margin-top:10px;
background:#1565c0;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

button.logout{background:red;}

.section{
margin-top:15px;
padding:10px;
border:1px solid #ddd;
border-radius:8px;
}

.viewerCard{
padding:10px;
border:1px solid #ddd;
border-radius:8px;
margin-top:8px;
background:#f9f9ff;
}

.preview img{
width:90px;
height:90px;
object-fit:cover;
border-radius:8px;
margin:5px;
}

#content{display:none}

.roleBadge{
display:inline-block;
padding:5px 12px;
background:#0d47a1;
color:white;
border-radius:20px;
font-size:13px;
margin-top:5px;
}

.analyticsBox{
padding:10px;
background:#eef3ff;
border-radius:8px;
margin-top:10px;
}

.galleryPreview img{
width:80px;
height:80px;
object-fit:cover;
border-radius:8px;
margin:5px;
}
</style>
</head>

<body>

<header>
<h2>Dashboard</h2>
<div class="roleBadge" id="roleText">Loading...</div>
</header>

<div class="container">

<div id="loading">Loading profile...</div>

<div id="content">

<!-- VIEWERS -->
<div class="section">
<h3>👀 Profile Views</h3>
<div id="viewers"></div>
</div>

<!-- ANALYTICS -->
<div class="section">
<h3>📊 Analytics</h3>
<div id="analytics" class="analyticsBox"></div>
</div>

<!-- PROFILE FORM -->
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<input id="experience" placeholder="Experience / Year">
<input id="location" placeholder="Location">

<textarea id="description" placeholder="About"></textarea>

<div class="section">
<h4>Subjects</h4>
<input id="subjects">
</div>

<div class="section">
<h4>Teaching Modes</h4>
<input id="modes">
</div>

<div class="section">
<h4>Fee</h4>
<input id="fee">
</div>

<!-- PROFILE PHOTO -->
<div class="section">
<h4>Profile Photo</h4>
<div class="preview" id="photoPreview"></div>
<input type="file" id="photo">
</div>

<!-- GALLERY -->
<div class="section">
<h4>Image Gallery</h4>
<input type="file" id="galleryInput" multiple>
<div class="galleryPreview" id="galleryPreview"></div>
</div>

<button onclick="saveData()">Save Changes</button>
<button class="logout" onclick="logout()">Logout</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getDatabase, ref, get, update, onValue, push
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

import {
getAuth, signOut
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
apiKey:"AIzaSyBK0Q...",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const uid = localStorage.getItem("uid");
const role = localStorage.getItem("role");
const profileId = localStorage.getItem("profileId");

if(!uid || !role || !profileId){
alert("Access Denied");
location.href="login.html";
}

roleText.innerText = role.toUpperCase();

const dbPath = role==="teacher"
? "teachers/"+profileId
: "institutions/"+profileId;

/* LOAD PROFILE */
async function loadProfile(){

const snap = await get(ref(db,dbPath));
const d = snap.val();

name.value=d.name||"";
phone.value=d.phone||"";
email.value=d.email||"";
experience.value=d.experience||"";
location.value=d.location||"";
description.value=d.description||"";

subjects.value=(d.subjects||[]).join(",");
modes.value=(d.teachingModes||[]).join(",");
fee.value=d.fee||"";

if(d.photo){
photoPreview.innerHTML=`<img src="${d.photo}">`;
}

if(d.gallery){
galleryPreview.innerHTML = d.gallery.map(img=>`<img src="${img}">`).join("");
}

loading.style.display="none";
content.style.display="block";
}
loadProfile();

/* VIEWERS */
function loadViewers(){

onValue(ref(db,"profileViews/"+profileId),(snap)=>{

let html="";
let count=0;
let today=0;
let week=0;
let now=Date.now();

snap.forEach(v=>{
let data=v.val();
count++;

let diff = now - data.time;
if(diff < 86400000) today++;
if(diff < 7*86400000) week++;

html+=`
<div class="viewerCard">
<b>${data.name}</b><br>
${data.email}<br>
${new Date(data.time).toLocaleString()}
</div>`;
});

viewers.innerHTML = html || "No views yet";

analytics.innerHTML=`
Total Views: ${count}<br>
Today: ${today}<br>
This Week: ${week}
`;

});

}
loadViewers();

/* IMAGE UPLOAD */
async function upload(file){
let fd=new FormData();
fd.append("image",file);

let res=await fetch(
"https://api.imgbb.com/1/upload?key=31f729ff855eb2e42c00ee508a8647ea",
{method:"POST",body:fd});

let data=await res.json();
return data?.data?.url||"";
}

/* SAVE */
window.saveData = async function(){

let file=photo.files[0];
let galleryFiles=galleryInput.files;

let data={
name:name.value,
phone:phone.value,
email:email.value,
experience:experience.value,
location:location.value,
description:description.value,
subjects:subjects.value.split(",").map(x=>x.trim()),
teachingModes:modes.value.split(",").map(x=>x.trim()),
fee:fee.value,
gallery:[]
};

if(file){
data.photo=await upload(file);
}

/* GALLERY UPLOAD */
if(galleryFiles.length){
for(let f of galleryFiles){
let url=await upload(f);
data.gallery.push(url);
}
}

await update(ref(db,dbPath),data);

alert("Profile Updated Successfully");
};

/* LOGOUT */
window.logout=async()=>{
await signOut(auth);
localStorage.clear();
location.href="login.html";
};

</script>

</body>
</html>
