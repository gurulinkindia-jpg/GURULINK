<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - GURULINK</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#1565c0;
color:white;
padding:15px;
text-align:center;
}

.container{
width:95%;
max-width:900px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

button{
padding:12px;
width:100%;
margin-top:10px;
background:#1565c0;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

button.logout{
background:red;
}

.preview img{
width:90px;
height:90px;
object-fit:cover;
border-radius:8px;
margin:5px;
}

.section{
margin-top:15px;
padding:10px;
border:1px solid #ddd;
border-radius:8px;
}

#content{display:none}

.roleBadge{
display:inline-block;
padding:5px 12px;
background:#1565c0;
color:white;
border-radius:20px;
font-size:13px;
margin-top:5px;
}

.viewBox{
background:#f5f7ff;
padding:10px;
margin-top:10px;
border-radius:8px;
border-left:4px solid #1976d2;
}
</style>
</head>

<body>

<header>
<h2>Dashboard</h2>
<div class="roleBadge" id="roleText">Loading...</div>
</header>

<div class="container">

<div id="loading">Loading your profile...</div>

<div id="content">

<!-- PROFILE FIELDS -->
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<input id="experience" placeholder="Experience / Established Year">
<input id="location" placeholder="Location / Address">
<textarea id="description" placeholder="About"></textarea>

<div class="section">
<h4>Subjects (comma separated)</h4>
<input id="subjects">
</div>

<div class="section">
<h4>Teaching Modes (comma separated)</h4>
<input id="modes">
</div>

<div class="section">
<h4>Fee</h4>
<input id="fee">
</div>

<div class="section">
<h4>Profile Photo / Logo</h4>
<div id="photoPreview" class="preview"></div>
<input type="file" id="photo">
</div>

<button onclick="saveData()">Save Changes</button>

<button class="logout" onclick="logout()">Logout</button>

<!-- 👁 PROFILE VIEWS -->
<div class="section">
<h3>👁 Students Who Viewed Your Profile</h3>
<div id="viewsBox">Loading views...</div>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
getDatabase,
ref,
get,
update,
onValue
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

import {
getAuth,
signOut
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

/* USER */
const uid = localStorage.getItem("uid");
const role = localStorage.getItem("role");
const profileId = localStorage.getItem("profileId");

document.getElementById("roleText").innerText = role || "User";

if(!uid || !role || !profileId){
alert("Access Denied");
location.href = "login.html";
}

/* DB PATH */
const dbPath = role === "teacher"
? "teachers/" + profileId
: "institutions/" + profileId;

/* LOAD PROFILE */
async function loadProfile(){

const snap = await get(ref(db, dbPath));

if(!snap.exists()){
alert("Profile not found");
return;
}

const d = snap.val();

name.value = d.name || "";
phone.value = d.phone || "";
email.value = d.email || "";
experience.value = d.experience || d.establishedDate || "";
location.value = d.location || d.address || "";
description.value = d.description || "";

subjects.value = Array.isArray(d.subjects) ? d.subjects.join(", ") : "";
modes.value = Array.isArray(d.teachingModes) ? d.teachingModes.join(", ") : "";
fee.value = d.fee || "";

if(d.photo || d.logo){
photoPreview.innerHTML = `<img src="${d.photo || d.logo}">`;
}

loading.style.display = "none";
content.style.display = "block";
}

loadProfile();

/* IMAGE UPLOAD */
const API_KEY = "31f729ff855eb2e42c00ee508a8647ea";

async function upload(file){
let fd = new FormData();
fd.append("image", file);

let res = await fetch(
`https://api.imgbb.com/1/upload?key=${API_KEY}`,
{method:"POST", body:fd}
);

let data = await res.json();
return data?.data?.url || "";
}

/* SAVE PROFILE */
window.saveData = async function(){

try{

let file = photo.files[0];
let photoUrl = "";

if(file){
photoUrl = await upload(file);
}

let updateData = {
name: name.value,
phone: phone.value,
email: email.value,
experience: experience.value,
location: location.value,
description: description.value,
subjects: subjects.value.split(",").map(x=>x.trim()).filter(Boolean),
teachingModes: modes.value.split(",").map(x=>x.trim()).filter(Boolean),
fee: fee.value
};

if(photoUrl){
updateData.photo = photoUrl;
}

await update(ref(db, dbPath), updateData);

alert("Profile Updated Successfully");

}catch(err){
alert(err.message);
}
};

/* PROFILE VIEWS */
function loadProfileViews(){

const viewsRef = ref(db, `profileViews/${profileId}`);

onValue(viewsRef,(snap)=>{

if(!snap.exists()){
viewsBox.innerHTML = "No views yet";
return;
}

let html = "";

snap.forEach(v=>{

let d = v.val();

html += `
<div class="viewBox">
<b>${d.name || "Student"}</b><br>
📧 ${d.email || "-"}<br>
📞 ${d.phone || "-"}<br>
🕒 ${new Date(d.time).toLocaleString()}
</div>
`;

});

viewsBox.innerHTML = html;

});

}

loadProfileViews();

/* LOGOUT */
window.logout = async function(){
await signOut(auth);
localStorage.clear();
location.href = "login.html";
};

</script>

</body>
</html>
