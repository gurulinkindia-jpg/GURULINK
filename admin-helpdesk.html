<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Helpdesk Admin Panel</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

header{
background:#000;
color:white;
padding:15px;
text-align:center;
}

.container{
max-width:950px;
margin:20px auto;
background:white;
padding:15px;
border-radius:10px;
}

.ticket{
border:1px solid #ddd;
padding:12px;
margin:10px 0;
border-radius:8px;
background:#fff;
}

.ticket p{
margin:5px 0;
}

button{
margin:5px;
padding:8px 10px;
border:none;
border-radius:5px;
cursor:pointer;
font-size:13px;
}

.resolve{background:green;color:white;}
.reject{background:red;color:white;}
.view{background:#1565c0;color:white;}
.delete{background:#444;color:white;}
.clearAll{background:#b71c1c;color:white;float:right;}
</style>
</head>

<body>

<header>
<h2>Helpdesk Admin Panel</h2>
<button class="clearAll" onclick="clearAllTickets()">🧨 Delete ALL Tickets</button>
</header>

<div class="container" id="tickets"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const box = document.getElementById("tickets");

/* LOAD TICKETS */
onValue(ref(db,"tickets"), snap => {

box.innerHTML = "";

snap.forEach(child => {

const t = child.val();
const id = child.key;

const div = document.createElement("div");
div.className="ticket";

div.innerHTML = `
<p><b>Ticket No:</b> ${t.ticketNo || "N/A"}</p>
<p><b>Name:</b> ${t.name || "N/A"}</p>
<p><b>Role:</b> ${t.role || "N/A"}</p>
<p><b>Phone:</b> ${t.phone || "N/A"}</p>
<p><b>Email:</b> ${t.email || "N/A"}</p>
<p><b>Category:</b> ${t.category || "N/A"}</p>
<p><b>Message:</b> ${t.message}</p>
<p><b>Status:</b> ${t.status}</p>

<button class="resolve" onclick="resolveTicket('${id}')">Resolve</button>
<button class="reject" onclick="rejectTicket('${id}')">Reject</button>
<button class="delete" onclick="deleteTicket('${id}')">Delete</button>
`;

box.appendChild(div);
});

});

/* RESOLVE */
window.resolveTicket = async function(id){
await update(ref(db,"tickets/"+id),{status:"resolved"});
};

/* REJECT */
window.rejectTicket = async function(id){
await update(ref(db,"tickets/"+id),{status:"not_resolved"});
};

/* DELETE SINGLE */
window.deleteTicket = async function(id){
if(confirm("Delete this ticket permanently?")){
await remove(ref(db,"tickets/"+id));
}
};

/* DELETE ALL */
window.clearAllTickets = async function(){
if(confirm("⚠ Delete ALL tickets from database? This cannot be undone!")){
await remove(ref(db,"tickets"));
}
};

</script>

</body>
</html>
