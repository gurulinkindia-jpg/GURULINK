<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Helpdesk Admin Panel</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#eef2f7;
color:#1f2933;
}

header{
background:linear-gradient(135deg,#0f766e,#1565c0);
color:white;
padding:15px;
box-shadow:0 3px 14px rgba(0,0,0,.16);
}

.headerInner{
max-width:1100px;
margin:auto;
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
flex-wrap:wrap;
}

.headerInner h2{
margin:0;
font-size:22px;
}

.container{
max-width:1100px;
margin:20px auto;
padding:0 12px 20px;
}

.summary{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
margin:14px 0;
}

.summaryCard{
background:white;
border-radius:14px;
padding:12px;
box-shadow:0 4px 14px rgba(0,0,0,.08);
border-left:6px solid #1565c0;
}

.summaryCard b{
display:block;
font-size:12px;
color:#667085;
margin-bottom:6px;
}

.summaryCard span{
font-size:24px;
font-weight:bold;
color:#0f172a;
}

.summaryOpen{border-left-color:#f57c00;background:#fffaf0;}
.summaryResolved{border-left-color:#2e7d32;background:#f4fff6;}
.summaryRejected{border-left-color:#d32f2f;background:#fff5f5;}
.summaryTotal{border-left-color:#1565c0;background:#f8fbff;}

.toolbar{
background:white;
border-radius:14px;
padding:10px;
box-shadow:0 4px 14px rgba(0,0,0,.08);
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
margin-bottom:12px;
flex-wrap:wrap;
}

.toolbar input{
flex:1;
min-width:220px;
padding:10px;
border:1px solid #d9e2ec;
border-radius:9px;
outline:none;
}

.ticketsGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(290px,1fr));
gap:12px;
}

.ticket{
border:1px solid #d9e2ec;
border-left:6px solid #f57c00;
padding:12px;
border-radius:14px;
background:#fff;
box-shadow:0 4px 14px rgba(0,0,0,.08);
overflow:hidden;
}

.ticket.openTicket{
border-left-color:#f57c00;
background:#fffaf0;
}

.ticket.resolvedTicket{
border-left-color:#2e7d32;
background:#f4fff6;
}

.ticket.rejectedTicket{
border-left-color:#d32f2f;
background:#fff5f5;
}

.ticketHeader{
display:flex;
align-items:flex-start;
justify-content:space-between;
gap:8px;
margin-bottom:8px;
}

.ticketHeader h3{
margin:0;
font-size:16px;
line-height:1.25;
word-break:break-word;
}

.statusBadge{
display:inline-block;
padding:5px 8px;
border-radius:999px;
font-size:11px;
font-weight:bold;
white-space:nowrap;
background:#f57c00;
color:white;
}

.statusBadge.resolved{
background:#2e7d32;
}

.statusBadge.rejected{
background:#d32f2f;
}

.ticket p{
margin:5px 0;
font-size:13px;
line-height:1.35;
word-break:break-word;
}

.buttonRow{
display:flex;
flex-wrap:wrap;
gap:5px;
margin:8px 0;
}

button{
margin:0;
padding:8px 10px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:13px;
font-weight:bold;
}

.resolve{background:green;color:white;}
.reject{background:red;color:white;}
.delete{background:#444;color:white;}

.call{background:#2e7d32;color:white;}
.whatsapp{background:#25D366;color:white;}
.email{background:#1565c0;color:white;}

.clearAll{background:#b71c1c;color:white;}

.chatBox{
margin-top:12px;
padding:10px;
background:rgba(255,255,255,.75);
border:1px solid #d9e2ec;
border-radius:10px;
}

.chatMessages{
max-height:220px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:8px;
margin-bottom:10px;
}

.chatMsg{
padding:8px 10px;
border-radius:8px;
line-height:1.4;
font-size:13px;
max-width:90%;
word-break:break-word;
}

.chatMsg.user{background:#e3f2fd;align-self:flex-start;}
.chatMsg.admin{background:#e8f5e9;align-self:flex-end;}

.chatMeta{
display:block;
font-size:11px;
color:#666;
margin-top:4px;
}

.replyRow{
display:flex;
gap:8px;
}

.replyRow textarea{
flex:1;
min-height:46px;
resize:vertical;
padding:9px;
border:1px solid #ccc;
border-radius:7px;
font-family:Arial;
}

.sendReply{background:#00897b;color:white;}

@media(max-width:650px){
.headerInner h2{font-size:18px;}
.container{margin:10px auto;padding:0 10px 15px;}
.ticketsGrid{grid-template-columns:1fr;}
.toolbar input{min-width:100%;}
.replyRow{flex-direction:column;}
.replyRow button{width:100%;margin:0;}
.buttonRow button{flex:1;}
}
</style>
<link rel="icon" type="image/png" href="https://i.ibb.co/0RT0BQKq/GURULINK-Logo-1.png">
<link rel="shortcut icon" href="https://i.ibb.co/0RT0BQKq/GURULINK-Logo-1.png">
<link rel="apple-touch-icon" href="https://i.ibb.co/0RT0BQKq/GURULINK-Logo-1.png">
</head>

<body>

<header>
<div class="headerInner">
<h2>Helpdesk Admin Panel</h2>
<button class="clearAll" onclick="clearAllTickets()">Delete ALL Tickets</button>
</div>
</header>

<div class="container">

<div class="summary">
<div class="summaryCard summaryOpen"><b>New / Open Tickets</b><span id="openTicketCount">0</span></div>
<div class="summaryCard summaryResolved"><b>Resolved Tickets</b><span id="resolvedTicketCount">0</span></div>
<div class="summaryCard summaryRejected"><b>Not Resolved</b><span id="rejectedTicketCount">0</span></div>
<div class="summaryCard summaryTotal"><b>Total Tickets</b><span id="totalTicketCount">0</span></div>
</div>

<div class="toolbar">
<input id="ticketSearch" placeholder="Search ticket, name, phone, email, category..." oninput="renderTickets()">
<button class="resolve" onclick="filterTickets('open')">Open</button>
<button class="resolve" onclick="filterTickets('resolved')">Resolved</button>
<button class="reject" onclick="filterTickets('not_resolved')">Not Resolved</button>
<button class="email" onclick="filterTickets('all')">All</button>
</div>

<div class="ticketsGrid" id="tickets"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, get, onValue, update, remove, push } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyBK0QmU6y1wDlZkna2ciE-tf-P8pZAjhBk",
authDomain:"gurulink-59cc7.firebaseapp.com",
databaseURL:"https://gurulink-59cc7-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"gurulink-59cc7",
storageBucket:"gurulink-59cc7.appspot.com",
messagingSenderId:"112148672399",
appId:"1:112148672399:web:f5fe5cd6e5c5ef4382e5fa"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const box = document.getElementById("tickets");
let allTickets = [];
let activeFilter = "all";
let isAdmin = false;

function escapeHtml(value){
return String(value ?? "").replace(/[&<>"]/g, c => ({
"&":"&amp;",
"<":"&lt;",
">":"&gt;",
"\"":"&quot;"
}[c]));
}

function formatTime(time){
return time ? new Date(time).toLocaleString() : "";
}

function chatHtml(messages){
const list =
Object.values(messages || {})
.sort((a,b)=>(a.time || 0) - (b.time || 0));

if(!list.length){
return `<div class="chatMsg user">No chat messages yet.</div>`;
}

return list.map(msg => `
<div class="chatMsg ${msg.sender === "admin" ? "admin" : "user"}">
${escapeHtml(msg.text)}
<span class="chatMeta">${msg.sender === "admin" ? "Admin" : "User"} - ${formatTime(msg.time)}</span>
</div>
`).join("");
}

function normalizeStatus(status){
return status || "open";
}

function ticketClass(status){
status = normalizeStatus(status);
if(status === "resolved") return "resolvedTicket";
if(status === "not_resolved") return "rejectedTicket";
return "openTicket";
}

function statusBadgeClass(status){
status = normalizeStatus(status);
if(status === "resolved") return "resolved";
if(status === "not_resolved") return "rejected";
return "";
}

function updateSummary(){
const total = allTickets.length;
const open = allTickets.filter(t => normalizeStatus(t.data.status) === "open").length;
const resolved = allTickets.filter(t => normalizeStatus(t.data.status) === "resolved").length;
const rejected = allTickets.filter(t => normalizeStatus(t.data.status) === "not_resolved").length;

document.getElementById("openTicketCount").innerText = open;
document.getElementById("resolvedTicketCount").innerText = resolved;
document.getElementById("rejectedTicketCount").innerText = rejected;
document.getElementById("totalTicketCount").innerText = total;
}

function ticketMatches(t,query){
const d = t.data;
const text = [
d.ticketNo,
d.name,
d.role,
d.phone,
d.email,
d.category,
d.message,
d.status
].join(" ").toLowerCase();

return text.includes(query);
}

window.filterTickets = function(status){
activeFilter = status;
renderTickets();
};

window.renderTickets = function(){
const query =
(document.getElementById("ticketSearch")?.value || "")
.trim()
.toLowerCase();

let list = allTickets.filter(t => {
const status = normalizeStatus(t.data.status);
const filterOk = activeFilter === "all" || status === activeFilter;
const searchOk = !query || ticketMatches(t,query);
return filterOk && searchOk;
});

list.sort((a,b)=>(b.data.time || b.data.lastUserMessageAt || b.data.lastReplyAt || 0) - (a.data.time || a.data.lastUserMessageAt || a.data.lastReplyAt || 0));

box.innerHTML = "";

if(!list.length){
box.innerHTML = `<div class="ticket openTicket"><p>No tickets found.</p></div>`;
return;
}

list.forEach(item => {
const t = item.data;
const id = item.id;

const phone = t.phone || "";
const email = t.email || "";
const status = normalizeStatus(t.status);

const div = document.createElement("div");
div.className = "ticket " + ticketClass(status);

div.innerHTML = `
<div class="ticketHeader">
<h3>${escapeHtml(t.name || "No Name")}</h3>
<span class="statusBadge ${statusBadgeClass(status)}">${escapeHtml(status)}</span>
</div>
<p><b>Ticket No:</b> ${escapeHtml(t.ticketNo || "N/A")}</p>
<p><b>Role:</b> ${escapeHtml(t.role || "N/A")}</p>
<p><b>Phone:</b> ${escapeHtml(phone)}</p>
<p><b>Email:</b> ${escapeHtml(email)}</p>
<p><b>Category:</b> ${escapeHtml(t.category || "N/A")}</p>
<p><b>Message:</b> ${escapeHtml(t.message || "")}</p>
<p><b>Created:</b> ${formatTime(t.time)}</p>

<div class="buttonRow">
<button class="resolve" onclick="resolveTicket('${id}')">Resolve</button>
<button class="reject" onclick="rejectTicket('${id}')">Reject</button>
<button class="delete" onclick="deleteTicket('${id}')">Delete</button>
<button class="call" onclick="callUser('${phone}')">Call</button>
<button class="whatsapp" onclick="whatsappUser('${phone}')">WhatsApp</button>
<button class="email" onclick="emailUser('${email}')">Email</button>
</div>

<div class="chatBox">
<b>Ticket Chat</b>
<div class="chatMessages">${chatHtml(t.chatMessages)}</div>
<div class="replyRow">
<textarea id="reply_${id}" placeholder="Type admin reply..."></textarea>
<button class="sendReply" onclick="sendAdminReply('${id}')">Send Reply</button>
</div>
</div>
`;

box.appendChild(div);
});
};

function loadTickets(){
onValue(ref(db,"tickets"), snap => {

allTickets = [];

snap.forEach(child => {
allTickets.push({
id:child.key,
data:child.val()
});
});

updateSummary();
renderTickets();

});
}

onAuthStateChanged(auth, async (user)=>{
if(!user){
box.innerHTML = `<div class="ticket openTicket"><p>Please login as admin first.</p></div>`;
return;
}

const adminSnap = await get(ref(db,"admins/"+user.uid));

if(!adminSnap.exists()){
box.innerHTML = `<div class="ticket rejectedTicket"><p>This account is not admin.</p></div>`;
return;
}

isAdmin = true;
loadTickets();
});

/* ACTIONS */
window.resolveTicket = async (id)=>{
if(!isAdmin) return alert("Admin login required.");
await update(ref(db,"tickets/"+id),{status:"resolved"});
};

window.rejectTicket = async (id)=>{
if(!isAdmin) return alert("Admin login required.");
await update(ref(db,"tickets/"+id),{status:"not_resolved"});
};

window.sendAdminReply = async (id)=>{
if(!isAdmin) return alert("Admin login required.");
const input = document.getElementById("reply_"+id);
const text = input.value.trim();

if(!text){
alert("Please type a reply.");
return;
}

await push(ref(db,"tickets/"+id+"/chatMessages"),{
sender:"admin",
text,
time:Date.now()
});

await update(ref(db,"tickets/"+id),{
lastReply:text,
lastReplyAt:Date.now()
});

input.value = "";
};

window.deleteTicket = async (id)=>{
if(!isAdmin) return alert("Admin login required.");
if(confirm("Delete this ticket?")){
await remove(ref(db,"tickets/"+id));
}
};

window.clearAllTickets = async ()=>{
if(!isAdmin) return alert("Admin login required.");
if(confirm("Delete ALL tickets?")){
await remove(ref(db,"tickets"));
}
};

/* CONTACT BUTTONS */
window.callUser = (phone)=>{
if(!phone) return alert("No phone number");
window.location.href = `tel:${phone}`;
};

window.whatsappUser = (phone)=>{
if(!phone) return alert("No phone number");
let msg = encodeURIComponent("Hello, regarding your support ticket.");
window.open(`https://wa.me/${phone}?text=${msg}`,"_blank");
};

window.emailUser = (email)=>{
if(!email) return alert("No email");
window.location.href = `mailto:${email}?subject=Support%20Ticket%20Update`;
};

</script>

</body>
</html>
